function getSystemTheme() {
  if (typeof window.__nativeDarkMode === 'boolean') return window.__nativeDarkMode ? 'dark' : 'light';
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

window.applyNativeTheme = function applyNativeTheme(isDark) {
  window.__nativeDarkMode = Boolean(isDark);
  if (state.uiConfig.theme === 'system') {
    applyUiConfig();
  }
};

function hexToSoft(hex) {
  const rgb = hexToRgb(hex);
  if (!rgb) return 'rgba(31,143,98,.12)';
  return `rgba(${rgb.r},${rgb.g},${rgb.b},.12)`;
}

function rgbaFromHex(hex, alpha) {
  const rgb = hexToRgb(hex);
  if (!rgb) return `rgba(31,143,98,${alpha})`;
  return `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
}

function hexToRgb(hex) {
  const clean = String(hex || '#1f8f62').replace('#', '');
  const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
  const r = parseInt(full.slice(0, 2), 16);
  const g = parseInt(full.slice(2, 4), 16);
  const b = parseInt(full.slice(4, 6), 16);
  if ([r, g, b].some(Number.isNaN)) return null;
  return { r, g, b };
}

async function loadBundledBanks() {
  state.loadingDefaults = true;
  state.defaultLoadError = '';
  renderHome();

  const imported = state.banks.filter(b => !b.bundled);
  const loaded = [];
  const embeddedBanks = Array.isArray(window.__QUIZAPP_EMBEDDED_BANKS__) ? window.__QUIZAPP_EMBEDDED_BANKS__ : null;

  if (embeddedBanks && embeddedBanks.length) {
    state.banks = [
      ...embeddedBanks.map((data, i) => normalizeBank(data, `embedded:${i}`, true)),
      ...imported,
    ];
    applyBankMeta();
    state.loadingDefaults = false;
    renderHome();
    return;
  }

  for (const file of DEFAULT_BANK_FILES_RUNTIME) {
    try {
      const data = await loadBankJson(file);
      loaded.push(normalizeBank(data, `bundled:${file}`, true));
    } catch(e) {
      state.defaultLoadError = '内置题库加载失败，请检查 APK 是否为最新版。';
      console.warn('[QuizApp] bundled bank load failed:', file, e);
    }
  }

  state.banks = [...loaded, ...imported];
  applyBankMeta();
  state.loadingDefaults = false;
  renderHome();
}

function getBankUrl(file) {
  return `data/${String(file).split('/').map(part => encodeURIComponent(part)).join('/')}`;
}

async function loadBankJson(file) {
  const url = getBankUrl(file);
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return await res.json();
  } catch(fetchError) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.overrideMimeType('application/json;charset=utf-8');
      xhr.onload = () => {
        if (xhr.status === 0 || (xhr.status >= 200 && xhr.status < 300)) {
          try {
            resolve(JSON.parse(xhr.responseText));
          } catch(parseError) {
            reject(parseError);
          }
          return;
        }
        reject(new Error(`${xhr.status} ${xhr.statusText || 'XHR failed'}`));
      };
      xhr.onerror = () => reject(fetchError);
      xhr.send();
    });
  }
}

// ========== Question helpers ==========
function getType(q) {
  const raw = String(q.type || '').trim().toLowerCase();
  if (raw === 'single' || raw === '单选') return 'single';
  if (raw === 'multi' || raw === '多选' || raw === 'multiple') return 'multi';
  if (raw === 'bool' || raw === '判断' || raw === 'tf' || raw === 'truefalse') return 'bool';
  return 'single';
}

function getTypeLabel(t) {
  return { single: '单选', multi: '多选', bool: '判断' }[t] || '单选';
}

function getOptions(q) {
  const t = getType(q);
  if (t === 'bool') return ['对', '错'];
  if (Array.isArray(q.options) && q.options.length) return normalizeOptions(q.options);
  if (q.options && typeof q.options === 'object') return normalizeOptions(Object.values(q.options));
  return ['A', 'B', 'C', 'D'];
}

function normalizeOptions(options) {
  const raw = Array.isArray(options) ? options.map(o => String(o || '').trim()).filter(Boolean) : [];
  if (!raw.length) return [];

  if (raw.length === 1) {
    const split = splitOptionBlock(raw[0]);
    if (split.length > 1) return split;
  }

  return raw.flatMap(item => {
    const split = splitOptionBlock(item);
    return split.length > 1 ? split : [stripOptionLabel(item)];
  }).map(o => o.trim()).filter(Boolean);
}

function splitOptionBlock(text) {
  const clean = String(text || '')
    .replace(/\u200b|\u200c|\u200d|\ufeff/g, '')
    .replace(/\r/g, '\n')
    .trim();
  const matches = [];
  const re = /(?:^|\n)\s*([A-H])(?:[.．、]|[\s])+\s*([\s\S]*?)(?=\n\s*[A-H](?:[.．、]|[\s])+\s*|$)/g;
  let match;
  while ((match = re.exec(clean))) {
    const value = stripOptionLabel(match[2]).trim();
    if (value) matches.push(value);
  }
  return matches;
}

function stripOptionLabel(text) {
  return String(text || '').replace(/^\s*[A-H](?:[.．、]|\s+)\s*/i, '').trim();
}

function isBooleanOptionSet(options) {
  const normalized = (options || [])
    .map(item => stripOptionLabel(item).replace(/\s/g, '').toLowerCase())
    .filter(Boolean);
  if (!normalized.length || normalized.length > 2) return false;
  const boolValues = new Set(['对', '错', '正确', '错误', '是', '否', 'true', 'false', 't', 'f', 'yes', 'no', 'y', 'n', '1', '0', '√', '×', '✓', '✗']);
  return normalized.every(item => boolValues.has(item));
}

function looksLikeBooleanAnswer(value) {
  const raw = String(value ?? '').trim();
  const upper = raw.toUpperCase();
  return ['TRUE', 'FALSE', 'T', 'F', 'YES', 'NO', 'Y', 'N', '1', '0', '对', '错', '正确', '错误', '是', '否', '√', '×', '✓', '✗'].includes(upper)
    || ['对', '错', '正确', '错误', '是', '否', '√', '×', '✓', '✗'].includes(raw);
}

function cleanQuestionText(text) {
  return String(text || '')
    .replace(/\u200b|\u200c|\u200d|\ufeff/g, '')
    .replace(/[─━]{5,}/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function inferQuestionType(raw, rawAnswer, options) {
  const declared = getType(raw);
  const rawText = String(raw.type || raw['题型'] || '');
  const answerLetters = String(rawAnswer ?? '').toUpperCase().split('').filter(c => c >= 'A' && c <= 'Z');
  const optionCount = (options || []).length;

  if (rawText.includes('多选') || answerLetters.length > 1) return 'multi';
  if (optionCount >= 3) return 'single';
  if ((rawText.includes('判断') || declared === 'bool' || looksLikeBooleanAnswer(rawAnswer)) && isBooleanOptionSet(options)) return 'bool';
  if (rawText.includes('单选')) return 'single';
  return declared;
}

function normalizeQuestion(q, i) {
  const raw = q || {};
  const question = raw.q || raw.question || raw['题目'] || raw.title || '';
  const answerValue = raw.ans ?? raw.answer ?? raw['答案'] ?? raw.correct;
  const options = normalizeOptions(Array.isArray(raw.options) ? raw.options : (raw.options && typeof raw.options === 'object' ? Object.values(raw.options) : []));
  const type = inferQuestionType(raw, answerValue, options);
  return {
    id: raw.id || `q${i + 1}`,
    type,
    q: cleanQuestionText(question),
    options: (type === 'bool' && isBooleanOptionSet(options) ? ['对', '错'] : (options.length ? options : getOptions({ ...raw, type }))).map(o => String(o)),
    ans: normalizeAnswer({ ...raw, type }, answerValue),
    rawAns: String(answerValue ?? ''),
    exp: raw.exp || raw.explanation || raw['解析'] || raw.note || '',
  };
}

function extractQuestions(data) {
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.questions)) return data.questions;
  if (Array.isArray(data.data)) return data.data;
  for (const key of Object.keys(data || {})) {
    if (Array.isArray(data[key]) && data[key].length > 0) return data[key];
  }
  return [];
}

function normalizeBank(data, fallbackId, bundled) {
  const rawQuestions = extractQuestions(data);
  const questions = rawQuestions
    .map((q, i) => normalizeQuestion(q, i))
    .filter(q => q.q && q.ans);
  const name = data.name || data.title || data['科目'] || fallbackId.replace(/^bundled:/, '').replace(/\.json$/i, '');
  const parsed = parseBankName(String(name));
  const subject = data.subject || data['科目'] || parsed.subject;
  const chapter = getDisplayChapter(subject, data.chapter || data['章节'] || parsed.chapter);
  const path = normalizePath(data.path || data['路径'] || [subject, chapter]);
  return {
    id: data.id || fallbackId || `${Date.now()}`,
    name: String(name),
    subject,
    chapter,
    path,
    questions,
    bundled: Boolean(bundled),
    releaseManaged: Boolean(data.releaseManaged),
    releaseVersion: data.releaseVersion || '',
    releaseSource: data.releaseSource || '',
  };
}

function getDisplayChapter(subject, chapter) {
  const clean = String(chapter || '').trim() || '综合练习';
  if (subject !== '习思') return clean;
  const map = {
    '导论': '导论',
    '中国特色社会主义': '第一章 中国特色社会主义',
    '党的领导': '第二章 坚持党的全面领导',
    '经济建设': '第三章 经济建设',
    '政治建设': '第四章 政治建设',
    '文化建设': '第五章 文化建设',
    '社会建设': '第六章 社会建设',
    '生态文明': '第七章 生态文明建设',
    '国家安全': '第八章 国家安全',
    '外交': '第九章 中国特色大国外交',
    '综合': '综合题库',
  };
  return map[clean] || clean;
}

function parseBankName(name) {
  const clean = String(name || '').replace(/\s*\(\d+题\)\s*/g, '').trim();
  const parts = clean.split(/\s*[-－—]\s*/).filter(Boolean);
  if (parts.length >= 2) {
    return { subject: parts[0], chapter: parts.slice(1).join('-') };
  }
  return { subject: clean || '未分类', chapter: '综合练习' };
}

function normalizePath(path) {
  if (Array.isArray(path)) return path.map(item => String(item || '').trim()).filter(Boolean);
  return String(path || '').split(/[/>｜|]/).map(item => item.trim()).filter(Boolean);
}

function pathKey(path) {
  return normalizePath(path).join('\u001f');
}

function samePath(a, b) {
  return pathKey(a) === pathKey(b);
}

function isPathPrefix(parent, child) {
  const p = normalizePath(parent);
  const c = normalizePath(child);
  return p.length <= c.length && p.every((item, index) => c[index] === item);
}

function parentPath(path) {
  return normalizePath(path).slice(0, -1);
}

function pathTitle(path) {
  const p = normalizePath(path);
  return p.length ? p[p.length - 1] : '全部题库';
}

function pathCrumbs(path) {
  const p = normalizePath(path);
  return ['首页', ...p].join(' / ');
}

function getBankPath(bank) {
  const path = normalizePath(bank?.path);
  if (path.length) return path;
  const parsed = parseBankName(bank?.name || '');
  const subject = bank?.subject || parsed.subject;
  const chapter = bank?.chapter || parsed.chapter;
  return normalizePath([subject, chapter]);
}

function setBankPath(bank, path) {
  const normalized = normalizePath(path);
  if (!bank || !normalized.length) return;
  bank.path = normalized;
  bank.subject = normalized[0] || bank.subject || '未分类';
  bank.chapter = normalized[normalized.length - 1] || bank.chapter || '综合练习';
}

function ensureLibraryPath(path) {
  const normalized = normalizePath(path);
  let changed = false;
  for (let i = 1; i <= normalized.length; i++) {
    const partial = normalized.slice(0, i);
    if (!state.libraryNodes.some(node => samePath(node.path, partial))) {
      state.libraryNodes.push({
        id: `node:${Date.now()}:${Math.random().toString(36).slice(2)}`,
        path: partial,
        createdAt: Date.now(),
      });
      changed = true;
    }
  }
  if (changed) saveLibraryNodes();
}

function getBanksAtPath(path) {
  const key = pathKey(path);
  return getVisibleBanks().filter(bank => pathKey(getBankPath(bank)) === key);
}

function getDescendantBanks(path) {
  const p = normalizePath(path);
  return getVisibleBanks().filter(bank => isPathPrefix(p, getBankPath(bank)));
}

function getLibraryChildren(path = []) {
  const p = normalizePath(path);
  const seen = new Map();
  const add = childPath => {
    const normalized = normalizePath(childPath);
    if (normalized.length !== p.length + 1) return;
    if (!isPathPrefix(p, normalized)) return;
    const key = pathKey(normalized);
    if (!seen.has(key)) seen.set(key, { path: normalized, title: pathTitle(normalized), banks: getDescendantBanks(normalized) });
  };
  state.libraryNodes.forEach(node => add(node.path));
  getVisibleBanks().forEach(bank => {
    const bankPath = getBankPath(bank);
    if (bankPath.length > p.length) add(bankPath.slice(0, p.length + 1));
  });
  return Array.from(seen.values()).sort((a, b) => {
    if (p.length === 0) {
      const order = Array.isArray(state.uiConfig.subjectOrder) ? state.uiConfig.subjectOrder : [];
      const ai = order.indexOf(a.title);
      const bi = order.indexOf(b.title);
      if (ai !== -1 || bi !== -1) return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    }
    if (p.length >= 1) {
      const av = chapterSortValue(a.title);
      const bv = chapterSortValue(b.title);
      if (av !== bv) return av - bv;
    }
    return a.title.localeCompare(b.title, 'zh-Hans-CN');
  });
}

function applyStoredOrder(items, orderKey, getKey) {
  const order = state.uiConfig.libraryOrder?.[orderKey] || [];
  return items.slice().sort((a, b) => {
    const ak = getKey(a);
    const bk = getKey(b);
    const ai = order.indexOf(ak);
    const bi = order.indexOf(bk);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    return 0;
  });
}

function getLibraryDisplayItems(path = []) {
  const p = normalizePath(path);
  const orderKey = `library:${pathKey(p) || 'root'}`;
  const items = [
    ...getLibraryChildren(p).map(child => ({ type: 'child', key: `path:${pathKey(child.path)}`, data: child })),
    ...getBanksAtPath(p).map(bank => ({ type: 'bank', key: `bank:${bank.id}`, data: bank })),
  ];
  return applyStoredOrder(items, orderKey, item => item.key);
}

function renderLibraryDisplayItem(item) {
  return item.type === 'child' ? renderLibraryChildItem(item.data) : renderDirectBankItem(item.data);
}

function getSubjectGroups() {
  const groups = new Map();
  for (const bank of getVisibleBanks()) {
    const subject = getBankPath(bank)[0] || bank.subject || parseBankName(bank.name).subject;
    if (!groups.has(subject)) groups.set(subject, []);
    groups.get(subject).push(bank);
  }
  const order = Array.isArray(state.uiConfig.subjectOrder) ? state.uiConfig.subjectOrder : [];
  return Array.from(groups, ([subject, banks]) => ({
    subject,
    banks,
    questionCount: banks.reduce((sum, bank) => sum + bank.questions.length, 0),
  })).sort((a, b) => {
    const ai = order.indexOf(a.subject);
    const bi = order.indexOf(b.subject);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    return a.subject.localeCompare(b.subject, 'zh-Hans-CN');
  });
}

function getBanksBySubject(subject) {
  return getVisibleBanks()
    .filter(b => getBankPath(b)[0] === subject)
    .sort((a, b) => chapterSortValue(a.chapter) - chapterSortValue(b.chapter));
}

function chapterSortValue(chapter) {
  const text = String(chapter || '');
  if (text.startsWith('导论')) return 0;
  if (text.startsWith('综合')) return 999;
  const map = { 一:1, 二:2, 三:3, 四:4, 五:5, 六:6, 七:7, 八:8, 九:9, 十:10 };
  const match = text.match(/^第([一二三四五六七八九十]+)章/);
  if (!match) return 500;
  const zh = match[1];
  if (zh === '十') return 10;
  if (zh.startsWith('十')) return 10 + (map[zh.slice(1)] || 0);
  return map[zh] || 500;
}

function buildQuestionSet(banks) {
  return banks.flatMap(bank => bank.questions.map((q, i) => ({
    ...q,
    sourceBankId: bank.id,
    sourcePath: getBankPath(bank),
    sourceSubject: getBankPath(bank)[0] || bank.subject || parseBankName(bank.name).subject,
    sourceChapter: getBankPath(bank).slice(-1)[0] || bank.chapter || parseBankName(bank.name).chapter,
    sourceIndex: i,
  })));
}

function questionKey(q) {
  return `${q.sourceBankId || 'bank'}:${q.sourceIndex ?? q.id ?? q.q}`;
}

function makeReviewScopeKey(subject, bankIds, title = '') {
  const ids = (bankIds || []).slice().sort().join('|');
  return `review-position:${subject || title || 'all'}:${hashString(ids)}`;
}

function makeAnswerLookupScope(subject = '', baseChapter = '') {
  return `answer-lookup:${subject || 'all'}:${baseChapter || 'all'}`;
}

function saveReviewPosition() {
  const session = state.activeSession;
  if (!session || !state.reviewMode || !state.uiConfig.rememberReviewPosition) return;
  const question = session.questions[state.currentIndex];
  setViewProgress(makeReviewScopeKey(session.subject, session.bankIds, session.title), {
    type: 'review',
    subject: session.subject || '',
    title: session.title || '',
    bankIds: session.bankIds || [],
    currentIndex: state.currentIndex,
    currentQuestionKey: question ? questionKey(question) : '',
    mode: state.mode,
  });
}

function applyReviewPosition(session) {
  if (!session || !state.reviewMode || !state.uiConfig.rememberReviewPosition) return;
  const saved = getViewProgressItem(makeReviewScopeKey(session.subject, session.bankIds, session.title));
  if (!saved) return;
  const index = session.questions.findIndex(q => questionKey(q) === saved.currentQuestionKey);
  state.currentIndex = index >= 0 ? index : Math.max(0, Math.min(saved.currentIndex || 0, session.questions.length - 1));
  if (saved.mode === 'scroll' || saved.mode === 'page') state.mode = saved.mode;
}

function saveAnswerLookupPosition() {
  const context = state.answerLookupContext;
  if (!context || !state.uiConfig.rememberAnswerLookupPosition) return;
  const viewport = document.getElementById('answerLookupViewport');
  setViewProgress(makeAnswerLookupScope(context.subject || '', context.baseChapter || ''), {
    type: 'answerLookup',
    subject: context.subject || '',
    baseChapter: context.baseChapter || '',
    chapter: context.chapter || '',
    query: context.query || '',
    scrollTop: viewport ? viewport.scrollTop : (context.scrollTop || 0),
  });
}

function restoreAnswerLookupContext(subject = '', baseChapter = '') {
  const fallback = { subject: subject || '', baseChapter: baseChapter || '', chapter: baseChapter || '', query: '', scrollTop: 0 };
  if (!state.uiConfig.rememberAnswerLookupPosition) return fallback;
  const saved = getViewProgressItem(makeAnswerLookupScope(subject || '', baseChapter || ''));
  if (!saved) return fallback;
  return {
    subject: subject || saved.subject || '',
    baseChapter: baseChapter || saved.baseChapter || '',
    chapter: saved.chapter || baseChapter || '',
    query: saved.query || '',
    scrollTop: Number(saved.scrollTop || 0),
  };
}

function saveCurrentViewPosition() {
  if (state.view === 'answerLookup') saveAnswerLookupPosition();
  if (state.view === 'quiz') saveReviewPosition();
}

function getWrongRecords(filter = {}) {
  return Object.values(state.wrongBook).filter(record => {
    if (filter.path && filter.path.length && !isPathPrefix(filter.path, record.question.sourcePath || [record.question.sourceSubject, record.question.sourceChapter])) return false;
    if (filter.subject && record.question.sourceSubject !== filter.subject) return false;
    if (filter.chapter && record.question.sourceChapter !== filter.chapter) return false;
    return true;
  }).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

function isInWrongBook(question) {
  return Boolean(state.wrongBook[questionKey(question)]);
}

function addWrongToBook(idx) {
  const session = state.activeSession;
  if (!session) return;
  const q = session.questions[idx];
  const userAns = state.answers[idx];
  if (!q || !userAns) return;
  if (checkAnswer(q, userAns)) return;
  const key = questionKey(q);
  const prev = state.wrongBook[key] || {};
  state.wrongBook[key] = {
    key,
    question: q,
    lastAnswer: userAns,
    correctAnswer: getCorrectAnswer(q),
    wrongCount: (prev.wrongCount || 0) + 1,
    updatedAt: Date.now(),
  };
  saveWrongBook();
  showToast('已加入错题集');
  renderQuizPreservingCard(idx);
}

function removeWrongFromBookByKey(key, rerender = true) {
  if (!key || !state.wrongBook[key]) return;
  const currentIdx = state.activeSession?.questions?.findIndex(q => questionKey(q) === key) ?? state.currentIndex;
  delete state.wrongBook[key];
  saveWrongBook();
  showToast('已从错题集删除');
  if (state.activeSession?.wrongPractice) {
    state.activeSession.questions = state.activeSession.questions.filter(q => questionKey(q) !== key);
    if (!state.activeSession.questions.length) {
      state.activeSession = null;
      renderSubject();
      return;
    }
    state.currentIndex = Math.min(state.currentIndex, state.activeSession.questions.length - 1);
  }
  if (rerender) {
    if (state.activeSession?.wrongPractice) renderQuiz();
    else renderQuizPreservingCard(currentIdx >= 0 ? currentIdx : state.currentIndex);
  }
}

function removeWrongFromBook(idx) {
  const q = state.activeSession?.questions?.[idx];
  if (!q) return;
  removeWrongFromBookByKey(questionKey(q));
}

function isToolGroupExpanded(key) {
  if (Object.prototype.hasOwnProperty.call(state.panelExpanded, key)) return state.panelExpanded[key];
  return Boolean(state.uiConfig.toolPanelsDefaultExpanded);
}

function toggleToolGroup(key) {
  state.panelExpanded[key] = !isToolGroupExpanded(key);
  if (state.view === 'subjects') renderSubject();
  else if (state.view === 'home') renderHome();
}

function renderToolToggle(key) {
  const expanded = isToolGroupExpanded(key);
  return `
    <button class="tool-toggle" onclick="toggleToolGroup('${escapeAttr(key)}')" aria-expanded="${expanded}">
      <span class="icon">${expanded ? '▴' : '▾'}</span>
      <span>${expanded ? '收起' : '工具'}</span>
    </button>
  `;
}

function renderActionPanel(title, buttonsHtml, options = {}) {
  const editAttrs = state.editMode && options.key
    ? ` editing editable-card" data-drag-kind="tool" data-drag-key="${escapeAttr(options.key)}`
    : '';
  return `
    <div class="action-panel${editAttrs}">
      ${state.editMode && options.key ? renderEditableRemove('tool', options.key, title) : ''}
      <div class="section-title">${escapeHtml(title)}</div>
      <div class="action-grid">${buttonsHtml}</div>
      ${state.editMode && options.key ? '<small class="edit-handle">长按拖动排序</small>' : ''}
    </div>
  `;
}

function getToolCardMeta(key) {

}

function getHomeMetricMeta(key) {

    questions: { label: '题目' },

    time: { label: '今日学习时长' },

function getEnabledHomeMetrics() {

  const order = Array.isArray(state.uiConfig.homeMetricOrder) ? state.uiConfig.homeMetricOrder.filter(key => defaults.includes(key)) : defaults;
  const hidden = new Set(Array.isArray(state.uiConfig.hiddenHomeMetrics) ? state.uiConfig.hiddenHomeMetrics : []);
  const fullOrder = [...order, ...defaults.filter(key => !order.includes(key))];

}

function renderEditableRemove(kind, key, label) {
  if (!state.editMode) return '';
  return `<button class="edit-remove" onclick="event.stopPropagation();hideEditableComponent('${escapeAttr(kind)}','${escapeAttr(key)}')" aria-label="移除${escapeAttr(label)}">×</button>`;

function renderHomeMetrics(subjectGroups, totalQuestions, progressSummary, todayStudyTime) {

function getEnabledToolCards() {

  const fullOrder = [...order, ...defaults.filter(key => !order.includes(key))];
  return fullOrder.filter(key => !hidden.has(key));

function renderToolPanels(scope, context = {}) {
  const cards = {
    home: {
      practice: () => renderActionPanel('练习模式', `
        <button onclick="startAllPractice(false)">全部顺序练习</button>
        <button class="secondary" onclick="startAllPractice(true)">全部随机练习</button>
        <button class="muted-mode" onclick="startAllPractice(false,true)">全部重新做</button>
      `, { key: 'practice' }),

function setupEditableInteractions() {
  if (!state.editMode) return;
  const cards = Array.from(document.querySelectorAll('.editable-card[data-drag-kind][data-drag-key]'));
  cards.forEach(card => {
    let timer = null;
    let dragging = false;
    let pointerOffsetX = 0;
    let pointerOffsetY = 0;
    let placeholder = null;
    let startRect = null;
    const clear = () => {
      window.clearTimeout(timer);
      timer = null;
      card.classList.remove('dragging');
      card.style.position = '';
      card.style.left = '';
      card.style.top = '';
      card.style.width = '';
      card.style.height = '';
      card.style.zIndex = '';
      card.style.pointerEvents = '';
      card.style.transition = '';
      if (placeholder) {
        placeholder.remove();
        placeholder = null;
      }
      dragging = false;
    };
    const moveTo = e => {
      card.style.left = `${e.clientX - pointerOffsetX}px`;
      card.style.top = `${e.clientY - pointerOffsetY}px`;
    };
    card.addEventListener('pointerdown', e => {
      if (e.target.closest('button')) return;
      startRect = card.getBoundingClientRect();
      pointerOffsetX = e.clientX - startRect.left;
      pointerOffsetY = e.clientY - startRect.top;
      timer = window.setTimeout(() => {
        dragging = true;
        placeholder = document.createElement('div');
        placeholder.className = 'drag-placeholder';
        placeholder.style.width = `${startRect.width}px`;
        placeholder.style.height = `${startRect.height}px`;
        card.parentNode.insertBefore(placeholder, card);
        card.classList.add('dragging');
        card.style.position = 'fixed';
        card.style.left = `${startRect.left}px`;
        card.style.top = `${startRect.top}px`;
        card.style.width = `${startRect.width}px`;
        card.style.height = `${startRect.height}px`;
        card.style.zIndex = '120';
        card.style.pointerEvents = 'none';
        card.style.transition = 'none';
        try { card.setPointerCapture(e.pointerId); } catch(err) {}
      }, 260);
    });
    card.addEventListener('pointermove', e => {
      if (!dragging) return;
      e.preventDefault();
      moveTo(e);
    });
    card.addEventListener('pointerup', e => {
      window.clearTimeout(timer);
      if (!dragging) return clear();
      const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.editable-card[data-drag-kind][data-drag-key]');
      const kind = card.dataset.dragKind;
      const from = card.dataset.dragKey;
      const to = target?.dataset.dragKind === kind ? target.dataset.dragKey : '';
      clear();
      if (to && to !== from) reorderEditableItem(kind, from, to);
    });
    card.addEventListener('pointercancel', clear);
    card.addEventListener('pointerleave', () => window.clearTimeout(timer));
  });
}

function moveKeyInList(list, from, to) {
  const arr = list.slice();
  const fromIndex = arr.indexOf(from);
  const toIndex = arr.indexOf(to);
  if (fromIndex < 0 || toIndex < 0) return arr;
  const [item] = arr.splice(fromIndex, 1);
  arr.splice(toIndex, 0, item);
  return arr;
}

function reorderEditableItem(kind, from, to) {
  if (kind === 'tool') {
    const current = getEnabledToolCards();
    state.uiConfig.toolCardOrder = moveKeyInList(current, from, to);
  } else if (kind === 'metric') {
    const current = getEnabledHomeMetrics();
    state.uiConfig.homeMetricOrder = moveKeyInList(current, from, to);
  } else if (kind === 'subject') {
    const current = getLibraryChildren([]).map(child => child.title);
    state.uiConfig.subjectOrder = moveKeyInList(current, from, to);
  } else if (kind === 'library') {
    const parent = state.view === 'subjects' ? normalizePath(state.activePath) : [];
    const orderKey = `library:${pathKey(parent) || 'root'}`;
    const current = getLibraryDisplayItems(parent).map(item => item.key);
    state.uiConfig.libraryOrder = state.uiConfig.libraryOrder || {};
    state.uiConfig.libraryOrder[orderKey] = moveKeyInList(current, from, to);
  }
  saveUiConfig();
  showToast('顺序已更新');
  if (state.view === 'subjects') renderSubject();
  else renderHome();
}

function shuffleQuestions(questions) {
  const arr = questions.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startPractice({ subject, banks, title, subtitle, shuffled, reviewMode = false, forceNew = false, path = [], returnPath = null }) {
  const source = Array.isArray(banks) ? banks : [];
  const questions = buildQuestionSet(source);
  const scopeKey = makeBankScopeKey(subject, source, reviewMode, shuffled);
  const bankIds = source.map(bank => bank.id);
  if (!forceNew) {
    const saved = getSavedSession(scopeKey);
    if (saved) {
      const ordered = shuffled ? shuffleQuestions(questions) : questions;
      restoreSavedSession(saved, { subject, title, subtitle, questions: ordered, shuffled, reviewMode, scopeKey, bankIds, startAtFirst: Boolean(shuffled), path, returnPath });
      return;
    }
  }
  startQuestionPractice({ subject, title, subtitle, questions, shuffled, reviewMode, scopeKey, bankIds, forceNew, path, returnPath });
}

function startQuestionPractice({ subject, title, subtitle, questions, shuffled, reviewMode = false, scopeKey = '', bankIds = [], wrongPractice = false, forceNew = false, path = [], returnPath = null }) {
  if (!questions.length) return;
  clearToast();
  const finalQuestions = shuffled ? shuffleQuestions(questions) : questions;
  const finalScopeKey = scopeKey || makeQuestionScopeKey(subject, questions, reviewMode, title, shuffled);
  const answerModeKey = getAnswerModeKey(shuffled, reviewMode, wrongPractice);
  if (forceNew) removeScopedProgress(finalScopeKey);
  if (forceNew) clearGlobalAnswersForQuestions(questions, answerModeKey);
  pushRoute();
  state.activeSubject = subject;
  state.activePath = normalizePath(path || (subject ? [subject] : []));
  state.activeSession = {
    title,
    subtitle,
    subject,
    path: state.activePath,
    returnPath: returnPath === null ? state.activePath : normalizePath(returnPath),
    shuffled,
    reviewMode,
    questions: finalQuestions,
    scopeKey: finalScopeKey,
    bankIds,
    wrongPractice,
  };
  state.currentIndex = 0;
  state.answers = shouldAutoPersistAnswers({ shuffled, reviewMode, wrongPractice, questions: finalQuestions })
    ? mapQuestionKeysToIndices(finalQuestions, getGlobalAnswersForQuestions(finalQuestions, answerModeKey))
    : {};
  state.drafts = {};
  state.revealedAnswers = {};
  state.reviewMode = Boolean(reviewMode);
  applyReviewPosition(state.activeSession);
  state.view = 'quiz';
  renderQuiz();
}

function normalizeAnswer(q, value) {
  const t = getType(q);
  const raw = String(value ?? '').trim();
  const upper = raw.toUpperCase();

  if (t === 'bool') {
    if (['A', 'TRUE', 'T', 'YES', 'Y', '1', '对', '正确', '是', '√', '✓'].includes(upper) || ['对', '正确', '是', '√', '✓'].includes(raw)) return 'A';
    if (['B', 'FALSE', 'F', 'NO', 'N', '0', '错', '错误', '否', '×', '✗'].includes(upper) || ['错', '错误', '否', '×', '✗'].includes(raw)) return 'B';
  }

  return upper.split('').filter(c => c >= 'A' && c <= 'Z').sort().join('');
}

function getCorrectAnswer(q) {
  return normalizeAnswer(q, q.ans || q.rawAns || q.answer);
}

function getAnswerLabel(q) {
  const ans = getCorrectAnswer(q);
  if (getType(q) === 'bool') return ans === 'A' ? '对' : '错';
  return ans;
}

function checkAnswer(q, userAns) {
  return normalizeAnswer(q, userAns) === getCorrectAnswer(q);
}

function importJSON(jsonStr, targetPath = null) {
  try {
    const data = JSON.parse(jsonStr);
    const bank = normalizeBank(data, `import:${Date.now()}`, false);
    if (!bank.questions.length) {
      showNotice('未找到有效题目');
      return false;
    }
    let importPath = normalizePath(targetPath ?? state.pendingImportPath ?? state.activePath ?? []);
    if (!importPath.length) {
      askText('请输入主页题库标题', bank.name || '新题库', title => importJSON(jsonStr, [title]));
      return false;
    }
    setBankPath(bank, importPath);
    bank.name = pathTitle(importPath);
    ensureLibraryPath(importPath);
    state.banks.push(bank);
    saveBanks();
    saveBankMeta();
    state.activePath = importPath;
    state.activeSubject = importPath[0] || '';
    importPath.length ? renderSubject() : renderHome();
    return true;
  } catch(e) {
    showNotice('JSON 解析失败：' + e.message);
    return false;
  }
}

function openLibraryPath(path) {
  pushRoute();
  state.view = 'subjects';
  state.activePath = normalizePath(path);
  state.activeSubject = state.activePath[0] || '';
  renderSubject();
}

function createLibraryNode(parent = []) {
  const base = normalizePath(parent);
  askText('请输入新层级名称', '', name => {
    const path = [...base, String(name).trim()].filter(Boolean);
    if (!path.length) return;
    ensureLibraryPath(path);
    state.activePath = base;
    showToast('已创建层级');
    if (base.length) renderSubject();
    else renderHome();
  });
}

function renameLibraryPath(path) {
  const oldPath = normalizePath(path);
  if (!oldPath.length) return;
  askText('请输入新的名称', pathTitle(oldPath), nextName => {
    const newPath = [...parentPath(oldPath), String(nextName).trim()].filter(Boolean);
    if (!newPath.length || samePath(oldPath, newPath)) return;
    state.libraryNodes.forEach(node => {
      if (isPathPrefix(oldPath, node.path)) node.path = [...newPath, ...normalizePath(node.path).slice(oldPath.length)];
    });
    state.banks.forEach(bank => {
      const bankPath = getBankPath(bank);
      if (!isPathPrefix(oldPath, bankPath)) return;
      setBankPath(bank, [...newPath, ...bankPath.slice(oldPath.length)]);
      rememberBankMeta(bank);
    });
    ensureLibraryPath(newPath);
    saveLibraryNodes();
    saveBanks();
    showToast('名称已更新');
    state.activePath = samePath(state.activePath, oldPath) ? newPath : state.activePath;
    if (state.activePath.length) renderSubject();
    else renderHome();
  });
}

function cloneData(value) {
  return JSON.parse(JSON.stringify(value));
}

function makeRecycleStoragePath(id) {
  const safeId = String(id || `recycle-${Date.now()}`).replace(/[^a-zA-Z0-9_-]/g, '_');
  return `${RECYCLE_STORAGE_DIRECTORY}${safeId}.json`;
}

function addRecycleItem(item) {
  const id = `recycle:${Date.now()}:${Math.random().toString(36).slice(2)}`;
  const deletedAt = Date.now();
  state.recycleBin.unshift({
    id,
    deletedAt,
    storagePath: item.storagePath || makeRecycleStoragePath(id),
    ...item,
  });
  saveRecycleBin();
}

function markBankHidden(bankId, hidden = true) {
  if (!bankId) return;
  const current = state.bankMeta[bankId] || {};
  state.bankMeta[bankId] = { ...current, hidden, updatedAt: Date.now() };
}

function deleteLibraryPath(path) {
  const target = normalizePath(path);
  if (!target.length) return;
  const banks = getDescendantBanks(target);
  const bundledCount = banks.filter(bank => bank.bundled).length;
  const message = bundledCount
    ? `删除“${pathTitle(target)}”？其中 ${bundledCount} 个内置题库会先在本机隐藏，并进入回收站。`
    : `删除“${pathTitle(target)}”及其下 ${banks.length} 个导入题库？删除后会先进入回收站。`;
  askConfirm(message, () => {
    const descendantNodes = state.libraryNodes.filter(node => isPathPrefix(target, node.path));
    const importedBanks = banks.filter(bank => !bank.bundled);
    const bundledBankIds = banks.filter(bank => bank.bundled).map(bank => bank.id);
    addRecycleItem({
      type: 'path',
      title: pathTitle(target),
      path: target,
      libraryNodes: cloneData(descendantNodes),
      importedBanks: cloneData(importedBanks),
      bundledBankIds,
      bankMeta: cloneData(Object.fromEntries(banks.map(bank => [bank.id, state.bankMeta[bank.id] || null]))),
    });
    state.libraryNodes = state.libraryNodes.filter(node => !isPathPrefix(target, node.path));
    state.banks = state.banks.filter(bank => {
      if (!isPathPrefix(target, getBankPath(bank))) return true;
      if (!bank.bundled) return false;
      markBankHidden(bank.id, true);
      return true;
    });
    saveLibraryNodes();
    saveBankMeta();
    saveBanks();
    state.activePath = parentPath(target);
    showToast('已移入回收站');
    state.activePath.length ? renderSubject() : renderHome();
  });
}

function renameBank(bankId) {
  const bank = state.banks.find(item => item.id === bankId);
  if (!bank) return;
  askText('请输入题库显示名称', bank.name || pathTitle(getBankPath(bank)), name => {
    bank.name = String(name).trim();
    rememberBankMeta(bank);
    saveBanks();
    state.activePath.length ? renderSubject() : renderHome();
  });
}

function moveBank(bankId) {
  const bank = state.banks.find(item => item.id === bankId);
  if (!bank) return;
  const current = getBankPath(bank).join(' / ');
  askText('请输入新的层级路径，用 / 分隔', current, text => {
    const path = normalizePath(text);
    if (!path.length) return;
    setBankPath(bank, path);
    ensureLibraryPath(path);
    rememberBankMeta(bank);
    saveBanks();
    showToast('题库路径已更新');
    state.activePath.length ? renderSubject() : renderHome();
  });
}

function deleteBank(bankId) {
  const bank = state.banks.find(item => item.id === bankId);
  if (!bank) return;
  if (bank.bundled) {
    askConfirm('内置题库会在本机隐藏并进入回收站，APK 内置资源不会被物理删除。继续？', () => {
      addRecycleItem({
        type: 'bank',
        title: bank.name || pathTitle(getBankPath(bank)),
        path: getBankPath(bank),
        bundledBankIds: [bank.id],
        importedBanks: [],
        libraryNodes: [],
        bankMeta: cloneData({ [bank.id]: state.bankMeta[bank.id] || null }),
      });
      markBankHidden(bank.id, true);
      saveBankMeta();
      state.activePath.length ? renderSubject() : renderHome();
    });
    return;
  }
  askConfirm(`删除题库“${bank.name}”？删除后会先进入回收站。`, () => {
    addRecycleItem({
      type: 'bank',
      title: bank.name || pathTitle(getBankPath(bank)),
      path: getBankPath(bank),
      importedBanks: cloneData([bank]),
      bundledBankIds: [],
      libraryNodes: [],
      bankMeta: cloneData({ [bank.id]: state.bankMeta[bank.id] || null }),
    });
    state.banks = state.banks.filter(item => item.id !== bankId);
    delete state.bankMeta[bank.id];
    saveBankMeta();
    saveBanks();
    state.activePath.length ? renderSubject() : renderHome();
  });
}

function restoreRecycleItem(id) {
  const item = state.recycleBin.find(entry => entry.id === id);
  if (!item) return;
  (item.libraryNodes || []).forEach(node => {
    if (node?.path?.length && !state.libraryNodes.some(existing => samePath(existing.path, node.path))) {
      state.libraryNodes.push(node);
    }
  });
  (item.importedBanks || []).forEach(bank => {
    if (bank?.id && !state.banks.some(existing => existing.id === bank.id)) {
      state.banks.push(normalizeBank(bank, bank.id, false));
    }
  });
  Object.entries(item.bankMeta || {}).forEach(([bankId, meta]) => {
    if (meta) state.bankMeta[bankId] = { ...meta, hidden: false, updatedAt: Date.now() };
    else if (state.bankMeta[bankId]) state.bankMeta[bankId].hidden = false;
    else state.bankMeta[bankId] = { hidden: false, updatedAt: Date.now() };
  });
  (item.bundledBankIds || []).forEach(bankId => markBankHidden(bankId, false));
  if (item.path?.length) ensureLibraryPath(item.path);
  state.recycleBin = state.recycleBin.filter(entry => entry.id !== id);
  saveRecycleBin();
  saveLibraryNodes();
  saveBankMeta();
  saveBanks();
  showToast('已从回收站恢复');
  renderSettings();
}

function purgeRecycleItem(id) {
  const item = state.recycleBin.find(entry => entry.id === id);
  if (!item) return;
  askConfirm(`永久删除回收站中的“${item.title || '项目'}”？此操作不能撤回。`, () => {
    state.recycleBin = state.recycleBin.filter(entry => entry.id !== id);
    saveRecycleBin();
    showToast('已永久删除');
    renderSettings();
  });
}

    { key: 'star', label: '重点', icon: '⭐' },
    { key: 'bookmark', label: '书签', icon: '🔖' },
  ];
}

function getIconStyle(kind = 'folder') {
  const iconKeys = getIconOptions().map(item => item.key);
  if (kind === 'subject') return iconKeys.includes(state.uiConfig.subjectIconStyle) ? state.uiConfig.subjectIconStyle : 'library';
  if (kind === 'bank' || kind === 'chapter') return iconKeys.includes(state.uiConfig.chapterIconStyle) ? state.uiConfig.chapterIconStyle : 'book';
  const style = state.uiConfig.iconStyle || 'folder';
  return iconKeys.includes(style) ? style : 'folder';
}

function renderLibraryIcon(kind = 'folder') {
  const style = getIconStyle(kind);
  const item = getIconOptions().find(option => option.key === style) || getIconOptions()[0];
  return `<span class="library-icon ${escapeAttr(style)}" aria-label="${escapeAttr(item.label)}">${escapeHtml(item.icon)}</span>`;
}

function jsPathArg(path) {
  return JSON.stringify(normalizePath(path)).replace(/"/g, '&quot;');
}

function jsStringArg(value) {
  return JSON.stringify(String(value ?? '')).replace(/"/g, '&quot;');
}

function renderChoiceSelect(id, value, options, action = '') {
  const normalizedOptions = Array.isArray(options) ? options : [];
  const current = normalizedOptions.find(item => String(item.value) === String(value)) || normalizedOptions[0] || { value: '', label: '' };
  return `
    <div class="choice-select" data-choice-id="${escapeAttr(id)}">
      <input type="hidden" id="${escapeAttr(id)}" value="${escapeAttr(current.value)}">
      <button type="button" class="choice-trigger" onclick="toggleChoiceSelect(event, ${jsStringArg(id)})">
        <span id="${escapeAttr(id)}Label">${escapeHtml(current.label)}</span>
        <span class="chevron">⌄</span>
      </button>
      <div class="choice-menu" id="${escapeAttr(id)}Menu">
        ${normalizedOptions.map(item => `
          <button type="button" class="choice-option ${String(item.value) === String(current.value) ? 'active' : ''}" data-choice-value="${escapeAttr(item.value)}" onclick="selectChoiceValue(event, ${jsStringArg(id)}, ${jsStringArg(item.value)}, ${jsStringArg(action)})">${escapeHtml(item.label)}</button>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleChoiceSelect(event, id) {
  event?.stopPropagation();
  const root = Array.from(document.querySelectorAll('.choice-select')).find(item => item.dataset.choiceId === String(id));
  const willOpen = root && !root.classList.contains('open');
  closeChoiceSelects();
  if (root && willOpen) root.classList.add('open');
}

function closeChoiceSelects() {
  document.querySelectorAll('.choice-select.open').forEach(item => item.classList.remove('open'));
}

function selectChoiceValue(event, id, value, action = '') {
  event?.stopPropagation();
  const root = Array.from(document.querySelectorAll('.choice-select')).find(item => item.dataset.choiceId === String(id));
  const input = document.getElementById(id);
  if (input) input.value = value;
  const selected = Array.from(root?.querySelectorAll('.choice-option') || [])
    .find(btn => String(btn.dataset.choiceValue || '') === String(value));
  const label = selected?.textContent?.trim() || value;
  const labelEl = document.getElementById(`${id}Label`);
  if (labelEl) labelEl.textContent = label;
  root?.querySelectorAll('.choice-option').forEach(btn => btn.classList.toggle('active', String(btn.dataset.choiceValue || '') === String(value)));
  closeChoiceSelects();
  if (action === 'theme') {
    state.uiConfig.theme = value || state.uiConfig.theme;
    applyUiConfig();
  } else if (action === 'chapterLayout') {
    state.uiConfig.chapterActionLayout = value || state.uiConfig.chapterActionLayout;
  } else if (action === 'answerSubject') {
    state.answerLookupContext.subject = value;
    state.answerLookupContext.chapter = '';
    state.answerLookupContext.scrollTop = 0;
    saveAnswerLookupPosition();
    renderAnswerLookup();
  } else if (action === 'answerChapter') {
    state.answerLookupContext.chapter = value;
    state.answerLookupContext.scrollTop = 0;
    saveAnswerLookupPosition();
    renderAnswerLookup();
  }
}

function renderLibraryManager(path = [], options = {}) {

function startBankPractice(bankId, shuffled = false, forceNew = false) {

  const path = getBankPath(bank);

    subject: path[0] || '',

    forceNew,

function renderStudyChartSvg(rows) {
  const shouldAnimate = Boolean(state.studyChartAnimate);
  state.studyChartAnimate = false;
  const width = 320;
  const height = 150;
  const left = 18;
  const top = 14;
  const chartWidth = 284;
  const chartHeight = 108;
  const maxSeconds = Math.max(60, ...rows.map(item => item.seconds));
  const points = rows.map((item, index) => {
    const x = rows.length <= 1 ? left + chartWidth : left + (chartWidth * index) / (rows.length - 1);
    const y = top + chartHeight - (item.seconds / maxSeconds) * chartHeight;
    return { x, y, seconds: item.seconds, label: item.label };
  });
  const path = buildSmoothPath(points);
  const selectedIndex = rows.findIndex(item => item.key === state.studyChartSelectedKey);
  const selectedPoint = selectedIndex >= 0 ? points[selectedIndex] : null;
  const hitAreas = points.map((point, index) => {
    const startX = index === 0 ? left : (points[index - 1].x + point.x) / 2;
    const endX = index === points.length - 1 ? left + chartWidth : (point.x + points[index + 1].x) / 2;
    return `
      <rect class="study-chart-hit" x="${startX.toFixed(1)}" y="${top}" width="${Math.max(1, endX - startX).toFixed(1)}" height="${chartHeight}" onclick="event.stopPropagation();selectStudyChartPoint(${index})">
        <title>${escapeHtml(rows[index].label)} · ${escapeHtml(formatStudyDuration(rows[index].seconds))}</title>
      </rect>
    `;
  }).join('');
  const dots = points.map((point, index) => `
    <circle class="study-chart-dot ${point.seconds ? 'active' : ''} ${selectedIndex === index ? 'selected' : ''}" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="${selectedIndex === index ? 4.8 : point.seconds ? 3.6 : 2.7}" onclick="event.stopPropagation();selectStudyChartPoint(${index})">
      <title>${escapeHtml(rows[index].label)} · ${escapeHtml(formatStudyDuration(rows[index].seconds))}</title>
    </circle>
  `).join('');
  const selectedOverlay = selectedPoint ? (() => {
    const tooltipWidth = 82;
    const tooltipHeight = 33;
    const tooltipX = Math.max(4, Math.min(width - tooltipWidth - 4, selectedPoint.x - tooltipWidth / 2));
    const tooltipY = selectedPoint.y < top + tooltipHeight + 8
      ? selectedPoint.y + 12
      : selectedPoint.y - tooltipHeight - 10;
    const row = rows[selectedIndex];
    return `
      <line class="study-chart-marker" x1="${selectedPoint.x.toFixed(1)}" y1="${top}" x2="${selectedPoint.x.toFixed(1)}" y2="${top + chartHeight}"></line>
      <g class="study-chart-tooltip" transform="translate(${tooltipX.toFixed(1)} ${tooltipY.toFixed(1)})">
        <rect width="${tooltipWidth}" height="${tooltipHeight}" rx="8"></rect>
        <text x="9" y="13">${escapeHtml(row.label)}</text>
        <text x="9" y="27">${escapeHtml(formatStudyDuration(row.seconds))}</text>
      </g>
    `;
  })() : '';
  return `
    <svg class="study-chart-svg ${shouldAnimate ? 'chart-enter' : ''}" viewBox="0 0 ${width} ${height}" role="img" aria-label="学习时长曲线图">
      <line class="study-chart-grid" x1="${left}" y1="${top}" x2="${left + chartWidth}" y2="${top}"></line>
      <line class="study-chart-grid" x1="${left}" y1="${top + chartHeight / 2}" x2="${left + chartWidth}" y2="${top + chartHeight / 2}"></line>
      <line class="study-chart-grid" x1="${left}" y1="${top + chartHeight}" x2="${left + chartWidth}" y2="${top + chartHeight}"></line>
      ${hitAreas}
      <path class="study-chart-line" d="${path}"></path>
      ${dots}
      ${selectedOverlay}
    </svg>
  `;
}

function renderStudyChartLabels(rows) {
  if (!rows.length) return '';
  const indexes = rows.length <= 7
    ? rows.map((_, index) => index)
    : [0, Math.floor((rows.length - 1) / 2), rows.length - 1];
  return `

function normalizeVersionTag(value) {
  return String(value || '').trim().replace(/^v/i, '');
}

function compareVersionTags(a, b) {
  const left = normalizeVersionTag(a).split(/[.-]/).map(part => Number.parseInt(part, 10));
  const right = normalizeVersionTag(b).split(/[.-]/).map(part => Number.parseInt(part, 10));
  const length = Math.max(left.length, right.length);
  for (let i = 0; i < length; i++) {
    const av = Number.isFinite(left[i]) ? left[i] : 0;
    const bv = Number.isFinite(right[i]) ? right[i] : 0;
    if (av > bv) return 1;
    if (av < bv) return -1;
  }
  return 0;
}

function getLatestApkAsset(release) {
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.find(asset => /\.apk$/i.test(asset?.name || '')) || null;
}

function formatUpdateCheckTime() {
  const time = Number(localStorage.getItem(UPDATE_LAST_CHECK_KEY) || 0);
  if (!time) return '尚未检查';
  try {
    return new Date(time).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    return '已检查';
  }
}

async function fetchLatestRelease() {
  const res = await fetch(RELEASE_API_URL, {
    cache: 'no-store',
    headers: { 'Accept': 'application/vnd.github+json' },
  });
  if (!res.ok) throw new Error(`GitHub 返回 ${res.status}`);
  return res.json();
}

async function checkForUpdates(options = {}) {
  const manual = Boolean(options.manual);
  if (!manual && state.uiConfig.autoUpdateCheck === false) return null;
  const now = Date.now();
  const last = Number(localStorage.getItem(UPDATE_LAST_CHECK_KEY) || 0);
  if (!manual && last && now - last < UPDATE_CHECK_INTERVAL_MS) return null;

  if (manual) showToast('正在检查更新');
  try {
    const release = await fetchLatestRelease();
    localStorage.setItem(UPDATE_LAST_CHECK_KEY, String(Date.now()));
    const latestTag = release?.tag_name || release?.tagName || '';
    const apkAsset = getLatestApkAsset(release);
    const hasNewer = latestTag && compareVersionTags(latestTag, APP_VERSION) > 0;
    if (hasNewer && apkAsset) {
      if (!manual && localStorage.getItem(UPDATE_DISMISSED_TAG_KEY) === latestTag) return release;
      showUpdateDialog({ release, apkAsset, manual });
    } else if (manual) {
      showNotice(`当前已是最新版本：${APP_VERSION}`);
    }
    if (state.view === 'settings' && !document.querySelector('.app-dialog-mask')) renderSettings();
    return release;
  } catch(e) {
    if (manual) showNotice(`检查更新失败：${e.message || e}`);
    return null;
  }
}

function getLatestBankManifestAsset(release) {
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.find(asset => BANK_MANIFEST_ASSET_NAMES.includes(asset?.name || '')) || null;
}

function getReleaseBankJsonAssets(release) {
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.filter(asset => {
    const name = String(asset?.name || '');
    return name.toLowerCase().endsWith('.json')
      && name.toLowerCase().startsWith(BANK_ASSET_PREFIX)
      && !BANK_MANIFEST_ASSET_NAMES.includes(name);
  });
}

function formatBankUpdateCheckTime() {
  const time = Number(localStorage.getItem(BANK_UPDATE_LAST_CHECK_KEY) || 0);
  if (!time) return '尚未检查';
  try {
    return new Date(time).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    return '已检查';
  }
}

async function fetchReleaseJsonAsset(asset) {
  const url = asset?.browser_download_url || asset?.url;
  if (!url) throw new Error('Release 资产缺少下载地址');
  const headers = asset?.browser_download_url ? {} : { 'Accept': 'application/octet-stream' };
  const res = await fetch(url, { cache: 'no-store', headers });
  if (!res.ok) throw new Error(`${asset?.name || 'JSON'} 下载失败：${res.status}`);
  return res.json();
}

function findReleaseAssetByName(release, name) {
  const target = String(name || '').trim();
  if (!target) return null;
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.find(asset => asset?.name === target) || null;
}

async function collectReleaseBankPayloads(release) {
  const manifestAsset = getLatestBankManifestAsset(release);
  const payloads = [];
  if (manifestAsset) {
    const manifest = await fetchReleaseJsonAsset(manifestAsset);
    const entries = Array.isArray(manifest) ? manifest : (Array.isArray(manifest?.banks) ? manifest.banks : []);
    for (const entry of entries) {
      if (!entry) continue;
      if (entry.questions || entry.bank || entry.data) {
        payloads.push({ payload: entry.bank || entry.data || entry, source: entry.file || entry.name || manifestAsset.name });
        continue;
      }
      const asset = findReleaseAssetByName(release, entry.file || entry.asset || entry.name);
      if (!asset && entry.url) {
        const res = await fetch(entry.url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`${entry.url} 下载失败：${res.status}`);
        payloads.push({ payload: await res.json(), source: entry.file || entry.url });
        continue;
      }
      if (asset) payloads.push({ payload: await fetchReleaseJsonAsset(asset), source: asset.name });
    }
    return payloads;
  }

  for (const asset of getReleaseBankJsonAssets(release)) {
    payloads.push({ payload: await fetchReleaseJsonAsset(asset), source: asset.name });
  }
  return payloads;
}

function normalizeReleaseBankPayload(payload, release, source, index) {
  const data = payload && typeof payload === 'object' ? payload : {};
  const fallbackId = String(data.id || data.name || source || `bank-${index + 1}`).replace(/^release:/, '');
  const bank = normalizeBank({
    ...data,
    id: `release:${fallbackId}`,
    releaseManaged: true,
    releaseVersion: release?.tag_name || release?.tagName || '',
    releaseSource: source || '',
  }, `release:${fallbackId}`, false);
  bank.releaseManaged = true;
  bank.releaseVersion = release?.tag_name || release?.tagName || '';
  bank.releaseSource = source || '';
  return bank;
}

async function checkForBankUpdates(options = {}) {
  const manual = Boolean(options.manual);
  if (manual) showToast('正在检查题库更新');
  try {
    const release = await fetchLatestRelease();
    const payloads = await collectReleaseBankPayloads(release);
    localStorage.setItem(BANK_UPDATE_LAST_CHECK_KEY, String(Date.now()));
    const banks = payloads
      .map((item, index) => normalizeReleaseBankPayload(item.payload, release, item.source, index))
      .filter(bank => bank.questions.length);
    if (manual) {
      showBankUpdateDialog({ release, banks });
    } else if (banks.length && hasNewReleaseBankUpdate(banks, release)) {
      showBankUpdateDialog({ release, banks, automatic: true });
    }
    if (state.view === 'settings' && !document.querySelector('.app-dialog-mask')) renderSettings();
    return banks;
  } catch(e) {
    if (manual) showNotice(`题库更新失败：${e.message || e}`);
    return [];
  }
}

function getBankUpdateMeta() {
  try {
    return JSON.parse(localStorage.getItem(BANK_UPDATE_META_KEY) || '{}') || {};
  } catch(e) {
    return {};
  }
}

function hasNewReleaseBankUpdate(banks, release) {
  if (!banks.length) return false;
  const meta = getBankUpdateMeta();
  const tag = release?.tag_name || release?.tagName || '';
  const sources = banks.map(bank => bank.releaseSource).filter(Boolean).sort().join('|');
  const oldSources = Array.isArray(meta.sources) ? meta.sources.slice().sort().join('|') : '';
  return meta.tag !== tag || Number(meta.count || 0) !== banks.length || oldSources !== sources;
}

function summarizeReleaseBankGroups(banks) {
  const groups = new Map();
  for (const bank of banks) {
    const subject = bank.subject || pathTitle(getBankPath(bank)) || '未分类';
    const current = groups.get(subject) || { subject, banks: 0, questions: 0 };
    current.banks += 1;
    current.questions += bank.questions.length;
    groups.set(subject, current);
  }
  return Array.from(groups.values()).sort((a, b) => a.subject.localeCompare(b.subject, 'zh-CN'));
}

        <p>可用题库包：<strong>${banks.length}</strong> 个题库，合计 <strong>${totalQuestions}</strong> 题。</p>

        <p>点击“下载题库”后才会写入本地题库区；同路径的 Release 题库会覆盖旧的 Release 题库显示，不会清除本地做题进度、错题集和用户手动导入的其他题库。</p>
      ` : '<p>请确认 Release 中存在 quizapp-bank-manifest.json，或上传 quizapp-bank-*.json。</p>'}
    </div>
    <div class="update-progress" id="bankUpdateProgress" hidden>
      <div class="update-progress-track"><div class="update-progress-fill" id="bankUpdateProgressFill"></div></div>
      <div class="update-progress-text" id="bankUpdateProgressText">等待下载</div>
    </div>
    <div class="app-dialog-actions ${hasBanks ? 'triple' : ''}">
      <button class="secondary" type="button">${automatic ? '稍后' : '关闭'}</button>
      ${hasBanks ? '<button class="secondary" type="button">Release</button><button type="button">下载题库</button>' : '<button type="button">查看 Release</button>'}
    </div>

  mask.appendChild(dialog);

  closeBtn.onclick = closeAppDialog;
  releaseBtn.onclick = () => openExternal(releaseUrl);
  if (downloadBtn) {
    downloadBtn.onclick = () => {
      const progress = document.getElementById('bankUpdateProgress');
      const fill = document.getElementById('bankUpdateProgressFill');

        showToast(`题库更新完成：${banks.length} 个题库`);
        window.setTimeout(() => {

          if (state.view === 'settings') renderSettings();
        }, 520);

    };

}

function applyReleaseBankUpdates(banks, release) {
  const ids = new Set(banks.map(bank => bank.id));
  const paths = new Set(banks.map(bank => pathKey(getBankPath(bank))).filter(Boolean));
  state.banks = state.banks.filter(bank => !(bank.releaseManaged && (ids.has(bank.id) || paths.has(pathKey(getBankPath(bank))))));
  for (const bank of banks) {
    ensureLibraryPath(getBankPath(bank));
    state.banks.push(bank);
  }
  saveBanks();
  localStorage.setItem(BANK_UPDATE_META_KEY, JSON.stringify({
    tag: release?.tag_name || release?.tagName || '',
    checkedAt: Date.now(),
    count: banks.length,
    sources: banks.map(bank => bank.releaseSource).filter(Boolean),
  }));
  if (state.view === 'home') renderHome();
  if (state.view === 'subjects') renderSubject();
}

function showUpdateDialog({ release, apkAsset, manual = false }) {
  closeAppDialog();
  const latestTag = release?.tag_name || release?.tagName || '';
  const releaseUrl = release?.html_url || release?.url || RELEASE_PAGE_URL;
  const downloadUrl = apkAsset?.browser_download_url || apkAsset?.url || releaseUrl;
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  const dialog = document.createElement('div');
  dialog.className = 'app-dialog announcement-dialog';
  dialog.innerHTML = `
    <h3>发现新版本 ${escapeHtml(latestTag)}</h3>
    <div class="announcement-body">
      <p>当前版本：<strong>${escapeHtml(APP_VERSION)}</strong></p>
      <p>GitHub Release 已发布新版 APK。点击“下载 APK”会优先调用系统下载器，下载完成后拉起系统安装器；浏览器环境会直接打开 APK 下载链接。</p>
      <p>覆盖安装不会清除本机题库、做题进度、错题集、设置和学习统计；这些数据保存在同一个 App 包名的数据区。不要先卸载旧版，也不要清除应用数据。</p>
      <p>如果系统提示签名不一致，说明安装包不是同一个签名来源，不能覆盖安装，请改用本项目 release 内的 APK。</p>
    </div>
    <label class="announcement-option">
      <input id="updateDontShowThisTag" type="checkbox">
      <span>这个版本不再自动提醒</span>
    </label>
    <div class="update-progress" id="updateProgress" hidden>
      <div class="update-progress-track"><div class="update-progress-fill" id="updateProgressFill"></div></div>
      <div class="update-progress-text" id="updateProgressText">等待下载</div>
    </div>
    <div class="app-dialog-actions triple">
      <button class="secondary" type="button">稍后</button>
      <button class="secondary" type="button">Release</button>
      <button type="button">下载 APK</button>
    </div>
  `;
  mask.appendChild(dialog);
  document.body.appendChild(mask);
  const [laterBtn, releaseBtn, downloadBtn] = dialog.querySelectorAll('button');
  const close = () => {
    if (document.getElementById('updateDontShowThisTag')?.checked && latestTag) {
      localStorage.setItem(UPDATE_DISMISSED_TAG_KEY, latestTag);
    }
    closeAppDialog();
  };
  laterBtn.onclick = close;
  releaseBtn.onclick = () => openExternal(releaseUrl);
  downloadBtn.onclick = () => {
    if (latestTag) localStorage.setItem(UPDATE_DISMISSED_TAG_KEY, latestTag);
    downloadApk(downloadUrl);
  };
  mask.onclick = e => { if (e.target === mask) close(); };
  downloadBtn.focus();
}

function scheduleAutoUpdateCheck() {

  const banks = getDescendantBanks(path);
  const directBanks = getBanksAtPath(path);
  const children = getLibraryChildren(path);
  if (!banks.length && !children.length && !state.editMode) return renderHome();
  const questionCount = banks.reduce((sum, b) => sum + b.questions.length, 0);
  const wrongCount = getWrongRecords({ path }).length;
  const title = pathTitle(path);
  const subjectToolsKey = `subject-tools:${pathKey(path)}`;
  const subjectToolsExpanded = isToolGroupExpanded(subjectToolsKey);
  const listHtml = getLibraryDisplayItems(path).map(renderLibraryDisplayItem).join('');

  const app = document.getElementById('app');
  app.innerHTML = `

        <span>${escapeHtml(pathCrumbs(path))} · ${questionCount} 题</span>
        ${state.editMode ? '<strong>编辑模式</strong>' : renderToolToggle(subjectToolsKey)}
      </div>
      ${state.editMode ? renderLibraryManager(path, { canEdit: true }) : ''}

        <div class="tool-group">
          ${renderToolPanels('subject', { subject: path[0] || '', wrongCount })}
        </div>
      ` : ''}

function restoreSubjectScroll(options = {}) {
  if (!options.preserveScroll) return;
  const anchor = options.scrollAnchor || {};
  const restore = () => {
    const scroller = document.querySelector('.viewport.view-scroll');
    if (!scroller) return;
    const oldBehavior = scroller.style.scrollBehavior;
    const oldAnchor = scroller.style.overflowAnchor;
    scroller.style.scrollBehavior = 'auto';
    scroller.style.overflowAnchor = 'none';
    scroller.scrollTop = Number(anchor.scrollTop || 0);
    if (anchor.bankId && Number.isFinite(anchor.cardTop)) {
      const card = findBankCardElement(anchor.bankId);
      if (card) scroller.scrollTop += card.getBoundingClientRect().top - anchor.cardTop;
    }
    scroller.style.scrollBehavior = oldBehavior;
    scroller.style.overflowAnchor = oldAnchor;
  };
  restore();
  requestAnimationFrame(() => {
    restore();
    requestAnimationFrame(restore);
  });
}

function computeQuizProgress(session) {
  const total = session?.questions?.length || 0;
  const codes = new Array(total);
  let correctCount = 0;
  let wrongCount = 0;
  if (state.reviewMode) {
    codes.fill(3);
    return { codes, correctCount: 0, wrongCount: 0, unansweredCount: 0 };
  }
  for (let i = 0; i < total; i++) {
    const answer = state.answers[i];
    if (!answer) {
      codes[i] = 0;
      continue;
    }
    if (checkAnswer(session.questions[i], answer)) {
      correctCount++;
      codes[i] = 1;
    } else {
      wrongCount++;
      codes[i] = 2;
    }
  }
  return { codes, correctCount, wrongCount, unansweredCount: total - correctCount - wrongCount };
}

function drawQuizProgressBar(codes) {
  const canvas = document.getElementById('quizProgressCanvas');
  if (!canvas || !codes || !codes.length) return;
  const rect = canvas.getBoundingClientRect();
  const cssWidth = Math.max(1, Math.floor(rect.width));
  const cssHeight = Math.max(1, Math.floor(rect.height));
  const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  const internalWidth = Math.max(Math.ceil(cssWidth * dpr), codes.length * 2);
  const internalHeight = Math.max(2, Math.ceil(cssHeight * dpr));
  if (canvas.width !== internalWidth) canvas.width = internalWidth;
  if (canvas.height !== internalHeight) canvas.height = internalHeight;
  const ctx = canvas.getContext('2d');
  if (!ctx) return;
  const style = getComputedStyle(document.documentElement);
  const colors = [
    style.getPropertyValue('--line').trim() || '#e2eadb',
    style.getPropertyValue('--success').trim() || '#22a06b',
    style.getPropertyValue('--danger').trim() || '#d94a5a',
    style.getPropertyValue('--primary').trim() || '#1f8f62',
  ];
  ctx.clearRect(0, 0, internalWidth, internalHeight);
  const unit = internalWidth / codes.length;
  const gap = unit >= 3 ? Math.max(1, Math.floor(unit * .28)) : 0;
  for (let i = 0; i < codes.length; i++) {
    const x = Math.floor(i * unit);
    const nextX = Math.ceil((i + 1) * unit);
    const width = Math.max(1, nextX - x - gap);
    ctx.fillStyle = colors[codes[i] || 0];
    ctx.fillRect(x, 0, width, internalHeight);
  }
}

function clampNumber(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getScrollWindow(total, center = state.currentIndex) {
  if (total <= 36) return { start: 0, end: Math.max(0, total - 1) };
  const radius = 7;
  let start = center - radius;
  let end = center + radius;
  if (start < 0) {
    end += -start;
    start = 0;
  }
  if (end > total - 1) {
    start -= end - (total - 1);
    end = total - 1;
  }
  start = clampNumber(start, 0, Math.max(0, total - 1));
  end = clampNumber(end, 0, Math.max(0, total - 1));
  return { start, end };
}

function getCardTop(idx) {
  const card = document.getElementById(`card-${idx}`);
  return card ? card.getBoundingClientRect().top : null;
}

function renderQuizPreservingCard(idx) {

}

function restoreQuizScrollPosition(options = {}) {
  const scroller = options.scroller || document.getElementById('scrollContainer') || document.querySelector('.page-slide.current-slide') || document.getElementById('viewport');
  if (!scroller) return;
  const oldBehavior = scroller.style.scrollBehavior;
  const oldAnchor = scroller.style.overflowAnchor;
  scroller.style.scrollBehavior = 'auto';
  scroller.style.overflowAnchor = 'none';
  if (Number.isFinite(options.scrollTop)) scroller.scrollTop = options.scrollTop;
  if (Number.isInteger(options.cardIndex) && Number.isFinite(options.cardTop)) {
    const card = document.getElementById(`card-${options.cardIndex}`);
    if (card) scroller.scrollTop += card.getBoundingClientRect().top - options.cardTop;
  }
  scroller.style.scrollBehavior = oldBehavior;
  scroller.style.overflowAnchor = oldAnchor;
}

function renderQuiz(options = {}) {
  state.view = 'quiz';

  if (!session) return renderHome();
  const total = session.questions.length;
  if (!total) return renderHome();
  window.clearTimeout(state.pageAnimationTimer);
  state.pageAnimationTimer = null;
  state.pageAnimating = false;
  state.pageTargetIndex = null;

  state.currentIndex = Math.max(0, Math.min(state.currentIndex, total - 1));
  const idx = state.currentIndex;
  const savablePractice = isSavablePracticeSession(session);
  const sessionTitle = String(session.title || session.subject || '练习');

  const progress = computeQuizProgress(session);

  const preserveScroll = Boolean(options.preserveScroll);
  const prevScrollTop = preserveScroll ? (document.getElementById('scrollContainer')?.scrollTop ?? document.getElementById('viewport')?.scrollTop ?? 0) : 0;
  const prevPageScrollTop = preserveScroll ? (document.querySelector('.page-slide.current-slide')?.scrollTop ?? 0) : 0;
  const preserveCardIndex = Number.isInteger(options.preserveCardIndex) ? options.preserveCardIndex : null;
  const preserveCardTop = Number.isFinite(options.preserveCardTop) ? options.preserveCardTop : null;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar quiz-topbar">
      <button class="btn-back" onclick="backFromQuiz()" aria-label="返回">←</button>
      <h1>${escapeHtml(sessionTitle.slice(0, 24))}</h1>
      <div class="topbar-actions">
        <button class="btn-text" onclick="cycleMode()">${state.mode === 'page' ? '竖向' : '横向'}</button>
        ${savablePractice ? `
          <button class="btn-text btn-reset" onclick="resetCurrentPractice()">重做</button>
          <button class="btn-text btn-save" onclick="saveCurrentSession()">保存</button>
        ` : ''}
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" title="${idx + 1}/${total}">
        <canvas id="quizProgressCanvas" aria-label="题目进度 ${idx + 1}/${total}"></canvas>
      </div>
      <div class="progress-info">
        <span>${escapeHtml(session.subtitle)}</span><span>${state.reviewMode ? '答案可见' : `${total} 题`}</span><span id="progressPositionLabel">${idx + 1}/${total}</span>
      </div>
    </div>
    <div class="viewport ${state.mode === 'scroll' ? 'view-scroll' : 'view-page'}" id="viewport">
      ${state.mode === 'scroll' ? renderScrollMode(session) : renderPageMode(session)}
    </div>
    <div class="bottombar">
      <button id="prevBtn" class="btn-prev" onclick="prevQ()" ${idx === 0 ? 'disabled' : ''}>上一题</button>
      <button class="btn-overview" onclick="showQuestionOverview()">题号总览</button>
      <button id="nextBtn" class="btn-next" onclick="nextQ()" ${idx === total - 1 ? 'disabled' : ''}>下一题</button>
    </div>
  `;

  if (state.mode === 'scroll') {
    if (preserveScroll) {
      const restoreScroll = () => {
        const scroller = document.getElementById('scrollContainer') || document.getElementById('viewport');
        if (!scroller) return;
        restoreQuizScrollPosition({ scroller, scrollTop: prevScrollTop, cardIndex: preserveCardIndex, cardTop: preserveCardTop });
      };
      restoreScroll();
      requestAnimationFrame(() => {
        restoreScroll();
        requestAnimationFrame(restoreScroll);
      });
    } else {
      const card = document.getElementById(`card-${idx}`);
      if (card) card.scrollIntoView({ behavior: 'instant', block: 'start' });
    }
    setupScrollTracking();
  } else {
    setupPageTouch();
    if (preserveScroll) {
      const restorePageScroll = () => {
        const scroller = document.querySelector('.page-slide.current-slide');
        restoreQuizScrollPosition({ scroller, scrollTop: prevPageScrollTop, cardIndex: preserveCardIndex, cardTop: preserveCardTop });
      };
      restorePageScroll();
      requestAnimationFrame(() => {
        restorePageScroll();
        requestAnimationFrame(restorePageScroll);
      });
    }
    updateNavState();
  }
  requestAnimationFrame(() => drawQuizProgressBar(progress.codes));
  scheduleAnswerAnimationCleanup();
  state.answerFeedbackIndex = null;
}

function renderPageMode(session) {
  const total = session.questions.length;
  const radius = 8;
  const start = Math.max(0, state.currentIndex - radius);
  const end = Math.min(total - 1, state.currentIndex + radius);
  const indices = Array.from({ length: end - start + 1 }, (_, i) => start + i);
  const currentPos = Math.max(0, indices.indexOf(state.currentIndex));
  return `
    <div class="page-frame">
      <div class="page-track" id="pageTrack" data-start-index="${start}" data-end-index="${end}" data-current-pos="${currentPos}" style="transform:translateX(${-currentPos * 100}%)">
        ${indices.map(i => `
          <div class="page-slide ${i === state.currentIndex ? 'current-slide' : ''}">
            ${renderCard(session.questions[i], i)}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function clearAnswerAnimations() {
  document.querySelectorAll('.animate-answer').forEach(el => el.classList.remove('animate-answer'));
}

function scheduleAnswerAnimationCleanup() {
  window.clearTimeout(state.answerAnimationTimer);
  state.answerAnimationTimer = window.setTimeout(clearAnswerAnimations, 300);
}

function renderScrollMode(session) {
  const total = session.questions.length;
  const { start, end } = getScrollWindow(total);
  const estimate = clampNumber(Math.round(state.scrollCardEstimate || 520), 320, 900);
  const topHeight = start * estimate;
  const bottomHeight = Math.max(0, total - end - 1) * estimate;
  const indices = Array.from({ length: end - start + 1 }, (_, i) => start + i);
  return `
    <div class="scroll-container" id="scrollContainer" data-window-start="${start}" data-window-end="${end}" data-estimate="${estimate}">
      ${topHeight ? `<div class="scroll-spacer" style="--spacer-height:${topHeight}px"></div>` : ''}
      ${indices.map(i => renderCard(session.questions[i], i)).join('')}
      ${bottomHeight ? `<div class="scroll-spacer" style="--spacer-height:${bottomHeight}px"></div>` : ''}
    </div>
  `;
}

function getQuestionStatus(idx) {
  if (!state.activeSession) return '';
  if (state.reviewMode) return 'review';
  const answer = state.answers[idx];
  if (!answer) return '';
  return checkAnswer(state.activeSession.questions[idx], answer) ? 'correct' : 'wrong';
}

function getQuizOverviewStats() {
  const session = state.activeSession;
  const total = session?.questions?.length || 0;
  if (!session || state.reviewMode) {
    return { total, answered: total, unanswered: 0, correct: total, wrong: 0 };
  }
  let answered = 0;
  let correct = 0;
  let wrong = 0;
  for (let i = 0; i < total; i++) {
    const answer = state.answers[i];
    if (!answer) continue;
    answered++;
    checkAnswer(session.questions[i], answer) ? correct++ : wrong++;
  }
  return { total, answered, unanswered: total - answered, correct, wrong };
}

function showQuestionOverview() {
  const session = state.activeSession;
  if (!session) return;
  const old = document.getElementById('questionOverview');
  if (old) old.remove();
  const stats = getQuizOverviewStats();
  state.questionOverviewItems = buildQuestionOverviewItems(session);

  const wrap = document.createElement('div');
  wrap.id = 'questionOverview';
  wrap.className = 'question-overview';
  wrap.innerHTML = `
    <div class="overview-panel">
      <div class="overview-head">
        <strong>题号总览</strong>
        <button class="btn-submit" onclick="closeQuestionOverview()">关闭</button>
      </div>
      <div class="overview-stats">
        <div class="overview-stat"><span>已答</span><strong>${stats.answered}/${stats.total}</strong></div>
        <div class="overview-stat"><span>未答</span><strong>${stats.unanswered}</strong></div>
        <div class="overview-stat good"><span>正确</span><strong>${stats.correct}</strong></div>
        <div class="overview-stat bad"><span>错误</span><strong>${stats.wrong}</strong></div>
      </div>
      <div class="overview-grid" id="overviewGrid"></div>
    </div>
  `;
  wrap.addEventListener('click', e => {
    if (e.target === wrap) closeQuestionOverview();
  });
