          ${renderNotebookInputModeSwitch()}
        `}
      </div>
    </div>
  `;
}

function getVisibleNotebookToolDefinitions() {
  const order = Array.isArray(state.uiConfig.notebookToolbarTools) ? state.uiConfig.notebookToolbarTools : NOTEBOOK_TOOL_DEFINITIONS.map(item => item.key);
  return order.map(key => NOTEBOOK_TOOL_DEFINITIONS.find(item => item.key === key)).filter(Boolean);
}

function toggleNotebookToolbarCollapsed() {
  if (!isNotebookFreeLayout()) return;
  state.uiConfig.notebookToolbarCollapsed = !state.uiConfig.notebookToolbarCollapsed;
  saveUiConfig();
  refreshNotebookToolbar();
}

function renderNotebookInputModeSwitch() {
  return `<div class="notebook-input-mode-switch" aria-label="手写输入方式"><button class="${state.inkPenOnly ? 'active' : ''}" type="button" onclick="setNotebookPenOnly(true)">笔写字</button><button class="${state.inkPenOnly ? '' : 'active'}" type="button" onclick="setNotebookPenOnly(false)">手指写字</button></div>`;
}

function updateNotebookBodyText(value) {
  if (!state.notebookSession) return;
  state.notebookSession.setPageBodyText(value);
  state.notebookSaveState = '正在保存…';
  const label = document.getElementById('notebookSaveState');
  if (label) label.textContent = state.notebookSaveState;
}

async function setNotebookEditorMode(mode) {
  const next = mode === 'typing' ? 'typing' : 'handwriting';
  if (!state.notebookSession || state.notebookEditorMode === next) return;
  if (state.notebookEditorMode === 'typing') await saveCurrentInkNote({ silent: true });
  state.notebookEditorMode = next;
  state.notebookSession.document.lastEditorMode = next;
  await getNotebookRepository().put(state.notebookSession.document);
  state.notebookContinuousRestore = { pageId: state.notebookSession.document.activePageId, focus: true };
  renderHandwritingPractice();
}

function showNotebookPenCaseMenu() {
  closeAppDialog();
  const currentTool = state.notebookViewport?.tool || state.inkTool;
  const currentColor = state.notebookViewport?.color || state.inkColor;
  const currentSize = state.notebookViewport?.size || state.inkSize;
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  mask.innerHTML = `<div class="app-dialog notebook-mobile-sheet" role="dialog" aria-modal="true" aria-label="快捷笔盒"><h3>快捷笔盒</h3><div class="notebook-pen-case-grid">${NOTEBOOK_PEN_PRESETS.map(preset => {
    const active = preset.tool === currentTool && preset.color === currentColor && preset.size === currentSize;
    const toolLabel = NOTEBOOK_TOOL_DEFINITIONS.find(item => item.key === preset.tool)?.label || '钢笔';
    return `<button class="notebook-pen-preset ${active ? 'active' : ''}" type="button" data-notebook-pen-preset="${preset.id}" onclick="applyNotebookPenPreset('${preset.id}')" aria-label="${preset.label}"><i class="notebook-pen-preset-swatch" style="--preset-color:${preset.color}">${renderNotebookIcon(preset.tool === 'highlighter' ? 'highlighter' : preset.tool)}</i><span class="notebook-pen-preset-copy"><strong>${preset.label}</strong><small>${toolLabel} · ${preset.size}px</small></span></button>`;

function applyNotebookPenPreset(id) {
  const preset = NOTEBOOK_PEN_PRESETS.find(item => item.id === id);
  if (!preset) return;
  state.inkTool = preset.tool;
  state.inkColor = preset.color;
  state.inkSize = preset.size;
  state.notebookSubtoolbarOpen = true;
  state.notebookViewport?.setTool(preset.tool);
  state.notebookViewport?.setStyle({ color: preset.color, size: preset.size });
  closeAppDialog();
  refreshNotebookToolbar();
  showToast(`已切换为${preset.label}`);
}

function showNotebookToolbarMenu() {
  closeAppDialog();
  const visible = new Set(state.uiConfig.notebookToolbarTools || []);
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  mask.innerHTML = `<div class="app-dialog notebook-mobile-sheet" role="dialog" aria-modal="true" aria-label="自定义工具栏"><h3>自定义工具栏</h3><div class="notebook-toolbar-custom-list">${NOTEBOOK_TOOL_DEFINITIONS.map(item => {
    const index = state.uiConfig.notebookToolbarTools.indexOf(item.key);
    return `<div class="notebook-toolbar-custom-row" data-toolbar-tool="${item.key}"><i>${renderNotebookIcon(item.icon)}</i><strong>${item.label}</strong><button type="button" onclick="moveNotebookToolbarTool('${item.key}',-1)" title="上移" aria-label="上移${item.label}" ${index <= 0 ? 'disabled' : ''}>${renderNotebookIcon('chevronUp')}</button><button type="button" onclick="moveNotebookToolbarTool('${item.key}',1)" title="下移" aria-label="下移${item.label}" ${index < 0 || index >= state.uiConfig.notebookToolbarTools.length - 1 ? 'disabled' : ''}>${renderNotebookIcon('chevronDown')}</button><label title="${item.key === 'pen' ? '钢笔保持显示' : '显示或隐藏'}"><input type="checkbox" ${visible.has(item.key) ? 'checked' : ''} ${item.key === 'pen' ? 'disabled' : ''} onchange="toggleNotebookToolbarTool('${item.key}',this.checked)" aria-label="显示${item.label}"></label></div>`;
  }).join('')}</div><div class="app-dialog-actions"><button class="secondary" type="button" onclick="resetNotebookToolbarTools()">恢复默认</button><button type="button" onclick="closeAppDialog()">完成</button></div></div>`;
  document.body.appendChild(mask);
  mask.onclick = event => { if (event.target === mask) closeAppDialog(); };
}

function toggleNotebookToolbarTool(key, visible) {
  if (key === 'pen') return;
  const current = [...(state.uiConfig.notebookToolbarTools || [])];
  const index = current.indexOf(key);
  if (visible && index < 0) current.push(key);
  if (!visible && index >= 0) current.splice(index, 1);
  state.uiConfig.notebookToolbarTools = current;
  if (!visible && state.inkTool === key) setNotebookTool('pen');
  else refreshNotebookToolbar();
  saveUiConfig();
}

function moveNotebookToolbarTool(key, delta) {
  const current = [...(state.uiConfig.notebookToolbarTools || [])];
  const index = current.indexOf(key);
  const target = Math.max(0, Math.min(current.length - 1, index + Number(delta || 0)));
  if (index < 0 || target === index) return;
  current.splice(index, 1);
  current.splice(target, 0, key);
  state.uiConfig.notebookToolbarTools = current;
  saveUiConfig();
  refreshNotebookToolbar();
  showNotebookToolbarMenu();
}

function resetNotebookToolbarTools() {
  state.uiConfig.notebookToolbarTools = NOTEBOOK_TOOL_DEFINITIONS.map(item => item.key);
  saveUiConfig();
  refreshNotebookToolbar();
  showNotebookToolbarMenu();
}

function renderNotebookLeftPanel() {
  return `
    <div class="notebook-panel-head">
      <button class="notebook-tab ${state.notebookLeftTab === 'questions' ? 'active' : ''}" onclick="setNotebookLeftTab('questions')">题目</button>
      <button class="notebook-tab ${state.notebookLeftTab === 'notebooks' ? 'active' : ''}" onclick="setNotebookLeftTab('notebooks')">笔记本</button>
      <button class="notebook-tab ${state.notebookLeftTab === 'bookmarks' ? 'active' : ''}" onclick="setNotebookLeftTab('bookmarks')">书签</button>
      ${state.notebookSession?.document.pdfOutline?.length ? `<button class="notebook-tab ${state.notebookLeftTab === 'outline' ? 'active' : ''}" onclick="setNotebookLeftTab('outline')">目录</button>` : ''}
      <button class="notebook-icon-action notebook-panel-close" onclick="toggleNotebookMobilePane('')" aria-label="关闭目录" title="关闭目录">${renderNotebookIcon('close')}</button>
    </div>
    <div class="notebook-panel-scroll">
      ${state.notebookLeftTab === 'outline' ? renderNotebookPdfOutline() : state.notebookLeftTab === 'bookmarks' ? renderNotebookBookmarks() : state.notebookLeftTab === 'notebooks' ? renderNotebookLibrary() : renderNotebookQuestionBrowser()}
    </div>
  `;
}

function renderNotebookBookmarks() {
  const notebook = state.notebookSession?.document;
  if (!notebook) return '<div class="notebook-empty">当前没有笔记</div>';
  const pageOrder = new Map(notebook.pages.map((page, index) => [page.id, index]));
  const bookmarks = [...(notebook.bookmarks || [])].sort((left, right) => (pageOrder.get(left.pageId) ?? 99999) - (pageOrder.get(right.pageId) ?? 99999));
  const current = bookmarks.find(bookmark => bookmark.pageId === notebook.activePageId);
  return `
    <button class="notebook-create" onclick="toggleCurrentNotebookBookmark()">${current ? '移除当前页书签' : '为当前页添加书签'}</button>
    <div class="notebook-bookmark-list">
      ${bookmarks.length ? bookmarks.map(bookmark => {
        const pageIndex = notebook.pages.findIndex(page => page.id === bookmark.pageId);
        return `<div class="notebook-bookmark-item">
          <button class="notebook-bookmark-copy" onclick="openNotebookBookmark('${escapeAttr(bookmark.id)}')"><strong>${escapeHtml(bookmark.label)}</strong><small>第 ${pageIndex + 1} 页${bookmark.note ? ` · ${escapeHtml(bookmark.note)}` : ''}</small></button>
          <button onclick="renameNotebookBookmark('${escapeAttr(bookmark.id)}')" title="重命名书签" aria-label="重命名书签">${renderNotebookIcon('edit')}</button>
          <button onclick="removeNotebookBookmark('${escapeAttr(bookmark.id)}')" title="删除书签" aria-label="删除书签">${renderNotebookIcon('trash')}</button>
        </div>`;
      }).join('') : '<div class="notebook-empty">还没有书签</div>'}
    </div>`;
}

function renderNotebookQuestionBrowser() {
  const session = state.inkSession;
  if (session?.freeMode || !session?.questions?.length) {
    return '<div class="notebook-empty">自由笔记不绑定题目。切换到“笔记本”可创建或打开笔记。</div>';
  }
  return `
    <div class="notebook-question-context">${escapeHtml(session.title)} · ${state.currentIndex + 1}/${session.questions.length}</div>
    <input class="notebook-search" value="${escapeAttr(state.notebookQuestionSearch)}" placeholder="搜索题干或题号" oninput="filterNotebookQuestions(this.value)">
    <div class="notebook-list" id="notebookQuestionList">${renderNotebookQuestionItems()}</div>
  `;
}

function renderNotebookQuestionItems() {
  const questions = state.inkSession?.questions || [];
  const query = state.notebookQuestionSearch.trim().toLowerCase();
  let indexes;
  if (query) {
    indexes = questions.map((question, index) => ({ question, index }))
      .filter(item => String(item.index + 1).includes(query) || String(item.question.q || '').toLowerCase().includes(query))
      .slice(0, 120);
  } else {
    const start = Math.max(0, Math.min(state.currentIndex - 30, Math.max(0, questions.length - 80)));
    indexes = questions.slice(start, start + 80).map((question, offset) => ({ question, index: start + offset }));
  }
  if (!indexes.length) return '<div class="notebook-empty">没有匹配的题目</div>';
  return indexes.map(({ question, index }) => `
    <button class="notebook-list-item ${index === state.currentIndex ? 'active' : ''}" onclick="jumpInkQuestion(${index})">
      <span class="index">${index + 1}</span>
      <span class="copy"><strong>${escapeHtml(String(question.q || '图片题').replace(/\s+/g, ' '))}</strong><small>${escapeHtml(getTypeLabel(getType(question)))}</small></span>
      <span>${index === state.currentIndex ? '●' : ''}</span>
    </button>
  `).join('');
}

function renderNotebookLibrary() {
  const query = state.notebookLibrarySearch.trim().toLowerCase();
  const documents = (state.notebookDocuments || []).filter(document => {
    if (!query) return document.kind === 'free';
    return String(state.notebookSearchIndex.get(document.id) || '').includes(query);
  });
  return `
    <div class="notebook-library-actions">
      <button class="notebook-create" onclick="createFreeNotebook('paged')">分页笔记</button>
      <button onclick="createFreeNotebook('edgeless')">无边界</button>
      <button onclick="showNotebookKnowledgeGraph()">知识图谱</button>
      <button onclick="showNotebookBatchExportDialog()">批量导出</button>
    </div>
    <input class="notebook-search" value="${escapeAttr(state.notebookLibrarySearch)}" placeholder="搜索笔记、PDF 原文或题目" oninput="filterNotebookLibrary(this.value)">
    <div class="notebook-list">
      ${documents.length ? documents.map(document => `
        <div class="notebook-list-item ${state.notebookSession?.document.id === document.id ? 'active' : ''}" onclick="openNotebookSearchResult('${escapeAttr(document.id)}')">
          <span class="index">${document.pages.length}</span>
          <span class="copy"><strong>${escapeHtml(document.title)}</strong><small>${document.kind === 'question' ? '题目笔记' : '自由笔记'} · ${new Date(document.updatedAt).toLocaleDateString()} · ${document.pages.length} 页</small></span>
          ${document.kind === 'free' ? `<span class="notebook-list-actions"><button class="notebook-icon-action" onclick="event.stopPropagation();renameNotebookById('${escapeAttr(document.id)}')" title="重命名笔记" aria-label="重命名笔记">${renderNotebookIcon('edit')}</button><button class="notebook-icon-action" onclick="event.stopPropagation();deleteFreeNotebook('${escapeAttr(document.id)}')" title="删除笔记" aria-label="删除笔记">${renderNotebookIcon('trash')}</button></span>` : '<span></span>'}
        </div>
      `).join('') : `<div class="notebook-empty">${query ? '没有匹配的笔记或 PDF 原文' : '还没有自由笔记'}</div>`}
    </div>
  `;
}

function notebookGraphTypeLabel(type) {
  if (type === 'document') return '笔记';
  if (type === 'tag') return '标签';
  if (type === 'question') return '题目';
  if (type === 'resource') return '外部资料';
  return '关联项';
}

async function showNotebookKnowledgeGraph() {
  if (!window.cytoscape || !window.QuizNotebookKnowledgeGraph) return showNotice('知识图谱模块未加载，请重新打开应用');
  await saveCurrentInkNote({ silent: true });
  await loadNotebookDocuments();
  const graph = QuizNotebookKnowledgeGraph.build(state.notebookDocuments);
  closeAppDialog();
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask notebook-graph-mask';
  mask.innerHTML = `
    <div class="app-dialog notebook-graph-dialog" role="dialog" aria-modal="true" aria-label="知识图谱">
      <div class="notebook-graph-head"><h3>知识图谱</h3><button type="button" onclick="closeAppDialog()" title="关闭" aria-label="关闭">${renderNotebookIcon('close')}</button></div>
      <div class="notebook-graph-toolbar">
        <input id="notebookGraphSearch" placeholder="搜索笔记、标签、题目或资料" oninput="filterNotebookKnowledgeGraph(this.value)">
        <button type="button" onclick="fitNotebookKnowledgeGraph()">适合视图</button>
        <button type="button" onclick="relayoutNotebookKnowledgeGraph()">重新布局</button>
      </div>
      <div class="notebook-graph-body">
        <div class="notebook-graph-canvas" id="notebookGraphCanvas" aria-label="笔记知识图谱"></div>
        <aside class="notebook-graph-side">
          <div class="notebook-graph-summary">
            <div><strong>${graph.counts.nodes}</strong><small>节点</small></div>
            <div><strong>${graph.counts.edges}</strong><small>关联</small></div>
            <div><strong>${graph.counts.typeCounts.document || 0}</strong><small>笔记</small></div>
            <div><strong>${graph.counts.typeCounts.question || 0}</strong><small>题目</small></div>
          </div>
          <div class="notebook-graph-legend">
            <span><i style="background:#1f8f62"></i>笔记</span><span><i style="background:#2878b5"></i>标签</span>

          </div>
          <div class="notebook-graph-selection" id="notebookGraphSelection"><strong>未选择节点</strong><small>${graph.counts.truncated ? '图谱较大，当前显示部分最新笔记。' : '当前图谱已加载。'}</small></div>

function notebookGraphPalette() {
  const styles = getComputedStyle(document.documentElement);
  return {
    text: styles.getPropertyValue('--text').trim() || '#202522',
    line: styles.getPropertyValue('--line').trim() || '#cdd5d0',
    surface: styles.getPropertyValue('--surface').trim() || '#ffffff',
    document: styles.getPropertyValue('--primary').trim() || '#1f8f62',
  };
}

function initializeNotebookKnowledgeGraph(elements) {
  const container = document.getElementById('notebookGraphCanvas');
  if (!container || !window.cytoscape) return;
  const palette = notebookGraphPalette();
  const graph = cytoscape({
    container,
    elements,
    minZoom: .18,
    maxZoom: 3.2,
    wheelSensitivity: .22,
    style: [

function filterNotebookKnowledgeGraph(value) {
  const graph = state.notebookGraph;
  if (!graph) return;
  const query = String(value || '').trim().toLowerCase();
  const status = document.getElementById('notebookGraphSearchStatus');
  graph.elements().removeClass('dim');
  if (!query) {
    if (status) status.textContent = '';
    return;
  }
  const matches = graph.nodes().filter(node => String(node.data('label') || '').toLowerCase().includes(query) || String(node.data('detail') || '').toLowerCase().includes(query));
  graph.elements().addClass('dim');
  matches.removeClass('dim');
  matches.connectedEdges().removeClass('dim');
  matches.neighborhood('node').removeClass('dim');
  if (matches.length) graph.animate({ fit: { eles: matches.union(matches.neighborhood()), padding: 70 }, duration: 240 });
  if (status) status.textContent = `找到 ${matches.length} 个节点`;
}

function fitNotebookKnowledgeGraph() {
  state.notebookGraph?.animate({ fit: { eles: state.notebookGraph.elements(':visible'), padding: 38 }, duration: 260 });
}

function relayoutNotebookKnowledgeGraph() {
  state.notebookGraph?.layout({ name: 'cose', animate: 'end', animationDuration: 380, fit: true, padding: 34, randomize: true, nodeRepulsion: 7600, idealEdgeLength: 90, numIter: 620 }).run();
}

async function openNotebookGraphSelection() {
  const selected = state.notebookGraphSelection;
  if (!selected) return;
  if (selected.type === 'tag') {
    const input = document.getElementById('notebookGraphSearch');
    if (input) input.value = selected.label || '';
    filterNotebookKnowledgeGraph(selected.label || '');
    return;
  }
  if (selected.type === 'resource') {
    if (/^https:\/\//i.test(selected.target || '')) window.open(selected.target, '_blank', 'noopener,noreferrer');
    return;
  }
  if (selected.type === 'document') {
    const target = selected.target;
    closeAppDialog();
    await openNotebookSearchResult(target);
    return;
  }
  if (selected.type === 'question') {
    const questions = buildQuestionSet(await ensureBanksHydrated(getVisibleBanks()));
    releaseHydratedLargeBanks();
    const index = questions.findIndex(question => questionKey(question) === selected.target);

    const question = questions[index];

}

async function hydrateNotebookPdfPreview(placeholder) {
  const session = state.notebookSession;
  if (!placeholder || !session || placeholder.dataset.loading === 'true' || placeholder.querySelector('canvas')) return;
  const documentId = session.document.id;
  const page = session.document.pages.find(item => item.id === placeholder.dataset.notebookPdfPreview);
  if (!page) return;
  placeholder.dataset.loading = 'true';
  placeholder.classList.add('loading');
  try {
    await ensureNotebookPdfSourcePage(page);
    if (!placeholder.isConnected || placeholder.dataset.visible !== 'true' || state.notebookSession?.document.id !== documentId) return;
    const ratio = Math.max(.2, Math.min(5, Number(page.width || 900) / Math.max(1, Number(page.height || 1200))));
    const canvas = document.createElement('canvas');
    canvas.width = 720;
    canvas.height = Math.max(360, Math.min(1600, Math.round(720 / ratio)));
    canvas.setAttribute('aria-hidden', 'true');
    placeholder.appendChild(canvas);
    const assetSource = page.background?.assetId ? await getNotebookAssetDataUrl(page.background.assetId) : '';
    if (!canvas.isConnected || placeholder.dataset.visible !== 'true') return;
    await window.QuizNotebook.renderPageThumbnail(canvas, page, window.PerfectFreehand?.getStroke, assetSource);
    placeholder.classList.add('ready');
  } catch(error) {
    placeholder.dataset.error = 'true';
    placeholder.title = error.message || '页面预览加载失败';
  } finally {
    placeholder.dataset.loading = 'false';
    placeholder.classList.remove('loading');
  }
}

function releaseNotebookPdfPreview(placeholder) {
  if (!placeholder) return;
  placeholder.dataset.visible = 'false';
  const canvas = placeholder.querySelector('canvas');
  if (canvas) {
    canvas.width = 1;
    canvas.height = 1;
    canvas.remove();
  }
  placeholder.classList.remove('ready');
}

function getNotebookContinuousScrollState() {
  const scroller = document.getElementById('notebookContinuousScroll');
  if (!scroller) return null;
  return {
    flow: scroller.dataset.pageFlow || getNotebookPageFlow(),
    scrollLeft: scroller.scrollLeft,
    scrollTop: scroller.scrollTop,
  };
}

function revealNotebookContinuousPage(scroller, page) {
  if (!scroller || !page) return;
  if (scroller.dataset.pageFlow === 'horizontal') {
    const start = page.offsetLeft;
    scroller.scrollLeft = Math.max(0, start - (scroller.clientWidth - page.offsetWidth) / 2);
    return;
  }
  const start = page.offsetTop;
  const end = start + page.offsetHeight;
  const viewStart = scroller.scrollTop;
  const viewEnd = viewStart + scroller.clientHeight;
  if (page.offsetHeight > scroller.clientHeight) {
    if (start > viewStart || end < viewEnd) scroller.scrollTop = start;
  } else if (start < viewStart) scroller.scrollTop = start;
  else if (end > viewEnd) scroller.scrollTop = end - scroller.clientHeight;
}

function initializeNotebookContinuousPages() {
  const scroller = document.getElementById('notebookContinuousScroll');
  if (!scroller) return;
  state.notebookContinuousObserver?.disconnect?.();
  state.notebookContinuousObserver = null;
  window.clearTimeout(state.notebookContinuousScrollTimer);
  const restore = state.notebookContinuousRestore;
  state.notebookContinuousRestore = null;
  const flow = scroller.dataset.pageFlow || getNotebookPageFlow();
  let userInteracted = false;
  scroller.addEventListener('wheel', () => { userInteracted = true; }, { passive: true });
  scroller.addEventListener('pointerdown', () => { userInteracted = true; }, { passive: true });
  scroller.addEventListener('touchstart', () => { userInteracted = true; }, { passive: true });
  const syncClosestPage = () => {
    if (!scroller.isConnected) return;
    const waitFor = state.notebookContinuousIgnoreUntil - performance.now();
    if (waitFor > 0) {
      state.notebookContinuousScrollTimer = window.setTimeout(syncClosestPage, waitFor + 20);
      return;
    }
    const scrollerRect = scroller.getBoundingClientRect();
    const center = flow === 'horizontal'
      ? scrollerRect.left + scroller.clientWidth / 2
      : scrollerRect.top + scroller.clientHeight / 2;
    let closest = null;
    let distance = Infinity;
    scroller.querySelectorAll('.notebook-continuous-page').forEach(page => {
      const rect = page.getBoundingClientRect();
      const pageCenter = flow === 'horizontal' ? rect.left + rect.width / 2 : rect.top + rect.height / 2;
      const nextDistance = Math.abs(pageCenter - center);
      if (nextDistance < distance) {
        closest = page;
        distance = nextDistance;
      }
    });
    const pageId = closest?.dataset.continuousPageId;
    if (pageId && pageId !== state.notebookSession?.document.activePageId) setNotebookPage(pageId, 'continuous-scroll');
  };
  const schedulePageSync = () => {
    window.clearTimeout(state.notebookContinuousScrollTimer);
    state.notebookContinuousScrollTimer = window.setTimeout(syncClosestPage, 150);
  };
  scroller.addEventListener('scroll', schedulePageSync, { passive: true });
  if (flow === 'horizontal') {
    scroller.addEventListener('wheel', event => {
      if (event.ctrlKey || Math.abs(event.deltaY) <= Math.abs(event.deltaX)) return;
      event.preventDefault();
      const pages = Array.from(scroller.querySelectorAll('.notebook-continuous-page'));
      const center = scroller.scrollLeft + scroller.clientWidth / 2;
      let currentIndex = 0;
      let currentDistance = Infinity;
      pages.forEach((page, index) => {
        const distance = Math.abs(page.offsetLeft + page.offsetWidth / 2 - center);
        if (distance < currentDistance) {
          currentIndex = index;
          currentDistance = distance;
        }
      });
      const targetIndex = Math.max(0, Math.min(pages.length - 1, currentIndex + Math.sign(event.deltaY)));
      const target = pages[targetIndex];
      if (target) {
        const targetLeft = Math.max(0, target.offsetLeft - (scroller.clientWidth - target.offsetWidth) / 2);
        scroller.scrollTo({ left: targetLeft, behavior: 'instant' });
      }
      schedulePageSync();
    }, { passive: false, capture: true });
  }
  if (window.IntersectionObserver) {
    const preloadDistance = flow === 'horizontal' ? scroller.clientWidth * 1.35 : scroller.clientHeight * 1.35;
    state.notebookContinuousObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        const placeholder = entry.target.querySelector('[data-notebook-pdf-preview]');
        if (!placeholder) return;
        if (entry.isIntersecting) {
          placeholder.dataset.visible = 'true';
          hydrateNotebookPdfPreview(placeholder);
        } else {
          releaseNotebookPdfPreview(placeholder);
        }
      });
    }, {
      root: scroller,
      rootMargin: flow === 'horizontal' ? `0px ${Math.round(preloadDistance)}px` : `${Math.round(preloadDistance)}px 0px`,
      threshold: .01,
    });
    scroller.querySelectorAll('.notebook-continuous-page').forEach(page => state.notebookContinuousObserver.observe(page));
  }
  const apply = () => {
    if (userInteracted) return;
    const active = scroller.querySelector('.notebook-continuous-page.active');
    if (restore?.preserve && restore.flow === scroller.dataset.pageFlow) {
      scroller.scrollLeft = Number(restore.scrollLeft || 0);
      scroller.scrollTop = Number(restore.scrollTop || 0);
    } else if (restore?.focus || !restore) {
      revealNotebookContinuousPage(scroller, active);
    }
    state.notebookContinuousIgnoreUntil = performance.now() + 220;
  };
  apply();
  requestAnimationFrame(() => {
    apply();
    requestAnimationFrame(apply);
  });
}

function beginNotebookPageDrag(event, pageId) {
  state.notebookPageDragId = pageId;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', pageId);
}

function overNotebookPageDrag(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  event.currentTarget.classList.add('drag-over');
}

function leaveNotebookPageDrag(event) {
  event.currentTarget.classList.remove('drag-over');
}

function dropNotebookPageDrag(event, targetId) {
  event.preventDefault();
  event.currentTarget.classList.remove('drag-over');
  const sourceId = state.notebookPageDragId || event.dataTransfer.getData('text/plain');
  const targetIndex = state.notebookSession?.document.pages.findIndex(page => page.id === targetId) ?? -1;
  if (sourceId && targetIndex >= 0 && state.notebookSession.movePageTo(sourceId, targetIndex)) {
    state.notebookSession.setPage(sourceId);
  }
  state.notebookPageDragId = '';
}

function endNotebookPageDrag() {
  state.notebookPageDragId = '';
  document.querySelectorAll('.notebook-page-thumb.drag-over').forEach(item => item.classList.remove('drag-over'));
}

  const notebook = state.notebookSession?.document;

  refreshNotebookSearchIndex(notebook);
  try {
    const saved = await getNotebookRepository().put(notebook);
    upsertNotebookDocument(saved);
    renderNotebookRightPanel();
    if (state.notebookLeftTab === 'notebooks') {
      const panel = window.document.getElementById('notebookLeftPanel');
      if (panel) panel.innerHTML = renderNotebookLeftPanel();
    }
    showToast(message);
  } catch(error) {
    showNotice(error.message || '笔记信息保存失败');
  }

function addNotebookTag() {
  askText('添加标签', '', value => {
    const tag = String(value || '').trim().slice(0, 24);
    const tags = state.notebookSession.document.tags || (state.notebookSession.document.tags = []);
    if (!tag || tags.includes(tag)) return showToast(tag ? '标签已存在' : '标签不能为空');
    tags.push(tag);
    saveNotebookMetadata('标签已添加');
  });
}

function removeNotebookTag(index) {
  const tags = state.notebookSession?.document?.tags || [];
  if (index < 0 || index >= tags.length) return;
  tags.splice(index, 1);
  saveNotebookMetadata('标签已删除');
}

function renderNotebookQuestionLinkResults(query = '') {
  const normalized = String(query || '').trim().toLowerCase();
  const matches = state.pendingNotebookLinkQuestions.filter(item => !normalized || item.search.includes(normalized)).slice(0, 80);
  if (!matches.length) return '<div class="notebook-empty">没有匹配的题目</div>';
  return matches.map(item => `
    <button onclick="addNotebookQuestionLink(${item.index})">
      <span>${item.number}</span><strong>${escapeHtml(item.label)}</strong>
    </button>
  `).join('');
}

async function showNotebookQuestionLinkDialog() {
  const questions = buildQuestionSet(await ensureBanksHydrated(getVisibleBanks()));
  releaseHydratedLargeBanks();
  state.pendingNotebookLinkQuestions = questions.map((question, index) => {
    const label = String(question.q || '图片题').replace(/\s+/g, ' ').slice(0, 120);
    return {
      index,
      number: index + 1,
      question,
      label,
      search: `${index + 1} ${label} ${pathCrumbs(question.sourcePath || [])}`.toLowerCase(),
    };
  });
  closeAppDialog();
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  mask.innerHTML = `
    <div class="app-dialog announcement-dialog" role="dialog" aria-modal="true" aria-label="关联题目">
      <h3>关联题目</h3>
      <input id="notebookQuestionLinkSearch" placeholder="搜索题号、题干或章节" oninput="filterNotebookQuestionLinks(this.value)">
      <div class="notebook-link-picker" id="notebookQuestionLinkResults">${renderNotebookQuestionLinkResults()}</div>
      <div class="app-dialog-actions single"><button type="button" onclick="closeAppDialog()">关闭</button></div>
    </div>`;

function filterNotebookQuestionLinks(value) {
  const list = document.getElementById('notebookQuestionLinkResults');
  if (list) list.innerHTML = renderNotebookQuestionLinkResults(value);
}

function addNotebookQuestionLink(index) {
  const candidate = state.pendingNotebookLinkQuestions.find(item => item.index === Number(index));
  if (!candidate) return;
  const target = questionKey(candidate.question);
  const links = state.notebookSession.document.links || (state.notebookSession.document.links = []);
  if (links.some(link => link.type === 'question' && link.target === target)) return showToast('已经关联这道题');
  links.push({
    type: 'question',
    target,
    label: candidate.label,
    sourcePath: normalizePath(candidate.question.sourcePath || []),
  });
  state.pendingNotebookLinkQuestions = [];
  closeAppDialog();
  saveNotebookMetadata('题目关联已添加');
}

function showNotebookDocumentLinkDialog() {
  const currentId = state.notebookSession?.document?.id;
  const documents = state.notebookDocuments.filter(item => item.id !== currentId).slice(0, 120);
  closeAppDialog();
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  mask.innerHTML = `
    <div class="app-dialog announcement-dialog" role="dialog" aria-modal="true" aria-label="关联笔记">
      <h3>关联笔记</h3>
      <div class="notebook-link-picker">
        ${documents.length ? documents.map((item, index) => `<button onclick="addNotebookDocumentLink('${escapeAttr(item.id)}')"><span>${index + 1}</span><strong>${escapeHtml(item.title)}</strong></button>`).join('') : '<div class="notebook-empty">还没有其他笔记</div>'}
      </div>
      <div class="app-dialog-actions single"><button type="button" onclick="closeAppDialog()">关闭</button></div>
    </div>`;
  document.body.appendChild(mask);
  mask.onclick = event => { if (event.target === mask) closeAppDialog(); };
}

function addNotebookDocumentLink(id) {
  const document = state.notebookDocuments.find(item => item.id === id);
  if (!document) return;
  const links = state.notebookSession.document.links || (state.notebookSession.document.links = []);
  if (links.some(link => link.type === 'notebook' && link.target === id)) return showToast('已经关联这份笔记');
  links.push({ type: 'notebook', target: id, label: document.title });
  closeAppDialog();
  saveNotebookMetadata('笔记关联已添加');
}

function addNotebookExternalLink() {
  askText('外部资料链接', 'https://', value => {
    let url;
    try { url = new URL(value); } catch(e) { return showNotice('请输入有效的 http 或 https 链接'); }
    if (!['http:', 'https:'].includes(url.protocol)) return showNotice('只允许 http 或 https 链接');
    const links = state.notebookSession.document.links || (state.notebookSession.document.links = []);
    if (links.some(link => link.type === 'url' && link.target === url.href)) return showToast('已经关联这个链接');
    links.push({ type: 'url', target: url.href, label: url.hostname || url.href });
    saveNotebookMetadata('外部资料已关联');
  });
}

function removeNotebookLink(index) {
  const links = state.notebookSession?.document?.links || [];
  if (index < 0 || index >= links.length) return;
  links.splice(index, 1);
  saveNotebookMetadata('关联已删除');
}

async function openNotebookLink(index) {
  const link = state.notebookSession?.document?.links?.[index];
  if (!link) return;
  if (link.type === 'notebook') return openNotebookSearchResult(link.target);
  if (link.type === 'url') return openExternal(link.target);
  if (link.type === 'question') {
    const questions = buildQuestionSet(await ensureBanksHydrated(getVisibleBanks()));
    releaseHydratedLargeBanks();
    const questionIndex = questions.findIndex(question => questionKey(question) === link.target);
    if (questionIndex < 0) return showNotice('关联题目已不在当前题库');
    return openHandwritingPractice(link.sourcePath || [], { questions, index: questionIndex });
  }
}

function setNotebookAiMode(mode) {
  state.notebookAiMode = mode === 'summary' ? 'summary' : 'question';
  renderNotebookRightPanel();
}

function getNotebookSummaryKey() {
  const notebook = state.notebookSession?.document;
  const page = state.notebookSession?.page;
  return notebook && page ? `${notebook.id}:${page.id}` : '';
}

function getNotebookSummaryContext() {
  const session = state.notebookSession;
  const notebook = session?.document;
  const page = session?.page;
  if (!notebook || !page) return null;
  const textObjects = [
    ...(page.bodyText ? [{ type: 'body', text: String(page.bodyText).slice(0, 12000) }] : []),
    ...page.objects.filter(object => object.visible && ['text', 'link'].includes(object.type)).map(object => ({
    type: object.type,
    text: String(object.data?.text || object.data?.url || '').slice(0, 3000),
    })),
  ].filter(item => item.text);
  const strokeCount = page.layers.reduce((sum, layer) => sum + (layer.visible ? layer.strokes.length : 0), 0);
  const visualObjectCount = page.objects.filter(object => object.visible && ['image', 'question'].includes(object.type)).length;
  const question = getCurrentNotebookQuestion();
  return {
    notebook: { title: notebook.title, kind: notebook.kind },
    page: { name: page.name, index: notebook.pages.findIndex(item => item.id === page.id) + 1, total: notebook.pages.length },
    visibleLayers: page.layers.filter(layer => layer.visible).map(layer => ({ name: layer.name, strokes: layer.strokes.length })),
    strokeCount,
    visualObjectCount,
    textObjects,
    boundQuestion: question ? getQuestionAiContext(question) : null,
  };
}

function renderNotebookSummaryPanel() {
  if (!window.QuizAiLearning) return '<div class="notebook-empty">AI 学习任务模块未加载。</div>';
  const type = QuizAiLearning.TASK_TYPES.NOTEBOOK_SUMMARY;
  const key = getNotebookSummaryKey();
  const taskId = getAiLearningTaskId(type, key);
  const record = getAiLearningRecord(type, key);
  const pending = state.aiLearningPending[taskId];
  const context = getNotebookSummaryContext();
  const currentSourceHash = context ? hashString(JSON.stringify({ context, updatedAt: state.notebookSession?.page?.updatedAt })) : '';
  const stale = Boolean(record?.sourceHash && currentSourceHash && record.sourceHash !== currentSourceHash);
  return `
    <div class="notebook-question-title">${escapeHtml(state.notebookSession?.document?.title || '笔记')} · ${escapeHtml(state.notebookSession?.page?.name || '当前页')}</div>
    <div class="notebook-analysis-actions"><button class="primary" onclick="summarizeCurrentNotebookPage(${record ? 'true' : 'false'})" ${pending ? 'disabled' : ''}>${pending ? '生成中' : (stale ? '更新摘要' : record ? '重新摘要' : '生成本页摘要')}</button></div>
    ${pending ? '<div class="ai-learning-loading">AI 正在读取当前笔记页…</div>' : ''}
    ${record && !pending ? `<div class="ai-learning-result"><div class="ai-learning-result-head"><strong>AI 笔记摘要</strong><small>${escapeHtml(record.model || 'AI')} · ${formatAiThreadTime(record.updatedAt)}</small></div><div class="ai-markdown">${renderAiMarkdown(record.content)}</div><div class="ai-generated-note ${stale ? 'stale' : ''}">${stale ? '笔记页已修改，建议更新摘要。' : 'AI 生成摘要，不会改动原笔记或题库解析。'}</div></div>` : ''}
  `;
}

async function captureCurrentNotebookPageForAi() {
  const session = state.notebookSession;
  if (!session) return '';
  const savedViewport = session.document.lastViewport ? { ...session.document.lastViewport } : null;
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;left:-10000px;top:0;width:600px;height:800px;pointer-events:none';
  document.body.appendChild(canvas);
  const viewport = new QuizNotebook.CanvasViewport(canvas, session, {
    getStroke: window.PerfectFreehand?.getStroke,
    resolveAsset: getNotebookAssetDataUrl,
  });
  try {
    viewport.fit();
    await new Promise(resolve => window.requestAnimationFrame(() => window.requestAnimationFrame(resolve)));
    await new Promise(resolve => window.setTimeout(resolve, 180));
    viewport.render();
    return canvas.toDataURL('image/jpeg', .82);
  } finally {
    viewport.destroy();
    canvas.remove();
    session.document.lastViewport = savedViewport;
  }
}

async function summarizeCurrentNotebookPage(force = false) {
  if (!window.QuizAiLearning || !state.notebookSession) return;
  const type = QuizAiLearning.TASK_TYPES.NOTEBOOK_SUMMARY;
  const key = getNotebookSummaryKey();
  const taskId = getAiLearningTaskId(type, key);
  if (state.aiLearningPending[taskId]) return;
  if (!force && getAiLearningRecord(type, key)) return renderNotebookRightPanel();
  const context = getNotebookSummaryContext();
  if (!context) return;
  const hasVisualContent = context.strokeCount > 0 || context.visualObjectCount > 0;
  try {
    validateAiConnectionConfig();
    const capability = QuizAiLearning.capabilityFor(type, { hasInk: hasVisualContent }, state.aiConfig);
    if (!capability.allowed) throw new Error(capability.message);
    state.aiLearningPending[taskId] = { model: state.aiConfig.model };
    renderNotebookRightPanel();
    const pageImage = hasVisualContent ? await captureCurrentNotebookPageForAi() : '';
    await QuizAiLearning.run({
      type,
      key,
      input: { context, hasInk: hasVisualContent, images: pageImage ? [pageImage] : [] },
      config: state.aiConfig,
      request: requestAiCompletion,
      sourceHash: hashString(JSON.stringify({ context, updatedAt: state.notebookSession.page.updatedAt })),
    });
  } catch(e) {
    showNotice(`AI 笔记摘要失败：${e.message || e}`);
    if (isAiConfigurationError(e)) openAiSettings();
  } finally {
    delete state.aiLearningPending[taskId];
    if (state.view === 'handwriting') renderNotebookRightPanel();
  }
}

      ${[...page.layers].reverse().map(layer => `

          <span class="notebook-layer-name" ondblclick="event.stopPropagation();renameNotebookLayer('${escapeAttr(layer.id)}')" title="双击重命名">${escapeHtml(layer.name)}</span>
          <button onclick="event.stopPropagation();moveNotebookLayer('${escapeAttr(layer.id)}',1)" title="上移图层" aria-label="上移图层">↑</button>
          <button onclick="event.stopPropagation();moveNotebookLayer('${escapeAttr(layer.id)}',-1)" title="下移图层" aria-label="下移图层">↓</button>
          <button onclick="event.stopPropagation();toggleNotebookLayer('${escapeAttr(layer.id)}','locked')" title="锁定图层" aria-label="锁定图层">${layer.locked ? '锁' : '开'}</button>
        </div>

    <div class="settings-notice">对象和笔画只在所属图层上编辑。锁定图层后可避免误移动。</div>

function initializeNotebookViewport() {
  const canvas = document.getElementById('notebookCanvas');
  if (!canvas || !state.notebookSession) return;
  state.notebookViewport?.destroy();
  const previous = state.notebookViewport;
  const viewport = new QuizNotebook.CanvasViewport(canvas, state.notebookSession, {
    getStroke: window.PerfectFreehand.getStroke,
    resolveAsset: getNotebookAssetDataUrl,
    panMargin: getNotebookDockConfig().panBoundary,
    nativeScroll: state.notebookSession.document.mode === 'paged',
    fitMargin: state.notebookSession.document.mode === 'paged' ? 0 : 32,
    onChange: () => {
      scheduleNotebookSave();
      updateNotebookToolbarState();
    },
    onSelectionChange: () => updateNotebookToolbarState(),
    onViewportChange: () => updateNotebookZoomLabel(),
    onLink: link => openNotebookPdfLink(link),
  });
  viewport.setTool(previous?.tool || state.inkTool || 'pen');
  viewport.setStyle({ color: previous?.color || state.inkColor, size: previous?.size || state.inkSize, penOnly: state.inkPenOnly });
  viewport.setStraightLine(previous?.straightLine ?? Boolean(state.inkStraightLine));
  state.notebookViewport = viewport;
  if (state.notebookSession.document.lastViewport) viewport.restoreViewport();
  else window.setTimeout(() => viewport.fit(), 0);
  updateNotebookZoomLabel();
}

function scheduleNotebookSave() {
  state.notebookSaveState = '正在保存…';
  const label = document.getElementById('notebookSaveState');
  if (label) label.textContent = state.notebookSaveState;
  window.clearTimeout(state.notebookSaveTimer);
  state.notebookSaveTimer = window.setTimeout(() => saveCurrentInkNote({ silent: true }), 420);
}

async function saveCurrentInkNote(options = {}) {
  const notebook = state.notebookSession?.document;
  const boundQuestion = getCurrentNotebookQuestion();
  if (!notebook) return;
  window.clearTimeout(state.notebookSaveTimer);
  try {
    notebook.lastEditorMode = state.notebookEditorMode;
    notebook.lastViewport = state.notebookViewport ? {
      scale: state.notebookViewport.scale,
      offsetX: state.notebookViewport.offsetX,
      offsetY: state.notebookViewport.offsetY,
      viewportWidth: state.notebookViewport.viewportSize.width,
      viewportHeight: state.notebookViewport.viewportSize.height,
    } : notebook.lastViewport;
    const savedNotebook = await getNotebookRepository().put(notebook);
    upsertNotebookDocument(savedNotebook);
    const question = boundQuestion;
    if (question) {
      const key = questionKey(question);
      const legacy = await readInkNote(key) || { key, strokes: [] };
      legacy.completed = Boolean(notebook.completed);
      legacy.updatedAt = Date.now();
      await writeInkNote(legacy);
    }
    state.notebookSaveState = '已保存';
    const label = document.getElementById('notebookSaveState');
    if (label) label.textContent = state.notebookSaveState;
    if (!options.silent) showToast('笔记已保存');
  } catch(e) {
    state.notebookSaveState = '保存失败';
    const label = document.getElementById('notebookSaveState');
    if (label) label.textContent = state.notebookSaveState;
    if (!options.silent) showNotice(e.message || '笔记保存失败');
    if (options.throwOnError) throw e;
  }
}

function updateNotebookToolbarState() {
  document.querySelectorAll('[data-notebook-tool]').forEach(button => button.classList.toggle('active', button.dataset.notebookTool === state.notebookViewport?.tool));
  const hasSelection = Boolean(state.notebookSession?.selected);
  const hasClipboard = Boolean(state.notebookSession?.clipboard?.length);
  const richObject = getSelectedNotebookRichObject();
  document.querySelectorAll('[data-notebook-action]').forEach(button => {
    if (button.dataset.notebookAction === 'paste') button.disabled = !hasClipboard;
    else if (button.dataset.notebookAction === 'edit-rich') button.disabled = !richObject;
    else button.disabled = !hasSelection;
  });
}

function refreshNotebookToolbar() {
  const host = document.getElementById('notebookToolbarHost');

function setNotebookTool(tool) {

function toggleNotebookSubtoolbar() {

function setNotebookColor(color) {

function setNotebookSize(value) {

function undoNotebook() {

function redoNotebook() {

function deleteNotebookSelection() {

async function setNotebookBackground(type) {
  return applyNotebookPaperTemplate(type, 'current');
}

function notebookPaperBaseType(templateId) {
  return ['plain', 'grid', 'lines'].includes(templateId) ? templateId : 'plain';
}

function getNotebookPaperSettings(scope = state.notebookPaperScope) {
  const document = state.notebookSession?.document;
  if (!document) return { type: 'grid', template: 'grid', spacing: 40 };
  if (scope === 'new') return document.defaultPageBackground || { type: 'grid', template: 'grid', spacing: 40 };
  return state.notebookSession.page.background;
}

function setNotebookPaperScope(scope) {
  state.notebookPaperScope = ['current', 'all', 'new'].includes(scope) ? scope : 'current';
  const settings = getNotebookPaperSettings();
  document.querySelectorAll('[data-notebook-paper-scope]').forEach(button => button.classList.toggle('active', button.dataset.notebookPaperScope === state.notebookPaperScope));
  document.querySelectorAll('[data-notebook-paper-template]').forEach(button => button.classList.toggle('active', button.dataset.notebookPaperTemplate === (settings.template || settings.type)));
  const range = document.getElementById('notebookPaperSpacing');
  if (range) range.value = String(settings.spacing || 40);
  const label = document.getElementById('notebookPaperSpacingValue');
  if (label) label.textContent = `${Number(settings.spacing || 40)}px`;
}

async function applyNotebookPaperTemplate(templateId, forcedScope = '') {
  const session = state.notebookSession;
  if (!session) return;
  const template = NOTEBOOK_PAPER_TEMPLATES.some(item => item.id === templateId) ? templateId : 'grid';
  const scope = forcedScope || state.notebookPaperScope;
  const previousAssetIds = new Set();
  session.beginHistory();
  const apply = background => {
    if (background.assetId) previousAssetIds.add(background.assetId);
    background.type = notebookPaperBaseType(template);
    background.template = template;
    background.assetId = '';
    background.sourceName = '';
    background.sourcePage = 0;
    background.searchText = '';
    background.links = [];
  };
  if (scope !== 'new') {
    const pages = scope === 'all' ? session.document.pages : [session.page];
    pages.filter(page => page.background.type !== 'pdf').forEach(page => apply(page.background));
  }
  if (scope === 'all' || scope === 'new') {
    session.document.defaultPageBackground ||= { type: 'grid', template: 'grid', color: '#ffffff', patternColor: '#dfe6e2', spacing: 40 };
    apply(session.document.defaultPageBackground);
  }
  session.commitHistory('paper-template');
  state.notebookViewport?.requestRender();
  window.requestAnimationFrame(renderNotebookPageThumbnails);
  try {
    await saveCurrentInkNote({ silent: true, throwOnError: true });
    for (const assetId of previousAssetIds) await deleteNotebookAssetIfUnused(assetId);
    setNotebookPaperScope(scope);
  } catch(error) {
    session.undo();
    renderHandwritingPractice();
    showNotice('纸张模板保存失败，已恢复原页面');
  }
}

async function setNotebookPaperSpacing(value) {
  const session = state.notebookSession;
  if (!session) return;
  const spacing = Math.max(20, Math.min(96, Number(value || 40)));
  const scope = state.notebookPaperScope;
  session.beginHistory();
  if (scope !== 'new') {
    const pages = scope === 'all' ? session.document.pages : [session.page];
    pages.filter(page => page.background.type !== 'pdf').forEach(page => { page.background.spacing = spacing; });
  }
  if (scope === 'all' || scope === 'new') {
    session.document.defaultPageBackground ||= { type: 'grid', template: 'grid', color: '#ffffff', patternColor: '#dfe6e2', spacing: 40 };
    session.document.defaultPageBackground.spacing = spacing;
  }
  session.commitHistory('paper-spacing');
  state.notebookViewport?.requestRender();

  const source = object ? QuizNotebookRichObjects.sourceForObject(object) : (resolvedType === 'formula' ? 'E = mc^2' : '# 学习笔记\n\n- 要点一\n- 要点二');

  mask.className = 'app-dialog-mask';
  mask.innerHTML = `

      <h3>${object ? '编辑' : '插入'}${resolvedType === 'formula' ? '数学公式' : ' Markdown'}</h3>
      <div class="notebook-rich-editor-grid">
        <label class="notebook-rich-field">${resolvedType === 'formula' ? 'LaTeX' : 'Markdown'} 源内容
          <textarea id="notebookRichSource" spellcheck="false">${escapeHtml(source)}</textarea>
        </label>
        <div class="notebook-rich-field">预览
          <div class="notebook-rich-preview ${resolvedType === 'formula' ? 'notebook-rich-preview-formula' : ''}" id="notebookRichPreview"></div>
        </div>
      </div>
      <div class="notebook-rich-status" id="notebookRichStatus"></div>
      <div class="app-dialog-actions">
        <button class="secondary" type="button" onclick="closeAppDialog()">取消</button>
        <button type="button" id="notebookRichSave">生成对象</button>
      </div>
    </div>`;
  document.body.appendChild(mask);
  const sourceInput = mask.querySelector('#notebookRichSource');
  const saveButton = mask.querySelector('#notebookRichSave');
  const updatePreview = () => renderNotebookRichObjectPreview(resolvedType);
  sourceInput.addEventListener('input', updatePreview);
  saveButton.onclick = () => saveNotebookRichObject(resolvedType, object?.id || '');

function renderNotebookRichObjectPreview(type) {
  const source = document.getElementById('notebookRichSource')?.value || '';
  const preview = document.getElementById('notebookRichPreview');
  const status = document.getElementById('notebookRichStatus');
  if (!preview || !window.QuizNotebookRichObjects) return;
  try {
    QuizNotebookRichObjects.render(preview, type, source);
    if (status) status.textContent = '';
  } catch(error) {
    preview.textContent = '';
    if (status) status.textContent = error.message || String(error);
  }
}

async function saveNotebookRichObject(type, objectId = '') {
  const source = document.getElementById('notebookRichSource')?.value?.trim() || '';
  const saveButton = document.getElementById('notebookRichSave');
  const status = document.getElementById('notebookRichStatus');
  if (!source) {
    if (status) status.textContent = type === 'formula' ? '请输入 LaTeX 公式' : '请输入 Markdown 内容';
    return;
  }
  if (saveButton) {
    saveButton.disabled = true;
    saveButton.textContent = '正在生成';
  }
  if (status) status.textContent = '正在使用本地排版生成可拖动对象…';
  try {
    const rendered = await QuizNotebookRichObjects.capture(type, source);
    let object = objectId ? state.notebookSession.page.objects.find(item => item.id === objectId) : null;
    const data = type === 'formula'
      ? { src: rendered.dataUrl, text: source, latex: source, generatedAt: Date.now() }
      : { src: rendered.dataUrl, text: source, markdown: source, generatedAt: Date.now() };
    if (object) {
      const centerX = object.x + object.width / 2;
      const centerY = object.y + object.height / 2;
      state.notebookSession.beginHistory();
      object.type = type;
      object.data = { ...object.data, ...data };
      object.width = rendered.width;
      object.height = rendered.height;
      object.x = clampNumber(centerX - object.width / 2, 0, Math.max(0, state.notebookSession.page.width - object.width));
      object.y = clampNumber(centerY - object.height / 2, 0, Math.max(0, state.notebookSession.page.height - object.height));
      state.notebookSession.commitHistory('edit-rich-object');
      state.notebookSession.selected = { kind: 'object', id: object.id };
    } else {
      object = state.notebookSession.addObject(type, data, {
        x: 100,
        y: 100,
        width: rendered.width,
        height: rendered.height,
      });
    }
    state.notebookViewport?.imageCache?.delete(object.id);
    closeAppDialog();
    setNotebookTool('select');
    state.notebookViewport?.requestRender();
    scheduleNotebookSave();
    showToast(type === 'formula' ? '已生成公式对象' : '已生成 Markdown 对象');
  } catch(error) {
    if (status) status.textContent = error.message || String(error);
    if (saveButton) {
      saveButton.disabled = false;
      saveButton.textContent = '重试';
    }
  }
}

function insertNotebookImage(file) {

function isBlankNotebookPage(page) {
  return Boolean(page) && !String(page.bodyText || '').trim() && !(page.objects || []).length && !(page.layers || []).some(layer => (layer.strokes || []).length) && !page.background?.assetId;
}

async function prepareNotebookPdfImport(input) {
  const file = input?.files?.[0];
  if (input) input.value = '';
  if (!file) return;
  if (!window.QuizPdfNotebook || !window.pdfjsLib) return showNotice('PDF 模块未加载，请重新打开应用');
  showBackupOperationDialog('读取 PDF', '正在解析 PDF 文件');
  try {
    const loaded = await QuizPdfNotebook.loadPdf(file);
    state.pendingPdfImport = loaded;
    closeAppDialog();
    showNotebookPdfImportDialog();
  } catch(error) {
    state.pendingPdfImport = null;
    closeAppDialog();
    showNotice(`PDF 读取失败：${error.message || error}`);
  }
}

function showNotebookPdfImportDialog() {

  document.body.appendChild(mask);

  cancelButton.onclick = cancelNotebookPdfImport;

  const pending = state.pendingPdfImport;
  state.pendingPdfImport = null;
  closeAppDialog();
  try { await pending?.loadingTask?.destroy(); } catch(e) {}
}

async function importSelectedNotebookPdfPages() {
  const pending = state.pendingPdfImport;
  if (!pending || !state.notebookSession) return;
  let pageNumbers;
  try {
    pageNumbers = QuizPdfNotebook.parsePageRange(document.getElementById('notebookPdfPageRange')?.value, pending.totalPages);
  } catch(error) {
    return showToast(error.message || String(error));
  }
  if (pageNumbers.length > 120) return showToast('一次最多导入 120 页，请缩小范围后分批导入');
  const replaceCurrent = Boolean(document.getElementById('notebookPdfReplaceBlank')?.checked && isBlankNotebookPage(state.notebookSession.page));
  showBackupOperationDialog('导入 PDF 页面', `准备导入 ${pageNumbers.length} 页`);
  let assetIds = [];
  let pagesAppended = false;
  try {
    const rendered = await QuizPdfNotebook.renderPdfPages(pending.document, pageNumbers, {
      sourceName: pending.fileName,
      documentId: state.notebookSession.document.id,
      onProgress: event => updateBackupOperation(event.percent * .78, `正在渲染第 ${event.pageNumber} 页 · ${event.completed}/${event.total}`),
    });
    assetIds = rendered.assets.map(asset => asset.id);
    updateBackupOperation(82, '正在保存 PDF 页面资源');
    await getNotebookAssetRepository().putMany(rendered.assets);
    rendered.assets.forEach(asset => state.notebookAssetCache.set(asset.id, asset.dataUrl));
    state.notebookSession.appendPages(rendered.pages, { replaceCurrent });
    pagesAppended = true;
    const importedPages = new Set(pageNumbers.map(Number));
    const currentOutline = state.notebookSession.document.pdfOutline || (state.notebookSession.document.pdfOutline = []);
    const outlineKeys = new Set(currentOutline.map(item => `${item.sourceName || ''}:${item.pageNumber}:${item.title}`));
    (pending.outline || []).filter(item => importedPages.has(Number(item.pageNumber))).forEach(item => {
      const entry = { ...item, sourceName: pending.fileName };
      const key = `${entry.sourceName}:${entry.pageNumber}:${entry.title}`;
      if (!outlineKeys.has(key)) {
        outlineKeys.add(key);
        currentOutline.push(entry);
      }
    });
    updateBackupOperation(94, '正在保存笔记文档');
    await saveCurrentInkNote({ silent: true, throwOnError: true });
    state.pendingPdfImport = null;
    try { await pending.loadingTask?.destroy(); } catch(e) {}
    closeAppDialog();
    renderHandwritingPractice();
    showToast(`已导入 ${rendered.pages.length} 页 PDF`);
  } catch(error) {
    if (pagesAppended) state.notebookSession.undo();
    if (assetIds.length) await getNotebookAssetRepository()?.deleteMany(assetIds).catch(() => {});
    assetIds.forEach(id => state.notebookAssetCache.delete(id));
    state.pendingPdfImport = null;
    try { await pending.loadingTask?.destroy(); } catch(e) {}
    closeAppDialog();
    showNotice(`PDF 导入失败：${error.message || error}`);
  }
}

  scheduleNotebookSave();

function setNotebookPage(id, source = 'manager') {
  const scroll = getNotebookContinuousScrollState();
  state.notebookContinuousRestore = source.startsWith('continuous') && scroll
    ? { ...scroll, pageId: id, preserve: true }
    : { pageId: id, focus: true };
  state.notebookPageChangeSource = source;
  state.notebookSession.setPage(id);
}

function navigateNotebookPage(delta) {
  const documentItem = state.notebookSession?.document;
  if (!documentItem) return;
  const current = documentItem.pages.findIndex(page => page.id === documentItem.activePageId);
  const target = Math.max(0, Math.min(documentItem.pages.length - 1, current + Number(delta || 0)));
  if (target !== current) setNotebookPage(documentItem.pages[target].id, 'navigation');
}

function refreshNotebookPages() {
  const pages = document.getElementById('notebookPages');
  if (!pages || !state.notebookSession) return;
  pages.innerHTML = renderNotebookPages();
  window.requestAnimationFrame(renderNotebookPageThumbnails);
}

function toggleCurrentNotebookBookmark() {
  const notebook = state.notebookSession?.document;
  const page = state.notebookSession?.page;
  if (!notebook || !page) return;
  const bookmarks = notebook.bookmarks || (notebook.bookmarks = []);
  const index = bookmarks.findIndex(bookmark => bookmark.pageId === page.id);
  state.notebookSession.beginHistory();
  if (index >= 0) bookmarks.splice(index, 1);
  else bookmarks.push({ id: `bookmark:${Date.now().toString(36)}:${Math.random().toString(36).slice(2)}`, pageId: page.id, label: page.name, note: '', createdAt: Date.now() });
  state.notebookSession.commitHistory('toggle-bookmark');
  refreshNotebookPages();
  if (state.notebookLeftTab === 'bookmarks') {
    const panel = document.getElementById('notebookLeftPanel');
    if (panel) panel.innerHTML = renderNotebookLeftPanel();
  }
  scheduleNotebookSave();
  showToast(index >= 0 ? '已移除书签' : '已添加书签');
}

function openNotebookBookmark(id) {
  const bookmark = state.notebookSession?.document.bookmarks?.find(item => item.id === id);
  if (bookmark && state.notebookSession.setPage(bookmark.pageId)) renderHandwritingPractice();
}

function renameNotebookBookmark(id) {
  const bookmark = state.notebookSession?.document.bookmarks?.find(item => item.id === id);
  if (!bookmark) return;
  const label = window.prompt('书签名称', bookmark.label);
  if (!label?.trim()) return;
  state.notebookSession.beginHistory();
  bookmark.label = label.trim().slice(0, 80);
  state.notebookSession.commitHistory('rename-bookmark');
  const panel = document.getElementById('notebookLeftPanel');
  if (panel) panel.innerHTML = renderNotebookLeftPanel();
  scheduleNotebookSave();
}

function removeNotebookBookmark(id) {
  const bookmarks = state.notebookSession?.document.bookmarks || [];
  const index = bookmarks.findIndex(bookmark => bookmark.id === id);
  if (index < 0) return;
  state.notebookSession.beginHistory();
  bookmarks.splice(index, 1);
  state.notebookSession.commitHistory('remove-bookmark');
  refreshNotebookPages();
  const panel = document.getElementById('notebookLeftPanel');
  if (panel) panel.innerHTML = renderNotebookLeftPanel();
  scheduleNotebookSave();
}

function addNotebookPage() {
  const document = state.notebookSession.document;
  const defaults = document.defaultPageBackground || state.notebookSession.page.background;
  const landscape = document.defaultPageOrientation === 'landscape';
  const page = state.notebookSession.addPage({
    width: landscape ? 1200 : 900,
    height: landscape ? 900 : 1200,
    backgroundType: defaults.type,
    backgroundTemplate: defaults.template,
    backgroundColor: defaults.color,
    patternColor: defaults.patternColor,
    spacing: defaults.spacing,
  });
  if (page) {
    state.notebookContinuousRestore = { pageId: page.id, focus: true };
    renderHandwritingPractice();
  }
}

  const layer = state.notebookSession?.layer;

  layer.opacity = Math.max(.1, Math.min(1, Number(value || 100) / 100));

  scheduleNotebookSave();

async function openNotebookSearchResult(id) {
  const document = state.notebookDocuments.find(item => item.id === id) || await getNotebookRepository().get(id);
  if (!document) return showNotice('找不到这个笔记');
  if (document.kind === 'free') return openFreeNotebook(id);
  const key = document.binding?.questionKey || '';
  const questions = buildQuestionSet(await ensureBanksHydrated(getVisibleBanks()));
  releaseHydratedLargeBanks();
  const index = questions.findIndex(question => questionKey(question) === key);
  if (index < 0) return showNotice('原题已不在当前题库，暂时只能从备份中保留这份题目笔记');
  return openHandwritingPractice(document.binding?.sourcePath || [], { questions, index });
}

async function changeInkQuestion(delta) {
  const next = Math.max(0, Math.min(state.currentIndex + Number(delta || 0), (state.inkSession?.questions?.length || 1) - 1));
  return jumpInkQuestion(next);
}

async function jumpInkQuestion(index) {
  if (!state.inkSession?.questions?.length) return;
  const next = Math.max(0, Math.min(Number(index || 0), state.inkSession.questions.length - 1));
  await saveCurrentInkNote({ silent: true });
  state.currentIndex = next;
  const document = await loadQuestionNotebook(state.inkSession.questions[next]);
  await activateNotebookDocument(document, { keepPanel: true });
  state.notebookQuestionExpanded = true;
  if (isNotebookFreeLayout()) {
    const dock = getNotebookDockConfig();
    dock.leftOpen = false;
    dock.rightOpen = false;
  }
  state.notebookMobilePane = '';
  renderHandwritingPractice();
}

async function createFreeNotebook(mode = 'paged') {
  closeAppDialog();
  const title = window.prompt('笔记本名称', '新笔记');
  if (!title?.trim()) return;
  await saveCurrentInkNote({ silent: true });
  const selectedFolder = ['all', 'unfiled'].includes(state.notebookLibraryFolderId) ? '' : state.notebookLibraryFolderId;
  const document = QuizNotebook.createDocument({
    title: title.trim(),
    kind: 'free',
    mode: mode === 'edgeless' ? 'edgeless' : 'paged',
    folderId: selectedFolder,
  });
  await getNotebookRepository().put(document);
  await loadNotebookDocuments();
  return openHandwritingPractice([], { freeMode: true, documentId: document.id });
}

function setNotebookDocumentMode(mode) {
  const document = state.notebookSession?.document;
  const nextMode = mode === 'edgeless' ? 'edgeless' : 'paged';
  if (!document || document.mode === nextMode) return;
  if (nextMode === 'edgeless' && document.pages.length > 1) return showToast('多页笔记不能直接切换为无边界画布');
  askConfirm(nextMode === 'edgeless' ? '切换为无边界画布？当前内容会居中保留。' : '切换为分页画布？当前画布尺寸和内容会保留。', () => {
    if (!state.notebookSession.setDocumentMode(nextMode)) return;
    state.notebookSession.document.lastViewport = null;
    renderHandwritingPractice();
    scheduleNotebookSave();
    showToast(nextMode === 'edgeless' ? '已切换为无边界画布' : '已切换为分页画布');
  });
}

function jumpNotebookPdfPage(pageNumber, sourceName = '') {
  const page = state.notebookSession?.document.pages.find(item => Number(item.background?.sourcePage || 0) === Number(pageNumber) && (!sourceName || item.background?.sourceName === sourceName));
  if (!page) return showToast('该 PDF 页尚未导入');
  state.notebookSession.setPage(page.id);
}

function openNotebookPdfLink(link) {
  if (Number(link?.targetPage) > 0) return jumpNotebookPdfPage(link.targetPage, state.notebookSession?.page.background?.sourceName || '');
  if (link?.url) return openExternal(link.url);
}

async function switchNotebookDocumentTab(id) {
  if (state.notebookSession?.document.id === id) return;
  const document = state.notebookDocuments.find(item => item.id === id) || await getNotebookRepository().get(id);
  if (!document) return showNotice('找不到这个笔记');
  await saveCurrentInkNote({ silent: true });
  state.inkSession.freeMode = document.kind === 'free';
  if (document.kind === 'free') {
    state.inkSession.title = '自由笔记';
  } else {
    let questions = state.inkSession.questions || [];
    let index = questions.findIndex(question => questionKey(question) === document.binding?.questionKey);
    if (index < 0) {
      questions = buildQuestionSet(await ensureBanksHydrated(getVisibleBanks()));
      releaseHydratedLargeBanks();
      index = questions.findIndex(question => questionKey(question) === document.binding?.questionKey);
    }
    if (index < 0) return showNotice('原题已不在当前题库');
    state.inkSession.questions = questions;
    state.inkSession.path = normalizePath(document.binding?.sourcePath || []);
    state.inkSession.title = state.inkSession.path.length ? pathTitle(state.inkSession.path) : '题目笔记';
    state.currentIndex = index;
  }
  await activateNotebookDocument(document, { keepPanel: true });
  state.notebookMobilePane = '';
  renderHandwritingPractice();
}

async function closeNotebookDocumentTab(id) {
  const index = state.notebookOpenTabs.indexOf(id);
  if (index < 0) return;
  const wasCurrent = state.notebookSession?.document.id === id;
  state.notebookOpenTabs.splice(index, 1);
  if (wasCurrent && state.notebookOpenTabs.length) {
    const nextId = state.notebookOpenTabs[Math.min(index, state.notebookOpenTabs.length - 1)];
    await switchNotebookDocumentTab(nextId);
    return;
  }
  renderHandwritingPractice();
}

function deleteFreeNotebook(id) {
  askConfirm('删除这个自由笔记本？删除后无法恢复。', async () => {
    const assets = state.notebookSession?.document.id === id
      ? state.notebookSession.document.pages.map(page => page.background?.assetId).filter(Boolean)
      : [];
    await getNotebookRepository().delete(id);
    await getNotebookAssetRepository()?.deleteByDocument(id).catch(() => {});
    assets.forEach(assetId => state.notebookAssetCache.delete(assetId));
    await loadNotebookDocuments();
    if (state.view === 'notebookLibrary') {
      renderNotebookLibraryPage();
      showToast('笔记本已删除');
      return;
    }
    if (state.notebookSession?.document.id === id) {
      const next = state.notebookDocuments.find(item => item.kind === 'free');
      if (next) await activateNotebookDocument(next);
      else {
        const created = QuizNotebook.createDocument({ title: '我的笔记', kind: 'free' });
        await getNotebookRepository().put(created);
        await loadNotebookDocuments();
        await activateNotebookDocument(created);
      }
      renderHandwritingPractice();
    } else setNotebookLeftTab('notebooks');
    showToast('笔记本已删除');
  });
}

function bytesToBase64(bytes) {
  let binary = '';
  for (let index = 0; index < bytes.length; index += 1) binary += String.fromCharCode(bytes[index]);
  return window.btoa(binary);
}

async function saveNotebookExportBytes(value, filename, mimeType) {
  const bytes = value instanceof Uint8Array ? value : new Uint8Array(value || []);
  if (window.QuizAppNative && typeof window.QuizAppNative.chooseDocumentDestination === 'function') {
    state.pendingNativeNotebookExport = { bytes, filename, mimeType };
    updateBackupOperation(100, '请选择文件保存位置');
    window.QuizAppNative.chooseDocumentDestination(filename, mimeType);
    return;
  }
  QuizNotebookExport.download(bytes, filename, mimeType);
  closeAppDialog();
  showToast(`已导出 ${filename} · ${formatBackupBytes(bytes.byteLength)}`);
}

async function streamNativeNotebookExport() {
  const pending = state.pendingNativeNotebookExport;
  if (!pending) return;
  const bytes = pending.bytes;
  const chunkSize = 48 * 1024;
  try {
    for (let offset = 0; offset < bytes.length; offset += chunkSize) {
      const end = Math.min(bytes.length, offset + chunkSize);
      const encoded = bytesToBase64(bytes.subarray(offset, end));
      const ok = window.QuizAppNative.appendDocumentBase64Chunk(encoded);
      if (ok === false) throw new Error('手机存储写入失败');
      updateBackupOperation(5 + end / Math.max(1, bytes.length) * 92, `正在写入 ${Math.round(end / Math.max(1, bytes.length) * 100)}%`);
      await new Promise(resolve => window.setTimeout(resolve, 0));
    }
    const finished = window.QuizAppNative.finishDocumentExport();
    if (finished === false) throw new Error('无法完成文件写入');
    const filename = pending.filename;
    state.pendingNativeNotebookExport = null;
    closeAppDialog();
    showToast(`已保存 ${filename}`);
  } catch(error) {
    try { window.QuizAppNative.cancelDocumentExport(); } catch(e) {}
    state.pendingNativeNotebookExport = null;
    closeAppDialog();
    showNotice(`文件保存失败：${error.message || error}`);
  }
}

window.onNativeNotebookExportDestinationReady = function onNativeNotebookExportDestinationReady(ok, message) {
  if (!ok) {
    state.pendingNativeNotebookExport = null;
    closeAppDialog();
    if (message && message !== '已取消保存') showNotice(message);
    else showToast('已取消导出');
    return;
  }
  updateBackupOperation(4, message || '已选择保存位置，开始写入');
  streamNativeNotebookExport();
};

function restoreQuizScrollPosition(options = {}) {
  const scroller = options.scroller || document.getElementById('scrollContainer') || document.querySelector('.page-slide.current-slide') || document.getElementById('viewport');
  if (!scroller) return;
  const oldBehavior = scroller.style.scrollBehavior;
  const oldAnchor = scroller.style.overflowAnchor;
  scroller.style.scrollBehavior = 'auto';
  scroller.style.overflowAnchor = 'none';
  if (Number.isFinite(options.scrollTop)) scroller.scrollTop = options.scrollTop;
  if (Number.isInteger(options.cardIndex) && Number.isFinite(options.cardTop)) {
    const card = document.getElementById(`card-${options.cardIndex}`);
    if (card) scroller.scrollTop += card.getBoundingClientRect().top - options.cardTop;
  }
  scroller.style.scrollBehavior = oldBehavior;
  scroller.style.overflowAnchor = oldAnchor;
}

function restoreQuizRouteViewport(snapshot) {
  if (!snapshot || !Number.isFinite(Number(snapshot.scrollTop))) return;
  const token = Number(state.quizViewportRestoreToken || 0) + 1;
  state.quizViewportRestoreToken = token;
  let cancelled = false;
  const interactionEvents = ['pointerdown', 'touchstart', 'wheel'];
  const cleanup = () => interactionEvents.forEach(type => document.removeEventListener(type, cancel, true));
  const cancel = () => { cancelled = true; cleanup(); };
  interactionEvents.forEach(type => document.addEventListener(type, cancel, { capture: true, passive: true }));
  const restore = () => {
    if (cancelled || state.quizViewportRestoreToken !== token || state.view !== 'quiz') return;
    const scroller = state.mode === 'scroll'
      ? (document.getElementById('scrollContainer') || document.getElementById('viewport'))
      : document.querySelector('.page-slide.current-slide');
    restoreQuizScrollPosition({
      scroller,
      scrollTop: Number(snapshot.scrollTop),
    });
  };
  restore();
  requestAnimationFrame(() => {
    restore();
    requestAnimationFrame(restore);
  });
  window.setTimeout(restore, 80);
  window.setTimeout(restore, 160);
  window.setTimeout(restore, 320);
  window.setTimeout(cleanup, 520);
  document.fonts?.ready?.then(restore).catch(() => {});
}

async function exportSelectedNotebooks(format) {
  const ids = Array.from(document.querySelectorAll('[data-notebook-batch-id]:checked')).map(input => input.dataset.notebookBatchId).filter(Boolean);
  if (!ids.length) return showToast('请至少选择一份笔记');
  if (ids.length > 60) return showToast('单次最多导出 60 份笔记，请分批处理');
  if (!window.JSZip || !window.QuizNotebookExport) return showNotice('批量导出模块未加载');
  showBackupOperationDialog('批量导出笔记', `准备处理 ${ids.length} 份笔记`);
  try {
    await saveCurrentInkNote({ silent: true, throwOnError: true });
    const zip = new JSZip();
    for (let index = 0; index < ids.length; index += 1) {
      const document = state.notebookDocuments.find(item => item.id === ids[index]) || await getNotebookRepository().get(ids[index]);
      if (!document) continue;
      updateBackupOperation(index / ids.length * 88, `正在导出 ${index + 1}/${ids.length} · ${document.title}`);
      if (format === 'snbx') {
        const assets = await getNotebookAssetRepository().listByDocument(document.id);
        const result = await QuizNotebookExport.createSnbx(document, assets);
        zip.file(`${String(index + 1).padStart(2, '0')}-${result.filename}`, result.bytes);
      } else {
        const result = await QuizNotebookExport.createPdf(document, {
          resolveAsset: getNotebookAssetDataUrl,
          getStroke: window.PerfectFreehand?.getStroke,
        });
        zip.file(`${String(index + 1).padStart(2, '0')}-${result.filename}`, result.bytes);
      }
      await new Promise(resolve => window.setTimeout(resolve, 0));
    }
    updateBackupOperation(90, '正在压缩批量导出文件');
    const bytes = await zip.generateAsync({ type: 'uint8array', compression: 'DEFLATE', compressionOptions: { level: 5 } }, metadata => {
      updateBackupOperation(90 + metadata.percent * .1, `正在压缩 ${Math.round(metadata.percent)}%`);
    });
    const filename = `QuizApp-笔记批量导出-${getTodayKey()}.zip`;
    await saveNotebookExportBytes(bytes, filename, 'application/zip');
  } catch(error) {
    state.pendingNativeNotebookExport = null;
    closeAppDialog();
    showNotice(`批量导出失败：${error.message || error}`);
  }
}
