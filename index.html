function getBankUrl(file) {
  const normalized = String(file || '').replace(/^\.\//, '');
  const encoded = normalized.split('/').map(part => encodeURIComponent(part)).join('/');
  return normalized.startsWith('output/') ? encoded : `data/${encoded}`;
}

async function loadBankJson(file) {
  const url = getBankUrl(file);
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return await res.json();
  } catch(fetchError) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.overrideMimeType('application/json;charset=utf-8');
      xhr.onload = () => {
        if (xhr.status === 0 || (xhr.status >= 200 && xhr.status < 300)) {
          try {
            resolve(JSON.parse(xhr.responseText));
          } catch(parseError) {
            reject(parseError);
          }
          return;
        }
        reject(new Error(`${xhr.status} ${xhr.statusText || 'XHR failed'}`));
      };
      xhr.onerror = () => reject(fetchError);
      xhr.send();
    });
  }
}

// ========== Question helpers ==========
function getType(q) {
  const raw = String(q.type || '').trim().toLowerCase();
  if (raw === 'single' || raw === '单选') return 'single';
  if (raw === 'multi' || raw === '多选' || raw === 'multiple') return 'multi';
  if (raw === 'bool' || raw === '判断' || raw === 'tf' || raw === 'truefalse') return 'bool';
  if (raw === 'subjective' || raw === '主观' || raw === '填空' || raw === '解答') return 'subjective';
  return 'single';
}

function getTypeLabel(t) {
  return { single: '单选', multi: '多选', bool: '判断', subjective: '主观题' }[t] || '单选';
}

function getOptions(q) {
  const t = getType(q);
  if (t === 'bool') return ['对', '错'];
  if (Array.isArray(q.options) && q.options.length) return normalizeOptions(q.options);
  if (q.options && typeof q.options === 'object') return normalizeOptions(Object.values(q.options));
  return ['A', 'B', 'C', 'D'];
}

function normalizeOptions(options) {
  const raw = Array.isArray(options) ? options.map(o => String(o || '').trim()).filter(Boolean) : [];
  if (!raw.length) return [];

  if (raw.length === 1) {
    const split = splitOptionBlock(raw[0]);
    if (split.length > 1) return split;
  }

  return raw.flatMap(item => {
    const split = splitOptionBlock(item);
    return split.length > 1 ? split : [stripOptionLabel(item)];
  }).map(o => o.trim()).filter(Boolean);
}

function splitOptionBlock(text) {
  const clean = String(text || '')
    .replace(/\u200b|\u200c|\u200d|\ufeff/g, '')
    .replace(/\r/g, '\n')
    .trim();
  const matches = [];
  const re = /(?:^|\n)\s*([A-H])(?:[.．、]|[\s])+\s*([\s\S]*?)(?=\n\s*[A-H](?:[.．、]|[\s])+\s*|$)/g;
  let match;
  while ((match = re.exec(clean))) {
    const value = stripOptionLabel(match[2]).trim();
    if (value) matches.push(value);
  }
  return matches;
}

function stripOptionLabel(text) {
  return String(text || '').replace(/^\s*[A-H](?:[.．、]|\s+)\s*/i, '').trim();
}

function isBooleanOptionSet(options) {
  const normalized = (options || [])
    .map(item => stripOptionLabel(item).replace(/\s/g, '').toLowerCase())
    .filter(Boolean);
  if (!normalized.length || normalized.length > 2) return false;
  const boolValues = new Set(['对', '错', '正确', '错误', '是', '否', 'true', 'false', 't', 'f', 'yes', 'no', 'y', 'n', '1', '0', '√', '×', '✓', '✗']);
  return normalized.every(item => boolValues.has(item));
}

function looksLikeBooleanAnswer(value) {
  const raw = String(value ?? '').trim();
  const upper = raw.toUpperCase();
  return ['TRUE', 'FALSE', 'T', 'F', 'YES', 'NO', 'Y', 'N', '1', '0', '对', '错', '正确', '错误', '是', '否', '√', '×', '✓', '✗'].includes(upper)
    || ['对', '错', '正确', '错误', '是', '否', '√', '×', '✓', '✗'].includes(raw);
}

function cleanQuestionText(text) {
  return String(text || '')
    .replace(/\u200b|\u200c|\u200d|\ufeff/g, '')
    .replace(/[─━]{5,}/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function inferQuestionType(raw, rawAnswer, options) {
  const declared = getType(raw);
  const rawText = String(raw.type || raw['题型'] || '');
  const answerLetters = String(rawAnswer ?? '').toUpperCase().split('').filter(c => c >= 'A' && c <= 'Z');
  const optionCount = (options || []).length;

  if (rawText.includes('多选') || answerLetters.length > 1) return 'multi';
  if (optionCount >= 3) return 'single';
  if ((rawText.includes('判断') || declared === 'bool' || looksLikeBooleanAnswer(rawAnswer)) && isBooleanOptionSet(options)) return 'bool';
  if (rawText.includes('单选')) return 'single';
  return declared;
}

function normalizeImageList(value) {
  if (Array.isArray(value)) return value.map(item => String(item || '').trim()).filter(Boolean);
  if (typeof value !== 'string' || !value.trim()) return [];
  const text = value.trim();
  if (text.startsWith('data:image/') || /^https?:\/\//i.test(text)) return [text];
  try {
    const parsed = JSON.parse(text);
    return Array.isArray(parsed) ? parsed.map(item => String(item || '').trim()).filter(Boolean) : [];
  } catch(e) {
    return [];
  }
}

function normalizeQuestionLayout(value) {
  if (!value || typeof value !== 'object' || !Array.isArray(value.pages)) return null;
  const number = (input, fallback = 0) => Number.isFinite(Number(input)) ? Number(input) : fallback;
  const pages = value.pages.slice(0, 6).map(page => {
    const width = Math.max(1, number(page?.width, 1));
    const height = Math.max(1, number(page?.height, 1));
    const runs = (Array.isArray(page?.runs) ? page.runs : []).slice(0, 1200).map(run => ({
      x: number(run?.x),
      y: number(run?.y),
      w: Math.max(0, number(run?.w)),
      h: Math.max(0, number(run?.h)),
      size: Math.max(1, number(run?.size, 12)),
      font: ['cjk', 'text', 'math', 'math-italic'].includes(run?.font) ? run.font : 'text',
      bold: Boolean(run?.bold),
      text: String(run?.text || ''),
    })).filter(run => run.text);
    const vectors = (Array.isArray(page?.vectors) ? page.vectors : []).slice(0, 300).map(vector => ({
      width: Math.max(.2, number(vector?.width, .5)),
      color: Array.isArray(vector?.color) ? vector.color.slice(0, 3).map(channel => Math.max(0, Math.min(1, number(channel)))) : [0, 0, 0],
      items: (Array.isArray(vector?.items) ? vector.items : []).slice(0, 500).map(item => ({
        type: ['line', 'curve', 'rect'].includes(item?.type) ? item.type : '',
        points: (Array.isArray(item?.points) ? item.points : []).map(point => number(point)),
      })).filter(item => item.type),
    }));
    return { width, height, runs, vectors };
  }).filter(page => page.runs.length || page.vectors.length);
  return pages.length ? { version: number(value.version, 1), pages } : null;
}

function normalizeBuiltinExplanation(raw) {
  const structured = raw?.explanations?.builtin || raw?.builtinExplanation || null;
  const legacyText = raw?.exp || raw?.explanation || raw?.['解析'] || raw?.note || '';
  const text = structured?.text ?? structured?.content ?? legacyText;
  return {
    label: String(structured?.label || '内置解析'),
    text: String(text || ''),
    images: normalizeImageList(structured?.images || structured?.imageUrls || raw?.answerImages || raw?.answer_image_url),
    pdfUrl: String(structured?.pdfUrl || structured?.pdf_url || raw?.answerPdfUrl || raw?.answer_pdf_url || raw?.source?.answerPdfUrl || ''),
    videoUrl: String(structured?.videoUrl || structured?.video_url || raw?.videoUrl || raw?.video_url || ''),
    source: structured?.source && typeof structured.source === 'object' ? { ...structured.source } : null,
  };
}

function normalizeQuestion(q, i) {
  const raw = q || {};
  const question = raw.q || raw.question || raw['题目'] || raw.title || '';
  const answerValue = raw.ans ?? raw.answer ?? raw['答案'] ?? raw.correct;
  const options = normalizeOptions(Array.isArray(raw.options) ? raw.options : (raw.options && typeof raw.options === 'object' ? Object.values(raw.options) : []));
  const type = inferQuestionType(raw, answerValue, options);
  const builtin = normalizeBuiltinExplanation(raw);
  return {
    id: raw.id || `q${i + 1}`,
    type,
    q: cleanQuestionText(question),
    options: (type === 'bool' && isBooleanOptionSet(options) ? ['对', '错'] : (options.length ? options : getOptions({ ...raw, type }))).map(o => String(o)),
    ans: normalizeAnswer({ ...raw, type }, answerValue),
    rawAns: String(answerValue ?? ''),
    exp: builtin.text,
    questionLayout: normalizeQuestionLayout(raw.questionLayout || raw.question_layout),
    questionImages: normalizeImageList(raw.questionImages || raw.questionImageUrls || raw.question_image_url),
    explanations: { builtin },
    source: raw.source && typeof raw.source === 'object' ? { ...raw.source } : null,
  };
}

function extractQuestions(data) {
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.questions)) return data.questions;
  if (Array.isArray(data.data)) return data.data;
  for (const key of Object.keys(data || {})) {
    if (Array.isArray(data[key]) && data[key].length > 0) return data[key];
  }
  return [];
}

function normalizeBank(data, fallbackId, bundled) {
  const rawQuestions = extractQuestions(data);
  const questions = rawQuestions
    .map((q, i) => normalizeQuestion(q, i))
    .filter(q => q.q && (q.ans || getType(q) === 'subjective' || q.explanations?.builtin?.images?.length || q.explanations?.builtin?.text));
  const name = data.name || data.title || data['科目'] || fallbackId.replace(/^bundled:/, '').replace(/\.json$/i, '');
  const parsed = parseBankName(String(name));
  const subject = data.subject || data['科目'] || parsed.subject;
  const chapter = getDisplayChapter(subject, data.chapter || data['章节'] || parsed.chapter);
  const path = normalizePath(data.path || data['路径'] || [subject, chapter]);
  return {
    id: data.id || fallbackId || `${Date.now()}`,
    name: String(name),
    subject,
    chapter,
    path,
    questions,
    bundled: Boolean(bundled),
    releaseManaged: Boolean(data.releaseManaged),
    releaseVersion: data.releaseVersion || '',
    releaseSource: data.releaseSource || '',
  };
}

function getDisplayChapter(subject, chapter) {
  const clean = String(chapter || '').trim() || '综合练习';
  if (subject !== '习思') return clean;
  const map = {
    '导论': '导论',
    '中国特色社会主义': '第一章 中国特色社会主义',
    '党的领导': '第二章 坚持党的全面领导',
    '经济建设': '第三章 经济建设',
    '政治建设': '第四章 政治建设',
    '文化建设': '第五章 文化建设',
    '社会建设': '第六章 社会建设',
    '生态文明': '第七章 生态文明建设',
    '国家安全': '第八章 国家安全',
    '外交': '第九章 中国特色大国外交',
    '综合': '综合题库',
  };
  return map[clean] || clean;
}

function parseBankName(name) {
  const clean = String(name || '').replace(/\s*\(\d+题\)\s*/g, '').trim();
  const parts = clean.split(/\s*[-－—]\s*/).filter(Boolean);
  if (parts.length >= 2) {
    return { subject: parts[0], chapter: parts.slice(1).join('-') };
  }
  return { subject: clean || '未分类', chapter: '综合练习' };
}

function normalizePath(path) {
  if (Array.isArray(path)) return path.map(item => String(item || '').trim()).filter(Boolean);
  return String(path || '').split(/[/>｜|]/).map(item => item.trim()).filter(Boolean);
}

function pathKey(path) {
  return normalizePath(path).join('\u001f');
}

function samePath(a, b) {
  return pathKey(a) === pathKey(b);
}

function isPathPrefix(parent, child) {
  const p = normalizePath(parent);
  const c = normalizePath(child);
  return p.length <= c.length && p.every((item, index) => c[index] === item);
}

function parentPath(path) {
  return normalizePath(path).slice(0, -1);
}

function pathTitle(path) {
  const p = normalizePath(path);
  return p.length ? p[p.length - 1] : '全部题库';
}

function pathCrumbs(path) {
  const p = normalizePath(path);
  return ['首页', ...p].join(' / ');
}

const LIBRARY_SEGMENT_ORDER = new Map([
  ['考研数学', 0],
  ['毛概', 10],
  ['习思', 20],
  ['基础篇', 0],
  ['强化篇', 1],
  ['数学一', 0],
  ['数学二', 1],
  ['数学三', 2],
  ['高等数学', 0],
  ['线性代数', 1],
  ['概率论与数理统计', 2],
]);

function chineseOrdinalToNumber(token) {
  const text = String(token || '').trim();
  if (!text) return null;
  if (/^\d+$/.test(text)) return Number(text);
  const digits = { 零: 0, 〇: 0, 一: 1, 二: 2, 两: 2, 三: 3, 四: 4, 五: 5, 六: 6, 七: 7, 八: 8, 九: 9 };
  if (Object.prototype.hasOwnProperty.call(digits, text)) return digits[text];
  if (text === '十') return 10;
  if (text.startsWith('十')) return 10 + (digits[text.slice(1)] ?? 0);
  if (text.endsWith('十')) return (digits[text.slice(0, -1)] ?? 0) * 10;
  if (text.includes('十')) {
    const [left, right] = text.split('十');
    return (digits[left] ?? 1) * 10 + (digits[right] ?? 0);
  }
  return null;
}

function segmentNaturalRank(segment) {
  const text = String(segment || '').trim();
  if (LIBRARY_SEGMENT_ORDER.has(text)) return LIBRARY_SEGMENT_ORDER.get(text);
  const chapterValue = chapterSortValue(text);
  if (chapterValue < 5000) return chapterValue;
  return 10000;
}

function compareLibrarySegments(left, right) {
  const a = String(left || '').trim();
  const b = String(right || '').trim();
  const ar = segmentNaturalRank(a);
  const br = segmentNaturalRank(b);
  if (ar !== br) return ar - br;
  return a.localeCompare(b, 'zh-Hans-CN', { numeric: true, sensitivity: 'base' });
}

function compareLibraryPaths(left, right) {
  const a = normalizePath(left);
  const b = normalizePath(right);
  const max = Math.max(a.length, b.length);
  for (let index = 0; index < max; index++) {
    if (index >= a.length) return -1;
    if (index >= b.length) return 1;
    const value = compareLibrarySegments(a[index], b[index]);
    if (value) return value;
  }
  return 0;
}

function compareBanksByPath(left, right) {
  const value = compareLibraryPaths(getBankPath(left), getBankPath(right));
  if (value) return value;
  return String(left?.id || left?.name || '').localeCompare(String(right?.id || right?.name || ''), 'zh-Hans-CN', { numeric: true, sensitivity: 'base' });
}

function getBankPath(bank) {
  const path = normalizePath(bank?.path);
  if (path.length) return path;
  const parsed = parseBankName(bank?.name || '');
  const subject = bank?.subject || parsed.subject;
  const chapter = bank?.chapter || parsed.chapter;
  return normalizePath([subject, chapter]);
}

function setBankPath(bank, path) {
  const normalized = normalizePath(path);
  if (!bank || !normalized.length) return;
  bank.path = normalized;
  bank.subject = normalized[0] || bank.subject || '未分类';
  bank.chapter = normalized[normalized.length - 1] || bank.chapter || '综合练习';
}

function ensureLibraryPath(path) {
  const normalized = normalizePath(path);
  let changed = false;
  for (let i = 1; i <= normalized.length; i++) {
    const partial = normalized.slice(0, i);
    if (!state.libraryNodes.some(node => samePath(node.path, partial))) {
      state.libraryNodes.push({
        id: `node:${Date.now()}:${Math.random().toString(36).slice(2)}`,
        path: partial,
        createdAt: Date.now(),
      });
      changed = true;
    }
  }
  if (changed) saveLibraryNodes();
}

function getBanksAtPath(path) {
  const key = pathKey(path);
  return getVisibleBanks().filter(bank => pathKey(getBankPath(bank)) === key).sort(compareBanksByPath);
}

function getDescendantBanks(path) {
  const p = normalizePath(path);
  return getVisibleBanks().filter(bank => isPathPrefix(p, getBankPath(bank))).sort(compareBanksByPath);
}

function getLibraryChildren(path = []) {
  const p = normalizePath(path);
  const seen = new Map();
  const add = childPath => {
    const normalized = normalizePath(childPath);
    if (normalized.length !== p.length + 1) return;
    if (!isPathPrefix(p, normalized)) return;
    const key = pathKey(normalized);
    if (!seen.has(key)) seen.set(key, { path: normalized, title: pathTitle(normalized), banks: getDescendantBanks(normalized) });
  };
  state.libraryNodes.forEach(node => add(node.path));
  getVisibleBanks().forEach(bank => {
    const bankPath = getBankPath(bank);
    if (bankPath.length > p.length) add(bankPath.slice(0, p.length + 1));
  });
  return Array.from(seen.values()).sort((a, b) => {
    if (p.length === 0) {
      const order = Array.isArray(state.uiConfig.subjectOrder) ? state.uiConfig.subjectOrder : [];
      const ai = order.indexOf(a.title);
      const bi = order.indexOf(b.title);
      if (ai !== -1 || bi !== -1) return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    }
    return compareLibraryPaths(a.path, b.path);
  });
}

function applyStoredOrder(items, orderKey, getKey) {
  const order = state.uiConfig.libraryOrder?.[orderKey] || [];
  return items.slice().sort((a, b) => {
    const ak = getKey(a);
    const bk = getKey(b);
    const ai = order.indexOf(ak);
    const bi = order.indexOf(bk);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    return 0;
  });
}

function getLibraryDisplayItems(path = []) {
  const p = normalizePath(path);
  const orderKey = `library:${pathKey(p) || 'root'}`;
  const items = [
    ...getLibraryChildren(p).map(child => ({ type: 'child', key: `path:${pathKey(child.path)}`, data: child })),
    ...getBanksAtPath(p).map(bank => ({ type: 'bank', key: `bank:${bank.id}`, data: bank })),
  ];
  return applyStoredOrder(items, orderKey, item => item.key);
}

function renderLibraryDisplayItem(item) {
  return item.type === 'child' ? renderLibraryChildItem(item.data) : renderDirectBankItem(item.data);
}

function getSubjectGroups() {
  const groups = new Map();
  for (const bank of getVisibleBanks()) {
    const subject = getBankPath(bank)[0] || bank.subject || parseBankName(bank.name).subject;
    if (!groups.has(subject)) groups.set(subject, []);
    groups.get(subject).push(bank);
  }
  const order = Array.isArray(state.uiConfig.subjectOrder) ? state.uiConfig.subjectOrder : [];
  return Array.from(groups, ([subject, banks]) => ({
    subject,
    banks,
    questionCount: banks.reduce((sum, bank) => sum + getBankQuestionCount(bank), 0),
  })).sort((a, b) => {
    const ai = order.indexOf(a.subject);
    const bi = order.indexOf(b.subject);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
    return compareLibrarySegments(a.subject, b.subject);
  });
}

function getBanksBySubject(subject) {
  return getVisibleBanks()
    .filter(b => getBankPath(b)[0] === subject)
    .sort(compareBanksByPath);
}

function chapterSortValue(chapter) {
  const text = String(chapter || '');
  if (text.startsWith('导论')) return 0;
  if (text.startsWith('综合')) return 9999;
  const match = text.match(/^第\s*([0-9零〇一二两三四五六七八九十百]+)\s*[章节讲]/);
  if (!match) return 5000;
  return chineseOrdinalToNumber(match[1]) ?? 5000;
}

function buildQuestionSet(banks) {
  return (banks || []).slice().sort(compareBanksByPath).flatMap(bank => (bank.questions || []).map((q, i) => ({
    ...q,
    sourceBankId: bank.id,
    sourcePath: getBankPath(bank),
    sourceSubject: getBankPath(bank)[0] || bank.subject || parseBankName(bank.name).subject,
    sourceChapter: getBankPath(bank).slice(-1)[0] || bank.chapter || parseBankName(bank.name).chapter,
    sourceIndex: i,
  })));
}

function questionKey(q) {
  return `${q.sourceBankId || 'bank'}:${q.sourceIndex ?? q.id ?? q.q}`;
}

function makeReviewScopeKey(subject, bankIds, title = '') {
  const ids = (bankIds || []).slice().sort().join('|');
  return `review-position:${subject || title || 'all'}:${hashString(ids)}`;
}

function makeAnswerLookupScope(subject = '', baseChapter = '') {
  return `answer-lookup:${subject || 'all'}:${baseChapter || 'all'}`;
}

function saveReviewPosition() {
  const session = state.activeSession;
  if (!session || !state.reviewMode || !state.uiConfig.rememberReviewPosition) return;
  const question = session.questions[state.currentIndex];
  setViewProgress(makeReviewScopeKey(session.subject, session.bankIds, session.title), {
    type: 'review',
    subject: session.subject || '',
    title: session.title || '',
    bankIds: session.bankIds || [],
    currentIndex: state.currentIndex,
    currentQuestionKey: question ? questionKey(question) : '',
    mode: state.mode,
  });
}

function applyReviewPosition(session) {
  if (!session || !state.reviewMode || !state.uiConfig.rememberReviewPosition) return;
  const saved = getViewProgressItem(makeReviewScopeKey(session.subject, session.bankIds, session.title));
  if (!saved) return;
  const index = session.questions.findIndex(q => questionKey(q) === saved.currentQuestionKey);
  state.currentIndex = index >= 0 ? index : Math.max(0, Math.min(saved.currentIndex || 0, session.questions.length - 1));
  if (saved.mode === 'scroll' || saved.mode === 'page') state.mode = saved.mode;
}

function saveAnswerLookupPosition() {
  const context = state.answerLookupContext;
  if (!context || !state.uiConfig.rememberAnswerLookupPosition) return;
  const viewport = document.getElementById('answerLookupViewport');
  setViewProgress(makeAnswerLookupScope(context.subject || '', context.baseChapter || ''), {
    type: 'answerLookup',
    subject: context.subject || '',
    baseChapter: context.baseChapter || '',
    chapter: context.chapter || '',
    query: context.query || '',
    scrollTop: viewport ? viewport.scrollTop : (context.scrollTop || 0),
  });
}

function restoreAnswerLookupContext(subject = '', baseChapter = '') {
  const fallback = { subject: subject || '', baseChapter: baseChapter || '', chapter: baseChapter || '', query: '', scrollTop: 0 };
  if (!state.uiConfig.rememberAnswerLookupPosition) return fallback;
  const saved = getViewProgressItem(makeAnswerLookupScope(subject || '', baseChapter || ''));
  if (!saved) return fallback;
  return {
    subject: subject || saved.subject || '',
    baseChapter: baseChapter || saved.baseChapter || '',
    chapter: saved.chapter || baseChapter || '',
    query: saved.query || '',
    scrollTop: Number(saved.scrollTop || 0),
  };
}

function saveCurrentViewPosition() {
  if (state.view === 'answerLookup') saveAnswerLookupPosition();
  if (state.view === 'quiz') saveReviewPosition();
}

function getWrongRecords(filter = {}) {
  return Object.values(state.wrongBook).filter(record => {
    if (filter.path && filter.path.length && !isPathPrefix(filter.path, record.question.sourcePath || [record.question.sourceSubject, record.question.sourceChapter])) return false;
    if (filter.subject && record.question.sourceSubject !== filter.subject) return false;
    if (filter.chapter && record.question.sourceChapter !== filter.chapter) return false;
    return true;
  }).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

function isInWrongBook(question) {
  return Boolean(state.wrongBook[questionKey(question)]);
}

function compactQuestionSnapshot(question) {
  const keepUrl = value => !String(value || '').startsWith('data:') || String(value || '').length < 4096;
  const builtin = question?.explanations?.builtin || {};
  return {
    ...question,
    questionImages: normalizeImageList(question?.questionImages).filter(keepUrl),
    explanations: {
      ...(question?.explanations || {}),
      builtin: { ...builtin, images: normalizeImageList(builtin.images).filter(keepUrl) },
    },
  };
}

function addWrongToBook(idx, options = {}) {
  const session = state.activeSession;
  if (!session) return;
  const q = session.questions[idx];
  const userAns = state.answers[idx];
  if (!q || !userAns) return;
  if (checkAnswer(q, userAns)) return;
  const key = questionKey(q);
  const prev = state.wrongBook[key] || {};
  state.wrongBook[key] = {
    ...prev,
    key,
    question: compactQuestionSnapshot(q),
    lastAnswer: userAns,
    correctAnswer: getCorrectAnswer(q),
    wrongCount: (prev.wrongCount || 0) + 1,
    updatedAt: Date.now(),
  };
  saveWrongBook();
  if (!options.silent) showToast('已加入错题集');
  if (options.rerender !== false) renderQuizPreservingCard(idx);
}

function removeWrongFromBookByKey(key, rerender = true) {
  if (!key || !state.wrongBook[key]) return;
  const currentIdx = state.activeSession?.questions?.findIndex(q => questionKey(q) === key) ?? state.currentIndex;
  delete state.wrongBook[key];
  saveWrongBook();
  showToast('已从错题集删除');
  if (state.activeSession?.wrongPractice) {
    state.activeSession.questions = state.activeSession.questions.filter(q => questionKey(q) !== key);
    if (!state.activeSession.questions.length) {
      state.activeSession = null;
      renderSubject();
      return;
    }
    state.currentIndex = Math.min(state.currentIndex, state.activeSession.questions.length - 1);
  }
  if (rerender) {
    if (state.activeSession?.wrongPractice) renderQuiz();
    else renderQuizPreservingCard(currentIdx >= 0 ? currentIdx : state.currentIndex);
  }
}

function removeWrongFromBook(idx) {
  const q = state.activeSession?.questions?.[idx];
  if (!q) return;
  removeWrongFromBookByKey(questionKey(q));
}

function renderWrongReasonSummary(question) {
  const record = state.wrongBook[questionKey(question)];
  const labels = new Map(WRONG_REASON_OPTIONS);
  const tags = (record?.reasonTags || []).map(tag => labels.get(tag)).filter(Boolean);
  const type = window.QuizAiLearning?.TASK_TYPES.WRONG_REASON;
  const key = questionKey(question);
  const taskId = type ? getAiLearningTaskId(type, key) : '';
  const aiRecord = type ? getAiLearningRecord(type, key) : null;
  const pending = taskId ? state.aiLearningPending[taskId] : null;
  if (!tags.length && !record?.reasonNote && !aiRecord && !pending) return '';
  return `<div class="wrong-reason-summary"><strong>错因</strong>${tags.map(tag => `<span>${escapeHtml(tag)}</span>`).join('')}${record?.reasonNote ? `<small>${escapeHtml(record.reasonNote)}</small>` : ''}${pending ? '<div class="ai-wrong-reason loading">AI 正在归纳错因…</div>' : ''}${aiRecord && !pending ? `<details class="ai-wrong-reason"><summary>AI 错因建议 <small>${escapeHtml(aiRecord.model || 'AI')} · ${formatAiThreadTime(aiRecord.updatedAt)}</small></summary><div class="ai-markdown">${renderAiMarkdown(aiRecord.content)}</div></details>` : ''}</div>`;
}

function renderAiWrongReasonButton(question, idx) {
  if (!window.QuizAiLearning || !isInWrongBook(question)) return '';
  const type = QuizAiLearning.TASK_TYPES.WRONG_REASON;
  const key = questionKey(question);
  const taskId = getAiLearningTaskId(type, key);
  const pending = state.aiLearningPending[taskId];
  const saved = getAiLearningRecord(type, key);
  return `<button onclick="summarizeWrongReasonWithAi(${idx}, ${saved ? 'true' : 'false'})" ${pending ? 'disabled' : ''}>${pending ? 'AI 归纳中' : (saved ? '重新 AI 归纳' : 'AI 归纳错因')}</button>`;
}

async function summarizeWrongReasonWithAi(idx, force = false) {
  const question = state.activeSession?.questions?.[idx];
  if (!question || !window.QuizAiLearning) return;
  const key = questionKey(question);
  const record = state.wrongBook[key];
  if (!record) return showNotice('请先把这道题加入错题集');
  const type = QuizAiLearning.TASK_TYPES.WRONG_REASON;
  const taskId = getAiLearningTaskId(type, key);
  if (state.aiLearningPending[taskId]) return;
  if (!force && getAiLearningRecord(type, key)) return renderQuizPreservingCard(idx);
  try {
    validateAiConnectionConfig();
    const vision = validateQuestionVisionCapability(question, type);
    const labels = new Map(WRONG_REASON_OPTIONS);
    const context = {
      question: getQuestionAiContext(question),
      userAnswer: record.lastAnswer || state.answers[idx] || '',
      correctAnswer: record.correctAnswer || getCorrectAnswer(question),
      manualReasonTags: (record.reasonTags || []).map(tag => labels.get(tag)).filter(Boolean),
      manualReasonNote: String(record.reasonNote || ''),
      existingAiQuestionAnalysis: String(state.aiAnalyses[key]?.content || ''),
    };
    state.aiLearningPending[taskId] = { model: state.aiConfig.model };
    renderQuizPreservingCard(idx);
    await QuizAiLearning.run({
      type,
      key,
      input: { question, context, images: vision.images, imageDependent: vision.imageDependent },
      config: state.aiConfig,
      request: requestAiCompletion,
      sourceHash: hashString(JSON.stringify(context)),
    });
  } catch(e) {
    showNotice(`AI 错因归纳失败：${e.message || e}`);
    if (isAiConfigurationError(e)) openAiSettings();
  } finally {
    delete state.aiLearningPending[taskId];
    if (state.activeSession?.questions?.[idx] && questionKey(state.activeSession.questions[idx]) === key) renderQuizPreservingCard(idx);
  }
}

    const clear = () => {
      window.clearTimeout(timer);
      timer = null;
      card.classList.remove('dragging');
      card.style.position = '';
      card.style.left = '';
      card.style.top = '';
      card.style.width = '';
      card.style.height = '';
      card.style.zIndex = '';
      card.style.pointerEvents = '';
      card.style.transition = '';
      if (placeholder) {
        placeholder.remove();
        placeholder = null;
      }
      dragging = false;
    };
    const moveTo = e => {
      card.style.left = `${e.clientX - pointerOffsetX}px`;
      card.style.top = `${e.clientY - pointerOffsetY}px`;
    };
    card.addEventListener('pointerdown', e => {
      if (e.target.closest('button')) return;
      startRect = card.getBoundingClientRect();
      pointerOffsetX = e.clientX - startRect.left;
      pointerOffsetY = e.clientY - startRect.top;
      timer = window.setTimeout(() => {
        dragging = true;
        placeholder = document.createElement('div');
        placeholder.className = 'drag-placeholder';
        placeholder.style.width = `${startRect.width}px`;
        placeholder.style.height = `${startRect.height}px`;
        card.parentNode.insertBefore(placeholder, card);
        card.classList.add('dragging');
        card.style.position = 'fixed';
        card.style.left = `${startRect.left}px`;
        card.style.top = `${startRect.top}px`;
        card.style.width = `${startRect.width}px`;
        card.style.height = `${startRect.height}px`;
        card.style.zIndex = '120';
        card.style.pointerEvents = 'none';
        card.style.transition = 'none';
        try { card.setPointerCapture(e.pointerId); } catch(err) {}
      }, 260);
    });
    card.addEventListener('pointermove', e => {
      if (!dragging) return;
      e.preventDefault();
      moveTo(e);
    });
    card.addEventListener('pointerup', e => {
      window.clearTimeout(timer);
      if (!dragging) return clear();
      const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.editable-card[data-drag-kind][data-drag-key]');
      const kind = card.dataset.dragKind;
      const from = card.dataset.dragKey;
      const to = target?.dataset.dragKind === kind ? target.dataset.dragKey : '';
      clear();
      if (to && to !== from) reorderEditableItem(kind, from, to);
    });
    card.addEventListener('pointercancel', clear);
    card.addEventListener('pointerleave', () => window.clearTimeout(timer));
  });
}

function moveKeyInList(list, from, to) {
  const arr = list.slice();
  const fromIndex = arr.indexOf(from);
  const toIndex = arr.indexOf(to);
  if (fromIndex < 0 || toIndex < 0) return arr;
  const [item] = arr.splice(fromIndex, 1);
  arr.splice(toIndex, 0, item);
  return arr;
}

function reorderEditableItem(kind, from, to) {
  if (kind === 'tool') {
    const current = getEnabledToolCards();
    state.uiConfig.toolCardOrder = moveKeyInList(current, from, to);
  } else if (kind === 'metric') {
    const current = getEnabledHomeMetrics();
    state.uiConfig.homeMetricOrder = moveKeyInList(current, from, to);
  } else if (kind === 'subject') {
    const current = getLibraryChildren([]).map(child => child.title);
    state.uiConfig.subjectOrder = moveKeyInList(current, from, to);
  } else if (kind === 'library') {
    const parent = state.view === 'subjects' ? normalizePath(state.activePath) : [];
    const orderKey = `library:${pathKey(parent) || 'root'}`;
    const current = getLibraryDisplayItems(parent).map(item => item.key);
    state.uiConfig.libraryOrder = state.uiConfig.libraryOrder || {};
    state.uiConfig.libraryOrder[orderKey] = moveKeyInList(current, from, to);
  }
  saveUiConfig();
  showToast('顺序已更新');
  if (state.view === 'subjects') renderSubject();
  else renderHome();
}

function renderChapterActions(bank, subject, chapter, wrongCount) {
  const bankId = bank.id;
  const allButtons = {
    sequence: `<button onclick="startChapterPractice('${escapeAttr(bankId)}',false)">顺序</button>`,
    random: `<button onclick="startChapterPractice('${escapeAttr(bankId)}',true)">随机</button>`,
    reset: `<button class="muted-mode" onclick="startChapterPractice('${escapeAttr(bankId)}',false,true)">重做</button>`,
    review: `<button onclick="startChapterReview('${escapeAttr(bankId)}')">背题</button>`,
    answer: `<button class="lookup-mode" onclick="openAnswerLookup('${escapeAttr(subject)}','${escapeAttr(chapter)}')">答案</button>`,
    wrong: `<button class="wrong-mode" onclick="openWrongPractice('${escapeAttr(subject)}','${escapeAttr(chapter)}',true)" ${wrongCount ? '' : 'disabled'}>错题集</button>`,
  };
  const buttons = getEnabledChapterActionButtons().map(key => allButtons[key]).join('');

  }

    <div class="chapter-action-wrap ${expanded ? 'expanded' : 'collapsed'}" onclick="event.stopPropagation()">
      <button class="chapter-expand-icon" onclick="event.stopPropagation();toggleChapterActions('${escapeAttr(bankId)}')" aria-expanded="${expanded}" aria-label="${expanded ? '收起模式' : '展开模式'}">
        ${renderNotebookIcon('plus')}
      </button>
      <div class="chapter-actions">${buttons}</div>

}

function shuffleQuestions(questions) {
  const arr = questions.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startPractice(options) {
  const source = Array.isArray(options.banks) ? options.banks : [];
  if (source.some(bank => bank?.storage === 'indexeddb' && bank.hydrated === false)) {
    return ensureBanksHydrated(source).then(hydrated => startHydratedPractice(options, hydrated));
  }
  return startHydratedPractice(options, source);
}

function startHydratedPractice({ subject, title, subtitle, shuffled, reviewMode = false, forceNew = false, path = [], returnPath = null }, source) {
  const questions = buildQuestionSet(source);
  releaseHydratedLargeBanks();
  if (!questions.length) return;
  const scopeKey = makeBankScopeKey(subject, source, reviewMode, shuffled);
  const bankIds = source.map(bank => bank.id);
  if (!forceNew) {
    const saved = getSavedSession(scopeKey);
    if (saved) {
      const ordered = shuffled ? shuffleQuestions(questions) : questions;
      return restoreSavedSession(saved, { subject, title, subtitle, questions: ordered, shuffled, reviewMode, scopeKey, bankIds, startAtFirst: Boolean(shuffled), path, returnPath });
    }
  }
  startQuestionPractice({ subject, title, subtitle, questions, shuffled, reviewMode, scopeKey, bankIds, forceNew, path, returnPath });
}

function startQuestionPractice({ subject, title, subtitle, questions, shuffled, reviewMode = false, scopeKey = '', bankIds = [], wrongPractice = false, forceNew = false, path = [], returnPath = null }) {
  if (!questions.length) return;
  clearToast();
  const finalQuestions = shuffled ? shuffleQuestions(questions) : questions;
  const finalScopeKey = scopeKey || makeQuestionScopeKey(subject, questions, reviewMode, title, shuffled);
  const answerModeKey = getAnswerModeKey(shuffled, reviewMode, wrongPractice);
  if (forceNew) removeScopedProgress(finalScopeKey);
  if (forceNew) clearGlobalAnswersForQuestions(questions, answerModeKey);
  pushRoute();
  state.activeSubject = subject;
  state.activePath = normalizePath(path || (subject ? [subject] : []));
  state.activeSession = {
    title,
    subtitle,
    subject,
    path: state.activePath,
    returnPath: returnPath === null ? state.activePath : normalizePath(returnPath),
    shuffled,
    reviewMode,
    questions: finalQuestions,
    scopeKey: finalScopeKey,
    bankIds,
    wrongPractice,
  };
  state.currentIndex = 0;
  state.answers = shouldAutoPersistAnswers({ shuffled, reviewMode, wrongPractice, questions: finalQuestions })
    ? mapQuestionKeysToIndices(finalQuestions, getGlobalAnswersForQuestions(finalQuestions, answerModeKey))
    : {};
  state.drafts = {};
  state.revealedAnswers = {};
  state.reviewMode = Boolean(reviewMode);
  applyReviewPosition(state.activeSession);
  state.view = 'quiz';
  renderQuiz();
}

function normalizeAnswer(q, value) {
  const t = getType(q);
  const raw = String(value ?? '').trim();
  const upper = raw.toUpperCase();

  if (t === 'bool') {
    if (['A', 'TRUE', 'T', 'YES', 'Y', '1', '对', '正确', '是', '√', '✓'].includes(upper) || ['对', '正确', '是', '√', '✓'].includes(raw)) return 'A';
    if (['B', 'FALSE', 'F', 'NO', 'N', '0', '错', '错误', '否', '×', '✗'].includes(upper) || ['错', '错误', '否', '×', '✗'].includes(raw)) return 'B';
  }

  return upper.split('').filter(c => c >= 'A' && c <= 'Z').sort().join('');
}

function getCorrectAnswer(q) {
  return normalizeAnswer(q, q.ans || q.rawAns || q.answer);
}

function getAnswerLabel(q) {
  const ans = getCorrectAnswer(q);
  if (getType(q) === 'bool') return ans === 'A' ? '对' : '错';
  if (getType(q) === 'subjective') return ans || '见内置解析';
  return ans;
}

function checkAnswer(q, userAns) {
  if (getType(q) === 'subjective') return String(userAns || '') === '__mastered__';
  return normalizeAnswer(q, userAns) === getCorrectAnswer(q);
}

// ========== Import ==========
function importJSON(jsonStr, targetPath = null, options = {}) {
  try {
    const data = JSON.parse(jsonStr);
    const bank = normalizeBank(data, `import:${Date.now()}`, false);
    if (!bank.questions.length) {
      showNotice('未找到有效题目');
      return false;
    }
    const pendingPath = normalizePath(state.pendingImportPath);
    const activePath = normalizePath(state.activePath);
    const requestedPath = targetPath !== null
      ? targetPath
      : (pendingPath.length ? pendingPath : (activePath.length ? activePath : bank.path));
    let importPath = normalizePath(requestedPath);
    if (!importPath.length) {
      if (options.silent) importPath = [bank.name || '导入题库'];
      else {
      askText('请输入主页题库标题', bank.name || '新题库', title => importJSON(jsonStr, [title]));
      return false;
      }
    }
    setBankPath(bank, importPath);
    bank.name = pathTitle(importPath);
    ensureLibraryPath(importPath);
    const existingIndex = state.banks.findIndex(item => !item.bundled && item.id === bank.id);
    if (existingIndex >= 0) state.banks[existingIndex] = bank;
    else state.banks.push(bank);
    if (!options.deferSave) saveBanks();
    saveBankMeta();
    state.activePath = importPath;
    state.activeSubject = importPath[0] || '';
    importPath.length ? renderSubject() : renderHome();
    return true;
  } catch(e) {
    showNotice('JSON 解析失败：' + e.message);
    return false;
  }
}

function openLibraryPath(path) {
  pushRoute();
  state.view = 'subjects';
  state.activePath = normalizePath(path);
  state.activeSubject = state.activePath[0] || '';
  renderSubject();
}

function createLibraryNode(parent = []) {
  const base = normalizePath(parent);
  askText('请输入新层级名称', '', name => {
    const path = [...base, String(name).trim()].filter(Boolean);
    if (!path.length) return;
    ensureLibraryPath(path);
    state.activePath = base;
    showToast('已创建层级');
    if (base.length) renderSubject();
    else renderHome();
  });
}

function renameLibraryPath(path) {
  const oldPath = normalizePath(path);
  if (!oldPath.length) return;
  askText('请输入新的名称', pathTitle(oldPath), nextName => {
    const newPath = [...parentPath(oldPath), String(nextName).trim()].filter(Boolean);
    if (!newPath.length || samePath(oldPath, newPath)) return;
    state.libraryNodes.forEach(node => {
      if (isPathPrefix(oldPath, node.path)) node.path = [...newPath, ...normalizePath(node.path).slice(oldPath.length)];
    });
    state.banks.forEach(bank => {
      const bankPath = getBankPath(bank);
      if (!isPathPrefix(oldPath, bankPath)) return;
      setBankPath(bank, [...newPath, ...bankPath.slice(oldPath.length)]);
      rememberBankMeta(bank);
    });
    ensureLibraryPath(newPath);
    saveLibraryNodes();
    saveBanks();
    showToast('名称已更新');
    state.activePath = samePath(state.activePath, oldPath) ? newPath : state.activePath;
    if (state.activePath.length) renderSubject();
    else renderHome();
  });
}

function cloneData(value) {
  return JSON.parse(JSON.stringify(value));
}

function makeRecycleStoragePath(id) {
  const safeId = String(id || `recycle-${Date.now()}`).replace(/[^a-zA-Z0-9_-]/g, '_');
  return `${RECYCLE_STORAGE_DIRECTORY}${safeId}.json`;
}

function addRecycleItem(item) {
  const id = `recycle:${Date.now()}:${Math.random().toString(36).slice(2)}`;
  const deletedAt = Date.now();
  state.recycleBin.unshift({
    id,
    deletedAt,
    storagePath: item.storagePath || makeRecycleStoragePath(id),
    ...item,
  });
  saveRecycleBin();
}

function markBankHidden(bankId, hidden = true) {
  if (!bankId) return;
  const current = state.bankMeta[bankId] || {};
  state.bankMeta[bankId] = { ...current, hidden, updatedAt: Date.now() };
}

function deleteLibraryPath(path) {
  const target = normalizePath(path);
  if (!target.length) return;
  const banks = getDescendantBanks(target);
  const bundledCount = banks.filter(bank => bank.bundled).length;
  const message = bundledCount
    ? `删除“${pathTitle(target)}”？其中 ${bundledCount} 个内置题库会先在本机隐藏，并进入回收站。`
    : `删除“${pathTitle(target)}”及其下 ${banks.length} 个导入题库？删除后会先进入回收站。`;
  askConfirm(message, () => {
    const descendantNodes = state.libraryNodes.filter(node => isPathPrefix(target, node.path));
    const importedBanks = banks.filter(bank => !bank.bundled);
    const bundledBankIds = banks.filter(bank => bank.bundled).map(bank => bank.id);
    addRecycleItem({
      type: 'path',
      title: pathTitle(target),
      path: target,
      libraryNodes: cloneData(descendantNodes),
      importedBanks: [],
      importedBankIds: importedBanks.map(bank => bank.id),
      bundledBankIds,
      bankMeta: cloneData(Object.fromEntries(banks.map(bank => [bank.id, state.bankMeta[bank.id] || null]))),
    });
    state.libraryNodes = state.libraryNodes.filter(node => !isPathPrefix(target, node.path));
    banks.forEach(bank => markBankHidden(bank.id, true));
    saveLibraryNodes();
    saveBankMeta();
    saveBanks();
    state.activePath = parentPath(target);
    showToast('已移入回收站');
    state.activePath.length ? renderSubject() : renderHome();
  });
}

function renameBank(bankId) {
  const bank = state.banks.find(item => item.id === bankId);
  if (!bank) return;
  askText('请输入题库显示名称', bank.name || pathTitle(getBankPath(bank)), name => {
    bank.name = String(name).trim();
    rememberBankMeta(bank);
    saveBanks();
    state.activePath.length ? renderSubject() : renderHome();
  });
}

function moveBank(bankId) {
  const bank = state.banks.find(item => item.id === bankId);
  if (!bank) return;
  const current = getBankPath(bank).join(' / ');
  askText('请输入新的层级路径，用 / 分隔', current, text => {
    const path = normalizePath(text);
    if (!path.length) return;
    setBankPath(bank, path);
    ensureLibraryPath(path);
    rememberBankMeta(bank);
    saveBanks();
    showToast('题库路径已更新');
    state.activePath.length ? renderSubject() : renderHome();
  });
}

function deleteBank(bankId) {
  const bank = state.banks.find(item => item.id === bankId);
  if (!bank) return;
  if (bank.bundled) {
    askConfirm('内置题库会在本机隐藏并进入回收站，APK 内置资源不会被物理删除。继续？', () => {
      addRecycleItem({
        type: 'bank',
        title: bank.name || pathTitle(getBankPath(bank)),
        path: getBankPath(bank),
        bundledBankIds: [bank.id],
        importedBanks: [],
        libraryNodes: [],
        bankMeta: cloneData({ [bank.id]: state.bankMeta[bank.id] || null }),
      });
      markBankHidden(bank.id, true);
      saveBankMeta();
      state.activePath.length ? renderSubject() : renderHome();
    });
    return;
  }
  askConfirm(`删除题库“${bank.name}”？删除后会先进入回收站。`, () => {
    addRecycleItem({
      type: 'bank',
      title: bank.name || pathTitle(getBankPath(bank)),
      path: getBankPath(bank),
      importedBanks: [],
      importedBankIds: [bank.id],
      bundledBankIds: [],
      libraryNodes: [],
      bankMeta: cloneData({ [bank.id]: state.bankMeta[bank.id] || null }),
    });
    markBankHidden(bank.id, true);
    saveBankMeta();
    saveBanks();
    state.activePath.length ? renderSubject() : renderHome();
  });
}

function restoreRecycleItem(id) {
  const item = state.recycleBin.find(entry => entry.id === id);
  if (!item) return;
  (item.libraryNodes || []).forEach(node => {
    if (node?.path?.length && !state.libraryNodes.some(existing => samePath(existing.path, node.path))) {
      state.libraryNodes.push(node);
    }
  });
  (item.importedBanks || []).forEach(bank => {
    if (bank?.id && !state.banks.some(existing => existing.id === bank.id)) {
      state.banks.push(normalizeBank(bank, bank.id, false));
    }
  });
  (item.importedBankIds || []).forEach(bankId => markBankHidden(bankId, false));
  Object.entries(item.bankMeta || {}).forEach(([bankId, meta]) => {
    if (meta) state.bankMeta[bankId] = { ...meta, hidden: false, updatedAt: Date.now() };
    else if (state.bankMeta[bankId]) state.bankMeta[bankId].hidden = false;
    else state.bankMeta[bankId] = { hidden: false, updatedAt: Date.now() };
  });
  (item.bundledBankIds || []).forEach(bankId => markBankHidden(bankId, false));
  if (item.path?.length) ensureLibraryPath(item.path);
  state.recycleBin = state.recycleBin.filter(entry => entry.id !== id);
  saveRecycleBin();
  saveLibraryNodes();
  saveBankMeta();
  saveBanks();
  showToast('已从回收站恢复');
  renderSettings();
}

function purgeRecycleItem(id) {
  const item = state.recycleBin.find(entry => entry.id === id);
  if (!item) return;
  askConfirm(`永久删除回收站中的“${item.title || '项目'}”？此操作不能撤回。`, () => {
    const importedBankIds = new Set(item.importedBankIds || []);
    if (importedBankIds.size) {
      state.banks = state.banks.filter(bank => !importedBankIds.has(bank.id));
      importedBankIds.forEach(bankId => delete state.bankMeta[bankId]);
      saveBankMeta();
      saveBanks();
    }
    state.recycleBin = state.recycleBin.filter(entry => entry.id !== id);
    saveRecycleBin();
    showToast('已永久删除');
    renderSettings();
  });
}

  return JSON.stringify(normalizePath(path)).replace(/"/g, '&quot;');
}

function jsStringArg(value) {
  return JSON.stringify(String(value ?? '')).replace(/"/g, '&quot;');
}

function renderChoiceSelect(id, value, options, action = '') {
  const normalizedOptions = Array.isArray(options) ? options : [];
  const current = normalizedOptions.find(item => String(item.value) === String(value)) || normalizedOptions[0] || { value: '', label: '' };
  return `
    <div class="choice-select" data-choice-id="${escapeAttr(id)}">
      <input type="hidden" id="${escapeAttr(id)}" value="${escapeAttr(current.value)}">
      <button type="button" class="choice-trigger" aria-haspopup="listbox" aria-expanded="false" onclick="toggleChoiceSelect(event, ${jsStringArg(id)})">
        <span id="${escapeAttr(id)}Label">${escapeHtml(current.label)}</span>
        <span class="chevron" aria-hidden="true"></span>
      </button>
      <div class="choice-menu" id="${escapeAttr(id)}Menu" role="listbox">
        ${normalizedOptions.map(item => `
          <button type="button" role="option" aria-selected="${String(item.value) === String(current.value) ? 'true' : 'false'}" class="choice-option ${String(item.value) === String(current.value) ? 'active' : ''}" data-choice-value="${escapeAttr(item.value)}" onclick="selectChoiceValue(event, ${jsStringArg(id)}, ${jsStringArg(item.value)}, ${jsStringArg(action)})">${escapeHtml(item.label)}</button>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleChoiceSelect(event, id) {
  event?.stopPropagation();
  const root = Array.from(document.querySelectorAll('.choice-select')).find(item => item.dataset.choiceId === String(id));
  const willOpen = root && !root.classList.contains('open');
  closeChoiceSelects();
  if (root && willOpen) root.classList.add('open');
  if (root) root.querySelector('.choice-trigger')?.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
}

function closeChoiceSelects() {
  document.querySelectorAll('.choice-select.open').forEach(item => {
    item.classList.remove('open');
    item.querySelector('.choice-trigger')?.setAttribute('aria-expanded', 'false');
  });
}

async function selectChoiceValue(event, id, value, action = '') {
  event?.stopPropagation();
  const root = Array.from(document.querySelectorAll('.choice-select')).find(item => item.dataset.choiceId === String(id));
  const input = document.getElementById(id);
  if (input) input.value = value;
  const selected = Array.from(root?.querySelectorAll('.choice-option') || [])
    .find(btn => String(btn.dataset.choiceValue || '') === String(value));
  const label = selected?.textContent?.trim() || value;
  const labelEl = document.getElementById(`${id}Label`);
  if (labelEl) labelEl.textContent = label;
  root?.querySelectorAll('.choice-option').forEach(btn => {
    const active = String(btn.dataset.choiceValue || '') === String(value);
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-selected', active ? 'true' : 'false');
  });
  input?.dispatchEvent(new Event('change', { bubbles: true }));
  closeChoiceSelects();
  if (action === 'theme') {
    state.uiConfig.theme = value || state.uiConfig.theme;
    applyUiConfig();
  } else if (action === 'chapterLayout') {
    state.uiConfig.chapterActionLayout = value || state.uiConfig.chapterActionLayout;
  } else if (action === 'answerSubject') {
    await ensureBanksHydrated(value ? getBanksBySubject(value) : getVisibleBanks());
    state.answerLookupAllQuestions = [];
    state.answerLookupLoadedSubject = null;
    state.answerLookupContext.subject = value;
    state.answerLookupContext.chapter = '';
    state.answerLookupContext.scrollTop = 0;
    saveAnswerLookupPosition();
    renderAnswerLookup();
  } else if (action === 'answerChapter') {
    state.answerLookupContext.chapter = value;
    state.answerLookupContext.scrollTop = 0;
    saveAnswerLookupPosition();
    renderAnswerLookup();
  } else if (action === 'studyScope') {
    selectStudyScope(value, 'dropdown');
  } else if (action === 'aiProvider') {
    applyAiProviderPreset(value);
  } else if (action === 'ocrModelSource') {
    toggleNotebookOcrCustomSource(value);
  }
}

// ========== AI views ==========
function openAiChat(options = {}) {
  pushRoute();
  if (options.newThread || options.context) {
    createAiThread({
      title: options.title || (options.context?.question ? String(options.context.question).slice(0, 28) : '新对话'),
      context: options.context || null,
      messages: options.messages || [],
    });
  } else {
    getActiveAiThread(true);
  }
  state.aiHistoryOpen = false;
  state.aiDraft = '';
  renderAiChat();
}

function startNewAiChat() {
  if (state.aiAbortController) state.aiAbortController.abort();
  createAiThread();
  state.aiPendingAttachments = [];
  state.aiDraft = '';
  state.aiHistoryOpen = false;
  renderAiChat();
}

function openAiSettings() {
  pushRoute();
  state.aiHistoryOpen = false;
  renderAiSettings();
}

function openAiThread(id) {
  if (!state.aiThreads.some(thread => thread.id === id)) return;
  state.activeAiThreadId = id;
  state.aiPendingAttachments = [];
  state.aiDraft = '';
  state.aiHistoryOpen = false;
  renderAiChat();
}

function deleteAiThread(id) {
  const thread = state.aiThreads.find(item => item.id === id);
  if (!thread) return;
  askConfirm(`删除对话“${getAiThreadTitle(thread)}”？`, () => {
    state.aiThreads = state.aiThreads.filter(item => item.id !== id);
    if (state.activeAiThreadId === id) state.activeAiThreadId = state.aiThreads[0]?.id || '';
    if (!state.aiThreads.length) createAiThread();
    saveAiThreads();
    renderAiChat();
  });
}

function toggleAiHistory() {
  state.aiHistoryOpen = !state.aiHistoryOpen;
  const pane = document.getElementById('aiHistoryPane');
  if (pane) pane.classList.toggle('open', state.aiHistoryOpen);
}

function renderAiHistoryPane(thread) {
  const sorted = state.aiThreads.slice().sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
  return `
    <aside class="ai-history-pane ${state.aiHistoryOpen ? 'open' : ''}" id="aiHistoryPane">
      <div class="ai-history-head">
        <strong>对话记录</strong>
        <button onclick="startNewAiChat()">新建</button>
      </div>
      <div class="ai-thread-list">
        ${sorted.map(item => `
          <div class="ai-thread-item ${item.id === thread?.id ? 'active' : ''}" onclick="openAiThread('${escapeAttr(item.id)}')">
            <div class="copy">
              <strong>${escapeHtml(getAiThreadTitle(item))}</strong>

function formatAiThreadTime(value) {
  const date = new Date(Number(value || Date.now()));
  const today = new Date();
  if (date.toDateString() === today.toDateString()) {
    return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }
  return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
}

              <button class="${generating ? 'stop' : 'send'}" onclick="${generating ? 'stopAiGeneration()' : 'sendAiMessage()'}" aria-label="${generating ? '停止生成' : '发送'}">${generating ? '■' : '↑'}</button>
            </div>

function autoResizeAiComposer(element) {
  if (!element) return;
  element.style.height = 'auto';
  element.style.height = `${Math.min(132, Math.max(42, element.scrollHeight))}px`;
}

function handleAiComposerKeydown(event) {
  if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
    event.preventDefault();
    sendAiMessage();
  }
}

function removeAiPendingAttachment(index) {
  state.aiPendingAttachments.splice(index, 1);
  renderAiChat();
}

function readAiFile(file, mode) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(reader.error || new Error('读取附件失败'));
    if (mode === 'dataUrl') reader.readAsDataURL(file);
    else reader.readAsText(file, 'utf-8');
  });
}

function isAiTextFile(file) {
  const name = String(file.name || '').toLowerCase();
  return String(file.type || '').startsWith('text/')
    || /\.(txt|md|json|csv|html?|xml|ya?ml|log|js|ts|css|py|java|c|cpp|h)$/i.test(name)
    || file.type === 'application/json';
}

async function handleAiAttachmentInput(input) {
  const files = Array.from(input.files || []).slice(0, Math.max(0, 4 - state.aiPendingAttachments.length));
  input.value = '';
  for (const file of files) {
    try {
      const base = {
        id: `attachment:${Date.now()}:${Math.random().toString(36).slice(2)}`,
        name: file.name || '附件',
        type: file.type || 'application/octet-stream',
        size: file.size || 0,
        kind: 'file',
        text: '',
        dataUrl: '',
      };
      if (String(file.type || '').startsWith('image/')) {
        if (file.size > 8 * 1024 * 1024) {
          showToast(`${file.name} 超过 8MB`);
          continue;
        }
        base.kind = 'image';
        base.dataUrl = await readAiFile(file, 'dataUrl');
      } else if (isAiTextFile(file)) {
        if (file.size > 1024 * 1024) {
          showToast(`${file.name} 超过 1MB`);
          continue;
        }
        base.kind = 'text';
        base.text = (await readAiFile(file, 'text')).slice(0, 30000);
      }
      state.aiPendingAttachments.push(base);
    } catch(e) {
      showToast(`${file.name || '附件'} 读取失败`);
    }
  }
  renderAiChat();
}

function updateStreamingAiMessage(message) {
  const element = document.getElementById(`ai-message-${message.id}`);
  const content = element?.querySelector('.ai-message-content');
  if (content) content.innerHTML = renderAiMarkdown(message.content || '正在生成…');
  const list = document.getElementById('aiMessageList');
  if (list && list.scrollHeight - list.scrollTop - list.clientHeight < 180) list.scrollTop = list.scrollHeight;
}

async function sendAiMessage() {
  if (state.aiAbortController) return;
  const input = document.getElementById('aiComposer');
  const content = String(input?.value ?? state.aiDraft ?? '').trim();
  if (!content && !state.aiPendingAttachments.length) return;
  try {
    validateAiConnectionConfig();
  } catch(e) {
    showNotice(e.message);
    return openAiSettings();
  }
  const thread = getActiveAiThread(true);
  const userMessage = {
    id: `message:${Date.now()}:${Math.random().toString(36).slice(2)}`,
    role: 'user',
    content,
    attachments: state.aiPendingAttachments.splice(0),
    createdAt: Date.now(),
  };
  thread.messages.push(userMessage);
  renameAiThreadFromContent(thread);
  thread.updatedAt = Date.now();
  state.aiDraft = '';
  const requestMessages = getAiRequestMessages(thread);
  const assistantMessage = {
    id: `message:${Date.now()}:${Math.random().toString(36).slice(2)}`,
    role: 'assistant',
    content: '',
    attachments: [],
    createdAt: Date.now(),
    model: state.aiConfig.model,
    usage: null,
    error: false,
  };
  thread.messages.push(assistantMessage);
  const controller = new AbortController();
  state.aiAbortController = controller;
  renderAiChat();
  try {
    const result = await requestAiCompletion(requestMessages, {
      controller,
      onDelta: value => {
        assistantMessage.content = value;
        updateStreamingAiMessage(assistantMessage);
      },
    });
    assistantMessage.content = result.content || assistantMessage.content || '模型没有返回文本内容。';
    assistantMessage.usage = result.usage || null;
  } catch(e) {
    if (e.name === 'AbortError') {
      assistantMessage.content = assistantMessage.content || '已停止生成。';
    } else {
      assistantMessage.error = true;
      assistantMessage.content = `请求失败：${e.message || e}`;
    }
  } finally {
    thread.updatedAt = Date.now();
    state.aiAbortController = null;
    saveAiThreads();
    if (state.view === 'aiChat' && state.activeAiThreadId === thread.id) renderAiChat();
  }
}

function stopAiGeneration() {
  if (state.aiAbortController) state.aiAbortController.abort();
}

function applyAiProviderPreset(value) {
  const provider = AI_PROVIDER_PRESETS[value] ? value : 'custom';
  state.aiConfig.provider = provider;
  const preset = AI_PROVIDER_PRESETS[provider];
  const baseInput = document.getElementById('aiBaseUrl');
  const modelInput = document.getElementById('aiModel');
  if (provider !== 'custom') {
    state.aiConfig.baseUrl = preset.baseUrl;
    state.aiConfig.model = preset.model;
    if (baseInput) baseInput.value = preset.baseUrl;
    if (modelInput) modelInput.value = preset.model;
  }
}

function readAiSettingsForm() {
  const value = id => document.getElementById(id)?.value;
  state.aiConfig.provider = value('aiProvider') || state.aiConfig.provider;
  state.aiConfig.baseUrl = value('aiBaseUrl') ?? state.aiConfig.baseUrl;

async function refreshAiModels() {
  readAiSettingsForm();
  const status = document.getElementById('aiModelStatus');
  if (status) status.textContent = '正在读取模型列表…';
  try {
    if (!state.aiConfig.baseUrl) throw new Error('请填写 API 地址');
    if (!state.aiConfig.apiKey) throw new Error('请填写 API Key');
    const response = await fetch(getAiModelsEndpoint(), {
      cache: 'no-store',
      headers: { 'Authorization': `Bearer ${state.aiConfig.apiKey}` },
    });
    if (!response.ok) throw new Error(`API 返回 ${response.status}`);
    const data = await response.json();
    const models = (Array.isArray(data?.data) ? data.data : Array.isArray(data) ? data : [])
      .map(item => String(item?.id || item?.name || item || '').trim())
      .filter(Boolean);
    if (!models.length) throw new Error('接口没有返回可用模型');
    state.aiConfig.modelOptions = Array.from(new Set(models)).sort();
    if (!state.aiConfig.model) state.aiConfig.model = state.aiConfig.modelOptions[0];
    saveAiConfig();
    const datalist = document.getElementById('aiModelList');
    if (datalist) datalist.innerHTML = state.aiConfig.modelOptions.map(model => `<option value="${escapeAttr(model)}"></option>`).join('');
    const modelInput = document.getElementById('aiModel');
    if (modelInput && !modelInput.value) modelInput.value = state.aiConfig.model;
    if (status) status.textContent = `已读取 ${state.aiConfig.modelOptions.length} 个模型`;
  } catch(e) {
    if (status) status.textContent = `读取失败：${e.message || e}`;
  }
}

async function testAiConnection() {
  readAiSettingsForm();
  const status = document.getElementById('aiModelStatus');
  if (status) status.textContent = '正在测试连接…';
  try {
    const result = await requestAiCompletion([
      { role: 'system', content: '只回复“连接成功”。' },
      { role: 'user', content: '测试连接' },
    ], { stream: false });
    if (status) status.textContent = result.content ? `连接成功：${result.content.slice(0, 40)}` : '连接成功';
  } catch(e) {
    if (status) status.textContent = `连接失败：${e.message || e}`;
  }
}

function getStudyConsoleContext(subjectGroups = getSubjectGroups()) {
  const availableSubjects = subjectGroups.map(group => group.subject);
  if (!availableSubjects.includes(state.studySubject)) state.studySubject = availableSubjects[0] || '';
  const subject = state.studySubject;
  const subjectPath = subject ? [subject] : [];
  if (!isPathPrefix(subjectPath, state.studyScopePath) || !getDescendantBanks(state.studyScopePath).length) {
    state.studyScopePath = subjectPath;
  }
  const selectedPath = normalizePath(state.studyScopePath);
  const scopeBanks = getDescendantBanks(selectedPath);
  const scopeKeys = new Set(getQuestionKeysForBanks(scopeBanks));
  const scopeQuestionCount = scopeKeys.size;
  const answered = new Set([
    ...Object.keys(state.answerState.sequence || {}).filter(key => scopeKeys.has(key)),
    ...Object.keys(state.answerState.random || {}).filter(key => scopeKeys.has(key)),
  ]).size;
  const immediatePaths = [
    ...getLibraryChildren(subjectPath).map(child => child.path),
    ...getBanksAtPath(subjectPath).map(getBankPath),
  ];
  const seen = new Set([pathKey(subjectPath)]);
  const scopes = [{ path: subjectPath, label: '全科', count: getDescendantBanks(subjectPath).reduce((sum, bank) => sum + getBankQuestionCount(bank), 0) }];
  immediatePaths.forEach(path => {
    const key = pathKey(path);
    if (!path.length || seen.has(key)) return;
    seen.add(key);
    scopes.push({ path, label: path[path.length - 1], count: getDescendantBanks(path).reduce((sum, bank) => sum + getBankQuestionCount(bank), 0) });
  });
  const subjectStats = getSubjectStudyStats().find(item => item.subject === subject) || {
    total: scopeQuestionCount, completed: 0, sequence: 0, random: 0, percent: 0, seconds: 0, todaySeconds: 0, wrong: 0, banks: scopeBanks.length,
  };
  return {
    subject,
    subjectStats,
    selectedPath,
    selectedLabel: pathTitle(selectedPath) || subject || '暂无科目',
    scopeQuestionCount,
    scopeAnswered: answered,
    scopePercent: scopeQuestionCount ? Math.round(answered / scopeQuestionCount * 100) : 0,
    scopeWrong: getWrongRecords({ path: selectedPath }).length,
    subjects: subjectGroups.map(group => ({
      name: group.subject,
      token: encodeURIComponent(group.subject),
      count: group.questionCount,
      active: group.subject === subject,
    })),
    scopes: scopes.map(scope => ({
      ...scope,
      token: encodeURIComponent(JSON.stringify(scope.path)),
      active: pathKey(scope.path) === pathKey(selectedPath),
    })),
  };
}

function selectStudySubject(token) {

function restoreStudyScopeSwitcher(selection = {}) {
  if (!selection.source) return;
  const restore = () => {
    const switcher = document.querySelector('.study-scope-switcher');
    if (!switcher) return;
    if (selection.source === 'switcher') {
      const maxScrollLeft = Math.max(0, switcher.scrollWidth - switcher.clientWidth);
      switcher.scrollLeft = Math.min(maxScrollLeft, Math.max(0, Number(selection.scrollLeft) || 0));
      return;
    }
    const active = switcher.querySelector('.study-scope-chip.active');
    if (!active) return;
    const switcherRect = switcher.getBoundingClientRect();
    const activeRect = active.getBoundingClientRect();
    if (activeRect.left < switcherRect.left) {
      switcher.scrollLeft += activeRect.left - switcherRect.left;
    } else if (activeRect.right > switcherRect.right) {
      switcher.scrollLeft += activeRect.right - switcherRect.right;
    }
  };
  restore();
  requestAnimationFrame(restore);
}

function selectStudyScope(token, source = 'switcher') {
  try {
    const path = normalizePath(JSON.parse(decodeURIComponent(String(token || ''))));
    if (!path.length || path[0] !== state.studySubject || !getDescendantBanks(path).length) return;
    const switcher = document.querySelector('.study-scope-switcher');
    const scrollLeft = switcher ? switcher.scrollLeft : 0;
    state.studyScopePath = path;
    renderHome({ studyScopeSelection: { source, scrollLeft } });
  } catch(e) {}
}

function getWrongReasonStats() {
  const labels = new Map(WRONG_REASON_OPTIONS);
  const counts = new Map(WRONG_REASON_OPTIONS.map(([key]) => [key, 0]));
  let tagged = 0;
  getWrongRecords().forEach(record => {
    const tags = Array.isArray(record.reasonTags) ? [...new Set(record.reasonTags)] : [];
    if (tags.length || record.reasonNote) tagged += 1;
    tags.forEach(tag => {
      if (counts.has(tag)) counts.set(tag, counts.get(tag) + 1);
    });
  });
  const rows = [...counts.entries()].map(([key, count]) => ({ key, label: labels.get(key), count })).sort((a, b) => b.count - a.count);
  return { total: getWrongRecords().length, tagged, rows, top: rows.find(item => item.count > 0) || null };
}

function renderStudyChartSvg(rows) {
  const shouldAnimate = Boolean(state.studyChartAnimate);
  state.studyChartAnimate = false;
  const width = 320;
  const height = 150;
  const left = 18;
  const top = 14;
  const chartWidth = 284;
  const chartHeight = 108;
  const maxSeconds = Math.max(60, ...rows.map(item => item.seconds));
  const points = rows.map((item, index) => {
    const x = rows.length <= 1 ? left + chartWidth : left + (chartWidth * index) / (rows.length - 1);
    const y = top + chartHeight - (item.seconds / maxSeconds) * chartHeight;
    return { x, y, seconds: item.seconds, label: item.label };
  });
  const path = buildSmoothPath(points);
  const selectedIndex = rows.findIndex(item => item.key === state.studyChartSelectedKey);
  const selectedPoint = selectedIndex >= 0 ? points[selectedIndex] : null;
  const hitAreas = points.map((point, index) => {
    const startX = index === 0 ? left : (points[index - 1].x + point.x) / 2;
    const endX = index === points.length - 1 ? left + chartWidth : (point.x + points[index + 1].x) / 2;
    return `
      <rect class="study-chart-hit" x="${startX.toFixed(1)}" y="${top}" width="${Math.max(1, endX - startX).toFixed(1)}" height="${chartHeight}" onclick="event.stopPropagation();selectStudyChartPoint(${index})">
        <title>${escapeHtml(rows[index].label)} · ${escapeHtml(formatStudyDuration(rows[index].seconds))}</title>
      </rect>
    `;
  }).join('');
  const dots = points.map((point, index) => `
    <circle class="study-chart-dot ${point.seconds ? 'active' : ''} ${selectedIndex === index ? 'selected' : ''}" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="${selectedIndex === index ? 4.8 : point.seconds ? 3.6 : 2.7}" onclick="event.stopPropagation();selectStudyChartPoint(${index})">
      <title>${escapeHtml(rows[index].label)} · ${escapeHtml(formatStudyDuration(rows[index].seconds))}</title>
    </circle>
  `).join('');
  const selectedOverlay = selectedPoint ? (() => {
    const tooltipWidth = 82;
    const tooltipHeight = 33;
    const tooltipX = Math.max(4, Math.min(width - tooltipWidth - 4, selectedPoint.x - tooltipWidth / 2));
    const tooltipY = selectedPoint.y < top + tooltipHeight + 8
      ? selectedPoint.y + 12
      : selectedPoint.y - tooltipHeight - 10;
    const row = rows[selectedIndex];
    return `
      <line class="study-chart-marker" x1="${selectedPoint.x.toFixed(1)}" y1="${top}" x2="${selectedPoint.x.toFixed(1)}" y2="${top + chartHeight}"></line>
      <g class="study-chart-tooltip" transform="translate(${tooltipX.toFixed(1)} ${tooltipY.toFixed(1)})">
        <rect width="${tooltipWidth}" height="${tooltipHeight}" rx="8"></rect>
        <text x="9" y="13">${escapeHtml(row.label)}</text>
        <text x="9" y="27">${escapeHtml(formatStudyDuration(row.seconds))}</text>
      </g>
    `;
  })() : '';
  return `
    <svg class="study-chart-svg ${shouldAnimate ? 'chart-enter' : ''}" viewBox="0 0 ${width} ${height}" role="img" aria-label="学习时长曲线图">
      <line class="study-chart-grid" x1="${left}" y1="${top}" x2="${left + chartWidth}" y2="${top}"></line>
      <line class="study-chart-grid" x1="${left}" y1="${top + chartHeight / 2}" x2="${left + chartWidth}" y2="${top + chartHeight / 2}"></line>
      <line class="study-chart-grid" x1="${left}" y1="${top + chartHeight}" x2="${left + chartWidth}" y2="${top + chartHeight}"></line>
      ${hitAreas}
      <path class="study-chart-line" d="${path}"></path>
      ${dots}
      ${selectedOverlay}
    </svg>
  `;
}

    rows.push({ name: pathCrumbs(node.path || []), type: '层级' });
  });
  (item.importedBanks || []).forEach(bank => {
    if (bank?.id) renderedBankIds.add(bank.id);
    const bankPath = pathCrumbs(getBankPath(bank || {}));
    rows.push({
      name: recycleBankName(bank),
      type: `${getBankQuestionCount(bank)} 题 · 导入题库${bankPath ? ` · ${bankPath}` : ''}`,
    });
  });
  (item.importedBankIds || []).forEach(bankId => {
    if (renderedBankIds.has(bankId)) return;
    const bank = state.banks.find(entry => entry.id === bankId);
    const bankPath = bank ? pathCrumbs(getBankPath(bank)) : pathCrumbs(item.path || []);
    rows.push({
      name: bank ? recycleBankName(bank) : String(bankId).replace(/^imported:/, ''),
      type: bank
        ? `${getBankQuestionCount(bank)} 题 · 导入题库${bankPath ? ` · ${bankPath}` : ''}`
        : `导入题库索引${bankPath ? ` · ${bankPath}` : ''}`,
    });
  });
  (item.bundledBankIds || []).forEach(bankId => {
    const bank = state.banks.find(entry => entry.id === bankId);
    rows.push({ name: bank?.name || String(bankId).replace(/^bundled:/, ''), type: '内置题库隐藏项' });

function formatBackupBytes(bytes) {
  const value = Math.max(0, Number(bytes || 0));
  if (value < 1024) return `${value} B`;
  if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
  if (value < 1024 * 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)} MB`;
  return `${(value / 1024 / 1024 / 1024).toFixed(2)} GB`;
}

function formatBackupTime(value) {
  const date = new Date(value || 0);
  return Number.isNaN(date.getTime()) ? '未知时间' : date.toLocaleString('zh-CN', { hour12: false });

async function exportCompleteBackup(includeSecrets = false) {
  showBackupOperationDialog('导出完整备份', '正在保存当前学习状态');
  try {
    await preparePersistentDataForBackup();
    const backup = await QuizBackup.create({
      appVersion: APP_VERSION,
      buildCommit: APP_BUILD_COMMIT,
      databaseName: INK_DB_NAME,
      includeSecrets,
      onProgress: updateBackupOperation,
    });
    const text = QuizBackup.stringify(backup);
    const filename = makeBackupFilename();
    if (window.QuizAppNative && typeof window.QuizAppNative.chooseBackupDestination === 'function') {
      state.pendingNativeBackupExport = { text, filename, manifest: backup.manifest };
      updateBackupOperation(100, '请选择备份文件的保存位置');
      window.QuizAppNative.chooseBackupDestination(filename);
      return;
    }
    QuizBackup.download(text, filename);
    closeAppDialog();
    showToast(`备份已导出 · ${formatBackupBytes(new TextEncoder().encode(text).byteLength)}`);
  } catch(error) {
    closeAppDialog();
    showNotice(`备份导出失败：${error.message || error}`);
  }
}

async function streamNativeBackupExport() {
  const pending = state.pendingNativeBackupExport;
  if (!pending) return;
  const text = pending.text;
  const chunkSize = 96 * 1024;
  try {
    for (let offset = 0; offset < text.length;) {
      let end = Math.min(text.length, offset + chunkSize);
      if (end < text.length) {
        const lastCode = text.charCodeAt(end - 1);
        if (lastCode >= 0xD800 && lastCode <= 0xDBFF) end--;
      }
      const ok = window.QuizAppNative.appendBackupChunk(text.slice(offset, end));
      if (ok === false) throw new Error('手机存储写入失败');
      offset = end;
      updateBackupOperation(5 + (offset / text.length) * 92, `正在写入备份 ${Math.round(offset / text.length * 100)}%`);
      await new Promise(resolve => window.setTimeout(resolve, 0));
    }
    const finished = window.QuizAppNative.finishBackupExport();
    if (finished === false) throw new Error('无法完成备份文件写入');
    state.pendingNativeBackupExport = null;
    closeAppDialog();
    showToast('完整备份已保存');
  } catch(error) {
    try { window.QuizAppNative.cancelBackupExport(); } catch(e) {}
    state.pendingNativeBackupExport = null;
    closeAppDialog();
    showNotice(`备份保存失败：${error.message || error}`);
  }
}

window.onNativeBackupDestinationReady = function onNativeBackupDestinationReady(ok, message) {
  if (!ok) {
    state.pendingNativeBackupExport = null;
    closeAppDialog();
    if (message && message !== '已取消保存') showNotice(message);
    else showToast('已取消备份');
    return;
  }
  updateBackupOperation(4, message || '已选择保存位置，开始写入');
  streamNativeBackupExport();
};

function readBackupFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onprogress = event => {
      if (event.lengthComputable) updateBackupOperation(5 + event.loaded / event.total * 42, `正在读取备份 ${Math.round(event.loaded / event.total * 100)}%`);
    };
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(reader.error || new Error('无法读取备份文件'));
    reader.readAsText(file, 'utf-8');
  });
}

async function handleBackupFile(input) {
  const file = input.files?.[0];
  input.value = '';
  if (!file) return;
  showBackupOperationDialog('检查备份文件', '正在读取文件');
  try {
    const text = await readBackupFile(file);
    updateBackupOperation(56, '正在验证格式与校验值');
    const inspection = await QuizBackup.inspect(text);
    if (!inspection.valid) throw new Error('校验值不一致，文件可能已损坏或被修改');
    state.pendingBackupRestore = { text, inspection, fileName: file.name, fileSize: file.size };
    closeAppDialog();
    showBackupRestorePreview();
  } catch(error) {
    state.pendingBackupRestore = null;
    closeAppDialog();
    showNotice(`无法恢复此文件：${error.message || error}`);
  }
}

function showBackupRestorePreview() {
  const candidate = state.pendingBackupRestore;
  if (!candidate) return;
  const { inspection } = candidate;
  const manifest = inspection.backup.manifest || {};
  const counts = inspection.counts || {};
  const stores = Object.entries(counts.recordCounts || {});
  closeAppDialog();
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  mask.innerHTML = `
    <div class="app-dialog announcement-dialog" role="dialog" aria-modal="true" aria-label="恢复备份预览">
      <h3>恢复备份预览</h3>
      <div class="announcement-body">
        <div class="backup-integrity">校验通过 · ${escapeHtml(String(manifest.checksum?.algorithm || '').toUpperCase())}</div>
        ${manifest.includesSecrets ? '<div class="backup-integrity backup-secret-warning">此备份包含 AI API Key，恢复后会覆盖当前密钥。</div>' : '<div class="settings-subtitle">此备份不包含 API Key，恢复时会保留本机当前密钥。</div>'}
        <div class="backup-preview-grid">
          <div><strong>${escapeHtml(manifest.appVersion || '未知')}</strong><small>来源版本</small></div>
          <div><strong>${escapeHtml(formatBackupTime(manifest.createdAt))}</strong><small>备份时间</small></div>
          <div><strong>${escapeHtml(formatBackupBytes(candidate.fileSize || inspection.dataBytes))}</strong><small>文件大小</small></div>
          <div><strong>${counts.localStorageKeys || 0} 项</strong><small>设置与学习记录</small></div>
          <div><strong>${counts.importedBankRecords || 0} 个</strong><small>大型导入题库</small></div>
          <div><strong>${(counts.notebookRecords || 0) + (counts.legacyInkRecords || 0)} 份</strong><small>笔记与旧笔迹</small></div>
        </div>
        <div class="backup-store-list">
          ${stores.length ? stores.map(([name, count]) => `<span>${escapeHtml(name)} · ${count}</span>`).join('') : '<span>无 IndexedDB 记录</span>'}
        </div>
        <p>确认后将用此备份替换当前 QuizApp 本地数据。恢复前会创建内存快照；任一步失败都会自动回滚。</p>
      </div>
      <div class="app-dialog-actions">
        <button class="secondary" type="button">取消</button>
        <button type="button">确认恢复</button>
      </div>
    </div>
  `;
  document.body.appendChild(mask);
  const [cancelButton, confirmButton] = mask.querySelectorAll('.app-dialog-actions button');
  cancelButton.onclick = () => {
    state.pendingBackupRestore = null;
    closeAppDialog();
  };
  confirmButton.onclick = confirmBackupRestore;
  mask.onclick = event => { if (event.target === mask) cancelButton.click(); };
  confirmButton.focus();
}

async function confirmBackupRestore() {
  const candidate = state.pendingBackupRestore;
  if (!candidate) return;
  showBackupOperationDialog('恢复完整备份', '正在重新校验备份');
  try {
    await QuizBackup.restore(candidate.text, {
      databaseName: INK_DB_NAME,
      onProgress: updateBackupOperation,
    });
    state.pendingBackupRestore = null;
    updateBackupOperation(100, '恢复完成，正在重新加载应用');
    window.setTimeout(() => window.location.reload(), 700);
  } catch(error) {
    state.pendingBackupRestore = null;
    closeAppDialog();
    showNotice(error.message || String(error));
  }
}
