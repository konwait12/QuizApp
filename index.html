  return `${prefix}:${window.crypto?.randomUUID?.() || `${Date.now().toString(36)}:${Math.random().toString(36).slice(2)}`}`;
}

function rekeyImportedNotebook(document, assets) {
  const imported = QuizNotebook.normalizeDocument(document);
  const sourceDocumentId = imported.id;
  imported.id = newNotebookImportId('notebook');
  imported.title = `${imported.title}（导入）`;
  imported.kind = 'free';
  imported.binding = null;
  imported.folderId = ['all', 'unfiled'].includes(state.notebookLibraryFolderId) ? '' : state.notebookLibraryFolderId;
  const pageIds = new Map();
  const assetIds = new Map();
  if (imported.cover?.mode === 'image' && imported.cover.assetId) {
    const nextCoverAssetId = newNotebookImportId('cover');
    assetIds.set(imported.cover.assetId, nextCoverAssetId);
    imported.cover.assetId = nextCoverAssetId;
  }
  imported.pages.forEach(page => {
    const oldPageId = page.id;
    page.id = newNotebookImportId('page');
    pageIds.set(oldPageId, page.id);
    page.layers.forEach(layer => {
      layer.id = newNotebookImportId('layer');
      layer.strokes.forEach(stroke => { stroke.id = newNotebookImportId('stroke'); });
    });
    page.activeLayerId = page.layers[0]?.id || '';
    page.objects.forEach(object => { object.id = newNotebookImportId('object'); });
    if (page.background?.assetId) {
      const nextAssetId = newNotebookImportId('asset');
      assetIds.set(page.background.assetId, nextAssetId);
      page.background.assetId = nextAssetId;
    }
  });
  imported.activePageId = pageIds.get(document.activePageId) || imported.pages[0]?.id || '';
  if (imported.cover?.mode === 'page') imported.cover.pageId = pageIds.get(imported.cover.pageId) || imported.activePageId;
  imported.bookmarks = (imported.bookmarks || []).map(bookmark => ({ ...bookmark, id: newNotebookImportId('bookmark'), pageId: pageIds.get(bookmark.pageId) || imported.activePageId }));
  imported.createdAt = Date.now();
  imported.updatedAt = Date.now();
  const importedAssets = (assets || []).map(asset => ({
    ...asset,
    id: assetIds.get(asset.id) || newNotebookImportId('asset'),
    documentId: imported.id,
    pageId: asset.role === 'cover' ? '' : (pageIds.get(asset.pageId) || imported.activePageId),
  }));
  return { document: imported, assets: importedAssets, sourceDocumentId };
}

async function importNotebookSnbxFiles(input) {
  const files = Array.from(input?.files || []);
  if (input) input.value = '';
  if (!files.length || !window.QuizNotebookExport?.readSnbx) return;
  showBackupOperationDialog('导入 SNBX', `准备导入 ${files.length} 个笔记包`);
  let importedCount = 0;
  try {
    for (let index = 0; index < files.length; index += 1) {
      updateBackupOperation(index / files.length * 90, `正在读取 ${files[index].name}`);
      const unpacked = await QuizNotebookExport.readSnbx(await files[index].arrayBuffer());
      const rekeyed = rekeyImportedNotebook(unpacked.document, unpacked.assets);
      await getNotebookRepository().put(rekeyed.document);
      if (rekeyed.assets.length) await getNotebookAssetRepository().putMany(rekeyed.assets);
      importedCount += 1;
    }
    await loadNotebookDocuments();
    if (state.view === 'notebookLibrary') {
      renderNotebookLibraryPage();
      showToast(`已导入 ${importedCount} 个笔记包`);
      return;
    }
    closeAppDialog();
    const newest = state.notebookDocuments.find(document => document.title.endsWith('（导入）'));
    if (newest) {
      state.inkSession.freeMode = true;
      await activateNotebookDocument(newest);
      renderHandwritingPractice();
    }
    showToast(`已导入 ${importedCount} 个笔记包`);
  } catch(error) {
    closeAppDialog();
    showNotice(`SNBX 导入失败：${error.message || error}`);
  }
}

function renderQuiz(options = {}) {
  state.view = 'quiz';
  const session = state.activeSession;
  if (!session) return renderHome();
  const total = session.questions.length;
  if (!total) return renderHome();
  window.clearTimeout(state.pageAnimationTimer);
  state.pageAnimationTimer = null;
  state.pageAnimating = false;
  state.pageTargetIndex = null;

  state.currentIndex = Math.max(0, Math.min(state.currentIndex, total - 1));
  const idx = state.currentIndex;
  const savablePractice = isSavablePracticeSession(session);
  const sessionTitle = String(session.title || session.subject || '练习');

  const progress = computeQuizProgress(session);

  const preserveScroll = Boolean(options.preserveScroll);
  const prevScrollTop = preserveScroll ? (document.getElementById('scrollContainer')?.scrollTop ?? document.getElementById('viewport')?.scrollTop ?? 0) : 0;
  const prevPageScrollTop = preserveScroll ? (document.querySelector('.page-slide.current-slide')?.scrollTop ?? 0) : 0;
  const preserveCardIndex = Number.isInteger(options.preserveCardIndex) ? options.preserveCardIndex : null;
  const preserveCardTop = Number.isFinite(options.preserveCardTop) ? options.preserveCardTop : null;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar quiz-topbar">
      <button class="btn-back" onclick="backFromQuiz()" aria-label="返回">${renderNotebookIcon('back')}</button>
      <h1>${escapeHtml(sessionTitle.slice(0, 24))}</h1>
      <div class="topbar-actions">
        <button class="btn-text notebook-entry-button" onclick="openCurrentQuizHandwriting()" title="当前题目手写笔记" aria-label="当前题目手写笔记">${renderNotebookIcon('pen')}</button>
        <button class="btn-text" onclick="cycleMode()">${state.mode === 'page' ? '竖向' : '横向'}</button>
        ${savablePractice ? `
          <button class="btn-text btn-reset" onclick="resetCurrentPractice()">重做</button>
          <button class="btn-text btn-save" onclick="saveCurrentSession()">保存</button>
        ` : ''}
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" title="${idx + 1}/${total}">
        <canvas id="quizProgressCanvas" aria-label="题目进度 ${idx + 1}/${total}"></canvas>
      </div>
      <div class="progress-info">
        <span>${escapeHtml(session.subtitle)}</span><span>${state.reviewMode ? '答案可见' : `${total} 题`}</span><span id="progressPositionLabel">${idx + 1}/${total}</span>
      </div>
    </div>
    <div class="viewport ${state.mode === 'scroll' ? 'view-scroll' : 'view-page'}" id="viewport">
      ${state.mode === 'scroll' ? renderScrollMode(session) : renderPageMode(session)}
    </div>
    <div class="bottombar">
      <button id="prevBtn" class="btn-prev" onclick="prevQ()" ${idx === 0 ? 'disabled' : ''}>上一题</button>
      <button class="btn-overview" onclick="showQuestionOverview()">题号总览</button>
      <button id="nextBtn" class="btn-next" onclick="nextQ()" ${idx === total - 1 ? 'disabled' : ''}>下一题</button>
    </div>
  `;

  if (state.mode === 'scroll') {
    if (preserveScroll) {
      const restoreScroll = () => {
        const scroller = document.getElementById('scrollContainer') || document.getElementById('viewport');
        if (!scroller) return;
        restoreQuizScrollPosition({ scroller, scrollTop: prevScrollTop, cardIndex: preserveCardIndex, cardTop: preserveCardTop });
      };
      restoreScroll();
      requestAnimationFrame(() => {
        restoreScroll();
        requestAnimationFrame(restoreScroll);
      });
    } else {
      const card = document.getElementById(`card-${idx}`);
      if (card) card.scrollIntoView({ behavior: 'instant', block: 'start' });
    }
    setupScrollTracking();
  } else {
    setupPageTouch();
    if (preserveScroll) {
      const restorePageScroll = () => {
        const scroller = document.querySelector('.page-slide.current-slide');
        restoreQuizScrollPosition({ scroller, scrollTop: prevPageScrollTop, cardIndex: preserveCardIndex, cardTop: preserveCardTop });
      };
      restorePageScroll();
      requestAnimationFrame(() => {
        restorePageScroll();
        requestAnimationFrame(restorePageScroll);
      });
    }
    updateNavState();
  }
  requestAnimationFrame(() => drawQuizProgressBar(progress.codes));
  scheduleAnswerAnimationCleanup();
  state.answerFeedbackIndex = null;
}

function renderPageMode(session) {
  const total = session.questions.length;
  const radius = 8;
  const start = Math.max(0, state.currentIndex - radius);
  const end = Math.min(total - 1, state.currentIndex + radius);
  const indices = Array.from({ length: end - start + 1 }, (_, i) => start + i);
  const currentPos = Math.max(0, indices.indexOf(state.currentIndex));
  return `
    <div class="page-frame">
      <div class="page-track" id="pageTrack" data-start-index="${start}" data-end-index="${end}" data-current-pos="${currentPos}" style="transform:translateX(${-currentPos * 100}%)">
        ${indices.map(i => `
          <div class="page-slide ${i === state.currentIndex ? 'current-slide' : ''}">
            ${renderCard(session.questions[i], i)}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function clearAnswerAnimations() {
  document.querySelectorAll('.animate-answer').forEach(el => el.classList.remove('animate-answer'));
}

function scheduleAnswerAnimationCleanup() {
  window.clearTimeout(state.answerAnimationTimer);
  state.answerAnimationTimer = window.setTimeout(clearAnswerAnimations, 300);
}

function renderScrollMode(session) {
  const total = session.questions.length;
  const { start, end } = getScrollWindow(total);
  const estimate = clampNumber(Math.round(state.scrollCardEstimate || 520), 320, 900);
  const topHeight = start * estimate;
  const bottomHeight = Math.max(0, total - end - 1) * estimate;
  const indices = Array.from({ length: end - start + 1 }, (_, i) => start + i);
  return `
    <div class="scroll-container" id="scrollContainer" data-window-start="${start}" data-window-end="${end}" data-estimate="${estimate}">
      ${topHeight ? `<div class="scroll-spacer" style="--spacer-height:${topHeight}px"></div>` : ''}
      ${indices.map(i => renderCard(session.questions[i], i)).join('')}
      ${bottomHeight ? `<div class="scroll-spacer" style="--spacer-height:${bottomHeight}px"></div>` : ''}
    </div>
  `;
}

function getQuestionStatus(idx) {
  if (!state.activeSession) return '';
  if (state.reviewMode) return 'review';
  const answer = state.answers[idx];
  if (!answer) return '';
  return checkAnswer(state.activeSession.questions[idx], answer) ? 'correct' : 'wrong';
}

function getQuizOverviewStats() {
  const session = state.activeSession;
  const total = session?.questions?.length || 0;
  if (!session || state.reviewMode) {
    return { total, answered: total, unanswered: 0, correct: total, wrong: 0 };
  }
  let answered = 0;
  let correct = 0;
  let wrong = 0;
  for (let i = 0; i < total; i++) {
    const answer = state.answers[i];
    if (!answer) continue;
    answered++;
    checkAnswer(session.questions[i], answer) ? correct++ : wrong++;
  }
  return { total, answered, unanswered: total - answered, correct, wrong };
}

function showQuestionOverview() {
  const session = state.activeSession;
  if (!session) return;
  const old = document.getElementById('questionOverview');
  if (old) old.remove();
  const stats = getQuizOverviewStats();
  state.questionOverviewItems = buildQuestionOverviewItems(session);

  const wrap = document.createElement('div');
  wrap.id = 'questionOverview';
  wrap.className = 'question-overview';
  wrap.innerHTML = `
    <div class="overview-panel">
      <div class="overview-head">
        <strong>题号总览</strong>
        <button class="btn-submit" onclick="closeQuestionOverview()">关闭</button>
      </div>
      <div class="overview-stats">
        <div class="overview-stat"><span>已答</span><strong>${stats.answered}/${stats.total}</strong></div>
        <div class="overview-stat"><span>未答</span><strong>${stats.unanswered}</strong></div>
        <div class="overview-stat good"><span>正确</span><strong>${stats.correct}</strong></div>
        <div class="overview-stat bad"><span>错误</span><strong>${stats.wrong}</strong></div>
      </div>
      <div class="overview-grid" id="overviewGrid"></div>
    </div>
  `;
  wrap.addEventListener('click', e => {
    if (e.target === wrap) closeQuestionOverview();
  });
  document.body.appendChild(wrap);
  renderQuestionOverviewChunk(0);
}

function renderQuestionOverviewChunk(start) {
  const session = state.activeSession;
  const grid = document.getElementById('overviewGrid');
  if (!session || !grid) return;
  const items = Array.isArray(state.questionOverviewItems) ? state.questionOverviewItems : buildQuestionOverviewItems(session);
  const chunkSize = 240;
  const end = Math.min(items.length, start + chunkSize);
  let html = '';
  for (let i = start; i < end; i++) {
    const item = items[i];
    if (item.kind === 'header') {
      html += `<div class="overview-type-label"><span>${escapeHtml(item.label)}</span><small>${item.start + 1}-${item.end} · ${item.count}题</small></div>`;
      continue;
    }
    const idx = item.index;
    html += `<button class="overview-num ${getQuestionStatus(idx)} ${idx === state.currentIndex ? 'current' : ''}" onclick="jumpToQuestion(${idx})">${idx + 1}</button>`;
  }
  grid.insertAdjacentHTML('beforeend', html);
  if (end < items.length) requestAnimationFrame(() => renderQuestionOverviewChunk(end));
}

function shouldGroupQuestionOverview(session) {
  return Boolean(session && !session.shuffled && !state.reviewMode && !session.wrongPractice);
}

function buildQuestionOverviewItems(session) {
  const questions = session?.questions || [];
  if (!shouldGroupQuestionOverview(session)) {
    return questions.map((_, index) => ({ kind: 'question', index }));
  }
  const items = [];
  let i = 0;
  while (i < questions.length) {
    const type = getType(questions[i]);
    let end = i + 1;
    while (end < questions.length && getType(questions[end]) === type) end++;
    items.push({
      kind: 'header',
      type,
      label: getTypeLabel(type),
      start: i,
      end,
      count: end - i,
    });
    for (let index = i; index < end; index++) {
      items.push({ kind: 'question', index });
    }
    i = end;
  }
  return items;
}

function closeQuestionOverview() {
  const el = document.getElementById('questionOverview');
  if (el) el.remove();
  state.questionOverviewItems = null;
}

function jumpToQuestion(idx) {
  if (!state.activeSession) return;
  state.currentIndex = Math.max(0, Math.min(idx, state.activeSession.questions.length - 1));
  saveReviewPosition();
  closeQuestionOverview();
  renderQuiz();
}

function getQuestionAiContext(question) {
  const letters = 'ABCDEFGH';
  const options = getOptions(question);
  const correct = getCorrectAnswer(question);
  return {
    source: {
      subject: question.sourceSubject || '',
      chapter: question.sourceChapter || '',
    },
    type: getTypeLabel(getType(question)),
    question: String(question.q || ''),
    questionMedia: {
      imageCount: question.questionImages?.length || 0,
      imageDependent: Boolean(window.QuizAiLearning?.isImageDependentQuestion(question)),
      includedInVisionRequest: Boolean(state.aiConfig.visionEnabled && getSafeQuestionImages(question).length),
    },
    options: options.map((text, index) => ({ letter: letters[index], text: String(text) })),
    correctAnswer: {
      letters: correct,
      display: getAnswerLabel(question),
      selectedOptions: options
        .map((text, index) => ({ letter: letters[index], text: String(text) }))
        .filter(item => correct.includes(item.letter)),
    },
    existingExplanation: {
      kind: 'builtin',
      text: String(question.explanations?.builtin?.text || question.exp || ''),
      imageCount: question.explanations?.builtin?.images?.length || 0,
      source: question.explanations?.builtin?.source?.provider || question.source?.provider || '',
    },
  };
}

function getQuestionAnalysisKey(question) {
  return questionKey(question);
}

function getAiLearningTaskId(type, key) {
  return window.QuizAiLearning?.recordId(type, key) || `${type}:${key}`;
}

function getAiLearningRecord(type, key) {
  return window.QuizAiLearning?.get(type, key) || null;
}

function getSafeQuestionImages(question) {
  return normalizeImageList(question?.questionImages).map(safeMediaUrl).filter(Boolean).slice(0, 4);
}

function validateQuestionVisionCapability(question, taskType) {
  if (!window.QuizAiLearning) throw new Error('AI 学习任务模块未加载');
  const images = getSafeQuestionImages(question);
  const imageDependent = QuizAiLearning.isImageDependentQuestion(question);
  if (imageDependent && !images.length) {
    const error = new Error('这道题依赖题目图片，但当前图片地址无法作为 AI 输入读取。');
    error.code = 'AI_IMAGE_UNAVAILABLE';
    throw error;
  }
  const capability = QuizAiLearning.capabilityFor(taskType, {
    question,
    images,
    imageDependent,
  }, state.aiConfig);
  if (!capability.allowed) {
    const error = new Error(capability.message);
    error.code = 'AI_VISION_REQUIRED';
    throw error;
  }
  return { capability, images, imageDependent };
}

function rerenderAiQuestionSurface(question, fallbackIndex = state.currentIndex) {
  const key = getQuestionAnalysisKey(question);
  if (state.view === 'quiz' && state.activeSession?.questions?.some(item => getQuestionAnalysisKey(item) === key)) {
    const index = state.activeSession.questions.findIndex(item => getQuestionAnalysisKey(item) === key);
    renderQuizPreservingCard(index >= 0 ? index : fallbackIndex);
  } else if (state.view === 'handwriting' && state.inkSession?.questions?.some(item => getQuestionAnalysisKey(item) === key)) {
    renderNotebookRightPanel();
  }
}

function renderSimilarQuestionResult(question, idx) {
  if (!window.QuizAiLearning) return '';
  const type = QuizAiLearning.TASK_TYPES.SIMILAR;
  const key = getQuestionAnalysisKey(question);
  const taskId = getAiLearningTaskId(type, key);
  const pending = state.aiLearningPending[taskId];
  const record = getAiLearningRecord(type, key);
  const currentSourceHash = hashString(JSON.stringify(getQuestionAiContext(question)));
  const stale = Boolean(record?.sourceHash && record.sourceHash !== currentSourceHash);
  if (!pending && !record) return '';
  const items = record?.parsed?.questions || [];
  return `
    <div class="ai-learning-result ${pending ? 'loading' : ''}">
      <div class="ai-learning-result-head"><strong>AI 相似练习</strong><small>${escapeHtml(pending?.model || record?.model || state.aiConfig.model || 'AI')}${record?.updatedAt && !pending ? ` · ${formatAiThreadTime(record.updatedAt)}` : ''}</small></div>
      ${pending ? '<div class="ai-learning-loading">正在生成同知识点练习题…</div>' : `
        <div class="ai-similar-list">${items.map((item, itemIndex) => {
          const revealKey = `${taskId}:${itemIndex}`;
          const revealed = Boolean(state.aiLearningReveal[revealKey]);
          return `<article class="ai-similar-card"><div class="ai-similar-meta"><span>AI 生成 · ${escapeHtml(getTypeLabel(item.type))}</span><b>${itemIndex + 1}</b></div><h4>${escapeHtml(item.question)}</h4>${item.options?.length ? `<ol>${item.options.map((option, optionIndex) => `<li><b>${'ABCDEFGH'[optionIndex]}</b><span>${escapeHtml(option)}</span></li>`).join('')}</ol>` : ''}<button onclick="toggleAiGeneratedAnswer('${escapeAttr(revealKey)}',${idx})">${revealed ? '收起答案' : '显示答案'}</button>${revealed ? `<div class="ai-similar-answer"><strong>答案 ${escapeHtml(item.answer || '未提供')}</strong>${item.analysis ? `<div class="ai-markdown">${renderAiMarkdown(item.analysis)}</div>` : ''}</div>` : ''}</article>`;
        }).join('')}</div>
        <div class="ai-generated-note ${stale ? 'stale' : ''}">${stale ? '原题内容已变化，建议重新生成。' : 'AI 生成练习，不属于题库原题或内置解析。'}</div>
      `}
    </div>`;
}

function toggleAiGeneratedAnswer(revealKey, idx) {
  state.aiLearningReveal[revealKey] = !state.aiLearningReveal[revealKey];
  const question = state.view === 'handwriting' ? state.inkSession?.questions?.[idx] : state.activeSession?.questions?.[idx];
  if (question) rerenderAiQuestionSurface(question, idx);
}

async function generateSimilarQuestions(idx, force = false) {
  const question = state.view === 'handwriting' ? state.inkSession?.questions?.[idx] : state.activeSession?.questions?.[idx];
  if (!question || !window.QuizAiLearning) return;
  const type = QuizAiLearning.TASK_TYPES.SIMILAR;
  const key = getQuestionAnalysisKey(question);
  const taskId = getAiLearningTaskId(type, key);
  if (state.aiLearningPending[taskId]) return;
  if (!force && getAiLearningRecord(type, key)) return rerenderAiQuestionSurface(question, idx);
  try {
    validateAiConnectionConfig();
    const vision = validateQuestionVisionCapability(question, type);
    const context = getQuestionAiContext(question);
    state.aiLearningPending[taskId] = { model: state.aiConfig.model };
    rerenderAiQuestionSurface(question, idx);
    await QuizAiLearning.run({
      type,
      key,
      input: { question, context, images: vision.images, imageDependent: vision.imageDependent },
      config: state.aiConfig,
      request: requestAiCompletion,
      sourceHash: hashString(JSON.stringify(context)),
    });
  } catch(e) {
    showNotice(`相似题生成失败：${e.message || e}`);
    if (isAiConfigurationError(e)) openAiSettings();
  } finally {
    delete state.aiLearningPending[taskId];
    rerenderAiQuestionSurface(question, idx);
  }
}

function getQuestionAnalysisPanelId(question) {
  return `ai-analysis-${hashString(getQuestionAnalysisKey(question))}`;
}

function renderQuestionAiPanel(question, idx) {
  const key = getQuestionAnalysisKey(question);
  if (!state.aiAnalysisExpanded[key]) return '';
  const saved = state.aiAnalyses[key];
  const pending = state.aiPendingAnalyses[key];
  const content = pending?.content || saved?.content || '';
  const model = pending?.model || saved?.model || state.aiConfig.model || 'AI';
  const similarType = window.QuizAiLearning?.TASK_TYPES.SIMILAR;
  const similarTaskId = similarType ? getAiLearningTaskId(similarType, key) : '';
  const similarSaved = similarType ? getAiLearningRecord(similarType, key) : null;
  const similarPending = similarTaskId ? state.aiLearningPending[similarTaskId] : null;
  return `
    <div class="question-ai-panel ${pending ? 'loading' : ''}" id="${getQuestionAnalysisPanelId(question)}">
      <div class="question-ai-head">
        <strong>${pending ? 'AI 正在分析' : 'AI 题目分析'}</strong>
        <small>${escapeHtml(model)}${saved?.updatedAt && !pending ? ` · ${formatAiThreadTime(saved.updatedAt)}` : ''}</small>
      </div>
      <div class="question-ai-body ${pending && !content ? 'is-loading' : ''}">
        <div class="ai-markdown">${content ? renderAiMarkdown(content) : '正在整理题干、选项和正确答案…'}</div>
      </div>
      <div class="ai-panel-actions">
        <button onclick="analyzeQuestionWithAi(${idx}, true)" ${pending ? 'disabled' : ''}>重新分析</button>
        <button onclick="generateSimilarQuestions(${idx}, ${similarSaved ? 'true' : 'false'})" ${pending || similarPending ? 'disabled' : ''}>${similarPending ? '生成中' : (similarSaved ? '换一组相似题' : '生成相似题')}</button>
        <button class="primary" onclick="followUpQuestionAnalysis(${idx})" ${pending || !saved?.content ? 'disabled' : ''}>追问</button>
      </div>
      ${renderSimilarQuestionResult(question, idx)}
    </div>
  `;
}

function updateQuestionAnalysisStreaming(question, content) {
  const panel = document.getElementById(getQuestionAnalysisPanelId(question));
  const body = panel?.querySelector('.question-ai-body');
  if (!body) return;
  body.classList.remove('is-loading');
  const markdown = body.querySelector('.ai-markdown');
  if (markdown) markdown.innerHTML = renderAiMarkdown(content);
}

function toggleQuestionAiAnalysis(idx) {
  const question = state.activeSession?.questions?.[idx];
  if (!question) return;
  const key = getQuestionAnalysisKey(question);
  if (!state.aiAnalyses[key] && !state.aiPendingAnalyses[key]) return analyzeQuestionWithAi(idx, false);
  state.aiAnalysisExpanded[key] = !state.aiAnalysisExpanded[key];
  renderQuizPreservingCard(idx);
}

async function analyzeQuestionWithAi(idx, force = false) {
  const question = state.view === 'handwriting'
    ? state.inkSession?.questions?.[idx]
    : state.activeSession?.questions?.[idx];
  if (!question) return;
  const key = getQuestionAnalysisKey(question);
  if (state.aiPendingAnalyses[key]) return;
  if (!force && state.aiAnalyses[key]) {
    state.aiAnalysisExpanded[key] = true;
    return state.view === 'handwriting' ? renderNotebookRightPanel() : renderQuizPreservingCard(idx);
  }
  try {
    validateAiConnectionConfig();
    validateQuestionVisionCapability(question, window.QuizAiLearning?.TASK_TYPES.ANALYSIS || 'question-analysis');
  } catch(e) {
    showNotice(e.message);
    if (isAiConfigurationError(e)) return openAiSettings();
    return;
  }
  const structured = getQuestionAiContext(question);
  const safeQuestionImages = getSafeQuestionImages(question);
  const hasQuestionImages = Boolean(safeQuestionImages.length);
  const imageNotice = hasQuestionImages && !state.aiConfig.visionEnabled
    ? '\n\n这道题含题目图片，但当前没有开启模型视觉能力。不得猜测图片内容，请提示用户在 AI 设置中开启视觉能力。'
    : '';
  const userPrompt = `请严格依据下面的结构化题目数据进行分析。正确答案字段是题库给定答案，不要擅自改写：\n\n${JSON.stringify(structured, null, 2)}${imageNotice}`;
  const userContent = hasQuestionImages && state.aiConfig.visionEnabled
    ? [
      { type: 'text', text: userPrompt },
      ...safeQuestionImages.map(url => ({ type: 'image_url', image_url: { url } })),
    ]
    : userPrompt;
  const controller = new AbortController();
  state.aiPendingAnalyses[key] = { content: '', model: state.aiConfig.model, controller };
  state.aiAnalysisExpanded[key] = true;
  if (state.view === 'handwriting') renderNotebookRightPanel();
  else renderQuizPreservingCard(idx);
  try {
    const result = await requestAiCompletion([
      { role: 'system', content: AI_QUESTION_SYSTEM_PROMPT },
      { role: 'user', content: userContent },
    ], {
      controller,
      onDelta: content => {
        if (!state.aiPendingAnalyses[key]) return;
        state.aiPendingAnalyses[key].content = content;
        updateQuestionAnalysisStreaming(question, content);
      },
    });
    state.aiAnalyses[key] = {
      content: result.content || state.aiPendingAnalyses[key]?.content || '模型没有返回文本内容。',
      model: state.aiConfig.model,
      usage: result.usage || null,
      updatedAt: Date.now(),
      question: structured.question,
    };
    saveAiAnalyses();
  } catch(e) {
    if (e.name !== 'AbortError') showNotice(`AI 分析失败：${e.message || e}`);
  } finally {
    delete state.aiPendingAnalyses[key];
    if (state.view === 'quiz' && state.activeSession?.questions?.some(item => getQuestionAnalysisKey(item) === key)) {
      const currentIdx = state.activeSession.questions.findIndex(item => getQuestionAnalysisKey(item) === key);
      renderQuizPreservingCard(currentIdx >= 0 ? currentIdx : idx);
    } else if (state.view === 'handwriting' && state.inkSession?.questions?.some(item => getQuestionAnalysisKey(item) === key)) {
      renderNotebookRightPanel();
    }
  }
}

function followUpQuestionAnalysis(idx) {
  const question = state.view === 'handwriting'
    ? state.inkSession?.questions?.[idx]
    : state.activeSession?.questions?.[idx];
  if (!question) return;
  const key = getQuestionAnalysisKey(question);
  const analysis = state.aiAnalyses[key];
  if (!analysis?.content) return showNotice('请先完成一次 AI 分析');
  const structured = getQuestionAiContext(question);
  openAiChat({
    newThread: true,
    title: `追问：${String(question.q || '').slice(0, 22)}`,
    context: {
      kind: 'question-follow-up',
      ...structured,
      firstAnalysis: analysis.content,
    },
    messages: [{
      id: `message:${Date.now()}:${Math.random().toString(36).slice(2)}`,
      role: 'assistant',
      content: analysis.content,
      attachments: [],
      createdAt: analysis.updatedAt || Date.now(),
      model: analysis.model || state.aiConfig.model,
      usage: analysis.usage || null,
    }],
  });
}

function safeMediaUrl(value) {
  const url = String(value || '').trim();
  if (/^data:image\/(?:png|jpe?g|webp|gif);base64,/i.test(url)) return url;
  if (/^https:\/\//i.test(url) || /^blob:/i.test(url)) return url;
  if (!url.includes('..') && /^(?:\.\/)?data\/.+\.(?:png|jpe?g|webp|gif)$/i.test(url)) return url.replace(/^\.\//, '');
  return '';
}

function safeDocumentUrl(value) {
  const url = String(value || '').trim();
  if (/^https:\/\//i.test(url) || /^blob:/i.test(url)) return url;
  if (!url.includes('..') && /^(?:\.\/)?data\/.+\.pdf(?:#page=\d+)?$/i.test(url)) return url.replace(/^\.\//, '');
  return '';
}

function renderQuestionVectorItem(item) {
  const points = item?.points || [];
  if (item?.type === 'line' && points.length >= 4) {
    return `<line x1="${points[0]}" y1="${points[1]}" x2="${points[2]}" y2="${points[3]}"></line>`;
  }
  if (item?.type === 'curve' && points.length >= 8) {
    return `<path d="M ${points[0]} ${points[1]} C ${points[2]} ${points[3]}, ${points[4]} ${points[5]}, ${points[6]} ${points[7]}"></path>`;
  }
  if (item?.type === 'rect' && points.length >= 4) {
    return `<rect x="${points[0]}" y="${points[1]}" width="${Math.max(0, points[2])}" height="${Math.max(0, points[3])}"></rect>`;
  }
  return '';
}

function renderStructuredMatrixBrackets(page) {
  const candidates = page.runs.filter(run => /^[⎡⎢⎣]+$/.test(run.text) || /^[⎤⎥⎦]+$/.test(run.text));
  const groups = [];
  candidates.forEach(run => {
    const side = /^[⎡⎢⎣]+$/.test(run.text) ? 'left' : 'right';
    let group = groups.find(item => item.side === side && Math.abs(item.x - run.x) <= Math.max(3, run.size * .45));
    if (!group) {
      group = { side, x: run.x, y0: run.y, y1: run.y + run.h, w: run.w };
      groups.push(group);
    } else {
      group.y0 = Math.min(group.y0, run.y);
      group.y1 = Math.max(group.y1, run.y + run.h);
      group.w = Math.max(group.w, run.w);
    }
  });
  groups.filter(group => group.side === 'left').forEach(left => {
    const right = groups
      .filter(group => group.side === 'right' && group.x > left.x)
      .sort((a, b) => a.x - b.x)[0];
    if (!right) return;
    const contents = page.runs.filter(run => {
      if (/^[⎡⎢⎣⎤⎥⎦]+$/.test(run.text)) return false;
      return run.x > left.x && run.x < right.x && run.y < Math.max(left.y1, right.y1) + run.size * 2;
    });
    if (!contents.length) return;
    const contentBottom = Math.max(...contents.map(run => run.y + run.h)) + 2;
    left.y1 = Math.max(left.y1, contentBottom);
    right.y1 = Math.max(right.y1, contentBottom);
  });
  return groups.map(group => `<span class="structured-matrix-bracket ${group.side}" style="left:${group.x / page.width * 100}%;top:${group.y0 / page.height * 100}%;width:${Math.max(group.w, 5) / page.width * 100}%;height:${Math.max(group.y1 - group.y0, 8) / page.height * 100}%"></span>`).join('');
}

function renderQuestionText(question) {
  const layout = normalizeQuestionLayout(question?.questionLayout);
  if (!layout) return `<p>${escapeHtml(question?.q || '')}</p>`;
  return `<div class="structured-question-layout" aria-label="${escapeAttr(question?.q || '')}">${layout.pages.map((page, pageIndex) => {
    const vectors = page.vectors.map(vector => {
      const color = vector.color.map(channel => Math.round(channel * 255));
      return `<g fill="none" stroke="rgb(${color.join(',')})" stroke-width="${vector.width}" stroke-linecap="round" stroke-linejoin="round">${vector.items.map(renderQuestionVectorItem).join('')}</g>`;
    }).join('');
    const brackets = renderStructuredMatrixBrackets(page);
    const runs = page.runs.map(run => {
      if (/^[⎡⎢⎣]+$/.test(run.text) || /^[⎤⎥⎦]+$/.test(run.text)) return '';
      const left = run.x / page.width * 100;
      const top = run.y / page.height * 100;
      if (/^―+$/.test(run.text)) {
        return `<span class="structured-question-rule" style="left:${left}%;top:${(run.y + run.h * .5) / page.height * 100}%;width:${Math.max(run.w, run.size) / page.width * 100}%"></span>`;
      }
      const fontScale = run.font === 'cjk' ? .92 : (run.font === 'text' ? .96 : 1);
      const size = run.size / page.width * 100 * fontScale;
      return `<span class="structured-question-run font-${escapeAttr(run.font)}" style="left:${left}%;top:${top}%;font-size:${size}cqw;font-weight:${run.bold ? 700 : 400}">${escapeHtml(run.text)}</span>`;
    }).join('');
    return `<div class="structured-question-page" data-layout-page="${pageIndex + 1}" style="--layout-width:${page.width};--layout-height:${page.height}"><svg class="structured-question-vectors" viewBox="0 0 ${page.width} ${page.height}" aria-hidden="true">${vectors}</svg>${brackets}${runs}</div>`;
  }).join('')}</div>`;
}

function renderQuestionMedia(question) {
  const images = normalizeImageList(question.questionImages);
  if (!images.length) return '';
  return `<div class="question-media">${images.map((url, imageIndex) => {
    const safe = safeMediaUrl(url);
    return safe ? `<img src="${escapeAttr(safe)}" alt="题目图片 ${imageIndex + 1}" loading="lazy" decoding="async">` : '';
  }).join('')}</div>`;
}

function renderInkQuestionOptions(question) {
  if (question.questionImages?.length || question.source?.optionsEmbeddedInLayout || getType(question) === 'subjective') return '';
  const letters = 'ABCDEFGH';
  const options = getOptions(question);
  return `<ul class="ink-question-options">${options.map((text, index) => `<li><b>${letters[index]}</b><span>${escapeHtml(text)}</span></li>`).join('')}</ul>`;
}

function renderBuiltinExplanation(question, options = {}) {
  const builtin = question.explanations?.builtin || normalizeBuiltinExplanation(question);
  const images = normalizeImageList(builtin.images);
  const safeVideo = /^https:\/\//i.test(String(builtin.videoUrl || '')) ? String(builtin.videoUrl) : '';
  const safePdf = safeDocumentUrl(builtin.pdfUrl || question.source?.answerPdfUrl || '');
  const sourceProvider = builtin.source?.provider || question.source?.provider || '';
  const hasContent = builtin.text || images.length || safeVideo || safePdf;
  return `
    <div class="builtin-explanation">
      ${options.showAnswer !== false && getType(question) !== 'subjective' ? `<div class="answer-line">正确答案：${escapeHtml(getAnswerLabel(question))}</div>` : ''}
      ${builtin.text ? `<div class="exp-detail">${escapeHtml(builtin.text)}</div>` : ''}
      ${images.length ? `<div class="builtin-media">${images.map((url, imageIndex) => {
        const safe = safeMediaUrl(url);
        return safe ? `<img src="${escapeAttr(safe)}" alt="内置解析图片 ${imageIndex + 1}" loading="lazy" decoding="async">` : '';
      }).join('')}</div>` : ''}
      ${safePdf ? `<div class="builtin-pdf-link"><a class="btn-text" href="${escapeAttr(safePdf)}" target="_blank" rel="noopener">打开对应解析页</a><span class="source-note">下方直接定位到这道题所在页</span></div><iframe class="builtin-pdf-viewer" src="${escapeAttr(safePdf)}" title="对应解析页预览" loading="lazy"></iframe>` : ''}
      ${safeVideo ? `<video controls preload="metadata" src="${escapeAttr(safeVideo)}"></video>` : ''}
      <div class="source-note">${hasContent ? '内置答案与解析' : '题库未提供文字解析'}${sourceProvider ? ` · 来源 ${escapeHtml(sourceProvider)}` : ''}；AI 分析单独保存，不会覆盖这里。</div>
    </div>
  `;
}

function renderSubjectiveMasteryControls(idx, value = '') {
  return `
    <div class="subjective-mastery" aria-label="掌握情况">
      <button class="mastered ${value === '__mastered__' ? 'active' : ''}" aria-pressed="${value === '__mastered__'}" onclick="setSubjectiveMastery(${idx},true)">已掌握</button>
      <button class="unmastered ${value === '__unmastered__' ? 'active' : ''}" aria-pressed="${value === '__unmastered__'}" onclick="setSubjectiveMastery(${idx},false)">未掌握</button>
    </div>
  `;
}

function renderCard(q, idx) {
  const t = getType(q);
  const hasDraft = Object.prototype.hasOwnProperty.call(state.drafts, idx);
  const userAns = hasDraft ? state.drafts[idx] : (state.answers[idx] || '');
  const isSubjective = t === 'subjective';
  const answered = state.reviewMode || Boolean(state.answers[idx]);
  const correct = state.reviewMode ? true : (answered ? checkAnswer(q, state.answers[idx]) : null);
  const opts = getOptions(q);
  const embeddedOptions = Boolean(q.source?.optionsEmbeddedInLayout);
  const letters = 'ABCDEFGH';
  const isMulti = t === 'multi';
  const correctAns = getCorrectAnswer(q);
  const session = state.activeSession;
  const showSource = session && session.subject === q.sourceSubject && session.title === session.subject;
  const inWrongBook = isInWrongBook(q);
  const revealed = !state.reviewMode && !answered && Boolean(state.revealedAnswers[idx]);

  let optHTML = '';
  const animateFeedback = state.answerFeedbackIndex === idx;
  if (isSubjective) {
    optHTML = '<div class="subjective-prompt">作答后查看本题解析，再按实际情况标记掌握状态。</div>';
  } else if (t === 'bool') {
    const clsFor = letter => {
      if (state.reviewMode) return correctAns === letter ? 'correct' : '';
      if (!answered) return userAns === letter ? 'selected' : '';
      if (correctAns === letter) return `${state.answers[idx] === letter ? 'selected ' : ''}correct ${animateFeedback ? 'animate-answer' : ''}`;
      if (state.answers[idx] === letter) return `wrong ${animateFeedback ? 'animate-answer' : ''}`;
      return '';
    };
    optHTML = `
      <div class="bool-row">
        <div class="bool-btn ${clsFor('A')}" onclick="${state.reviewMode ? '' : `answerBool(${idx},'A')`}">✓</div>
        <div class="bool-btn ${clsFor('B')}" onclick="${state.reviewMode ? '' : `answerBool(${idx},'B')`}">✗</div>
      </div>
    `;
  } else {
    optHTML = `
      <div class="options ${embeddedOptions ? 'embedded-option-buttons' : ''}">
        ${opts.map((o, i) => {
          const letter = letters[i];
          const selected = userAns.includes(letter);
          let cls = selected ? 'selected' : '';
          if (state.reviewMode) {
            cls = correctAns.includes(letter) ? 'correct' : '';
          } else if (answered) {
            if (correctAns.includes(letter)) cls = `${selected ? 'selected ' : ''}correct ${animateFeedback ? 'animate-answer' : ''}`;
            else if (selected) cls = `wrong ${animateFeedback ? 'animate-answer' : ''}`;
            else cls = '';
          }
          return `
            <div class="option ${cls}" onclick="${state.reviewMode ? '' : (isMulti ? `toggleMulti(${idx},'${letter}')` : `answerSingle(${idx},'${letter}')`)}">
              <span class="option-letter">${letter}</span>
              ${embeddedOptions ? '' : `<span class="option-text">${escapeHtml(String(o))}</span>`}
            </div>`;
        }).join('')}
      </div>
      ${isMulti ? `
        <div class="multi-actions">
          <button class="btn-submit" onclick="submitMulti(${idx})" ${state.drafts[idx] ? '' : 'disabled'}>确认答案</button>
        </div>
      ` : ''}
    `;
  }

  return `
    <div class="card ${answered ? `answered ${correct ? 'correct' : 'wrong'}` : ''}" id="card-${idx}" data-index="${idx}">
      <div class="card-header">
        <span class="card-num">${idx + 1}</span>
        <span class="card-type type-${t === 'multi' ? 'multi' : t === 'bool' ? 'bool' : t === 'subjective' ? 'subjective' : 'single'}">${getTypeLabel(t)}</span>
        ${showSource ? `<span class="source-chip">${escapeHtml(q.sourceChapter)}</span>` : ''}
        ${isMulti && !answered ? '<span class="multi-hint">选完后确认</span>' : ''}
      </div>
      <div class="card-body">${renderQuestionText(q)}${renderQuestionMedia(q)}</div>
      ${optHTML}
      <div class="answer-reveal insight-actions">
        ${!state.reviewMode && !answered ? `<button class="${revealed ? 'active' : ''}" onclick="toggleAnswerReveal(${idx})">${revealed ? '收起答案' : (isSubjective ? '查看内置解析' : '看答案')}</button>` : ''}
        <button class="ai-analyze-button ${state.aiAnalysisExpanded[getQuestionAnalysisKey(q)] ? 'active' : ''}" onclick="toggleQuestionAiAnalysis(${idx})" ${state.aiPendingAnalyses[getQuestionAnalysisKey(q)] ? 'disabled' : ''}>${state.aiPendingAnalyses[getQuestionAnalysisKey(q)] ? '分析中' : (state.aiAnalysisExpanded[getQuestionAnalysisKey(q)] ? '收起分析' : 'AI 分析')}</button>
        <button class="review-queue-button ${window.QuizReview?.has(questionKey(q)) ? 'active' : ''}" onclick="toggleQuestionReviewCard(${idx})">${window.QuizReview?.has(questionKey(q)) ? '已加入复习' : '加入复习'}</button>
      </div>
      ${renderQuestionAiPanel(q, idx)}
      ${revealed ? `
        <div class="explanation show reveal">
          <div class="exp-head">
            <div class="exp-label">答案</div>
          </div>
          <div class="exp-body">
           ${renderBuiltinExplanation(q)}
            ${isSubjective ? renderSubjectiveMasteryControls(idx, state.answers[idx] || '') : ''}
          </div>
        </div>
      ` : ''}
      ${state.activeSession?.wrongPractice ? `
        <div class="feedback-actions">
          <button onclick="openWrongReasonEditor(${idx})">错因标记</button>
          ${renderAiWrongReasonButton(q, idx)}
          <button class="danger" onclick="removeWrongFromBook(${idx})">从错题集删除</button>
        </div>
        ${renderWrongReasonSummary(q)}
      ` : ''}
      ${answered ? `
        <div class="explanation show ${state.reviewMode || correct ? '' : 'wrong'}">
          <div class="exp-head">
            <div class="exp-label">${state.reviewMode ? '答案' : (isSubjective ? (correct ? '已掌握' : '未掌握') : (correct ? '正确' : '错误'))}</div>
          </div>
          <div class="exp-body">
            ${!state.reviewMode && correct ? '<div class="answer-line subtle">你的选择正确</div>' : ''}
            ${renderBuiltinExplanation(q, { showAnswer: state.reviewMode || !correct })}
            ${isSubjective && !state.reviewMode ? renderSubjectiveMasteryControls(idx, state.answers[idx] || '') : ''}
            ${!state.reviewMode && !correct && !state.activeSession?.wrongPractice ? `
              <div class="feedback-actions">
                ${inWrongBook
                  ? `<button onclick="openWrongReasonEditor(${idx})">错因标记</button>${renderAiWrongReasonButton(q, idx)}<button class="danger" onclick="removeWrongFromBook(${idx})">从错题集删除</button>`
                  : `<button class="danger" onclick="addWrongToBook(${idx})">加入错题集</button>`}
              </div>
              ${inWrongBook ? renderWrongReasonSummary(q) : ''}
            ` : ''}
            </div>
        </div>
      ` : ''}
    </div>
  `;
}

function toggleAnswerReveal(idx) {
  state.currentIndex = idx;
  if (state.revealedAnswers[idx]) delete state.revealedAnswers[idx];
  else state.revealedAnswers[idx] = true;
  renderQuizPreservingCard(idx);
}

function setSubjectiveMastery(idx, mastered) {
  const question = state.activeSession?.questions?.[idx];
  if (!question || getType(question) !== 'subjective' || state.reviewMode) return;
  const value = mastered ? '__mastered__' : '__unmastered__';
  state.currentIndex = idx;
  state.answers[idx] = value;
  syncCurrentAnswerToGlobal(idx, value);
  delete state.drafts[idx];
  delete state.revealedAnswers[idx];
  if (!mastered) {
    addWrongToBook(idx, { silent: true, rerender: false });
    const key = questionKey(question);
    if (window.QuizReview && !QuizReview.has(key)) QuizReview.add(key, question);
    showToast('已标记未掌握，并加入错题集和复习');
  } else {
    showToast('已标记掌握');
  }
  renderQuizPreservingCard(idx);
}

function answerSingle(idx, letter) {
  state.currentIndex = idx;
  if (state.answers[idx] === letter) {
    delete state.answers[idx];
    state.answerFeedbackIndex = null;
    syncCurrentAnswerToGlobal(idx, '');
  } else {
    state.answers[idx] = letter;
    state.answerFeedbackIndex = idx;
    syncCurrentAnswerToGlobal(idx, letter);
  }
  delete state.drafts[idx];
  delete state.revealedAnswers[idx];
  renderQuizPreservingCard(idx);
}

function answerBool(idx, letter) {
  state.currentIndex = idx;
  if (state.answers[idx] === letter) {
    delete state.answers[idx];
    state.answerFeedbackIndex = null;
    syncCurrentAnswerToGlobal(idx, '');
  } else {
    state.answers[idx] = letter;
    state.answerFeedbackIndex = idx;
    syncCurrentAnswerToGlobal(idx, letter);
  }
  delete state.drafts[idx];
  delete state.revealedAnswers[idx];
  renderQuizPreservingCard(idx);
}

function toggleMulti(idx, letter) {
  state.currentIndex = idx;
  const cur = Object.prototype.hasOwnProperty.call(state.drafts, idx) ? state.drafts[idx] : (state.answers[idx] || '');
  const parts = cur.split('').filter(c => c >= 'A' && c <= 'Z');
  const i = parts.indexOf(letter);
  if (i >= 0) parts.splice(i, 1);
  else parts.push(letter);
  const next = parts.sort().join('');
  if (next) state.drafts[idx] = next;
  else delete state.drafts[idx];
  delete state.answers[idx];
  syncCurrentAnswerToGlobal(idx, '');
  delete state.revealedAnswers[idx];
  renderQuizPreservingCard(idx);
}

function submitMulti(idx) {
  const draft = state.drafts[idx] || '';
  if (!draft) return;
  state.currentIndex = idx;
  state.answers[idx] = draft;
  state.answerFeedbackIndex = idx;
  syncCurrentAnswerToGlobal(idx, draft);
  delete state.drafts[idx];
  renderQuizPreservingCard(idx);
}

function nextQ() {
  if (state.activeSession && state.currentIndex < state.activeSession.questions.length - 1) {
    if (state.mode === 'page') return animatePage(1);
    state.currentIndex++;
    saveReviewPosition();
    renderQuiz();
  }
}

function prevQ() {
  if (state.currentIndex > 0) {
    if (state.mode === 'page') return animatePage(-1);
    state.currentIndex--;
    saveReviewPosition();
    renderQuiz();
  }
}

function cycleMode() {
  state.mode = state.mode === 'page' ? 'scroll' : 'page';
  saveReviewPosition();
  renderQuiz();
}

function animatePage(delta) {
  if (!state.activeSession) return;
  const baseIndex = state.pageAnimating && Number.isInteger(state.pageTargetIndex)
    ? state.pageTargetIndex
    : state.currentIndex;
  const target = baseIndex + delta;
  goToPageIndex(target, true);
}

function goToPageIndex(target, animate) {
  if (!state.activeSession) return;
  clearAnswerAnimations();
  target = Math.max(0, Math.min(target, state.activeSession.questions.length - 1));
  if (target === state.currentIndex && !state.pageAnimating) return;
  if (target < 0 || target >= state.activeSession.questions.length) return;
  const track = document.getElementById('pageTrack');
  if (!track) {
    state.currentIndex = target;
    state.pageAnimating = false;
    state.pageTargetIndex = null;
    saveReviewPosition();
    renderQuiz();
    return;
  }
  const start = Number(track.dataset.startIndex || 0);
  const end = Number(track.dataset.endIndex || start);
  if (target < start || target > end) {
    state.currentIndex = target;
    state.pageAnimating = false;
    state.pageTargetIndex = null;
    saveReviewPosition();
    renderQuiz();
    return;
  }
  const pos = target - start;
  state.currentIndex = target;
  state.pageTargetIndex = target;
  state.pageAnimating = Boolean(animate);
  track.dataset.currentPos = String(pos);
  saveReviewPosition();
  updateNavState();
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(${-pos * 100}%)`;
  if (!animate) {
    track.offsetHeight;
    track.style.transition = '';
    state.pageAnimating = false;
    state.pageTargetIndex = null;
    return;
  }
  window.clearTimeout(state.pageAnimationTimer);
  state.pageAnimationTimer = window.setTimeout(finalizePageAnimation, 260);
}

function finalizePageAnimation() {
  if (!state.activeSession) return;
  state.pageAnimating = false;
  state.pageTargetIndex = null;
  const track = document.getElementById('pageTrack');
  if (!track) return;
  const start = Number(track.dataset.startIndex || 0);
  const end = Number(track.dataset.endIndex || start);
  const total = state.activeSession.questions.length;
  const shouldRecenter = (state.currentIndex - start <= 1 && start > 0)
    || (end - state.currentIndex <= 1 && end < total - 1);
  if (shouldRecenter) renderQuiz();
}

function updatePagePosition(animate) {
  const track = document.getElementById('pageTrack');
  if (!track || !state.activeSession) return;
  const start = Number(track.dataset.startIndex || 0);
  const pos = state.currentIndex - start;
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(${-pos * 100}%)`;
  track.dataset.currentPos = String(pos);
  if (!animate) {
    track.offsetHeight;
    track.style.transition = '';
  }
  updateNavState();
}

function updateNavState() {
  if (!state.activeSession) return;
  const total = state.activeSession.questions.length;
  const counter = document.getElementById('questionCounter');
  const progressPos = document.getElementById('progressPositionLabel');
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (counter) counter.textContent = `${state.currentIndex + 1}/${total}`;
  if (progressPos) progressPos.textContent = `${state.currentIndex + 1}/${total}`;
  if (prev) prev.disabled = state.currentIndex === 0;
  if (next) next.disabled = state.currentIndex === total - 1;
}

function setupPageTouch() {
  const viewport = document.getElementById('viewport');
  if (!viewport) return;
  viewport.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    state.touchStartX = t.clientX;
    state.touchStartY = t.clientY;
  }, { passive: true });
  viewport.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    const dx = t.clientX - state.touchStartX;
    const dy = t.clientY - state.touchStartY;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
      dx < 0 ? nextQ() : prevQ();
    }
  }, { passive: true });
}

function setupScrollTracking() {
  const container = document.getElementById('scrollContainer');
  if (!container || !state.activeSession) return;
  container.addEventListener('scroll', () => {
    window.clearTimeout(state.scrollTimer);
    state.scrollTimer = window.setTimeout(() => {
      const cards = Array.from(container.querySelectorAll('.card'));
      if (!cards.length) return;
      let bestIndex = state.currentIndex;
      let bestDistance = Infinity;
      const top = container.getBoundingClientRect().top;
      cards.forEach(card => {
        const cardIndex = Number(card.dataset.index);
        if (!Number.isFinite(cardIndex)) return;
        const distance = Math.abs(card.getBoundingClientRect().top - top - 12);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = cardIndex;
        }
      });
      const measured = cards
        .map(card => card.getBoundingClientRect().height)
        .filter(height => height > 160);
      if (measured.length) {
        const average = measured.reduce((sum, height) => sum + height, 0) / measured.length;
        state.scrollCardEstimate = clampNumber(Math.round((state.scrollCardEstimate || average) * .7 + average * .3), 320, 900);
      }
      const total = state.activeSession.questions.length;
      const start = Number(container.dataset.windowStart || 0);
      const end = Number(container.dataset.windowEnd || start);
      const estimate = Number(container.dataset.estimate || state.scrollCardEstimate || 520);
      if (bestDistance > Math.max(260, estimate * .7)) {
        bestIndex = clampNumber(Math.round(container.scrollTop / estimate), 0, total - 1);
      }
      state.currentIndex = bestIndex;
      saveReviewPosition();
      updateNavState();
      if ((bestIndex - start <= 2 && start > 0) || (end - bestIndex <= 2 && end < total - 1) || bestDistance > Math.max(260, estimate * .7)) {
        const preserveCardTop = getCardTop(bestIndex);
        renderQuiz({ preserveScroll: preserveCardTop !== null, preserveCardIndex: bestIndex, preserveCardTop });
      }
    }, 80);
  }, { passive: true });
}

document.addEventListener('keydown', e => {
  if (state.view !== 'quiz') return;
  if (e.key === 'ArrowRight') nextQ();
  if (e.key === 'ArrowLeft') prevQ();
});

// ========== Import ==========
function setupImport() {
  const zone = document.getElementById('importZone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const files = Array.from(e.dataTransfer.files || []);
    if (files.length) importBankFiles(files);
  });
}

async function handleFile(input) {
  const files = Array.from(input.files || []);
  if (files.length) await importBankFiles(files);
  input.value = '';
}

async function importBankFiles(files) {
  let imported = 0;
  let failed = 0;
  showToast(`正在导入 ${files.length} 个题库文件`);
  for (const file of files) {
    try {
      const text = await file.text();
      if (importJSON(text, null, { deferSave: true, silent: files.length > 1 })) imported++;
      else failed++;
    } catch(e) {
      failed++;
      console.error('[QuizApp] bank import failed:', file.name, e);
    }
    await new Promise(resolve => window.setTimeout(resolve, 0));
  }
  if (imported) {
    try {
      await saveBanks();
    } catch(e) {
      return;
    }
    state.pendingImportPath = [];
    if (state.activePath.length) renderSubject();
    else renderHome();
  }
  showToast(`已导入 ${imported} 个题库${failed ? `，${failed} 个失败` : ''}`);
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/'/g, '&#39;');
}

loadUiConfig();
loadAiState();
window.loadOcrConfig?.();
loadAnswerState();
loadStudyStats();
loadLibraryNodes();
loadBankMeta();
loadRecycleBin();
loadWrongBook();
loadRemoteAnnouncementCache();
(async () => {
  await loadBanks();
  await loadBundledBanks();
})();
showStartupAnnouncementIfNeeded();
scheduleAutoAnnouncementCheck();
scheduleAutoUpdateCheck();
scheduleAutoBankUpdateCheck();
startStudyTimer();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (state.uiConfig.theme === 'system') applyUiConfig();
});
let notebookLayoutResizeTimer = null;
window.addEventListener('resize', () => {
  window.clearTimeout(notebookLayoutResizeTimer);
  notebookLayoutResizeTimer = window.setTimeout(() => {
    if (state.view === 'notebookLibrary') {
      const nextMobileLayout = isNotebookLibraryMobileLayout();
      if (nextMobileLayout !== state.notebookLibraryMobileLayout) renderNotebookLibraryPage();
      return;
    }
    if (state.view !== 'handwriting') return;
    const nextFreeLayout = isNotebookFreeLayout();
    if (nextFreeLayout !== state.notebookFreeLayoutActive) renderHandwritingPractice();
  }, 120);
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    saveCurrentViewPosition();
    saveStudyStats();
    if (state.view === 'handwriting') saveCurrentInkNote({ silent: true });
  }
});
document.addEventListener('click', closeChoiceSelects);
window.addEventListener('beforeunload', () => {
  saveCurrentViewPosition();
  saveStudyStats();
  if (state.view === 'handwriting') saveCurrentInkNote({ silent: true });
  if (isSavablePracticeSession() && state.uiConfig.autoSaveOnExit) saveCurrentSession({ silent: true });
});
