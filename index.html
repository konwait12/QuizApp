function getAnnouncementId(item) {
  return String(item?.id || `${item?.date || ''}:${item?.title || ''}`).trim();
}

function sanitizeAnnouncementHtml(value) {
  return String(value || '')
    .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
    .replace(/\son\w+\s*=\s*(['"]).*?\1/gi, '')
    .replace(/\son\w+\s*=\s*[^\s>]+/gi, '')
    .replace(/javascript:/gi, '');
}

function normalizeAnnouncementItem(item, index = 0, remote = false) {
  if (!item || typeof item !== 'object') return null;
  const title = String(item.title || item.name || `公告 ${index + 1}`).trim();
  const date = String(item.date || item.publishedAt || item.updatedAt || '').trim();
  const id = String(item.id || `${remote ? 'remote' : 'local'}:${date}:${title}`).trim();
  const body = sanitizeAnnouncementHtml(item.bodyHtml || item.html || item.body || (item.text ? `<p>${escapeHtml(item.text)}</p>` : ''));
  if (!id || !title || !body) return null;
  return {
    id,
    title,
    date,
    body,
    latest: Boolean(item.latest),
    remote: Boolean(remote),
  };
}

function getLocalAnnouncements() {
  return ANNOUNCEMENTS.map((item, index) => normalizeAnnouncementItem(item, index, false)).filter(Boolean);
}

function announcementTimestamp(item) {
  const raw = String(item?.date || '').trim();
  if (!raw) return 0;
  const normalized = /^\d{4}-\d{2}-\d{2}$/.test(raw) ? `${raw}T00:00:00+08:00` : raw;
  const value = Date.parse(normalized);
  return Number.isFinite(value) ? value : 0;
}

function sortAnnouncements(items) {
  return [...(Array.isArray(items) ? items : [])].sort((left, right) => {
    const byTime = announcementTimestamp(right) - announcementTimestamp(left);
    if (byTime) return byTime;
    if (Boolean(left.latest) !== Boolean(right.latest)) return left.latest ? -1 : 1;
    return String(right.id || '').localeCompare(String(left.id || ''), 'zh-Hans-CN');
  });
}

function getLatestAnnouncement(items) {
  return sortAnnouncements(items)[0] || null;
}

function formatAnnouncementTime(item) {
  const value = announcementTimestamp(item);
  if (!value) return String(item?.date || '时间未知');
  return new Intl.DateTimeFormat('zh-CN', {
    year: 'numeric', month: '2-digit', day: '2-digit',
  }).format(new Date(value)).replaceAll('/', '-');
}

function getAllAnnouncements() {
  const seen = new Set();
  const items = [...state.remoteAnnouncements, ...getLocalAnnouncements()].filter(item => {
    const id = getAnnouncementId(item);
    if (!id || seen.has(id)) return false;
    seen.add(id);
    return true;
  });
  return sortAnnouncements(items);
}

function getReadAnnouncementIds() {
  try {
    const ids = JSON.parse(localStorage.getItem(ANNOUNCEMENT_READ_IDS_KEY) || '[]');
    return new Set(Array.isArray(ids) ? ids.map(String) : []);
  } catch(e) {
    return new Set();
  }
}

function saveReadAnnouncementIds(ids) {
  localStorage.setItem(ANNOUNCEMENT_READ_IDS_KEY, JSON.stringify(Array.from(ids)));
}

function isAnnouncementRead(item) {
  const id = getAnnouncementId(item);
  if (!id) return true;
  const read = getReadAnnouncementIds();
  if (read.has(id)) return true;
  return !item.remote && localStorage.getItem(ANNOUNCEMENT_SEEN_KEY) === ANNOUNCEMENT_ID;
}

function getUnreadAnnouncements() {
  return sortAnnouncements(getAllAnnouncements().filter(item => !isAnnouncementRead(item)));
}

function markAnnouncementsRead(items, suppress = false) {
  const ids = getReadAnnouncementIds();
  (Array.isArray(items) ? items : []).forEach(item => {
    const id = getAnnouncementId(item);
    if (id) ids.add(id);
  });
  saveReadAnnouncementIds(ids);
  const localIds = new Set(getLocalAnnouncements().map(getAnnouncementId));
  if ([...localIds].every(id => ids.has(id))) localStorage.setItem(ANNOUNCEMENT_SEEN_KEY, ANNOUNCEMENT_ID);
  if (suppress) localStorage.setItem(ANNOUNCEMENT_SUPPRESS_KEY, '1');
}

function markAnnouncementSeen(suppress = false, items = []) {
  markAnnouncementsRead(items.length ? items : [getLatestAnnouncement(getUnreadAnnouncements())].filter(Boolean), suppress);
}

function markAllAnnouncementsRead() {
  markAnnouncementsRead(getAllAnnouncements());
}

function hasUnreadAnnouncements() {
  return getUnreadAnnouncements().length > 0;
}

function shouldShowStartupAnnouncement() {
  const unread = getUnreadAnnouncements();
  if (!unread.length) return false;

    state.remoteAnnouncements = Array.isArray(items)
      ? items.map((item, index) => normalizeAnnouncementItem(item, index, true)).filter(Boolean)

}

function saveRemoteAnnouncementCache(items) {

    ? items.map((item, index) => normalizeAnnouncementItem(item, index, true)).filter(Boolean)
    : [];
  localStorage.setItem(ANNOUNCEMENT_REMOTE_CACHE_KEY, JSON.stringify(state.remoteAnnouncements));
  localStorage.setItem(ANNOUNCEMENT_REMOTE_LAST_CHECK_KEY, String(Date.now()));
}

function getAnnouncementAsset(release) {
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.find(asset => ANNOUNCEMENT_ASSET_NAMES.includes(asset?.name || '')) || null;
}

function normalizeAnnouncementPayload(payload) {
  const list = Array.isArray(payload) ? payload : (Array.isArray(payload?.announcements) ? payload.announcements : []);
  return list.map((item, index) => normalizeAnnouncementItem(item, index, true)).filter(Boolean);
}

async function checkForRemoteAnnouncements(options = {}) {
  const manual = Boolean(options.manual);
  if (!manual && state.uiConfig.autoAnnouncementCheck === false) return [];
  try {
    let payload = null;
    try {
      const feedResponse = await fetch(ANNOUNCEMENT_FEED_URL, { cache: 'no-store' });
      if (feedResponse.ok) payload = await feedResponse.json();
    } catch(e) {}
    if (!payload) {
      try {
        const localResponse = await fetch(ANNOUNCEMENT_LOCAL_FEED_URL, { cache: 'no-store' });
        if (localResponse.ok) payload = await localResponse.json();
      } catch(e) {}
    }
    if (!payload) {
      const release = options.release || await fetchLatestRelease();
      const asset = getAnnouncementAsset(release);
      if (!asset) {
        if (manual) showNotice('当前没有可用的远程公告文件');
        return [];
      }
      payload = await fetchReleaseJsonAsset(asset);
    }
    const items = normalizeAnnouncementPayload(payload);
    saveRemoteAnnouncementCache(items);
    if (state.view === 'home') renderHome();
    const unread = getUnreadAnnouncements().filter(item => item.remote);
    if (unread.length) {
      showAnnouncementDialog({ startup: !manual, all: false });
    } else if (manual) {
      showNotice('公告已经是最新，没有未读公告');
    }
    return items;
  } catch(e) {
    if (manual) showNotice(`检查公告失败：${e.message || e}`);
    return [];
  }
}

function scheduleAutoAnnouncementCheck() {
  window.setTimeout(() => {
    if (document.querySelector('.app-dialog-mask')) {
      scheduleAutoAnnouncementCheck();
      return;
    }
    checkForRemoteAnnouncements({ manual: false });
  }, 1100);
}

function normalizeVersionTag(value) {
  return String(value || '').trim().replace(/^v/i, '');
}

function compareVersionTags(a, b) {
  const left = normalizeVersionTag(a).split(/[.-]/).map(part => Number.parseInt(part, 10));
  const right = normalizeVersionTag(b).split(/[.-]/).map(part => Number.parseInt(part, 10));
  const length = Math.max(left.length, right.length);
  for (let i = 0; i < length; i++) {
    const av = Number.isFinite(left[i]) ? left[i] : 0;
    const bv = Number.isFinite(right[i]) ? right[i] : 0;
    if (av > bv) return 1;
    if (av < bv) return -1;
  }
  return 0;
}

function normalizeCommit(value) {
  return String(value || '').trim().toLowerCase();
}

function getReleaseTargetCommit(release) {
  return normalizeCommit(release?.target_commitish || release?.targetCommitish || release?.target || '');
}

function getApkAssetFingerprint(asset) {
  if (!asset) return '';
  return [
    asset.name || '',
    asset.id || '',
    asset.size || '',
    asset.digest || '',
    asset.updated_at || asset.updatedAt || '',
  ].join('|');
}

function getReleaseUpdateFingerprint(release, apkAsset) {
  return [
    release?.tag_name || release?.tagName || '',
    getReleaseTargetCommit(release),
    getApkAssetFingerprint(apkAsset),
  ].join('::');
}

function hasInstallableReleaseUpdate(release, apkAsset) {
  if (!release || !apkAsset) return false;
  const latestTag = release?.tag_name || release?.tagName || '';
  const versionCompare = compareVersionTags(latestTag, APP_VERSION);
  if (versionCompare > 0) return true;
  if (versionCompare < 0) return false;
  const releaseCommit = getReleaseTargetCommit(release);
  const buildCommit = normalizeCommit(APP_BUILD_COMMIT);
  return Boolean(releaseCommit && buildCommit && buildCommit !== 'dev' && releaseCommit !== buildCommit);
}

function getLatestApkAsset(release) {
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.find(asset => /\.apk$/i.test(asset?.name || '')) || null;
}

function formatUpdateCheckTime() {
  const time = Number(localStorage.getItem(UPDATE_LAST_CHECK_KEY) || 0);
  if (!time) return '尚未检查';
  try {
    return new Date(time).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    return '已检查';
  }
}

async function fetchLatestRelease() {
  const res = await fetch(RELEASE_API_URL, {
    cache: 'no-store',
    headers: { 'Accept': 'application/vnd.github+json' },
  });
  if (!res.ok) throw new Error(`GitHub 返回 ${res.status}`);
  return res.json();
}

async function checkForUpdates(options = {}) {
  const manual = Boolean(options.manual);
  if (!manual && state.uiConfig.autoUpdateCheck === false) return null;
  if (manual) showToast('正在检查更新');
  try {
    const release = await fetchLatestRelease();
    localStorage.setItem(UPDATE_LAST_CHECK_KEY, String(Date.now()));
    const latestTag = release?.tag_name || release?.tagName || '';
    const apkAsset = getLatestApkAsset(release);
    const updateFingerprint = getReleaseUpdateFingerprint(release, apkAsset);
    const hasNewer = hasInstallableReleaseUpdate(release, apkAsset);
    if (hasNewer && apkAsset) {
      if (!manual && localStorage.getItem(UPDATE_DISMISSED_TAG_KEY) === updateFingerprint) return release;
      showUpdateDialog({ release, apkAsset, manual });
    } else if (manual) {
      showNotice(`当前已是最新版本：${APP_VERSION}`);
    }
    if (state.view === 'settings' && !document.querySelector('.app-dialog-mask')) renderSettings();
    return release;
  } catch(e) {
    if (manual) showNotice(`检查更新失败：${e.message || e}`);
    return null;
  }
}

function getLatestBankManifestAsset(release) {
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.find(asset => BANK_MANIFEST_ASSET_NAMES.includes(asset?.name || '')) || null;
}

function getReleaseBankJsonAssets(release) {
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.filter(asset => {
    const name = String(asset?.name || '');
    return name.toLowerCase().endsWith('.json')
      && name.toLowerCase().startsWith(BANK_ASSET_PREFIX)
      && !BANK_MANIFEST_ASSET_NAMES.includes(name);
  });
}

function formatBankUpdateCheckTime() {
  const time = Number(localStorage.getItem(BANK_UPDATE_LAST_CHECK_KEY) || 0);
  if (!time) return '尚未检查';
  try {
    return new Date(time).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    return '已检查';
  }
}

async function fetchReleaseJsonAsset(asset) {
  const url = asset?.browser_download_url || asset?.url;
  if (!url) throw new Error('Release 资产缺少下载地址');
  const headers = asset?.browser_download_url ? {} : { 'Accept': 'application/octet-stream' };
  const res = await fetch(url, { cache: 'no-store', headers });
  if (!res.ok) throw new Error(`${asset?.name || 'JSON'} 下载失败：${res.status}`);
  return res.json();
}

function findReleaseAssetByName(release, name) {
  const target = String(name || '').trim();
  if (!target) return null;
  const assets = Array.isArray(release?.assets) ? release.assets : [];
  return assets.find(asset => asset?.name === target) || null;
}

    </div>

function updateBankCheckingDialog(percent, message) {

  if (fill) fill.style.width = `${Math.max(8, Math.min(100, percent))}%`;

function normalizeReleaseBankMeta(entry, source, index, bank = null) {
  const data = bank || (entry && typeof entry === 'object' ? entry : {});
  const rawName = data.name || data.title || data['科目'] || entry?.name || entry?.title || source || `题库 ${index + 1}`;
  const parsed = parseBankName(rawName);
  const subject = data.subject || data['科目'] || entry?.subject || entry?.['科目'] || parsed.subject;
  const chapter = getDisplayChapter(subject, data.chapter || data['章节'] || entry?.chapter || entry?.['章节'] || parsed.chapter);
  const path = normalizePath(data.path || data['路径'] || entry?.path || entry?.['路径'] || [subject, chapter]);
  return {
    name: data.name || entry?.name || pathTitle(path) || rawName,
    subject,
    chapter,
    path,
    questionCount: Array.isArray(data.questions) ? data.questions.length : Number(entry?.questionCount || entry?.count || 0),
  };
}

function createReleaseBankItem({ entry = {}, payload = null, asset = null, source = '', release, index }) {
  const embedded = payload || entry.bank || entry.data || (entry.questions ? entry : null);
  const bank = embedded ? normalizeReleaseBankPayload(embedded, release, source || entry.file || entry.name || `bank-${index + 1}`, index) : null;
  const meta = normalizeReleaseBankMeta(entry, source || asset?.name || entry.file || entry.name, index, bank);
  return {
    index,
    entry,
    bank,
    asset,
    url: entry.url || '',
    source: source || asset?.name || entry.file || entry.asset || entry.name || meta.name,
    ...meta,
  };
}

async function collectReleaseBankItems(release) {
  const manifestAsset = getLatestBankManifestAsset(release);
  const items = [];
  if (manifestAsset) {
    const manifest = await fetchReleaseJsonAsset(manifestAsset);
    const entries = Array.isArray(manifest) ? manifest : (Array.isArray(manifest?.banks) ? manifest.banks : []);
    for (let index = 0; index < entries.length; index++) {
      const entry = entries[index];
      if (!entry) continue;
      if (entry.questions || entry.bank || entry.data) {
        items.push(createReleaseBankItem({
          entry,
          payload: entry.bank || entry.data || entry,
          source: entry.file || entry.name || manifestAsset.name,
          release,
          index,
        }));
        continue;
      }
      const asset = findReleaseAssetByName(release, entry.file || entry.asset || entry.name);
      if (asset || entry.url) {
        items.push(createReleaseBankItem({
          entry,
          asset,
          source: asset?.name || entry.file || entry.asset || entry.name || entry.url,
          release,
          index,
        }));
      }
    }
    return items;
  }

  const assets = getReleaseBankJsonAssets(release);
  for (let index = 0; index < assets.length; index++) {
    const asset = assets[index];
    items.push(createReleaseBankItem({ asset, source: asset.name, release, index }));
  }
  return items;
}

function normalizeReleaseBankPayload(payload, release, source, index) {
  const data = payload && typeof payload === 'object' ? payload : {};
  const fallbackId = String(data.id || data.name || source || `bank-${index + 1}`).replace(/^release:/, '');
  const stableId = String(data.id || '').trim() || `release:${fallbackId}`;
  const bank = normalizeBank({
    ...data,
    id: stableId,
    releaseManaged: true,
    releaseVersion: release?.tag_name || release?.tagName || '',
    releaseSource: source || '',
  }, stableId, false);
  bank.releaseManaged = true;
  bank.releaseVersion = release?.tag_name || release?.tagName || '';
  bank.releaseSource = source || '';
  return bank;
}

async function loadReleaseBankItem(item, release, index) {
  if (item.bank) return item.bank;
  let payload = null;
  if (item.asset) {
    payload = await fetchReleaseJsonAsset(item.asset);
  } else if (item.url) {
    const res = await fetch(item.url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`${item.url} 下载失败：${res.status}`);
    payload = await res.json();
  } else {
    throw new Error(`题库 ${item.name || index + 1} 缺少下载地址`);
  }
  item.bank = normalizeReleaseBankPayload(payload, release, item.source || item.name, index);
  item.questionCount = item.bank.questions.length;
  item.path = getBankPath(item.bank);
  item.name = item.bank.name;
  item.subject = item.bank.subject;
  item.chapter = item.bank.chapter;
  return item.bank;
}

async function checkForBankUpdates(options = {}) {
  const manual = Boolean(options.manual);
  if (!manual && state.uiConfig.autoBankUpdateCheck === false) return [];
  if (manual) showBankCheckingDialog();
  try {
    if (manual) updateBankCheckingDialog(18, '正在读取最新 Release');
    const release = await fetchLatestRelease();
    if (manual) updateBankCheckingDialog(42, '正在读取题库清单');
    const items = await collectReleaseBankItems(release);
    if (manual) updateBankCheckingDialog(78, '正在整理可下载题库');
    localStorage.setItem(BANK_UPDATE_LAST_CHECK_KEY, String(Date.now()));
    const validItems = items.filter(item => item.bank ? item.bank.questions.length : (item.asset || item.url || item.questionCount));
    if (manual) {
      updateBankCheckingDialog(100, '检查完成');
      showBankUpdateDialog({ release, items: validItems });
    } else if (validItems.length && hasNewReleaseBankUpdate(validItems, release)) {
      const fingerprint = getBankReleaseFingerprint(validItems, release);
      if (localStorage.getItem(BANK_UPDATE_DISMISSED_KEY) !== fingerprint) {
        showBankUpdateDialog({ release, items: validItems, automatic: true });
      }
    }
    if (state.view === 'settings' && !document.querySelector('.app-dialog-mask')) renderSettings();
    return validItems;
  } catch(e) {
    if (manual) showNotice(`题库更新失败：${e.message || e}`);
    return [];
  }
}

function getBankUpdateMeta() {
  try {
    return JSON.parse(localStorage.getItem(BANK_UPDATE_META_KEY) || '{}') || {};
  } catch(e) {
    return {};
  }
}

function getReleaseItemPath(item) {
  return normalizePath(item.path || (item.bank ? getBankPath(item.bank) : []));
}

function getReleaseItemCount(item) {
  return Number(item.questionCount || item.bank?.questions?.length || 0);
}

function findBankByPath(path) {
  const key = pathKey(path);
  return state.banks.find(bank => pathKey(getBankPath(bank)) === key) || null;
}

function findBankConflict(item) {
  const p = getReleaseItemPath(item);
  const byPath = findBankByPath(p);
  if (byPath) return byPath;
  const name = String(item?.name || pathTitle(p) || '').trim();
  if (!name) return null;
  return state.banks.find(bank => String(bank.name || pathTitle(getBankPath(bank)) || '').trim() === name) || null;
}

function hasNewReleaseBankUpdate(items, release) {
  if (!items.length) return false;
  const meta = getBankUpdateMeta();
  const fingerprint = getBankReleaseFingerprint(items, release);
  if (meta.fingerprint) return meta.fingerprint !== fingerprint;
  const tag = release?.tag_name || release?.tagName || '';
  const sources = items.map(item => item.source || item.bank?.releaseSource).filter(Boolean).sort().join('|');
  const oldSources = Array.isArray(meta.sources) ? meta.sources.slice().sort().join('|') : '';
  return meta.tag !== tag || Number(meta.count || 0) !== items.length || oldSources !== sources;
}

function getBankReleaseFingerprint(items, release) {
  const assetFingerprint = asset => asset ? [
    asset.name || '', asset.id || '', asset.size || '', asset.digest || '', asset.updated_at || asset.updatedAt || '',
  ].join(':') : '';
  const manifest = getLatestBankManifestAsset(release);
  const releaseAssets = manifest
    ? [assetFingerprint(manifest)]
    : getReleaseBankJsonAssets(release).map(assetFingerprint).sort();
  const itemFingerprint = items.map(item => [
    item.source || item.asset?.name || item.url || '',
    pathKey(getReleaseItemPath(item)),
    getReleaseItemCount(item),
    assetFingerprint(item.asset),
  ].join(':')).sort();
  return [
    release?.tag_name || release?.tagName || '',
    getReleaseTargetCommit(release),
    ...releaseAssets,
    ...itemFingerprint,
  ].join('|');
}

function summarizeReleaseBankGroups(items) {
  const groups = new Map();
  for (const item of items) {
    const subject = item.subject || pathTitle(getReleaseItemPath(item)) || '未分类';
    const current = groups.get(subject) || { subject, banks: 0, questions: 0 };
    current.banks += 1;
    current.questions += getReleaseItemCount(item);
    groups.set(subject, current);
  }
  return Array.from(groups.values()).sort((a, b) => a.subject.localeCompare(b.subject, 'zh-CN'));
}

function buildReleaseBankTree(items) {
  const root = { title: '', path: [], children: new Map(), items: [] };
  let groupIndex = 0;
  items.forEach((item, index) => {
    const p = getReleaseItemPath(item);
    const hierarchy = p.length > 1 ? p.slice(0, -1) : [item.subject || p[0] || '未分类'];
    let node = root;
    hierarchy.forEach((title, depth) => {
      const key = pathKey(hierarchy.slice(0, depth + 1));
      if (!node.children.has(key)) {
        node.children.set(key, {
          key: `release-group-${groupIndex++}`,
          title,
          path: hierarchy.slice(0, depth + 1),
          children: new Map(),
          items: [],
          leafCount: 0,
          questions: 0,
        });
      }
      node = node.children.get(key);
    });
    node.items.push({ item, index });
  });
  const finalize = node => {
    const children = Array.from(node.children.values()).sort((a, b) => a.title.localeCompare(b.title, 'zh-CN'));
    node.children = children;
    node.leafCount = node.items.length;
    node.questions = node.items.reduce((sum, entry) => sum + getReleaseItemCount(entry.item), 0);
    children.forEach(child => {
      finalize(child);
      node.leafCount += child.leafCount;
      node.questions += child.questions;
    });
    return node;
  };
  finalize(root);
  return root.children;
}

function buildReleaseBankGroups(items) {
  return buildReleaseBankTree(items);
}

function scheduleAutoBankUpdateCheck() {
  window.setTimeout(() => {
    if (document.querySelector('.app-dialog-mask')) {
      scheduleAutoBankUpdateCheck();
      return;

    checkForBankUpdates({ manual: false });
  }, 2600);
}

function renderReleaseBankRows(items) {
  const groups = buildReleaseBankTree(items);
  const renderGroup = (group, depth = 0) => `
    <details class="release-bank-group" data-group="${escapeHtml(group.key)}" data-depth="${depth}" ${depth < 2 ? 'open' : ''}>
      <summary>
        <input class="release-bank-subject-check" type="checkbox" data-group="${escapeHtml(group.key)}" checked onclick="event.stopPropagation()">
        <span class="release-bank-group-title">

          <span>${group.leafCount} 个题库 · ${group.questions} 题${group.children.length ? '，可继续展开分级选择' : '，可展开只选部分章节'}</span>
        </span>
        <span class="release-bank-group-arrow">›</span>
      </summary>
      <div class="release-bank-children">
        ${group.children.map(child => renderGroup(child, depth + 1)).join('')}

      </div>

    <div class="release-bank-toolbar">

      </span>

    </div>
  `;
}

function updateReleaseBankSelectionHint(dialog) {
  const hint = dialog.querySelector('#bankSelectionHint');
  if (!hint) return;
  const selected = dialog.querySelectorAll('.release-bank-check:checked').length;
  const total = dialog.querySelectorAll('.release-bank-check').length;
  hint.textContent = `已选择 ${selected}/${total} 个题库`;
}

function syncReleaseBankGroupState(dialog, groupKey) {
  const subject = dialog.querySelector(`.release-bank-subject-check[data-group="${groupKey}"]`);
  const group = dialog.querySelector(`.release-bank-group[data-group="${groupKey}"]`);
  const checks = Array.from(group?.querySelectorAll('.release-bank-check') || []);
  if (!subject || !checks.length) return;
  const checked = checks.filter(input => input.checked).length;
  subject.checked = checked === checks.length;
  subject.indeterminate = checked > 0 && checked < checks.length;
}

function syncAllReleaseBankGroups(dialog) {
  Array.from(dialog.querySelectorAll('.release-bank-group')).reverse().forEach(group => {
    syncReleaseBankGroupState(dialog, group.dataset.group || '');
  });
}

function wireReleaseBankTree(dialog) {
  dialog.querySelectorAll('.release-bank-subject-check').forEach(input => {
    input.addEventListener('change', () => {
      const groupKey = input.dataset.group || '';
      const group = dialog.querySelector(`.release-bank-group[data-group="${groupKey}"]`);
      group?.querySelectorAll('.release-bank-check,.release-bank-subject-check').forEach(child => {
        child.checked = input.checked;
        child.indeterminate = false;
      });
      syncAllReleaseBankGroups(dialog);
      updateReleaseBankSelectionHint(dialog);
    });
  });
  dialog.querySelectorAll('.release-bank-check').forEach(input => {
    input.addEventListener('change', () => {
      syncAllReleaseBankGroups(dialog);
      updateReleaseBankSelectionHint(dialog);
    });
  });
  dialog.querySelectorAll('[data-bank-tree-action]').forEach(button => {
    button.addEventListener('click', () => {
      const checked = button.dataset.bankTreeAction === 'select-all';
      dialog.querySelectorAll('.release-bank-check,.release-bank-subject-check').forEach(input => {
        input.checked = checked;
        input.indeterminate = false;
      });
      updateReleaseBankSelectionHint(dialog);
    });
  });
  syncAllReleaseBankGroups(dialog);
  updateReleaseBankSelectionHint(dialog);
}

function showBankUpdateDialog({ release, items = [], automatic = false }) {
  closeAppDialog();
  const latestTag = release?.tag_name || release?.tagName || 'Release';
  const releaseUrl = release?.html_url || release?.url || RELEASE_PAGE_URL;
  const hasBanks = items.length > 0;
  const hasUpdate = hasNewReleaseBankUpdate(items, release);
  const totalQuestions = items.reduce((sum, item) => sum + getReleaseItemCount(item), 0);
  const groups = summarizeReleaseBankGroups(items);
  const groupHtml = groups.slice(0, 8).map(group => `
    <li><strong>${escapeHtml(group.subject)}</strong>：${group.banks} 个题库 · ${group.questions} 题</li>
  `).join('');
  const moreHtml = groups.length > 8 ? `<li>还有 ${groups.length - 8} 个科目未展开显示。</li>` : '';
  const meta = getBankUpdateMeta();
  const updateFingerprint = getBankReleaseFingerprint(items, release);
  const statusText = !hasBanks
    ? '当前 Release 没有可用的题库更新包。'
    : (hasUpdate ? '发现可下载的题库更新包。' : '当前本机记录显示题库已经是最新。');
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  const dialog = document.createElement('div');
  dialog.className = 'app-dialog announcement-dialog';
  dialog.innerHTML = `
    <h3>题库更新检查</h3>
    <div class="announcement-body">
      <p>${escapeHtml(statusText)}</p>
      <p>Release：<strong>${escapeHtml(latestTag)}</strong></p>
      ${meta.tag ? `<p>本机上次题库版本：${escapeHtml(meta.tag)} · ${Number(meta.count || 0)} 个题库</p>` : '<p>本机还没有题库更新记录。</p>'}
      ${hasBanks ? `
        <p>可用题库包：<strong>${items.length}</strong> 个题库，合计 <strong>${totalQuestions}</strong> 题。</p>
        <ul>${groupHtml}${moreHtml}</ul>
        ${renderReleaseBankRows(items)}
        <p>勾选要下载的题库；同路径题库可以选择覆盖，也可以另存为新题库。不会清除本地做题进度和错题集。</p>
      ` : '<p>请确认 Release 中存在 quizapp-bank-manifest.json，或上传 quizapp-bank-*.json。</p>'}
    </div>
    <div class="update-progress" id="bankUpdateProgress" hidden>
      <div class="update-progress-track"><div class="update-progress-fill" id="bankUpdateProgressFill"></div></div>
      <div class="update-progress-text" id="bankUpdateProgressText">等待下载</div>
    </div>
    ${automatic ? `
      <label class="announcement-option">
        <input id="bankUpdateDontShowThisBatch" type="checkbox">
        <span>这批题库不再自动提醒</span>
      </label>
    ` : ''}
    <div class="app-dialog-actions ${hasBanks ? 'triple' : ''}">
      <button class="secondary" type="button">${automatic ? '稍后' : '关闭'}</button>
      ${hasBanks ? '<button class="secondary" type="button">Release</button><button type="button">下载题库</button>' : '<button type="button">查看 Release</button>'}
    </div>
  `;
  mask.appendChild(dialog);
  document.body.appendChild(mask);
  if (hasBanks) wireReleaseBankTree(dialog);
  const buttons = dialog.querySelectorAll('.app-dialog-actions button');
  const closeBtn = buttons[0];
  const releaseBtn = hasBanks ? buttons[1] : buttons[1];
  const downloadBtn = hasBanks ? buttons[2] : null;
  const close = () => {
    if (automatic && document.getElementById('bankUpdateDontShowThisBatch')?.checked) {
      localStorage.setItem(BANK_UPDATE_DISMISSED_KEY, updateFingerprint);
    }
    closeAppDialog();
  };
  closeBtn.onclick = close;
  releaseBtn.onclick = () => openExternal(releaseUrl);
  if (downloadBtn) {
    downloadBtn.onclick = async () => {
      const progress = document.getElementById('bankUpdateProgress');
      const fill = document.getElementById('bankUpdateProgressFill');
      const text = document.getElementById('bankUpdateProgressText');
      const selected = Array.from(dialog.querySelectorAll('.release-bank-check:checked'))
        .map(input => Number(input.dataset.index))
        .filter(index => Number.isInteger(index) && items[index]);
      if (!selected.length) return showToast('请至少选择一个题库');
      progress.hidden = false;
      fill.style.width = '8%';
      text.textContent = '正在下载题库';
      downloadBtn.disabled = true;
      try {
        const selectedBanks = [];
        const modes = new Map();
        for (let i = 0; i < selected.length; i++) {
          const itemIndex = selected[i];
          const item = items[itemIndex];
          const modeEl = dialog.querySelector(`#releaseBankAction${itemIndex}`);
          modes.set(itemIndex, modeEl?.value || 'overwrite');
          text.textContent = `正在下载题库 ${i + 1}/${selected.length}`;
          fill.style.width = `${Math.max(8, Math.round(((i + 0.5) / selected.length) * 80))}%`;
          selectedBanks.push({ bank: await loadReleaseBankItem(item, release, itemIndex), mode: modes.get(itemIndex) });
        }
        fill.style.width = '96%';
        text.textContent = '正在写入本地题库';
        const selectedItems = selected.map(index => items[index]);
        await applyReleaseBankUpdates(selectedBanks, release, getBankReleaseFingerprint(selectedItems, release));
        fill.style.width = '100%';
        text.textContent = `题库更新完成：${selectedBanks.length} 个题库`;
        showToast(`题库更新完成：${selectedBanks.length} 个题库`);
        window.setTimeout(() => {
          closeAppDialog();
          if (state.view === 'settings') renderSettings();
        }, 520);
      } catch(e) {
        downloadBtn.disabled = false;
        text.textContent = `题库下载失败：${e.message || e}`;
        showToast('题库下载失败');
      }
    };
  }
  mask.onclick = e => { if (e.target === mask) close(); };
  (downloadBtn || closeBtn).focus();
}

function uniqueReleaseCopyPath(path, release) {
  const base = normalizePath(path);
  const parent = base.slice(0, -1);
  const title = base[base.length - 1] || '新题库';
  const tag = String(release?.tag_name || release?.tagName || '').replace(/^v/i, '') || '新版';
  let candidate = `${title}（${tag}）`;
  let index = 2;
  const used = new Set(state.banks.map(bank => pathKey(getBankPath(bank))));
  while (used.has(pathKey([...parent, candidate]))) {
    candidate = `${title}（${tag}-${index++}）`;
  }
  return [...parent, candidate];
}

function prepareReleaseBankForCopy(bank, release) {
  const next = JSON.parse(JSON.stringify(bank));
  const newPath = uniqueReleaseCopyPath(getBankPath(bank), release);
  next.path = newPath;
  next.subject = newPath[0] || next.subject;
  next.chapter = newPath[newPath.length - 1] || next.chapter;
  next.name = `${next.subject}-${next.chapter}`;
  next.id = `${next.id || 'release'}:copy:${Date.now()}:${Math.random().toString(36).slice(2, 7)}`;
  return next;
}

async function applyReleaseBankUpdates(entries, release, fingerprint = '') {
  const normalized = entries.map(entry => entry?.bank ? entry : { bank: entry, mode: 'overwrite' }).filter(entry => entry.bank);
  for (const entry of normalized) {
    let bank = entry.bank;
    const originalPath = getBankPath(bank);
    if (entry.mode === 'copy') {
      bank = prepareReleaseBankForCopy(bank, release);
    } else {
      const id = bank.id;
      const path = pathKey(originalPath);
      const name = String(bank.name || pathTitle(originalPath) || '').trim();
      state.banks = state.banks.filter(item => {
        const sameName = name && String(item.name || pathTitle(getBankPath(item)) || '').trim() === name;
        return item.id !== id && pathKey(getBankPath(item)) !== path && !sameName;
      });
    }
    ensureLibraryPath(getBankPath(bank));
    state.banks.push(bank);
  }
  await saveBanks();
  localStorage.setItem(BANK_UPDATE_META_KEY, JSON.stringify({
    tag: release?.tag_name || release?.tagName || '',
    checkedAt: Date.now(),
    count: normalized.length,
    sources: normalized.map(entry => entry.bank.releaseSource).filter(Boolean),
    fingerprint,
  }));
  if (state.view === 'home') renderHome();
  if (state.view === 'subjects') renderSubject();
}

function showUpdateDialog({ release, apkAsset, manual = false }) {
  closeAppDialog();
  const latestTag = release?.tag_name || release?.tagName || '';
  const releaseCommit = getReleaseTargetCommit(release);
  const updateFingerprint = getReleaseUpdateFingerprint(release, apkAsset);
  const releaseUrl = release?.html_url || release?.url || RELEASE_PAGE_URL;
  const downloadUrl = apkAsset?.browser_download_url || apkAsset?.url || releaseUrl;
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  const dialog = document.createElement('div');
  dialog.className = 'app-dialog announcement-dialog';
  dialog.innerHTML = `
    <h3>发现新版本 ${escapeHtml(latestTag)}</h3>
    <div class="announcement-body">
      <p>当前版本：<strong>${escapeHtml(APP_VERSION)}</strong></p>
      <p>当前构建：<code>${escapeHtml(APP_BUILD_COMMIT === 'dev' ? '本地开发版' : APP_BUILD_COMMIT.slice(0, 12))}</code>${releaseCommit ? `，Release 构建：<code>${escapeHtml(releaseCommit.slice(0, 12))}</code>` : ''}</p>
      <p>GitHub Release 已发布新版 APK。点击“下载 APK”会优先调用系统下载器，下载完成后拉起系统安装器；浏览器环境会直接打开 APK 下载链接。</p>
      <p>覆盖安装不会清除本机题库、做题进度、错题集、设置和学习统计；这些数据保存在同一个 App 包名的数据区。不要先卸载旧版，也不要清除应用数据。</p>
      <p>如果系统提示签名不一致，说明安装包不是同一个签名来源，不能覆盖安装，请改用本项目 release 内的 APK。</p>
    </div>
    <label class="announcement-option">
      <input id="updateDontShowThisTag" type="checkbox">
      <span>这个版本不再自动提醒</span>
    </label>
    <div class="update-progress" id="updateProgress" hidden>
      <div class="update-progress-track"><div class="update-progress-fill" id="updateProgressFill"></div></div>
      <div class="update-progress-text" id="updateProgressText">等待下载</div>
    </div>
    <div class="app-dialog-actions triple">
      <button class="secondary" type="button">稍后</button>
      <button class="secondary" type="button">Release</button>
      <button type="button">下载 APK</button>
    </div>
  `;
  mask.appendChild(dialog);
  document.body.appendChild(mask);
  const [laterBtn, releaseBtn, downloadBtn] = dialog.querySelectorAll('button');
  const close = () => {
    if (document.getElementById('updateDontShowThisTag')?.checked && latestTag) {
      localStorage.setItem(UPDATE_DISMISSED_TAG_KEY, updateFingerprint || latestTag);
    }
    closeAppDialog();
  };
  laterBtn.onclick = close;
  releaseBtn.onclick = () => openExternal(releaseUrl);
  downloadBtn.onclick = () => {
    if (latestTag) localStorage.setItem(UPDATE_DISMISSED_TAG_KEY, latestTag);
    downloadApk(downloadUrl);
  };
  mask.onclick = e => { if (e.target === mask) close(); };
  downloadBtn.focus();
}

function scheduleAutoUpdateCheck() {

function restoreSubjectScroll(options = {}) {
  if (!options.preserveScroll) return;
  const anchor = options.scrollAnchor || {};
  const restore = () => {
    const scroller = document.querySelector('.viewport.view-scroll');
    if (!scroller) return;
    const oldBehavior = scroller.style.scrollBehavior;
    const oldAnchor = scroller.style.overflowAnchor;
    scroller.style.scrollBehavior = 'auto';
    scroller.style.overflowAnchor = 'none';
    scroller.scrollTop = Number(anchor.scrollTop || 0);
    if (anchor.bankId && Number.isFinite(anchor.cardTop)) {
      const card = findBankCardElement(anchor.bankId);
      if (card) scroller.scrollTop += card.getBoundingClientRect().top - anchor.cardTop;
    }
    scroller.style.scrollBehavior = oldBehavior;
    scroller.style.overflowAnchor = oldAnchor;
  };
  restore();
  requestAnimationFrame(() => {
    restore();
    requestAnimationFrame(restore);
  });
}

function computeQuizProgress(session) {
  const total = session?.questions?.length || 0;
  const codes = new Array(total);
  let correctCount = 0;
  let wrongCount = 0;
  if (state.reviewMode) {
    codes.fill(3);
    return { codes, correctCount: 0, wrongCount: 0, unansweredCount: 0 };
  }
  for (let i = 0; i < total; i++) {
    const answer = state.answers[i];
    if (!answer) {
      codes[i] = 0;
      continue;
    }
    if (checkAnswer(session.questions[i], answer)) {
      correctCount++;
      codes[i] = 1;
    } else {
      wrongCount++;
      codes[i] = 2;
    }
  }
  return { codes, correctCount, wrongCount, unansweredCount: total - correctCount - wrongCount };
}

function drawQuizProgressBar(codes) {
  const canvas = document.getElementById('quizProgressCanvas');
  if (!canvas || !codes || !codes.length) return;
  const rect = canvas.getBoundingClientRect();
  const cssWidth = Math.max(1, Math.floor(rect.width));
  const cssHeight = Math.max(1, Math.floor(rect.height));
  const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  const internalWidth = Math.max(Math.ceil(cssWidth * dpr), codes.length * 2);
  const internalHeight = Math.max(2, Math.ceil(cssHeight * dpr));
  if (canvas.width !== internalWidth) canvas.width = internalWidth;
  if (canvas.height !== internalHeight) canvas.height = internalHeight;
  const ctx = canvas.getContext('2d');
  if (!ctx) return;
  const style = getComputedStyle(document.documentElement);
  const colors = [
    style.getPropertyValue('--line').trim() || '#e2eadb',
    style.getPropertyValue('--success').trim() || '#22a06b',
    style.getPropertyValue('--danger').trim() || '#d94a5a',
    style.getPropertyValue('--primary').trim() || '#1f8f62',
  ];
  ctx.clearRect(0, 0, internalWidth, internalHeight);
  const unit = internalWidth / codes.length;
  const gap = unit >= 3 ? Math.max(1, Math.floor(unit * .28)) : 0;
  for (let i = 0; i < codes.length; i++) {
    const x = Math.floor(i * unit);
    const nextX = Math.ceil((i + 1) * unit);
    const width = Math.max(1, nextX - x - gap);
    ctx.fillStyle = colors[codes[i] || 0];
    ctx.fillRect(x, 0, width, internalHeight);
  }
}

function clampNumber(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function getScrollWindow(total, center = state.currentIndex) {
  if (total <= 36) return { start: 0, end: Math.max(0, total - 1) };
  const radius = 7;
  let start = center - radius;
  let end = center + radius;
  if (start < 0) {
    end += -start;
    start = 0;
  }
  if (end > total - 1) {
    start -= end - (total - 1);
    end = total - 1;
  }
  start = clampNumber(start, 0, Math.max(0, total - 1));
  end = clampNumber(end, 0, Math.max(0, total - 1));
  return { start, end };
}

function openInkDatabase() {
  return new Promise((resolve, reject) => {
    if (!window.indexedDB) return reject(new Error('当前环境不支持 IndexedDB'));
    const request = indexedDB.open(INK_DB_NAME, INK_DB_VERSION);
    request.onupgradeneeded = () => {
      const database = request.result;
      if (!database.objectStoreNames.contains(INK_STORE_NAME)) database.createObjectStore(INK_STORE_NAME, { keyPath: 'key' });
      if (!database.objectStoreNames.contains(BANK_STORE_NAME)) database.createObjectStore(BANK_STORE_NAME, { keyPath: 'id' });
      if (!database.objectStoreNames.contains(NOTEBOOK_STORE_NAME)) database.createObjectStore(NOTEBOOK_STORE_NAME, { keyPath: 'id' });
      const assetStore = database.objectStoreNames.contains(NOTEBOOK_ASSET_STORE_NAME)
        ? request.transaction.objectStore(NOTEBOOK_ASSET_STORE_NAME)
        : database.createObjectStore(NOTEBOOK_ASSET_STORE_NAME, { keyPath: 'id' });
      if (!assetStore.indexNames.contains(NOTEBOOK_ASSET_DOCUMENT_INDEX)) {
        assetStore.createIndex(NOTEBOOK_ASSET_DOCUMENT_INDEX, 'documentId', { unique: false });
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error('无法打开手写存储'));
  });
}

async function readInkNote(key) {
  try {
    const database = await openInkDatabase();
    return await new Promise((resolve, reject) => {
      const transaction = database.transaction(INK_STORE_NAME, 'readonly');
      const request = transaction.objectStore(INK_STORE_NAME).get(key);
      request.onsuccess = () => resolve(request.result || null);
      request.onerror = () => reject(request.error);
      transaction.oncomplete = () => database.close();
    });
  } catch(e) {
    return null;
  }
}

async function readAllInkNotes() {
  try {
    const database = await openInkDatabase();
    return await new Promise((resolve, reject) => {
      const transaction = database.transaction(INK_STORE_NAME, 'readonly');
      const request = transaction.objectStore(INK_STORE_NAME).getAll();
      request.onsuccess = () => resolve(request.result || []);
      request.onerror = () => reject(request.error);
      transaction.oncomplete = () => database.close();
    });
  } catch(e) {
    return [];
  }
}

async function writeInkNote(note) {
  const database = await openInkDatabase();
  return new Promise((resolve, reject) => {
    const transaction = database.transaction(INK_STORE_NAME, 'readwrite');
    transaction.objectStore(INK_STORE_NAME).put(note);
    transaction.oncomplete = () => {
      database.close();
      resolve();
    };
    transaction.onerror = () => {
      database.close();
      reject(transaction.error || new Error('手写记录保存失败'));
    };
  });
}

const notebookPdfPageLoads = new Map();

function createBuiltinMathPdfPage(definition, index) {
  return QuizNotebook.createPage({
    name: `第 ${index + 1} 页`,
    width: 1200,
    height: 1697,
    backgroundType: 'pdf',
    backgroundSourceUrl: definition.url,
    sourceName: definition.title,
    sourcePage: index + 1,
  });
}

function isBuiltinMathPdfDocumentCurrent(documentItem, definition) {
  if (!documentItem?.builtIn || documentItem.title !== definition.title || documentItem.kind !== 'free') return false;
  if (documentItem.pdfSource?.url !== definition.url || Number(documentItem.pdfSource?.totalPages) !== definition.totalPages || documentItem.pdfSource?.role !== definition.role) return false;
  if (normalizePath(documentItem.binding?.sourcePath || [])[0] !== '考研数学') return false;
  const sourcePages = new Set((documentItem.pages || [])
    .filter(page => page?.background?.type === 'pdf' && page.background.sourceUrl === definition.url)
    .map(page => Number(page.background.sourcePage || 0))
    .filter(pageNumber => pageNumber >= 1 && pageNumber <= definition.totalPages));
  return sourcePages.size === definition.totalPages;
}

function repairBuiltinMathPdfDocument(documentItem, definition) {
  const pages = Array.isArray(documentItem.pages) ? documentItem.pages : [];
  const bySourcePage = new Map();
  for (const page of pages) {
    const sourcePage = Number(page?.background?.sourcePage || 0);
    if (sourcePage >= 1 && sourcePage <= definition.totalPages && !bySourcePage.has(sourcePage)) {
      bySourcePage.set(sourcePage, page);
    }
  }
  const used = new Set();
  const repairedPages = Array.from({ length: definition.totalPages }, (_, index) => {
    const sourcePage = index + 1;
    let page = bySourcePage.get(sourcePage);
    if (!page) page = pages.find((candidate, candidateIndex) => candidateIndex === index && !used.has(candidate));
    if (!page) page = createBuiltinMathPdfPage(definition, index);
    used.add(page);
    page.name = page.name || `第 ${sourcePage} 页`;
    page.width = Number(page.width || 1200);
    page.height = Number(page.height || 1697);
    page.background = {
      ...(page.background || {}),
      type: 'pdf',
      sourceUrl: definition.url,
      sourceName: definition.title,
      sourcePage,
    };
    return page;
  });
  const extraPages = pages.filter(page => !used.has(page));
  documentItem.title = definition.title;
  documentItem.kind = 'free';
  documentItem.builtIn = true;
  documentItem.binding = { sourcePath: ['考研数学', 'PDF资料', definition.role] };
  documentItem.cover = documentItem.cover || { mode: 'preset', preset: definition.preset };
  documentItem.lastEditorMode = documentItem.lastEditorMode || 'handwriting';
  documentItem.pdfSource = { url: definition.url, fileName: `${definition.title}.pdf`, totalPages: definition.totalPages, role: definition.role };
  documentItem.mode = 'paged';
  documentItem.pages = [...repairedPages, ...extraPages];
  if (!documentItem.pages.some(page => page.id === documentItem.activePageId)) {
    documentItem.activePageId = documentItem.pages[0].id;
  }
  return documentItem;
}

async function ensureBuiltinMathPdfDocuments() {
  const repository = getNotebookRepository();
  if (!repository || !window.QuizNotebook) return;
  const existing = new Map((await repository.list()).map(document => [document.id, document]));
  for (const definition of BUILTIN_MATH_PDF_DOCUMENTS) {
    let documentItem = existing.get(definition.id);
    if (isBuiltinMathPdfDocumentCurrent(documentItem, definition)) continue;
    if (!documentItem) documentItem = QuizNotebook.createDocument({
      id: definition.id,
      title: definition.title,
      kind: 'free',
      builtIn: true,
      binding: { sourcePath: ['考研数学', 'PDF资料', definition.role] },
      cover: { mode: 'preset', preset: definition.preset },
      lastEditorMode: 'handwriting',
      pdfSource: { url: definition.url, fileName: `${definition.title}.pdf`, totalPages: definition.totalPages, role: definition.role },
    });
    repairBuiltinMathPdfDocument(documentItem, definition);
    await repository.put(documentItem);
  }
}

async function ensureNotebookPdfSourcePage(page = state.notebookSession?.page) {
  const session = state.notebookSession;
  const background = page?.background;
  if (!session || !page || background?.type !== 'pdf' || background.assetId || !background.sourceUrl) return;
  const loadKey = `${session.document.id}:${page.id}`;
  if (notebookPdfPageLoads.has(loadKey)) return notebookPdfPageLoads.get(loadKey);
  const pending = (async () => {
    const loaded = await QuizPdfNotebook.loadPdfUrl(safeDocumentUrl(background.sourceUrl));
    if (background.sourcePage < 1 || background.sourcePage > loaded.totalPages) throw new Error('PDF 页码超出范围');
    const assetId = `builtin-pdf-page:${stableNotebookHash(background.sourceUrl)}:${background.sourcePage}`;
    const cached = await getNotebookAssetRepository().get(assetId);
    if (cached) {
      background.assetId = assetId;
      state.notebookAssetCache.set(assetId, cached.dataUrl);
      return;
    }
    const rendered = await QuizPdfNotebook.renderPdfPage(loaded.document, background.sourcePage, {
      sourceName: background.sourceName,
      documentId: session.document.id,
    });
    rendered.asset.id = assetId;
    rendered.asset.pageId = page.id;
    page.width = rendered.page.width;
    page.height = rendered.page.height;
    background.assetId = assetId;
    background.searchText = rendered.page.background.searchText;
    background.links = rendered.page.background.links;
    await getNotebookAssetRepository().putMany([rendered.asset]);
    state.notebookAssetCache.set(assetId, rendered.asset.dataUrl);
    if (!session.document.pdfOutline?.length) {
      const outline = await QuizPdfNotebook.extractPdfOutline(loaded.document);
      session.document.pdfOutline = outline.map(item => ({ ...item, sourceName: background.sourceName }));
    }
    await getNotebookRepository().put(session.document);
  })().finally(() => notebookPdfPageLoads.delete(loadKey));
  notebookPdfPageLoads.set(loadKey, pending);
  return pending;
}

function stableNotebookHash(value) {
  let hash = 2166136261;
  for (const char of String(value || '')) {
    hash ^= char.charCodeAt(0);
    hash = Math.imul(hash, 16777619);
  }
  return (hash >>> 0).toString(36);
}

function getQuestionNotebookId(question) {
  return `question-note:${stableNotebookHash(questionKey(question))}`;
}

function getNotebookBinding(question) {

}

function loadNotebookFolders() {

    state.notebookFolders = Array.isArray(saved) ? saved.map(item => ({

    })).filter(item => item.id && item.name) : [];

function getNotebookLibraryFolders() {
  const subjects = new Set(getSubjectGroups().map(group => group.subject));
  state.notebookDocuments.filter(item => item.binding?.sourcePath?.length).forEach(item => {
    const subject = normalizePath(item.binding?.sourcePath || [])[0];
    if (subject) subjects.add(subject);
  });
  const subjectFolders = [...subjects].sort((a, b) => a.localeCompare(b, 'zh-Hans-CN')).map(subject => ({
    id: notebookSubjectFolderId(subject), name: subject, type: 'subject', subject,
  }));
  const customFolders = state.notebookFolders.map(folder => ({ ...folder, type: 'custom' }));
  return [...subjectFolders, ...customFolders];
}

function getNotebookDocumentFolderId(documentItem) {
  if (documentItem?.binding?.sourcePath?.length) {
    return notebookSubjectFolderId(normalizePath(documentItem.binding?.sourcePath || [])[0]);
  }
  return String(documentItem?.folderId || '');
}

  return window.matchMedia('(max-width:839px), (orientation:portrait)').matches;

function getNotebookLibraryView() {

function getFilteredNotebookDocuments() {
  const query = String(state.notebookLibrarySearch || '').trim().toLowerCase();
  const folders = new Set(getNotebookLibraryFolders().map(folder => folder.id));
  return [...(state.notebookDocuments || [])].filter(documentItem => {
    if (query && !String(state.notebookSearchIndex.get(documentItem.id) || '').includes(query)) return false;
    const pdfNotebook = documentItem.pages?.some(page => page.background?.type === 'pdf');
    if (state.notebookLibraryTypeFilter === 'pdf' && !pdfNotebook) return false;
    if (state.notebookLibraryTypeFilter === 'note' && pdfNotebook) return false;
    const folderId = getNotebookDocumentFolderId(documentItem);
    if (state.notebookLibraryFolderId === 'all') return true;
    if (state.notebookLibraryFolderId === 'unfiled') return documentItem.kind === 'free' && (!folderId || !folders.has(folderId));
    return folderId === state.notebookLibraryFolderId;
  }).sort((left, right) => {
    if (left.builtIn && right.builtIn) {
      const leftOrder = BUILTIN_MATH_PDF_DOCUMENTS.findIndex(item => item.id === left.id);
      const rightOrder = BUILTIN_MATH_PDF_DOCUMENTS.findIndex(item => item.id === right.id);
      if (leftOrder >= 0 && rightOrder >= 0) return leftOrder - rightOrder;
    }
    return Number(right.updatedAt || 0) - Number(left.updatedAt || 0);
  });
}

function notebookFolderTitle(id = state.notebookLibraryFolderId) {
  if (id === 'all') return '全部笔记';

  return getNotebookLibraryFolders().find(folder => folder.id === id)?.name || '全部笔记';

function countNotebookFolderDocuments(id) {
  if (id === 'all') return state.notebookDocuments.length;
  const folders = new Set(getNotebookLibraryFolders().map(folder => folder.id));
  return state.notebookDocuments.filter(documentItem => {
    const folderId = getNotebookDocumentFolderId(documentItem);
    if (id === 'unfiled') return documentItem.kind === 'free' && (!folderId || !folders.has(folderId));
    return folderId === id;
  }).length;
}

async function openNotebookFromLibrary(id) {

    const questions = buildQuestionSet(await ensureBanksHydrated(getVisibleBanks()));
    releaseHydratedLargeBanks();
    const index = questions.findIndex(question => questionKey(question) === documentItem.binding?.questionKey);
    if (index < 0) return showNotice('原题已不在当前题库');
    return openHandwritingPractice(documentItem.binding?.sourcePath || [], { questions, index });

function previewNotebookCoverCrop() {

async function saveNotebookCoverImage(id, source) {
  const focusX = Number(document.getElementById('notebookCoverFocusX')?.value || 50) / 100;
  const focusY = Number(document.getElementById('notebookCoverFocusY')?.value || 50) / 100;
  const zoom = Number(document.getElementById('notebookCoverZoom')?.value || 100) / 100;
  const image = new Image();
  image.src = source;
  await image.decode();
  const width = 640;
  const height = 800;
  const scale = Math.max(width / image.naturalWidth, height / image.naturalHeight) * zoom;
  const sourceWidth = width / scale;
  const sourceHeight = height / scale;
  const sourceX = clampNumber(focusX * image.naturalWidth - sourceWidth / 2, 0, Math.max(0, image.naturalWidth - sourceWidth));
  const sourceY = clampNumber(focusY * image.naturalHeight - sourceHeight / 2, 0, Math.max(0, image.naturalHeight - sourceHeight));
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  canvas.getContext('2d').drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, width, height);
  const dataUrl = canvas.toDataURL('image/jpeg', .88);
  const assetId = `cover:${id}:${Date.now().toString(36)}`;
  await getNotebookAssetRepository().putMany([{ id: assetId, documentId: id, pageId: '', role: 'cover', mimeType: 'image/jpeg', dataUrl, createdAt: Date.now() }]);
  await updateNotebookCover(id, { mode: 'image', preset: 'sage', assetId, pageId: '', focusX: .5, focusY: .5, zoom: 1 });
}

function upsertNotebookDocument(document) {

  if (index >= 0) state.notebookDocuments[index] = document;
  else state.notebookDocuments.unshift(document);
  state.notebookDocuments.sort((a, b) => Number(b.updatedAt || 0) - Number(a.updatedAt || 0));
  refreshNotebookSearchIndex(document);
}

function refreshNotebookSearchIndex(document) {
  if (!document?.id) return;
  state.notebookSearchIndex.set(
    document.id,
    window.QuizPdfNotebook?.documentSearchText(document) || String(document.title || '').toLowerCase(),
  );
}

async function loadQuestionNotebook(question) {
  const repository = getNotebookRepository();
  const id = getQuestionNotebookId(question);
  let document = await repository.get(id);
  if (!document) {
    const legacy = await readInkNote(questionKey(question));
    document = legacy
      ? QuizNotebook.migrateLegacyInk(legacy, {
        id,
        title: `题目笔记 · ${String(question.q || '').slice(0, 24)}`,
        binding: getNotebookBinding(question),
      })
      : QuizNotebook.createDocument({
        id,
        title: `题目笔记 · ${String(question.q || '').slice(0, 24)}`,
        kind: 'question',
        binding: getNotebookBinding(question),
      });
    await repository.put(document);
  }
  return document;
}

async function activateNotebookDocument(document, options = {}) {
  state.notebookViewport?.destroy();
  state.notebookViewport = null;
  await window.QuizPdfNotebook?.releasePdfSourcesExcept(document.pdfSource?.url || '');
  state.notebookSession = new QuizNotebook.NotebookSession(document);
  try {
    await ensureNotebookPdfSourcePage(state.notebookSession.page);
  } catch(error) {
    showNotice(`PDF 页面读取失败：${error.message || error}`);
  }
  const mobileLayout = window.matchMedia('(max-width:839px), (orientation:portrait)').matches;
  state.notebookEditorMode = state.notebookSession.document.lastEditorMode
    || (state.notebookSession.document.kind === 'free' && mobileLayout ? 'typing' : 'handwriting');
  upsertNotebookDocument(state.notebookSession.document);
  if (document.kind === 'question') {
    if (state.notebookQuestionTabId && state.notebookQuestionTabId !== document.id) {
      state.notebookOpenTabs = state.notebookOpenTabs.filter(id => id !== state.notebookQuestionTabId);
    }
    state.notebookQuestionTabId = document.id;
  }
  if (!state.notebookOpenTabs.includes(document.id)) {
    state.notebookOpenTabs.push(document.id);
    state.notebookOpenTabs = state.notebookOpenTabs.slice(-8);
  }
  state.notebookSession.addEventListener('change', () => scheduleNotebookSave());
  state.notebookSession.addEventListener('documentchange', () => {
    scheduleNotebookSave();
    renderHandwritingPractice();
  });
  state.notebookSession.addEventListener('pagechange', async () => {
    const pageChangeSource = state.notebookPageChangeSource;
    state.notebookPageChangeSource = '';
    scheduleNotebookSave();
    try {
      await ensureNotebookPdfSourcePage(state.notebookSession.page);
    } catch(error) {
      showNotice(`PDF 页面读取失败：${error.message || error}`);
    }
    if (pageChangeSource === 'continuous-scroll') {
      const scroll = getNotebookContinuousScrollState();
      if (scroll) state.notebookContinuousRestore = { ...scroll, pageId: state.notebookSession.document.activePageId, preserve: true };
    }
    renderHandwritingPractice();
  });
  state.notebookSession.addEventListener('layerchange', () => {
    scheduleNotebookSave();
    renderNotebookRightPanel();
    state.notebookViewport?.requestRender();
  });
  if (!options.keepPanel) state.notebookRightTab = state.inkSession?.freeMode ? 'layers' : 'answer';
}

async function openHandwritingPractice(path = [], options = {}) {
  if (!window.QuizNotebook || !window.PerfectFreehand?.getStroke) {
    showNotice('笔记引擎未加载，请确认 notebook 与 vendor 资源已随应用打包');
    return;
  }
  const normalizedPath = normalizePath(path);
  const freeMode = Boolean(options.freeMode);
  let questions = [];
  if (!freeMode) {
    const banks = normalizedPath.length ? getDescendantBanks(normalizedPath) : getVisibleBanks();
    questions = options.questions || buildQuestionSet(await ensureBanksHydrated(banks));
    if (!options.questions) releaseHydratedLargeBanks();
    if (options.unansweredOnly) {
      const [legacyNotes, documents] = await Promise.all([readAllInkNotes(), loadNotebookDocuments()]);
      const completed = new Set(legacyNotes.filter(note => note.completed).map(note => note.key));
      documents.filter(document => document.kind === 'question' && document.completed && document.binding?.questionKey)
        .forEach(document => completed.add(document.binding.questionKey));
      questions = questions.filter(question => !completed.has(questionKey(question)));
    }
    if (!questions.length) {
      showNotice(options.unansweredOnly ? '当前范围没有未完成的题目笔记' : '当前范围没有可练习题目');
      return;
    }
  }
  if (!options.restoreRoute) pushRoute();
  state.activePath = normalizedPath;
  state.activeSubject = normalizedPath[0] || '';
  state.inkSession = {
    path: normalizedPath,
    title: freeMode ? '自由笔记' : (normalizedPath.length ? normalizedPath.slice(1).join(' / ') || normalizedPath[0] : '全部题库'),
    questions,
    freeMode,
    returnToQuiz: Boolean(options.fromQuiz),
  };
  state.currentIndex = Math.max(0, Math.min(Number(options.index || 0), Math.max(0, questions.length - 1)));
  state.notebookLeftTab = freeMode ? 'notebooks' : 'questions';
  state.notebookRightTab = freeMode ? 'layers' : 'answer';
  state.notebookAiMode = freeMode ? 'summary' : 'question';
  state.notebookQuestionSearch = '';
  state.notebookLibrarySearch = '';
  state.notebookQuestionExpanded = !freeMode;
  state.view = 'handwriting';
  await loadNotebookDocuments();
  let document;
  if (freeMode) {
    document = options.documentId ? await getNotebookRepository().get(options.documentId) : state.notebookDocuments.find(item => item.kind === 'free');
    if (!document) {
      document = QuizNotebook.createDocument({ title: '我的笔记', kind: 'free' });
      await getNotebookRepository().put(document);
      await loadNotebookDocuments();
    }
  } else {
    document = await loadQuestionNotebook(questions[state.currentIndex]);
  }
  await activateNotebookDocument(document);
  const mobileLayout = window.matchMedia('(max-width:839px), (orientation:portrait)').matches;
  state.notebookEditorMode = document.kind === 'free'
    ? (document.lastEditorMode || (mobileLayout ? 'typing' : 'handwriting'))
    : (document.lastEditorMode || 'handwriting');
  if (!freeMode && isNotebookFreeLayout()) {
    const dock = getNotebookDockConfig();
    dock.leftOpen = false;
    dock.rightOpen = false;
  }
  renderHandwritingPractice();
}

function renderNotebookContinuousPage(page, index) {
  const active = page.id === state.notebookSession.document.activePageId;
  const ratio = Math.max(.2, Math.min(5, Number(page.width || 900) / Math.max(1, Number(page.height || 1200))));
  let content;
  if (active && state.notebookEditorMode === 'typing') {
    content = `<textarea class="notebook-continuous-textarea" aria-label="笔记正文" placeholder="开始记录…" oninput="updateNotebookBodyText(this.value)">${escapeHtml(page.bodyText || '')}</textarea>`;
  } else if (active) {
    content = '<canvas class="notebook-canvas" id="notebookCanvas" aria-label="笔记画布"></canvas>';
  } else if (state.notebookEditorMode === 'typing') {
    content = `<div class="notebook-continuous-text-preview">${escapeHtml(page.bodyText || '')}</div>`;
  } else if (page.background?.type === 'pdf') {
    content = `<div class="notebook-pdf-page-placeholder" data-notebook-pdf-preview="${escapeAttr(page.id)}" aria-label="第 ${index + 1} 页预览"></div>`;
  } else {
    const previewWidth = 720;
    const previewHeight = Math.max(360, Math.min(1600, Math.round(previewWidth / ratio)));
    content = `<canvas data-notebook-page-preview="${escapeAttr(page.id)}" width="${previewWidth}" height="${previewHeight}" aria-hidden="true"></canvas>`;
  }
  return `<section class="notebook-continuous-page ${active ? 'active' : ''}" data-continuous-page-id="${escapeAttr(page.id)}" style="--notebook-page-ratio:${ratio}" ${active ? '' : `onclick="setNotebookPage('${escapeAttr(page.id)}','continuous')"`}>
    ${content}<span class="notebook-continuous-page-number">${index + 1}</span>
  </section>`;
}

function renderNotebookPagedSurface() {
  const document = state.notebookSession.document;
  const flow = getNotebookPageFlow();
  return `<div class="notebook-continuous-shell">
    <div class="notebook-continuous-scroll" id="notebookContinuousScroll" data-page-flow="${flow}">
      ${document.pages.map((page, index) => renderNotebookContinuousPage(page, index)).join('')}

function getNotebookDockConfig() {
  if (state.notebookDockConfig) return state.notebookDockConfig;
  let saved = {};
  try {
    const parsed = JSON.parse(localStorage.getItem(NOTEBOOK_DOCK_KEY));
    if (parsed && typeof parsed === 'object') saved = parsed;
  } catch(e) {}
  state.notebookDockConfig = {
    leftOpen: saved.leftOpen === true,
    rightOpen: saved.rightOpen === true,
    navigatorPosition: saved.navigatorPosition === 'top' ? 'top' : 'side',
    leftWidth: Math.max(190, Math.min(360, Number(saved.leftWidth || 220))),
    rightWidth: Math.max(220, Math.min(460, Number(saved.rightWidth || 300))),
    panBoundary: Math.max(24, Math.min(320, Number(saved.panBoundary || 96))),
  };
  return state.notebookDockConfig;
}

function saveNotebookDockConfig() {
  localStorage.setItem(NOTEBOOK_DOCK_KEY, JSON.stringify(getNotebookDockConfig()));
}

function setNotebookPanBoundary(value) {
  const dock = getNotebookDockConfig();
  dock.panBoundary = Math.max(24, Math.min(320, Number(value || 96)));
  saveNotebookDockConfig();
  state.notebookViewport?.setPanMargin(dock.panBoundary);
  const output = document.getElementById('notebookPanBoundaryValue');
  if (output) output.textContent = `${dock.panBoundary}px`;
}

function toggleNotebookDock(side) {
  const dock = getNotebookDockConfig();
  if (side === 'right') dock.rightOpen = !dock.rightOpen;
  else dock.leftOpen = !dock.leftOpen;
  saveNotebookDockConfig();
  renderHandwritingPractice();
}

function setNotebookNavigatorPosition(position) {
  const dock = getNotebookDockConfig();
  dock.navigatorPosition = position === 'top' ? 'top' : 'side';
  dock.leftOpen = true;
  saveNotebookDockConfig();
  closeAppDialog();
  renderHandwritingPractice();
}

function resetNotebookDockLayout() {
  state.notebookDockConfig = null;
  localStorage.removeItem(NOTEBOOK_DOCK_KEY);
  localStorage.removeItem(NOTEBOOK_LAYOUT_KEY);
  state.notebookWidgetLayout = null;
  state.uiConfig.notebookPageFlow = 'vertical';
  saveUiConfig();
  closeAppDialog();
  renderHandwritingPractice();
  showToast('已恢复默认布局');
}

function initializeNotebookDockLayout() {
  const workspace = document.getElementById('notebookWorkspace');
  if (!workspace?.classList.contains('dock-layout')) return;
  const dock = getNotebookDockConfig();
  workspace.querySelectorAll('[data-notebook-resizer]').forEach(handle => {
    handle.addEventListener('pointerdown', event => {
      event.preventDefault();
      const side = handle.dataset.notebookResizer;
      const startX = event.clientX;
      const startWidth = side === 'right' ? dock.rightWidth : dock.leftWidth;
      handle.setPointerCapture(event.pointerId);
      const move = moveEvent => {
        const delta = moveEvent.clientX - startX;
        if (side === 'right') dock.rightWidth = Math.max(220, Math.min(460, startWidth - delta));
        else dock.leftWidth = Math.max(190, Math.min(360, startWidth + delta));
        workspace.style.setProperty(`--notebook-${side}-width`, `${side === 'right' ? dock.rightWidth : dock.leftWidth}px`);
        state.notebookViewport?.resize();
      };
      const end = () => {
        handle.removeEventListener('pointermove', move);
        handle.removeEventListener('pointerup', end);
        handle.removeEventListener('pointercancel', end);
        saveNotebookDockConfig();
      };
      handle.addEventListener('pointermove', move);
      handle.addEventListener('pointerup', end);
      handle.addEventListener('pointercancel', end);
    });
  });
}

function getNotebookWidgetLayout() {
  if (state.notebookWidgetLayout) return state.notebookWidgetLayout;
  try {
    const saved = JSON.parse(localStorage.getItem(NOTEBOOK_LAYOUT_KEY));
    state.notebookWidgetLayout = saved && typeof saved === 'object' ? saved : {};
  } catch(e) {
    state.notebookWidgetLayout = {};
  }
  return state.notebookWidgetLayout;
}

function getNotebookWidgetDefaults() {
  return {
    left: { x: .01, y: .02, w: .23, h: .94 },
    tools: { x: .25, y: .02, w: .44, h: .13 },
    pages: { x: .25, y: .83, w: .44, h: .15 },
    right: { x: .70, y: .02, w: .29, h: .94 },
  };
}

function normalizeNotebookWidgetItem(key) {
  const layout = getNotebookWidgetLayout();
  const fallback = getNotebookWidgetDefaults()[key];
  const saved = layout[key] && typeof layout[key] === 'object' ? layout[key] : {};
  layout[key] = {
    ...fallback,
    ...saved,
    hidden: Boolean(saved.hidden),
    collapsed: Boolean(saved.collapsed),
    maximized: Boolean(saved.maximized),
  };
  return layout[key];
}

function applyNotebookWidgetLayout(widget) {
  const workspace = document.getElementById('notebookWorkspace');
  const key = widget?.dataset.notebookWidget;
  if (!workspace || !key) return;
  const item = normalizeNotebookWidgetItem(key);
  const width = Math.max(1, workspace.clientWidth);
  const height = Math.max(1, workspace.clientHeight);
  widget.classList.toggle('hidden', item.hidden);
  widget.classList.toggle('collapsed', item.collapsed);
  widget.classList.toggle('maximized', item.maximized);
  if (item.maximized) {
    widget.style.left = '8px';
    widget.style.top = '8px';
    widget.style.width = `${Math.max(320, width - 16)}px`;
    widget.style.height = `${Math.max(180, height - 16)}px`;
  } else {
    const minWidth = key === 'tools' ? 340 : 220;
    const minHeight = key === 'tools' ? 74 : key === 'pages' ? 92 : 180;
    const widgetWidth = Math.min(width - 16, Math.max(minWidth, Number(item.w || .25) * width));
    const widgetHeight = item.collapsed ? 34 : Math.min(height - 16, Math.max(minHeight, Number(item.h || .3) * height));
    const left = Math.max(8, Math.min(width - widgetWidth - 8, Number(item.x || 0) * width));
    const top = Math.max(8, Math.min(height - widgetHeight - 8, Number(item.y || 0) * height));
    widget.style.left = `${left}px`;
    widget.style.top = `${top}px`;
    widget.style.width = `${widgetWidth}px`;
    widget.style.height = `${widgetHeight}px`;
  }
  widget.style.zIndex = String(Number(item.z || 12));
}

function saveNotebookWidgetRect(widget) {
  const workspace = document.getElementById('notebookWorkspace');
  const key = widget?.dataset.notebookWidget;
  if (!workspace || !key) return;
  const item = normalizeNotebookWidgetItem(key);
  const workspaceRect = workspace.getBoundingClientRect();
  const rect = widget.getBoundingClientRect();
  item.x = (rect.left - workspaceRect.left) / Math.max(1, workspaceRect.width);
  item.y = (rect.top - workspaceRect.top) / Math.max(1, workspaceRect.height);
  item.w = rect.width / Math.max(1, workspaceRect.width);
  if (!item.collapsed) item.h = rect.height / Math.max(1, workspaceRect.height);
  item.z = Number(widget.style.zIndex || item.z || 12);
  localStorage.setItem(NOTEBOOK_LAYOUT_KEY, JSON.stringify(getNotebookWidgetLayout()));
}

function bringNotebookWidgetToFront(widget) {
  if (!widget) return;
  state.notebookWidgetZ = Math.max(20, Number(state.notebookWidgetZ || 20) + 1);
  widget.style.zIndex = String(state.notebookWidgetZ);
  const key = widget.dataset.notebookWidget;
  if (key) normalizeNotebookWidgetItem(key).z = state.notebookWidgetZ;
}

function bindNotebookWidgetInteraction(widget) {
  const workspace = document.getElementById('notebookWorkspace');
  const bar = widget.querySelector('.notebook-widget-bar');
  const resize = widget.querySelector('.notebook-widget-resize');
  if (!workspace || !bar || !resize) return;
  widget.addEventListener('pointerdown', () => bringNotebookWidgetToFront(widget));
  bar.addEventListener('pointerdown', event => {
    if (event.target.closest('button') || widget.classList.contains('maximized')) return;
    event.preventDefault();
    bringNotebookWidgetToFront(widget);
    const workspaceRect = workspace.getBoundingClientRect();
    const rect = widget.getBoundingClientRect();
    const startX = event.clientX;
    const startY = event.clientY;
    const startLeft = rect.left - workspaceRect.left;
    const startTop = rect.top - workspaceRect.top;
    bar.setPointerCapture(event.pointerId);
    const move = moveEvent => {
      const left = Math.max(0, Math.min(workspace.clientWidth - widget.offsetWidth, startLeft + moveEvent.clientX - startX));
      const top = Math.max(0, Math.min(workspace.clientHeight - widget.offsetHeight, startTop + moveEvent.clientY - startY));
      widget.style.left = `${left}px`;
      widget.style.top = `${top}px`;
    };
    const end = () => {
      bar.removeEventListener('pointermove', move);
      bar.removeEventListener('pointerup', end);
      bar.removeEventListener('pointercancel', end);
      saveNotebookWidgetRect(widget);
    };
    bar.addEventListener('pointermove', move);
    bar.addEventListener('pointerup', end);
    bar.addEventListener('pointercancel', end);
  });
  resize.addEventListener('pointerdown', event => {
    if (widget.classList.contains('collapsed') || widget.classList.contains('maximized')) return;
    event.preventDefault();
    event.stopPropagation();
    bringNotebookWidgetToFront(widget);
    const startX = event.clientX;
    const startY = event.clientY;
    const startWidth = widget.offsetWidth;
    const startHeight = widget.offsetHeight;
    resize.setPointerCapture(event.pointerId);
    const move = moveEvent => {
      const maxWidth = workspace.clientWidth - widget.offsetLeft;
      const maxHeight = workspace.clientHeight - widget.offsetTop;
      widget.style.width = `${Math.max(180, Math.min(maxWidth, startWidth + moveEvent.clientX - startX))}px`;
      widget.style.height = `${Math.max(74, Math.min(maxHeight, startHeight + moveEvent.clientY - startY))}px`;
    };
    const end = () => {
      resize.removeEventListener('pointermove', move);
      resize.removeEventListener('pointerup', end);
      resize.removeEventListener('pointercancel', end);
      saveNotebookWidgetRect(widget);
    };
    resize.addEventListener('pointermove', move);
    resize.addEventListener('pointerup', end);
    resize.addEventListener('pointercancel', end);
  });
}

function initializeNotebookFloatingLayout() {

function getNotebookPageOrientation(scope = state.notebookPaperScope) {
  const document = state.notebookSession?.document;
  if (!document) return 'portrait';
  if (scope === 'new') return document.defaultPageOrientation === 'landscape' ? 'landscape' : 'portrait';
  const page = state.notebookSession.page;
  return Number(page?.width || 0) > Number(page?.height || 0) ? 'landscape' : 'portrait';
}

function setNotebookPageSettingsScope(scope) {
  state.notebookPaperScope = ['current', 'all', 'new'].includes(scope) ? scope : 'current';
  showNotebookPageSettingsMenu();
}

async function applyNotebookPageOrientation(orientation) {
  const session = state.notebookSession;
  if (!session || session.document.mode !== 'paged') return;
  const next = orientation === 'landscape' ? 'landscape' : 'portrait';
  const scope = state.notebookPaperScope;
  const pages = scope === 'new' ? [] : (scope === 'all' ? session.document.pages : [session.page]);
  const editablePages = pages.filter(page => page.background?.type !== 'pdf');
  if (scope === 'current' && !editablePages.length) return showToast('PDF 页面保持原始方向');
  session.beginHistory();
  editablePages.forEach(page => {
    const width = Number(page.width || 900);
    const height = Number(page.height || 1200);
    const landscape = width > height;
    if ((next === 'landscape') !== landscape) {
      page.width = height;
      page.height = width;
    }
  });
  if (scope === 'all' || scope === 'new') session.document.defaultPageOrientation = next;
  session.commitHistory('page-orientation');
  closeAppDialog();
  await saveCurrentInkNote({ silent: true });
  state.notebookContinuousRestore = { pageId: session.document.activePageId, focus: true };
  renderHandwritingPractice();
  showToast(next === 'landscape' ? '已切换横向纸张' : '已切换竖向纸张');
}

function showNotebookPageSettingsMenu() {
  closeAppDialog();

  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  mask.innerHTML = `

      ${state.notebookSession?.document.mode === 'paged' ? `

        <div class="notebook-page-settings-group"><strong>纸张方向</strong><div class="notebook-page-settings-options"><button class="${orientation === 'portrait' ? 'active' : ''}" type="button" onclick="applyNotebookPageOrientation('portrait')">竖向</button><button class="${orientation === 'landscape' ? 'active' : ''}" type="button" onclick="applyNotebookPageOrientation('landscape')">横向</button></div></div>
        <div class="notebook-page-settings-group"><strong>翻页方向</strong><div class="notebook-page-settings-options"><button class="${flow === 'vertical' ? 'active' : ''}" type="button" onclick="closeAppDialog();setNotebookPageFlow('vertical')">上下翻页</button><button class="${flow === 'horizontal' ? 'active' : ''}" type="button" onclick="closeAppDialog();setNotebookPageFlow('horizontal')">左右翻页</button></div></div>

  return `

        ${collapsed ? '' : `<button class="notebook-tool" onclick="undoNotebook()" title="撤销" aria-label="撤销" ${state.notebookSession.undoStack.length ? '' : 'disabled'}>${renderNotebookIcon('undo')}</button><button class="notebook-tool" onclick="redoNotebook()" title="重做" aria-label="重做" ${state.notebookSession.redoStack.length ? '' : 'disabled'}>${renderNotebookIcon('redo')}</button><span class="notebook-toolbar-separator"></span>`}

        ${collapsed ? '' : `<span class="notebook-toolbar-separator"></span><button class="notebook-tool" onclick="showNotebookInsertMenu()" title="插入与纸张" aria-label="插入与纸张">${renderNotebookIcon('insert')}</button><button class="notebook-tool ${state.notebookSubtoolbarOpen ? 'active' : ''}" onclick="toggleNotebookSubtoolbar()" title="工具设置" aria-label="工具设置">${renderNotebookIcon('settings')}</button>`}
        ${isNotebookFreeLayout() ? `<button class="notebook-tool notebook-toolbar-collapse" type="button" onclick="toggleNotebookToolbarCollapsed()" title="${collapsed ? '展开工具栏' : '收起工具栏'}" aria-label="${collapsed ? '展开工具栏' : '收起工具栏'}">${renderNotebookIcon(collapsed ? 'chevronRight' : 'chevronLeft')}</button>` : ''}

          <button class="notebook-tool" data-notebook-action="copy" onclick="copyNotebookSelection()" title="复制所选" aria-label="复制所选" ${state.notebookSession.selected ? '' : 'disabled'}>${renderNotebookIcon('copy')}</button>
          <button class="notebook-tool" data-notebook-action="paste" onclick="pasteNotebookSelection()" title="粘贴" aria-label="粘贴" ${state.notebookSession.clipboard?.length ? '' : 'disabled'}>${renderNotebookIcon('paste')}</button>
          <button class="notebook-tool" data-notebook-action="duplicate" onclick="duplicateNotebookSelection()" title="创建副本" aria-label="创建副本" ${state.notebookSession.selected ? '' : 'disabled'}>${renderNotebookIcon('pages')}</button>
          <button class="notebook-tool" data-notebook-action="edit-rich" onclick="editSelectedNotebookRichObject()" title="编辑所选 Markdown 或公式" aria-label="编辑所选 Markdown 或公式" ${richObject ? '' : 'disabled'}>${renderNotebookIcon('edit')}</button>
          <button class="notebook-tool" data-notebook-action="delete" onclick="deleteNotebookSelection()" title="删除所选" aria-label="删除所选" ${state.notebookSession.selected ? '' : 'disabled'}>${renderNotebookIcon('trash')}</button>
        ` : `
          <span class="notebook-subtoolbar-label">${drawingTool ? '笔触' : tool === 'eraser' ? '橡皮范围' : '画布操作'}</span>
          ${drawingTool ? ['#202522','#1f6feb','#b42318','#6f42c1'].map(item => `<button class="notebook-color ${color === item ? 'active' : ''}" style="background:${item}" onclick="setNotebookColor('${item}')" title="选择颜色" aria-label="选择颜色"></button>`).join('') : ''}

          ${drawingTool ? `<button class="notebook-tool ${state.inkStraightLine ? 'active' : ''}" data-notebook-straight-line onclick="toggleNotebookStraightLine()" title="直线模式" aria-label="直线模式">${renderNotebookIcon('line')}</button>` : ''}
