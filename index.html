<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>QuizApp — 刷题</title>
<link rel="icon" href="data:,">
<style>
:root {
  --bg: #f3f7ee;
  --card: #fff;
  --surface: #fff;
  --surface-soft: #f7faf6;
  --text: #18211b;
  --muted: #74816f;
  --line: #e2eadb;
  --primary: #1f8f62;
  --primary-soft: rgba(31,143,98,.12);
  --secondary: #5f6f62;
  --secondary-soft: rgba(95,111,98,.12);
  --success: #22a06b;
  --success-soft: rgba(34,160,107,.12);
  --danger: #d94a5a;
  --danger-soft: #fef0f2;
  --warn: #b98320;
  --warn-soft: #fef7eb;
  --bar-bg: rgba(255,255,255,.92);
  --option-tint: rgba(248,249,251,.62);
  --saved-progress-width-phone: 360px;
  --saved-progress-width-tablet: 520px;
  --shadow: 0 10px 28px rgba(23,31,56,.07);
  --shadow-soft: 0 1px 2px rgba(23,31,56,.04),0 10px 30px rgba(23,31,56,.055);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-control: 12px;
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
body[data-theme="dark"]{
  --bg:#12151c;
  --card:#1b202b;
  --surface:#1b202b;
  --surface-soft:#222833;
  --text:#f4f6fb;
  --muted:#9aa3b5;
  --line:#2b3240;
  --primary-soft:#263153;
  --secondary-soft:#252b36;
  --success-soft:#17382d;
  --danger-soft:#3a1f27;
  --warn-soft:#3b301b;
  --bar-bg:rgba(27,32,43,.92);
  --option-tint:rgba(18,21,28,.72);
  --shadow:0 2px 18px rgba(0,0,0,.24);
  --shadow-soft:0 1px 2px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.24);
}
*{box-sizing:border-box;margin:0;padding:0}
body[data-reduce-motion="true"] *,body[data-reduce-motion="true"] *::before,body[data-reduce-motion="true"] *::after{
  animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important
}
body[data-system-theme="standard"] button,
body[data-system-theme="standard"] input:not([type="checkbox"]):not([type="radio"]):not([type="range"]):not([type="color"]),
body[data-system-theme="standard"] textarea{border-radius:var(--radius-control)!important}
body[data-system-theme="standard"] .app-dialog,
body[data-system-theme="standard"] .saved-progress-float,
body[data-system-theme="standard"] .announcement-entry,
body[data-system-theme="standard"] .release-bank-group,
body[data-system-theme="standard"] .release-bank-row,
body[data-system-theme="standard"] .choice-menu,
body[data-system-theme="standard"] .study-stats-chart,
body[data-system-theme="standard"] .hub-summary-band,
body[data-system-theme="standard"] .hub-study-status,
body[data-system-theme="standard"] .hub-global-practice{border-radius:var(--radius)!important}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  height:100%;
  overflow:hidden;
  display:flex;flex-direction:column;
  -webkit-user-select:none;user-select:none;
}
.app{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:760px;margin:0 auto;width:100%}

/* Top bar */
.topbar{
  min-height:58px;padding:10px 16px;display:flex;align-items:center;gap:10px;
  background:var(--bar-bg);border-bottom:1px solid var(--line);z-index:10;
  backdrop-filter:blur(10px)
}
.topbar h1{
  font-size:18px;font-weight:850;flex:1;min-width:0;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;letter-spacing:0
}
.brand-title{display:flex;align-items:center;gap:9px}
.brand-mark{
  width:30px;height:30px;border-radius:10px;display:grid;place-items:center;
  background:var(--primary);color:var(--on-primary,#fff);font-size:15px;font-weight:950;
  box-shadow:var(--shadow-soft)
}
.topbar .btn-back,.topbar .btn-icon{
  width:36px;height:36px;border:1px solid var(--line);
  background:rgba(248,249,251,.72);color:var(--text);cursor:pointer;
  border-radius:50%;display:grid;place-items:center;transition:all .15s;
  flex-shrink:0
}
.topbar .btn-back{font-size:20px}
.topbar .btn-icon{font-size:13px;font-weight:900}
.topbar .btn-back:hover,.topbar .btn-icon:hover{background:var(--primary-soft);color:var(--primary);border-color:var(--primary)}
.topbar .btn-back:active,.topbar .btn-icon:active{transform:scale(.96)}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mail-button{position:relative;font-size:15px!important;display:inline-grid!important;place-items:center;line-height:1}
.mail-button.unread::after{
  content:"";position:absolute;right:4px;top:4px;width:8px;height:8px;border-radius:50%;
  background:var(--danger);box-shadow:0 0 0 2px var(--card)
}
.topbar .btn-text{
  height:34px;border:1px solid transparent;border-radius:99px;padding:0 12px;
  background:var(--primary-soft);color:var(--primary);
  font-size:12px;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s,background .15s
}
.topbar .btn-text:active{transform:scale(.97)}
.topbar .btn-save{background:var(--primary);color:var(--on-primary,#fff)}
.topbar-meta{
  height:32px;display:inline-flex;align-items:center;justify-content:center;
  padding:0 10px;border-radius:99px;background:rgba(248,249,251,.72);color:var(--muted);
  border:1px solid var(--line);font-size:12px;font-weight:850;white-space:nowrap
}
body[data-theme="dark"] .topbar .btn-back,
body[data-theme="dark"] .topbar .btn-icon,
body[data-theme="dark"] .topbar-meta{background:rgba(18,21,28,.56)}
body[data-theme="dark"] .topbar,
body[data-theme="dark"] .bottombar{background:var(--bar-bg)}
.quiz-topbar{align-items:center}
.quiz-topbar .topbar-actions{gap:6px}
.counter-pill{
  height:34px;display:inline-flex;align-items:center;justify-content:center;
  padding:0 10px;border-radius:99px;background:var(--bg);
  color:var(--muted);border:1px solid var(--line);font-size:12px;font-weight:900;white-space:nowrap
}

/* Progress bar */
.progress-wrap{padding:10px 16px 9px;background:var(--card)}
.progress-bar{
  height:6px;background:var(--line);border-radius:999px;overflow:hidden;
  display:block
}
.progress-bar canvas{display:block;width:100%;height:100%}
.progress-info{
  display:grid;grid-template-columns:minmax(0,1fr) auto auto auto;gap:6px;align-items:center;margin-top:7px;
  font-size:11px;color:var(--muted)
}
.progress-info:empty{display:none}
.progress-info span{white-space:nowrap}
.progress-info span:first-child{overflow:hidden;text-overflow:ellipsis}
.progress-info span:not(:first-child){
  background:var(--bg);border-radius:99px;padding:3px 7px;font-weight:800
}

/* Viewport */
.viewport{flex:1;overflow:hidden;position:relative;touch-action:pan-y}
.viewport.view-scroll{
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}

/* Vertical scroll mode */
.scroll-container{height:100%;overflow-y:auto;scroll-behavior:auto;padding:12px}
.scroll-container .card{margin-bottom:14px}
.scroll-spacer{height:var(--spacer-height,0px);flex:0 0 auto;pointer-events:none}

/* Horizontal page mode */
.page-frame{height:100%;overflow:hidden}
.page-track{
  height:100%;display:flex;transition:transform .24s cubic-bezier(.22,.8,.25,1);
  will-change:transform
}
.page-slide{
  min-width:100%;height:100%;overflow-y:auto;padding:16px 14px 18px;
  display:flex;align-items:flex-start;justify-content:center
}

/* Card */
.card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--line);
  box-shadow:var(--shadow-soft);padding:18px 16px 20px;width:100%;max-width:100%;
  transition:box-shadow .2s, transform .2s
}
.card.answered.correct{border-color:var(--success);box-shadow:var(--shadow-soft)}
.card.answered.wrong{border-color:var(--danger);box-shadow:var(--shadow-soft)}
.card-header{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)
}
.card-num{
  min-width:30px;height:26px;border-radius:99px;display:inline-flex;
  align-items:center;justify-content:center;background:var(--primary-soft);
  color:var(--primary);font-size:13px;font-weight:900
}
.card-type{
  font-size:11px;padding:5px 9px;border-radius:99px;font-weight:900
}
.type-single{background:var(--primary-soft);color:var(--primary)}
.type-multi{background:var(--warn-soft);color:var(--warn)}
.type-bool{background:var(--success-soft);color:var(--success)}
.source-chip,.multi-hint{
  font-size:11px;border-radius:99px;padding:4px 8px;background:var(--bg);
  color:var(--muted);font-weight:800
}
.multi-hint{background:var(--warn-soft);color:var(--warn)}
.card-body{
  font-size:16px;line-height:1.72;margin-bottom:16px;
  background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 14px 15px
}
.card-body p{white-space:pre-wrap;word-break:break-word}

/* Options */
.options{display:flex;flex-direction:column;gap:10px}
.option{
  display:grid;grid-template-columns:auto minmax(0,1fr);align-items:flex-start;
  gap:11px;padding:13px 14px;min-height:54px;
  border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--card);cursor:pointer;transition:all .15s;
  font-size:15px;line-height:1.45
}
.option:active{transform:scale(.98)}
.option.selected{border-color:var(--primary);background:var(--primary-soft);box-shadow:none}
.option.correct{border-color:var(--success);background:var(--success-soft);color:#10241b;box-shadow:none}
.option.selected.correct{box-shadow:0 0 0 2px var(--success)}
.option.wrong{border-color:var(--danger);background:var(--danger-soft);color:#351116;box-shadow:none}
.option.correct.animate-answer{animation:answerPop .22s ease-out}
.option.wrong.animate-answer{animation:answerShake .28s ease-out}
body[data-theme="dark"] .option{background:var(--card)}
body[data-theme="dark"] .option.correct{color:#d9f8eb}
body[data-theme="dark"] .option.wrong{color:#ffd9df}
.option[disabled],button[disabled]{opacity:.45;cursor:not-allowed}
.option-letter{
  width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  font-weight:800;font-size:13px;flex-shrink:0;
  background:var(--bg);color:var(--muted);transition:all .15s
}
.option-text{min-width:0;word-break:break-word}
.option.selected .option-letter{background:var(--primary);color:var(--on-primary,#fff)}
.option.correct .option-letter{background:var(--success);color:#fff}
.option.wrong .option-letter{background:var(--danger);color:#fff}

/* Bool buttons */
.bool-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bool-btn{
  padding:40px 20px;border:2px solid var(--line);border-radius:var(--radius);
  font-size:28px;font-weight:800;cursor:pointer;transition:all .15s;
  display:grid;place-items:center;background:var(--card)
}
.bool-btn:active{transform:scale(.96)}
.bool-btn.selected{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
.bool-btn.correct{border-color:var(--success);background:var(--success-soft);color:var(--success)}
.bool-btn.selected.correct{box-shadow:0 0 0 2px var(--success)}
.bool-btn.wrong{border-color:var(--danger);background:var(--danger-soft);color:var(--danger)}
.bool-btn.correct.animate-answer{animation:answerPop .22s ease-out}
.bool-btn.wrong.animate-answer{animation:answerShake .28s ease-out}

.multi-actions{display:flex;justify-content:flex-end;margin-top:14px}
.btn-submit{
  min-width:112px;padding:10px 18px;border:0;border-radius:99px;
  background:var(--primary);color:var(--on-primary,#fff);font-weight:800;cursor:pointer
}
.btn-submit[disabled]{background:var(--line);color:var(--muted)}

/* Explanation */
.answer-reveal{display:flex;justify-content:flex-end;margin-top:14px}
.answer-reveal button{
  width:100%;min-height:44px;border:1px solid var(--primary);border-radius:99px;padding:11px 14px;
  background:var(--primary-soft);
  color:var(--primary);font-size:13px;font-weight:900;
  cursor:pointer;transition:all .15s
}
.answer-reveal button:active{transform:scale(.96)}
.answer-reveal button.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
body[data-theme="dark"] .answer-reveal button{
  background:var(--primary-soft)
}
.explanation{
  margin-top:16px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--card);font-size:13px;line-height:1.62;display:none;color:var(--text);
  overflow:hidden
}
.explanation.show{display:block;animation:feedbackIn .2s ease-out}
.exp-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;background:var(--success-soft)
}
.explanation.wrong .exp-head{background:var(--danger-soft)}
.explanation.reveal .exp-head{background:var(--primary-soft)}
.explanation .exp-label{
  font-weight:900;color:var(--success);letter-spacing:.02em
}
.explanation.wrong .exp-label{color:var(--danger)}
.explanation.reveal .exp-label{color:var(--primary)}
.exp-body{padding:12px 14px 14px}
.answer-line{font-weight:900;color:var(--text)}
.answer-line.subtle{color:var(--muted)}
.exp-detail{margin-top:8px;color:var(--muted);white-space:pre-wrap;word-break:break-word}
.feedback-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.feedback-actions button{
  border:0;border-radius:99px;padding:8px 12px;font-size:12px;
  font-weight:800;cursor:pointer;background:var(--primary);color:var(--on-primary,#fff)
}
.feedback-actions button.secondary{background:var(--card);color:var(--muted);border:1px solid var(--line)}
.feedback-actions button.danger{background:var(--danger);color:#fff}

/* Bottom bar */
.bottombar{
  padding:10px 16px calc(14px + env(safe-area-inset-bottom));display:flex;justify-content:space-between;
  gap:10px;align-items:center;background:var(--bar-bg);border-top:1px solid var(--line);
  backdrop-filter:blur(10px);
  box-shadow:0 -8px 24px rgba(0,0,0,.04)
}
.bottombar button{
  flex:1;min-width:0;padding:11px 12px;border:0;border-radius:99px;font-weight:800;
  font-size:14px;cursor:pointer;transition:all .15s
}
.bottombar button:active{transform:scale(.96)}
.btn-prev{background:var(--bg);color:var(--muted)}
.btn-next{background:var(--primary);color:var(--on-primary,#fff)}
.btn-mode{background:var(--primary-soft);color:var(--primary);font-size:12px!important;padding:8px 12px!important}
.btn-overview{background:var(--primary-soft);color:var(--primary);flex:1.15!important}

.question-overview{
  position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:50;
  display:grid;align-items:end
}
.overview-panel{
  max-height:72vh;overflow-y:auto;background:var(--card);color:var(--text);
  border-radius:18px 18px 0 0;padding:16px;box-shadow:0 -8px 32px rgba(0,0,0,.28)
}
.overview-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.overview-head strong{font-size:16px}
.overview-stats{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px
}
.overview-stat{
  min-width:0;background:var(--bg);border:1px solid var(--line);border-radius:12px;
  padding:9px 8px;display:flex;flex-direction:column;gap:3px
}
.overview-stat span{font-size:11px;color:var(--muted);white-space:nowrap}
.overview-stat strong{font-size:15px;color:var(--text);line-height:1.1}
.overview-stat.good strong{color:var(--success)}
.overview-stat.bad strong{color:var(--danger)}
.overview-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.overview-type-label{
  grid-column:1 / -1;
  display:flex;align-items:center;gap:8px;
  margin:8px 0 2px;
  color:var(--muted);
  font-size:12px;font-weight:900;
  letter-spacing:0
}
.overview-type-label::before{
  content:"";
  width:6px;height:6px;border-radius:50%;
  background:var(--primary);
  opacity:.75
}
.overview-type-label small{font-size:11px;font-weight:700;color:var(--muted)}
.overview-num{
  height:42px;border:1px solid var(--line);border-radius:10px;
  background:var(--bg);color:var(--muted);font-weight:900;cursor:pointer
}
.overview-num.current{box-shadow:0 0 0 2px var(--primary);color:var(--primary)}
.overview-num.correct{background:var(--success);border-color:var(--success);color:#fff}
.overview-num.wrong{background:var(--danger);border-color:var(--danger);color:#fff}
.overview-num.review{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.toast{
  position:fixed;left:50%;bottom:86px;transform:translateX(-50%);
  z-index:80;background:rgba(20,24,34,.94);color:#fff;border-radius:99px;
  padding:10px 16px;font-size:13px;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,.22)
}
.app-dialog-mask{
  position:fixed;inset:0;z-index:90;background:rgba(15,18,28,.42);
  display:grid;place-items:center;padding:20px
}
.app-dialog{
  width:min(420px,100%);background:var(--card);border:1px solid var(--line);
  border-radius:18px;box-shadow:0 24px 64px rgba(0,0,0,.22);
  padding:16px;display:flex;flex-direction:column;gap:12px;max-height:calc(100dvh - 40px);min-height:0
}
.app-dialog h3{font-size:16px;line-height:1.4}
.app-dialog p{font-size:13px;line-height:1.6;color:var(--muted)}
.app-dialog input{
  width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--bg);color:var(--text);padding:12px;font-size:14px
}
.app-dialog-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.app-dialog-actions.triple{grid-template-columns:1fr 1fr 1fr}
.app-dialog-actions.single{display:flex;justify-content:flex-end}
.app-dialog-actions button{
  border:0;border-radius:99px;padding:11px 12px;font-size:13px;font-weight:900;
  background:var(--primary);color:var(--on-primary,#fff);cursor:pointer
}
.app-dialog-actions.single button{min-width:112px}
.app-dialog-actions button.secondary{background:var(--bg);color:var(--muted)}
.announcement-dialog{width:min(560px,100%);overflow:hidden}
.announcement-board-dialog{
  width:100%;
  height:100dvh;
  max-height:none;
  padding:0;
  gap:0;
  border:0;
  border-radius:0;
  background:var(--bg);
  box-shadow:none
}
.app-dialog-mask:has(.announcement-board-dialog){padding:0;background:var(--bg);place-items:stretch}
.announcement-board-head{
  flex:0 0 auto;
  display:grid;
  grid-template-columns:44px minmax(0,1fr) 44px;
  align-items:center;
  min-height:54px;
  border-bottom:1px solid var(--line);
  background:var(--bar-bg)
}
.announcement-board-head h3{
  margin:0;
  text-align:center;
  font-size:15px;
  font-weight:850
}
.announcement-board-back{
  width:44px;height:44px;border:0;background:transparent;color:var(--muted);
  font-size:28px;line-height:1;cursor:pointer
}
.announcement-body{
  display:flex;flex-direction:column;gap:10px;color:var(--muted);font-size:13px;line-height:1.7;
  flex:1;min-height:0;overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y;
  padding-right:2px
}
.announcement-board-dialog .announcement-body{padding:22px clamp(18px,5vw,48px) calc(28px + env(safe-area-inset-bottom));gap:0}
.announcement-board-dialog .announcement-timeline{width:min(760px,100%);margin:0 auto}
.announcement-body h4{font-size:14px;color:var(--text);line-height:1.35}
.announcement-body p,.announcement-body ul{margin:0}
.announcement-body ul{padding-left:18px}
.announcement-body li{margin:3px 0}
.release-bank-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px}
.release-bank-toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.release-bank-toolbar button{
  border:1px solid var(--line);border-radius:999px;background:var(--bg);color:var(--text);
  padding:6px 10px;font-size:12px;font-weight:900
}
.release-bank-selection-hint{font-size:12px;color:var(--muted);font-weight:800}
.release-bank-list{
  display:flex;flex-direction:column;gap:10px;max-height:42dvh;overflow:auto;padding-right:2px;
  min-height:0;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y
}
.release-bank-group{border:1px solid var(--line);border-radius:14px;background:var(--bg);overflow:hidden}
.release-bank-group .release-bank-group{border-radius:10px;background:var(--card)}
.release-bank-group summary{
  list-style:none;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  padding:11px 12px;cursor:pointer
}
.release-bank-group summary::-webkit-details-marker{display:none}
.release-bank-group[open] summary{border-bottom:1px solid var(--line)}
.release-bank-group-title{display:flex;flex-direction:column;gap:3px;min-width:0}
.release-bank-group-title strong{font-size:13px;color:var(--text);line-height:1.35}
.release-bank-group-title span{font-size:12px;color:var(--muted);line-height:1.35}
.release-bank-group-arrow{font-size:13px;color:var(--muted);transition:transform .18s ease}
.release-bank-group[open] .release-bank-group-arrow{transform:rotate(90deg)}
.release-bank-children{display:flex;flex-direction:column;gap:8px;padding:10px}
.release-bank-item{
  display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;
  border:1px solid var(--line);border-radius:12px;background:var(--card);padding:10px
}
.release-bank-item input,.release-bank-group input{width:auto;margin-top:3px}
.release-bank-main{display:flex;flex-direction:column;gap:6px;min-width:0}
.release-bank-title{font-size:13px;font-weight:900;color:var(--text);line-height:1.35}
.release-bank-meta{font-size:12px;color:var(--muted);line-height:1.45}
.release-bank-conflict{font-size:12px;color:var(--danger);font-weight:800}
.release-bank-action{position:relative;min-width:0}
.release-bank-action .choice-trigger{min-height:40px;font-size:12px}
.release-bank-action .choice-menu{
  position:static;margin-top:6px;max-height:160px;box-shadow:none
}
.announcement-list{display:flex;flex-direction:column;gap:10px;min-height:0}
.announcement-entry{
  border:1px solid var(--line);border-radius:14px;background:var(--bg);overflow:hidden
}
.announcement-entry.latest{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary-soft)}
.announcement-meta{
  list-style:none;display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;
  padding:12px;cursor:pointer
}
.announcement-meta::-webkit-details-marker{display:none}
.announcement-meta strong{font-size:14px;color:var(--text)}
.announcement-meta span{
  white-space:nowrap;font-size:11px;font-weight:900;color:var(--primary);
  background:var(--primary-soft);border-radius:999px;padding:4px 8px
}
.announcement-arrow{font-size:14px;color:var(--muted);transition:transform .18s ease}
.announcement-entry[open] .announcement-arrow{transform:rotate(90deg)}
.announcement-entry-body{
  border-top:1px solid var(--line);padding:12px;max-height:min(34dvh,320px);overflow:auto;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y
}
.announcement-timeline{display:flex;flex-direction:column;gap:24px}
.announcement-time{
  text-align:center;
  color:var(--text);
  font-size:12px;
  font-weight:850;
  line-height:1
}
.announcement-card{
  margin-top:13px;
  padding:18px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--card);
  color:var(--muted);
  font-size:13px;
  line-height:1.78
}
.announcement-card h4{
  margin:0 0 12px;
  color:var(--text);
  font-size:15px;
  line-height:1.4
}
.announcement-card p{margin:0 0 10px}
.announcement-card ul{margin:0;padding-left:18px}
.announcement-card li{margin:4px 0}
.announcement-option{
  display:flex;align-items:center;gap:8px;border:1px solid var(--line);
  background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px;
  font-size:13px;color:var(--muted);cursor:pointer
}
.announcement-option input{width:auto}
.update-progress{
  display:flex;flex-direction:column;gap:8px;border:1px solid var(--line);
  background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px
}
.update-progress[hidden]{display:none}
.update-progress-track{
  height:8px;border-radius:99px;background:var(--line);overflow:hidden
}
.update-progress-fill{
  height:100%;width:0;background:var(--primary);border-radius:inherit;
  transition:width .22s ease
}
.update-progress-text{font-size:12px;color:var(--muted);font-weight:800}

/* Home page */
.home{padding:24px 16px;display:flex;flex-direction:column;gap:16px}
.stats-row{display:flex;gap:10px;align-items:stretch}
.home-overview{
  display:block
}
.home-metrics{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  min-width:0
}
.metric-card{
  background:var(--card);border-radius:var(--radius);padding:16px 14px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;min-width:0;position:relative
}
.metric-card h3{font-size:20px;line-height:1}
.metric-card small{color:var(--muted);font-size:12px}
.metric-card .metric-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.metric-card .metric-value{font-size:18px;font-weight:900;white-space:nowrap}
.metric-card.progress-metric,.metric-card.time-metric{grid-column:1 / -1}
.home-progress-track{
  height:8px;border-radius:99px;background:var(--bar-bg);overflow:hidden
}
.home-progress-fill{
  height:100%;width:0%;border-radius:inherit;
  background:var(--primary);
  transition:width .3s ease
}
.home-progress-meta{
  display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;
  color:var(--muted);font-size:11px;font-weight:700
}
.home-toggle-row{
  display:flex;align-items:center;justify-content:flex-start;
  min-height:30px;margin:-4px 0 -2px
}
.home-toggle-row .tool-toggle{
  height:30px;background:var(--card);box-shadow:var(--shadow);
  border-color:transparent
}
.library-manager{font-size:12px;color:var(--muted)}
.library-manager > summary{list-style:none;cursor:pointer;width:max-content}
.library-manager > summary::-webkit-details-marker{display:none}
.library-manager-panel{
  margin-top:10px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow-soft);padding:12px;
  display:flex;flex-direction:column;gap:10px
}
.library-manager-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.library-manager-row button{
  border:0;border-radius:var(--radius-sm);padding:10px 9px;font-size:12px;font-weight:900;
  background:var(--primary-soft);color:var(--primary);cursor:pointer
}
.library-manager-row button.secondary{background:var(--bg);color:var(--muted)}
.library-manager textarea{
  width:100%;height:64px;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:8px;font-size:11px;resize:none;background:var(--bg);color:var(--text)
}
.saved-progress-float{
  align-self:flex-start;
  display:grid;
  grid-template-columns:auto minmax(150px,1fr) auto;
  gap:10px;
  align-items:center;
  width:min(100%,var(--saved-progress-width-phone,360px));
  padding:10px 11px;
  border:1px solid var(--primary);
  border-radius:18px;
  background:var(--card);
  box-shadow:var(--shadow-soft);
  position:relative
}
.saved-progress-float.has-hint{margin-bottom:72px}
.saved-progress-float .icon{
  width:34px;height:34px;border-radius:50%;
  display:grid;place-items:center;
  background:var(--primary-soft);
  color:var(--primary);
  font-weight:900
}
.saved-progress-float .info{min-width:0}
.saved-progress-float .info strong{
  display:block;font-size:13px;line-height:1.25;
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical
}
.saved-progress-float .info small{
  display:block;margin-top:3px;font-size:11px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.saved-progress-float .actions{display:flex;gap:6px}
.saved-progress-float .actions,
.saved-progress-float .actions button{white-space:nowrap}
.saved-progress-float .actions button{
  border:0;border-radius:99px;padding:7px 10px;
  font-size:12px;font-weight:900;cursor:pointer;
  background:var(--primary);color:var(--on-primary,#fff)
}
.saved-progress-float .actions button.secondary{background:var(--bg);color:var(--muted)}
.settings-widget-preview{margin-top:8px;max-width:100%}
.saved-progress-hint{
  position:absolute;left:44px;top:calc(100% + 8px);z-index:30;
  width:min(260px,calc(100vw - 80px));
  padding:10px;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--card);
  box-shadow:var(--shadow);
  color:var(--text);
  font-size:12px;
  line-height:1.45
}
.saved-progress-hint:before{
  content:"";
  position:absolute;left:18px;top:-6px;
  width:10px;height:10px;
  transform:rotate(45deg);
  background:var(--card);
  border-left:1px solid var(--line);
  border-top:1px solid var(--line)
}
.saved-progress-hint button{
  margin-top:7px;border:0;background:transparent;color:var(--primary);
  font-weight:900;font-size:12px;padding:0;cursor:pointer
}
.subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.subject-card{
  background:var(--card);border-radius:var(--radius);padding:20px 16px;
  box-shadow:var(--shadow);cursor:pointer;transition:all .15s;
  display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden
}
.subject-card:active{transform:scale(.97)}
.subject-card.editing{padding-right:42px}
.subject-card .subject-icon{width:38px;height:38px;display:grid;place-items:center}
.subject-card h3{font-size:15px;line-height:1.3}
.subject-card small{color:var(--muted);font-size:12px}

.bank-list{display:flex;flex-direction:column;gap:8px}
.bank-item{
  background:var(--card);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:12px
}
.bank-item:active{transform:scale(.98)}
.bank-item .icon{width:34px;height:34px;display:grid;place-items:center;flex-shrink:0}
.library-icon{
  width:34px;height:34px;border-radius:12px;display:grid;place-items:center;
  background:var(--primary-soft);
  border:1px solid var(--line);
  color:var(--text);
  font-size:22px;line-height:1;
  filter:none
}
.library-icon .notebook-icon{width:19px;height:19px;stroke-width:1.8}
.library-icon.plain{background:transparent;border-color:transparent;filter:none}
.bank-item .info{flex:1}
.bank-item .info h4{font-size:15px;margin-bottom:2px}
.bank-item .info small{color:var(--muted);font-size:12px}
.bank-item .count{font-size:13px;font-weight:700;color:var(--primary)}
.bank-item button.count{
  border:0;background:transparent;padding:6px 0;cursor:pointer
}
.bank-item button.count:active{transform:scale(.96)}
.bank-item .quick-actions{
  width:100%;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap
}
.bank-item .quick-actions button{
  border:0;border-radius:99px;padding:6px 9px;font-size:11px;font-weight:900;
  background:var(--bg);color:var(--muted);cursor:pointer
}
.bank-item .quick-actions button.primary{background:var(--primary-soft);color:var(--primary)}
.bank-item.editing{
  align-items:flex-start;
  flex-wrap:wrap;
  gap:10px 12px;
  position:relative
}
.bank-item.editing.dragging,.subject-card.editing.dragging,.metric-card.editing.dragging,.action-panel.editing.dragging{
  opacity:.94;box-shadow:0 18px 48px rgba(0,0,0,.18)
}
.drag-placeholder{border:1px dashed var(--primary);border-radius:var(--radius);background:var(--primary-soft);min-height:64px}
.edit-remove{
  position:absolute;right:8px;top:8px;width:24px;height:24px;border:0;border-radius:50%;
  background:var(--danger-soft);color:var(--danger);font-weight:950;cursor:pointer;
  display:grid;place-items:center;z-index:2
}
.edit-handle{
  font-size:11px;color:var(--muted);font-weight:800
}
.bank-item.editing .info{
  min-width:0
}
.bank-item.editing .count{
  padding:4px 8px;
  margin-right:24px;
  border-radius:99px;
  background:var(--primary-soft);
  font-size:12px;
  line-height:1.2
}
.bank-item.editing .quick-actions{
  margin-left:46px;
  justify-content:flex-start
}
.chapter-actions,.practice-actions{display:flex;gap:8px;flex-wrap:wrap}
.chapter-actions button,.practice-actions button{
  border:0;border-radius:99px;padding:9px 13px;font-size:13px;font-weight:800;
  cursor:pointer;background:var(--primary-soft);color:var(--primary)
}
.practice-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.practice-actions button{padding:13px 12px;background:var(--primary);color:var(--on-primary,#fff)}
.practice-actions button.secondary{background:var(--secondary-soft);color:var(--secondary)}
.practice-actions button.answer-mode{background:var(--success-soft);color:var(--success)}
.practice-actions button.lookup-mode,.chapter-actions button.lookup-mode{background:var(--warn-soft);color:var(--warn)}
.practice-actions button.wrong-mode,.chapter-actions button.wrong-mode{background:var(--danger-soft);color:var(--danger)}
.practice-actions button.muted-mode,.chapter-actions button.muted-mode{background:var(--bg);color:var(--muted)}
.action-panel{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;display:flex;flex-direction:column;gap:10px;position:relative
}
.tool-toggle{
  height:26px;
  border:1px solid var(--line);
  border-radius:99px;
  padding:0 7px;
  background:var(--bg);
  color:var(--primary);
  font-size:11px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  gap:5px;
  cursor:pointer;
  box-shadow:none;
  transition:transform .15s, background .18s, border-color .18s
}
.tool-toggle:active{transform:scale(.97)}
.tool-toggle .icon{
  width:16px;
  height:16px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:var(--primary-soft);
  color:var(--primary);
  font-size:10px;
  line-height:1
}
.subject-card.with-tool{
  position:relative;
  padding-right:82px
}
.subject-card.with-tool .tool-toggle{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%)
}
.subject-card.with-tool .tool-toggle:active{
  transform:translateY(-50%) scale(.97)
}
.tool-group{
  display:contents
}
.tool-group + .bank-list{margin-top:-8px}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-grid button{
  border:0;border-radius:var(--radius-sm);padding:13px 10px;font-size:13px;font-weight:800;
  cursor:pointer;background:var(--primary);color:var(--on-primary,#fff)
}
.action-grid button.secondary{background:var(--secondary-soft);color:var(--secondary)}
.action-grid button.answer-mode{background:var(--success-soft);color:var(--success)}
.action-grid button.lookup-mode{background:var(--warn-soft);color:var(--warn)}
.action-grid button.wrong-mode{background:var(--danger-soft);color:var(--danger)}
.action-grid button.muted-mode{background:var(--bg);color:var(--muted)}
.action-grid button:last-child:nth-child(odd){grid-column:1 / -1}
.chapter-action-wrap{
  min-width:210px;
  display:flex;
  align-items:center;
  gap:8px
}
.chapter-expand-icon{
  width:32px;height:32px;border:1px solid var(--line);border-radius:50%;
  background:var(--bg);color:var(--primary);font-size:13px;font-weight:900;
  cursor:pointer;display:grid;place-items:center;flex-shrink:0;
  transition:transform .16s, background .18s, border-color .18s
}
.chapter-expand-icon:active{transform:scale(.94)}
.chapter-expand-icon .notebook-icon{width:15px;height:15px}
.chapter-action-wrap.expanded .chapter-expand-icon{background:var(--primary-soft);border-color:var(--primary);transform:rotate(45deg)}
.chapter-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));min-width:210px;gap:8px}
.chapter-actions button{padding:9px 8px;min-width:0}
.chapter-action-wrap.expanded .chapter-actions button{animation:chapterActionIn .16s ease-out both}
.chapter-action-wrap.collapsed .chapter-actions{display:none}
.section-title{font-size:13px;font-weight:800;color:var(--muted);padding:2px}
.subject-summary{
  font-size:12px;color:var(--muted);padding:0 2px;
  display:flex;align-items:center;justify-content:space-between;gap:10px
}
.wrong-badge{font-size:12px;font-weight:800;color:var(--danger)}
.analysis-panel{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;display:flex;flex-direction:column;gap:12px
}
.settings-row{display:flex;flex-direction:column;gap:6px}
.settings-row label{font-size:12px;font-weight:800;color:var(--muted)}
.settings-row input,.settings-row select{
  width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:10px;font-size:13px;background:var(--card);color:var(--text)
}
.setting-toggle{
  display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;
  padding:10px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--bg)
}
.setting-toggle input{width:18px;height:18px;margin-top:2px;accent-color:var(--primary)}
.setting-toggle strong{font-size:13px}
.setting-toggle small{display:block;margin-top:3px;color:var(--muted);font-size:12px;line-height:1.45}
.swatches{display:flex;gap:10px;flex-wrap:wrap}
.swatch{
  width:34px;height:34px;border-radius:50%;border:3px solid var(--card);
  box-shadow:0 0 0 1px var(--line);cursor:pointer
}
.swatch.active{box-shadow:0 0 0 3px var(--primary-soft),0 0 0 1px var(--primary)}
.settings-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.settings-actions.storage-actions button:first-child{grid-column:1 / -1}
.settings-actions.top{
  position:sticky;top:10px;z-index:5;padding:8px;margin-bottom:2px;
  background:var(--bar-bg);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow-soft);backdrop-filter:blur(10px)
}
.settings-actions button{
  border:0;border-radius:99px;padding:12px;font-size:13px;font-weight:800;
  background:var(--primary);color:var(--on-primary,#fff);cursor:pointer
}
.settings-actions button.secondary{background:var(--bg);color:var(--muted)}
body[data-theme="dark"] .settings-actions.top{background:var(--bar-bg)}
.settings-notice{
  border:1px solid var(--primary);
  background:var(--primary-soft);
  color:var(--primary);
  border-radius:var(--radius);
  padding:12px 14px;
  font-size:13px;
  font-weight:800;
  line-height:1.45
}
.palette-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.palette-card{
  border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px;
  background:var(--bg);cursor:pointer;text-align:left;color:var(--text);
  display:flex;flex-direction:column;gap:8px
}
.palette-card.active{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft);background:var(--card)}
.palette-card strong{font-size:13px}
.palette-dots{display:flex;gap:5px}
.palette-dots span{width:18px;height:18px;border-radius:50%;border:1px solid rgba(0,0,0,.08)}
.system-theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.system-theme-card{
  min-height:72px;padding:11px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--bg);color:var(--text);text-align:left;cursor:pointer
}
.system-theme-card strong,.system-theme-card small{display:block}
.system-theme-card small{margin-top:5px;color:var(--muted);font-size:10px;line-height:1.45}
.system-theme-card.active{border-color:var(--primary);box-shadow:inset 0 0 0 1px var(--primary)}
.system-theme-card.endfield{background:#15161a;color:#f4f4f2;border-color:#45464d}
.system-theme-card.endfield strong{color:#fdfc00}
.system-theme-card.endfield small{color:#a7a8ad}
.system-theme-card.endfield.active{border-color:#fdfc00;box-shadow:inset 0 0 0 1px #fdfc00}
.appearance-standard-controls{display:contents}
.appearance-standard-controls.locked{opacity:.42;filter:grayscale(.8)}
.endfield-lock-notice{border-left:3px solid #fdfc00}
.radius-setting{display:grid;gap:8px}
.radius-setting-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
.radius-setting-head output{min-width:46px;color:var(--primary);font-size:12px;font-weight:900;text-align:right}
.radius-setting input[type="range"]{width:100%;accent-color:var(--primary)}
.radius-preview{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.radius-preview span{display:grid;place-items:center;min-height:44px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);font-size:11px;color:var(--muted)}
.radius-preview span:last-child{border-radius:var(--radius-control);background:var(--primary);color:var(--on-primary,#fff)}
.button-choice-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.button-choice{
  display:flex;align-items:center;justify-content:center;gap:6px;
  min-height:36px;border:1px solid var(--line);border-radius:99px;
  background:var(--bg);font-size:12px;font-weight:900;color:var(--text);
  cursor:pointer
}
.button-choice input{width:14px;height:14px;accent-color:var(--primary)}
.button-choice.icon-choice{min-height:44px;font-size:22px;padding:0}
.button-choice.icon-choice .notebook-icon{width:20px;height:20px}
.button-choice.icon-choice input{position:absolute;opacity:0;pointer-events:none}
.button-choice.icon-choice.active{
  border-color:var(--primary);background:var(--primary-soft);box-shadow:0 0 0 2px var(--primary-soft)
}
.settings-subtitle{font-size:12px;line-height:1.55;color:var(--muted)}
.help-details{
  border:1px solid var(--line);border-radius:var(--radius);
  background:var(--card);box-shadow:var(--shadow-soft);overflow:hidden
}
.help-details summary{
  list-style:none;cursor:pointer;padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  font-size:13px;font-weight:900;color:var(--text)
}
.help-details summary::-webkit-details-marker{display:none}
.help-details summary span{color:var(--primary);font-size:12px}
.help-details[open] summary{border-bottom:1px solid var(--line)}
.help-body{padding:12px 14px;font-size:13px;line-height:1.75;color:var(--text)}
.help-body h4{font-size:13px;margin:10px 0 4px}
.help-body p{color:var(--muted);margin:0 0 6px}
.choice-select{position:relative;width:100%;min-width:0}
.choice-select input[type="hidden"]{display:none}
.choice-trigger{
  width:100%;min-height:42px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--card);color:var(--text);padding:0 12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  font-size:13px;font-weight:800;cursor:pointer;text-align:left;
  transition:border-color .16s ease,background-color .16s ease,box-shadow .16s ease
}
.choice-trigger .chevron{
  position:relative;display:block;flex:0 0 18px;width:18px;height:18px;color:var(--muted)
}
.choice-trigger .chevron::before,.choice-trigger .chevron::after{
  content:"";position:absolute;top:8px;width:8px;height:2px;border-radius:1px;
  background:currentColor;transition:transform .16s ease
}
.choice-trigger .chevron::before{left:2px;transform:rotate(42deg)}
.choice-trigger .chevron::after{right:2px;transform:rotate(-42deg)}
.choice-select.open .choice-trigger{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
.choice-select.open .choice-trigger .chevron{color:var(--primary)}
.choice-select.open .choice-trigger .chevron::before{transform:rotate(-42deg)}
.choice-select.open .choice-trigger .chevron::after{transform:rotate(42deg)}
.choice-menu{
  display:none;position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:170;
  border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--card);box-shadow:var(--shadow);padding:5px;max-height:238px;overflow-y:auto
}
.choice-select.open .choice-menu{display:grid;gap:4px}
.choice-option{
  position:relative;min-height:40px;border:0;border-radius:var(--radius-sm);
  background:transparent;color:var(--text);padding:9px 34px 9px 11px;
  text-align:left;font-size:13px;font-weight:800;cursor:pointer;
  transition:background-color .14s ease,color .14s ease
}
.choice-option:hover,.choice-option.active{background:var(--primary-soft);color:var(--primary)}
.choice-option.active::after{
  content:"\2713";position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--primary);font-size:14px;font-weight:900
}
.range-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.range-row input{width:100%}
.study-chart-panel{display:flex;flex-direction:column;gap:12px}
.subject-study-section{display:grid;gap:8px;margin-top:4px}
.subject-study-list{display:grid;gap:8px}
.subject-study-card{
  display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px 14px;align-items:center;
  width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:6px;
  background:var(--surface);color:var(--text);font:inherit;text-align:left;cursor:pointer
}
.subject-study-card strong,.subject-study-card small{display:block}
.subject-study-card strong{font-size:13px}.subject-study-card small{margin-top:3px;color:var(--muted);font-size:10px;line-height:1.45}
.subject-study-card .subject-time{color:var(--primary);font-size:12px;font-weight:900;text-align:right}
.subject-study-card .subject-progress-track{grid-column:1/-1;height:4px;background:var(--line);overflow:hidden}
.subject-study-card .subject-progress-track i{display:block;height:100%;background:var(--primary)}
.mode-study-summary{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.mode-study-summary span{flex:0 0 auto;padding:6px 8px;border:1px solid var(--line);background:var(--bg);font-size:10px;color:var(--muted)}
.study-stats-controls,.study-stats-chart{display:flex;flex-direction:column;gap:12px;min-width:0}
.study-chart-tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
.study-chart-tabs button{
  border:1px solid var(--line);border-radius:99px;padding:8px 6px;
  background:var(--bg);color:var(--muted);font-size:12px;font-weight:900;cursor:pointer
}
.study-chart-tabs button.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
.study-chart-summary{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px
}
.study-chart-summary div{
  border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--bg);padding:9px 8px;min-width:0
}
.study-chart-summary strong{display:block;font-size:14px;line-height:1.2}
.study-chart-summary span{display:block;margin-top:4px;color:var(--muted);font-size:11px;font-weight:800}
.study-chart-svg{
  width:100%;height:auto;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--bg);display:block
}
.study-chart-grid{stroke:var(--line);stroke-width:1}
.study-chart-line{fill:none;stroke:var(--primary);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.study-chart-svg.chart-enter .study-chart-line{
  stroke-dasharray:420;
  stroke-dashoffset:420;
  animation:studyLineDraw .9s ease-out forwards
}
.study-chart-dot{fill:var(--card);stroke:var(--primary);stroke-width:2}
.study-chart-dot.active{fill:var(--primary)}
.study-chart-svg.chart-enter .study-chart-dot{
  opacity:0;
  transform-box:fill-box;
  transform-origin:center;
  animation:studyDotIn .42s ease-out forwards
}
.study-chart-dot.selected{fill:var(--primary);stroke:var(--card);stroke-width:2.2px}
.study-chart-hit{fill:transparent;cursor:pointer}
.study-chart-marker{stroke:var(--primary);stroke-width:1.2;stroke-dasharray:3 3;opacity:.55;pointer-events:none}
.study-chart-tooltip{animation:studyTipIn .18s ease-out both;pointer-events:none}
.study-chart-tooltip rect{fill:var(--card);stroke:var(--line);stroke-width:1}
.study-chart-tooltip text{fill:var(--text);font-size:10px;font-weight:900}
.study-chart-tooltip text:last-child{fill:var(--primary);font-size:11px}
.study-chart-labels{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:11px;font-weight:800}
.study-chart-labels button{
  border:0;background:transparent;color:inherit;font:inherit;padding:0;cursor:pointer
}
.study-chart-labels button.active{color:var(--primary)}
@keyframes studyLineDraw{to{stroke-dashoffset:0}}
@keyframes studyDotIn{
  from{opacity:0;transform:scale(.76)}
  to{opacity:1;transform:scale(1)}
}
@keyframes studyTipIn{
  from{opacity:0;transform:translateY(3px)}
  to{opacity:1;transform:translateY(0)}
}
.metric-card.time-metric:not(.editing){
  cursor:pointer;border:1px solid transparent;
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease
}
.metric-card.time-metric:not(.editing):hover{border-color:var(--primary);box-shadow:var(--shadow)}
.metric-card.time-metric:not(.editing):focus-visible{outline:2px solid var(--primary);outline-offset:3px}
.metric-card.time-metric:not(.editing):active{transform:scale(.99)}
.metric-card.progress-metric:not(.editing){
  cursor:pointer;border:1px solid transparent;
  transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease
}
.metric-card.progress-metric:not(.editing):hover{border-color:var(--primary);box-shadow:var(--shadow)}
.metric-card.progress-metric:not(.editing):focus-visible{outline:2px solid var(--primary);outline-offset:3px}
.metric-card.progress-metric:not(.editing):active{transform:scale(.99)}
.progress-detail-list{display:flex;flex-direction:column;gap:8px;max-height:min(58vh,520px);overflow-y:auto;padding-right:2px}
.progress-detail-row{
  width:100%;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px 14px;
  text-align:left;padding:12px;background:var(--bg);border:1px solid var(--line);color:var(--text)
}
.progress-detail-row strong{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-detail-row small{color:var(--muted);font-weight:750}
.progress-detail-track{grid-column:1 / -1;height:5px;border-radius:99px;background:var(--line);overflow:hidden}
.progress-detail-track span{display:block;height:100%;background:var(--primary)}
body[data-system-theme="endfield"]{
  --bg:#101113;
  --card:#18191d;
  --surface:#18191d;
  --surface-soft:#232429;
  --text:#f4f4f2;
  --muted:#b5b6bb;
  --line:#45464d;
  --primary:#fdfc00;
  --primary-soft:rgba(253,252,0,.14);
  --secondary:#a7a8ad;
  --secondary-soft:rgba(167,168,173,.14);
  --success:#d7df3f;
  --success-soft:rgba(215,223,63,.14);
  --danger:#ff7972;
  --danger-soft:rgba(255,121,114,.14);
  --warn:#f1c84c;
  --warn-soft:rgba(241,200,76,.14);
  --bar-bg:rgba(17,18,22,.96);
  --option-tint:rgba(16,17,19,.78);
  --shadow:none;
  --shadow-soft:none;
  --radius:3px;
  --radius-sm:2px;
  color:var(--text);
  background:var(--bg);
  font-family:Consolas,"Microsoft YaHei UI",sans-serif
}
body[data-system-theme="endfield"] .brand-mark,
body[data-system-theme="endfield"] .main-brand-mark{
  background:#fdfc00;color:#101113;border-color:#fdfc00;border-radius:2px
}
body[data-system-theme="endfield"] .topbar,
body[data-system-theme="endfield"] .bottombar,
body[data-system-theme="endfield"] .main-nav{border-color:#3a3a40;background:#111216;box-shadow:none}
body[data-system-theme="endfield"] .topbar{border-top:3px solid #fdfc00}
body[data-system-theme="endfield"] .metric-card,
body[data-system-theme="endfield"] .subject-card,
body[data-system-theme="endfield"] .bank-item,
body[data-system-theme="endfield"] .action-panel,
body[data-system-theme="endfield"] .analysis-panel,
body[data-system-theme="endfield"] .settings-section,
body[data-system-theme="endfield"] .card,
body[data-system-theme="endfield"] .hub-summary-band,
body[data-system-theme="endfield"] .hub-study-status{
  border-radius:3px;border-color:#393a40;box-shadow:none
}
body[data-system-theme="endfield"] .section-title,
body[data-system-theme="endfield"] .settings-section > h3{border-left:3px solid #fdfc00;padding-left:9px;text-transform:uppercase}
body[data-system-theme="endfield"] .option.selected,
body[data-system-theme="endfield"] .option.correct,
body[data-system-theme="endfield"] .btn-save,
body[data-system-theme="endfield"] .progress-detail-track span{
  background:#fdfc00;color:#101113;border-color:#fdfc00
}
body[data-system-theme="endfield"] button{border-radius:2px}
body[data-system-theme="endfield"] .main-nav-button.active{background:#fdfc00;color:#101113}
body[data-system-theme="endfield"] .main-nav-button.active .icon{background:transparent;color:#101113}
body[data-system-theme="endfield"] .subject-card::after,
body[data-system-theme="endfield"] .bank-item::after{
  content:"";position:absolute;right:0;top:0;width:22px;height:4px;background:#fdfc00
}
body[data-system-theme="endfield"] .subject-card::before,
body[data-system-theme="endfield"] .bank-item::before,
body[data-system-theme="endfield"] .analysis-panel::before{
  content:"";position:absolute;left:-1px;bottom:-1px;width:11px;height:11px;
  border-left:2px solid #fdfc00;border-bottom:2px solid #fdfc00;pointer-events:none
}
body[data-system-theme="endfield"] .subject-card,
body[data-system-theme="endfield"] .bank-item,
body[data-system-theme="endfield"] .analysis-panel{position:relative;border:1px solid #393a40}
.study-entry-meta{align-items:center}
.study-entry-meta > span:first-child{min-width:0}
.metric-click-hint{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:22px;padding:0 8px;border-radius:99px;
  background:var(--primary-soft);color:var(--primary);
  font-size:11px;font-weight:900;white-space:nowrap
}
.recycle-list,.component-list{display:flex;flex-direction:column;gap:8px}
.component-item{
  border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg);
  padding:10px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center
}
.component-item strong{font-size:13px}
.component-item small{display:block;color:var(--muted);font-size:11px;margin-top:3px}
.storage-path-card{
  border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg);
  padding:10px;display:flex;flex-direction:column;gap:7px
}
.storage-path-card code{
  width:max-content;max-width:100%;border-radius:8px;padding:5px 7px;
  background:var(--card);color:var(--primary);font-size:12px;
  overflow:hidden;text-overflow:ellipsis
}
.storage-path-card small{color:var(--muted);font-size:11px;line-height:1.5}
.backup-card{gap:10px}
.backup-card .settings-actions{margin-top:2px}
.backup-card .settings-actions button:first-child{grid-column:auto}
.backup-security-note{display:flex;align-items:flex-start;gap:8px;color:var(--muted);font-size:11px;line-height:1.5}
.backup-security-note input{width:16px;height:16px;margin-top:1px;accent-color:var(--primary)}
.backup-operation{display:flex;flex-direction:column;gap:12px}
.backup-progress-track{height:8px;border-radius:99px;background:var(--line);overflow:hidden}
.backup-progress-fill{height:100%;width:0;background:var(--primary);transition:width .18s ease-out}
.backup-progress-label{font-size:12px;line-height:1.5;color:var(--muted)}
.backup-preview-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.backup-preview-grid div{border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px;background:var(--bg);min-width:0}
.backup-preview-grid strong,.backup-preview-grid small{display:block}
.backup-preview-grid strong{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.backup-preview-grid small{margin-top:3px;color:var(--muted);font-size:10px}
.backup-store-list{display:flex;flex-wrap:wrap;gap:6px}
.backup-store-list span{padding:5px 7px;border:1px solid var(--line);border-radius:99px;background:var(--bg);color:var(--muted);font-size:10px;font-weight:800}
.backup-integrity{border:1px solid var(--success);border-radius:var(--radius-sm);padding:9px;color:var(--success);background:var(--success-soft);font-size:12px;font-weight:800}
.backup-secret-warning{border-color:var(--danger);color:var(--danger);background:var(--danger-soft)}
.recycle-box{
  border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg);
  padding:0;overflow:hidden
}
.recycle-box > summary{
  list-style:none;cursor:pointer;padding:10px 11px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  font-size:13px;font-weight:900
}
.recycle-box > summary::-webkit-details-marker{display:none}
.recycle-box > summary span{color:var(--muted);font-size:11px;font-weight:800}
.recycle-item{
  border-top:1px solid var(--line);background:var(--card);padding:10px;
  display:flex;flex-direction:column;gap:9px
}
.recycle-item > summary{
  list-style:none;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center
}
.recycle-item > summary::-webkit-details-marker{display:none}
.recycle-item strong{font-size:13px}
.recycle-item small{display:block;color:var(--muted);font-size:11px;margin-top:3px}
.recycle-detail{
  border-top:1px dashed var(--line);padding-top:9px;
  display:flex;flex-direction:column;gap:8px
}
.recycle-detail code{
  display:inline-block;max-width:100%;border-radius:8px;padding:4px 6px;
  background:var(--bg);color:var(--primary);font-size:11px;
  overflow:hidden;text-overflow:ellipsis
}
.recycle-file-list{display:flex;flex-direction:column;gap:5px}
.recycle-file-list div{
  display:grid;grid-template-columns:minmax(0,1fr) minmax(110px,.9fr);align-items:start;gap:8px 12px;
  border:1px solid var(--line);border-radius:9px;background:var(--bg);padding:7px 8px;
  font-size:12px
}
.recycle-file-list span{min-width:0;overflow-wrap:anywhere;line-height:1.5}
.recycle-file-list span:last-child{color:var(--muted);font-size:11px;text-align:right}
@media(max-width:520px){
  .recycle-file-list div{grid-template-columns:minmax(0,1fr)}
  .recycle-file-list span:last-child{text-align:left}
}
.recycle-actions,.component-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.recycle-actions button,.component-actions button{
  border:0;border-radius:99px;padding:7px 9px;font-size:11px;font-weight:900;
  background:var(--primary-soft);color:var(--primary);cursor:pointer
}
.recycle-actions button.danger{background:var(--danger-soft);color:var(--danger)}
.lookup-toolbar{display:grid;grid-template-columns:1fr;gap:10px}
.lookup-toolbar input,.lookup-toolbar select{
  width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:10px;font-size:13px;background:var(--card);color:var(--text)
}
.answer-list{display:flex;flex-direction:column;gap:10px}
.answer-row{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;display:flex;flex-direction:column;gap:8px
}
.answer-row .meta{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted);flex-wrap:wrap}
.answer-row .question{font-size:14px;line-height:1.55}
.answer-row .answer{font-size:15px;font-weight:900;color:var(--primary)}
.answer-row .options-mini{font-size:12px;line-height:1.55;color:var(--muted)}

/* AI */
.ai-entry{
  width:100%;grid-column:1 / -1;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--card);color:var(--text);padding:13px 14px;display:flex;align-items:center;
  gap:12px;text-align:left;cursor:pointer;box-shadow:var(--shadow-soft);transition:transform .15s,border-color .15s
}
.ai-entry:active{transform:scale(.985)}
.ai-entry:hover{border-color:var(--primary)}
.ai-entry-mark{
  width:38px;height:38px;border-radius:12px;background:var(--primary);color:var(--on-primary,#fff);
  display:grid;place-items:center;font-size:13px;font-weight:950;flex-shrink:0
}
.ai-entry-copy{min-width:0;display:flex;flex-direction:column;gap:3px;flex:1}
.ai-entry-copy strong{font-size:14px}
.ai-entry-copy small{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-entry-arrow{color:var(--muted);font-size:20px}
.answer-reveal.insight-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px}
.answer-reveal .ai-analyze-button{border-color:var(--line);background:var(--card);color:var(--text)}
.answer-reveal .ai-analyze-button.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
.question-ai-panel{
  margin-top:12px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--card);overflow:hidden
}
.question-ai-panel.loading{border-color:var(--primary)}
.question-ai-head{
  min-height:42px;padding:9px 12px;background:var(--primary-soft);display:flex;
  align-items:center;justify-content:space-between;gap:10px
}
.question-ai-head strong{font-size:13px;color:var(--primary)}
.question-ai-head small{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.question-ai-body{padding:13px 14px;font-size:13px;line-height:1.7;user-select:text;-webkit-user-select:text}
.question-ai-body.is-loading{color:var(--muted)}
.ai-markdown{white-space:normal;word-break:break-word}
.ai-markdown p{margin:0 0 9px}
.ai-markdown p:last-child{margin-bottom:0}
.ai-markdown h3,.ai-markdown h4{font-size:14px;margin:12px 0 6px;color:var(--text)}
.ai-markdown ul,.ai-markdown ol{padding-left:20px;margin:7px 0}
.ai-markdown li{margin:4px 0}
.ai-markdown code{font-family:Consolas,monospace;font-size:12px;background:var(--bg);border-radius:6px;padding:2px 5px}
.ai-markdown pre{overflow-x:auto;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;margin:8px 0;white-space:pre-wrap}
.ai-panel-actions{display:flex;gap:8px;flex-wrap:wrap;padding:0 14px 13px}
.ai-panel-actions button{
  border:1px solid var(--line);border-radius:99px;background:var(--card);color:var(--text);
  min-height:34px;padding:7px 12px;font-size:12px;font-weight:850;cursor:pointer
}
.ai-panel-actions button.primary{background:var(--primary);border-color:var(--primary);color:var(--on-primary,#fff)}
.ai-panel-actions button[disabled]{opacity:.5}
.ai-learning-result{margin:0 14px 14px;border:1px solid var(--line);border-radius:6px;background:var(--surface);overflow:hidden}.ai-learning-result.loading{border-color:var(--primary)}
.ai-learning-result-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 11px;border-bottom:1px solid var(--line);background:var(--surface-soft)}.ai-learning-result-head strong{font-size:12px}.ai-learning-result-head small{color:var(--muted);font-size:9px}
.ai-learning-loading{padding:18px 12px;color:var(--muted);font-size:11px;text-align:center}
.ai-similar-list{display:grid;gap:8px;padding:10px}.ai-similar-card{padding:11px;border:1px solid var(--line);border-radius:5px;background:var(--card)}.ai-similar-meta{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:9px}.ai-similar-meta b{color:var(--primary);font-size:11px}.ai-similar-card h4{margin:7px 0 9px;font-size:13px;line-height:1.6}.ai-similar-card ol{display:grid;gap:5px;margin:0 0 9px;padding:0;list-style:none}.ai-similar-card li{display:grid;grid-template-columns:20px minmax(0,1fr);gap:6px;padding:6px 7px;border:1px solid var(--line);border-radius:4px;font-size:11px;line-height:1.45}.ai-similar-card li>b{color:var(--primary)}.ai-similar-card>button{height:30px;padding:0 10px;border:1px solid var(--primary);border-radius:4px;background:transparent;color:var(--primary);font:inherit;font-size:10px}.ai-similar-answer{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:11px}.ai-similar-answer>strong{color:var(--primary)}.ai-generated-note{padding:8px 10px;border-top:1px solid var(--line);color:var(--muted);font-size:9px;line-height:1.5}
.ai-generated-note.stale{background:var(--warn-soft);color:var(--warn);font-weight:650}
.ai-shell{height:100%;min-height:0;position:relative;display:grid;grid-template-columns:minmax(0,1fr);background:var(--bg)}
.ai-history-pane{
  display:none;min-height:0;background:var(--card);border-right:1px solid var(--line);
  overflow-y:auto;padding:12px
}
.ai-history-pane.open{
  display:flex;position:absolute;inset:0 auto 0 0;width:min(84vw,320px);z-index:15;
  flex-direction:column;box-shadow:12px 0 30px rgba(0,0,0,.16)
}
.ai-history-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.ai-history-head strong{font-size:14px}
.ai-history-head button,.ai-thread-item button{
  border:1px solid var(--line);border-radius:99px;background:var(--bg);color:var(--muted);
  padding:6px 9px;font-size:11px;font-weight:800;cursor:pointer
}
.ai-thread-list{display:flex;flex-direction:column;gap:7px}
.ai-thread-item{
  border:1px solid var(--line);border-radius:10px;background:var(--card);padding:9px;
  display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:7px;cursor:pointer
}
.ai-thread-item.active{border-color:var(--primary);background:var(--primary-soft)}
.ai-thread-item .copy{min-width:0}
.ai-thread-item strong,.ai-thread-item small{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ai-thread-item strong{font-size:12px}
.ai-thread-item small{font-size:10px;color:var(--muted);margin-top:3px}
.ai-chat-main{min-width:0;min-height:0;display:flex;flex-direction:column}
.ai-message-list{
  flex:1;min-height:0;overflow-y:auto;padding:16px 14px 22px;display:flex;
  flex-direction:column;gap:12px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch
}
.ai-empty{margin:auto;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted);text-align:center}
.ai-empty .ai-entry-mark{width:48px;height:48px;border-radius:15px}
.ai-empty strong{font-size:16px;color:var(--text)}
.ai-message{max-width:min(88%,720px);display:flex;flex-direction:column;gap:5px}
.ai-message.user{align-self:flex-end;align-items:flex-end}
.ai-message.assistant{align-self:flex-start;align-items:flex-start}
.ai-message-bubble{
  border:1px solid var(--line);border-radius:12px;padding:11px 13px;background:var(--card);
  font-size:14px;line-height:1.65;user-select:text;-webkit-user-select:text;word-break:break-word
}
.ai-message.user .ai-message-bubble{background:var(--primary);border-color:var(--primary);color:var(--on-primary,#fff)}
.ai-message.error .ai-message-bubble{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.ai-message-meta{font-size:10px;color:var(--muted);padding:0 3px}
.ai-message-attachments{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.ai-attachment-chip{
  max-width:220px;border:1px solid currentColor;border-radius:8px;padding:5px 7px;
  font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.ai-composer-wrap{background:var(--bar-bg);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom))}
.ai-pending-attachments{display:flex;gap:7px;overflow-x:auto;margin-bottom:8px}
.ai-pending-attachment{
  flex:0 0 auto;max-width:210px;border:1px solid var(--line);border-radius:8px;background:var(--card);
  padding:6px 8px;display:flex;align-items:center;gap:7px;font-size:11px
}
.ai-pending-attachment span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ai-pending-attachment button{border:0;background:none;color:var(--danger);font-weight:900;cursor:pointer}
.ai-composer{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:end;gap:8px}
.ai-composer textarea{
  width:100%;min-height:42px;max-height:132px;resize:none;border:1px solid var(--line);
  border-radius:12px;background:var(--card);color:var(--text);padding:10px 11px;
  font-family:var(--font);font-size:14px;line-height:1.45;user-select:text;-webkit-user-select:text
}
.ai-composer button{
  width:42px;height:42px;border:1px solid var(--line);border-radius:50%;background:var(--card);
  color:var(--text);font-size:17px;font-weight:900;cursor:pointer
}
.ai-composer button.send{background:var(--primary);border-color:var(--primary);color:var(--on-primary,#fff)}
.ai-composer button.stop{background:var(--danger);border-color:var(--danger);color:#fff}
.ai-chat-context{border:1px solid var(--line);border-radius:10px;background:var(--card);padding:10px 12px;margin:0 14px 10px;font-size:12px;color:var(--muted)}
.ai-settings-page{width:min(900px,100%);margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-settings-grid{display:grid;grid-template-columns:1fr;gap:12px}
.ai-field{display:flex;flex-direction:column;gap:6px}
.ai-field > label{font-size:12px;font-weight:850;color:var(--muted)}
.ai-field input,.ai-field select,.ai-field textarea{
  width:100%;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--text);
  padding:10px 11px;font-family:var(--font);font-size:13px;user-select:text;-webkit-user-select:text
}
.ai-field textarea{min-height:100px;resize:vertical;line-height:1.55}
.ai-inline{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:end}
.ai-inline button,.ai-settings-actions button{
  min-height:40px;border:1px solid var(--line);border-radius:10px;background:var(--card);
  color:var(--text);padding:9px 12px;font-weight:850;cursor:pointer
}
.ai-settings-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ai-settings-actions button.primary{background:var(--primary);border-color:var(--primary);color:var(--on-primary,#fff)}

/* Import section */
.import-zone{

  padding:30px 20px;text-align:center;cursor:pointer;transition:all .15s;

}
.import-zone:hover,.import-zone.dragover{border-color:var(--primary);background:var(--primary-soft)}
.import-zone p{color:var(--muted);font-size:14px}
.import-zone .big{font-size:36px;margin-bottom:8px}

.main-nav-button.active .icon{background:var(--primary-soft)}
.hub-section{display:grid;gap:12px}
.hub-lead-grid{display:grid;gap:12px;align-items:start}

.hub-quick-action{min-width:0;min-height:74px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--text);font:inherit;font-size:11px;font-weight:650}

  border-color:var(--primary);background:var(--primary-soft);color:var(--primary)
}

  border:1px solid rgba(253,252,0,.42);background:rgba(253,252,0,.16);color:var(--primary)
}

body[data-system-theme="endfield"] .topbar .btn-save *,

// ========== Navigation ==========
function getRouteSnapshot() {
  return {
    view: state.view,
    activeSubject: state.activeSubject,
    activePath: normalizePath(state.activePath),
    answerLookupContext: state.answerLookupContext ? { ...state.answerLookupContext } : null,
    activeAiThreadId: state.activeAiThreadId || '',
    currentIndex: state.currentIndex,
    mode: state.mode,
    mainTab: state.mainTab || 'home',
    inkPath: state.inkSession ? normalizePath(state.inkSession.path) : [],
    inkFreeMode: Boolean(state.inkSession?.freeMode),
    notebookDocumentId: state.notebookSession?.document?.id || '',
    examHistoryId: state.examHistoryId || '',
    quizViewport: getQuizRouteViewportSnapshot(),
  };
}

function getQuizRouteViewportSnapshot() {
  if (state.view !== 'quiz') return null;
  const scroller = state.mode === 'scroll'
    ? (document.getElementById('scrollContainer') || document.getElementById('viewport'))
    : document.querySelector('.page-slide.current-slide');
  const card = document.getElementById(`card-${state.currentIndex}`);
  return {
    scrollTop: Number(scroller?.scrollTop || 0),
    cardIndex: state.currentIndex,
    cardTop: card ? card.getBoundingClientRect().top : null,
  };
}

function pushRoute() {
  if (state.suppressNavPush) return;
  const current = getRouteSnapshot();
  if (!current.view || current.view === 'home') return;
  const last = state.navStack[state.navStack.length - 1];
  if (last && last.view === current.view && last.activeSubject === current.activeSubject) return;
  state.navStack.push(current);
  if (state.navStack.length > 40) state.navStack.shift();
}

function goHome() {
  saveCurrentViewPosition();
  state.navStack = [];
  state.answerLookupContext = null;
  state.answerLookupQuestions = [];
  state.answerLookupAllQuestions = [];
  state.answerLookupLoadedSubject = null;
  state.aiHistoryOpen = false;
  state.activePath = [];
  state.mainTab = 'home';
  renderHome();
}

function goBackRoute() {
  const overview = document.getElementById('questionOverview');
  if (overview) {
    overview.remove();
    return true;
  }
  if (state.view === 'exam' && state.examSession && !state.examSession.submitted) {
    requestExitExam();
    return true;
  }
  if (state.view === 'home') return false;
  saveCurrentViewPosition();
  if (state.view === 'answerLookup') {
    state.answerLookupQuestions = [];
    state.answerLookupAllQuestions = [];
    state.answerLookupLoadedSubject = null;
    releaseHydratedLargeBanks();
  }
  state.suppressNavPush = true;
  try {
    if (state.view === 'quiz') {
      return backFromQuiz();
    }
    if (state.view === 'handwriting') {
      saveCurrentInkNote({ silent: true });
      state.notebookViewport?.destroy();
      state.notebookViewport = null;
      state.notebookSession = null;
      state.inkSession = null;
      releaseHydratedLargeBanks();
    }
    const route = state.navStack.pop();
    if (route) {
      restoreRoute(route);
      return true;
    }
    if (state.transientReturnMainTab) {
      state.mainTab = state.transientReturnMainTab;
      state.transientReturnMainTab = '';
      state.activePath = [];
      renderHome();
      return true;
    }
    if (state.view === 'subjects' && normalizePath(state.activePath).length > 1) {
      state.activePath = parentPath(state.activePath);
      state.activeSubject = state.activePath[0] || '';
      renderSubject();
      return true;
    }
    if (state.view === 'settings' || state.view === 'studyStats' || state.view === 'subjects') {
      state.activePath = [];
      renderHome();
      return true;
    }
    if (state.view === 'quiz' || state.view === 'answerLookup') {
      renderSubject();
      return true;
    }
    renderHome();
    return true;
  } finally {
    state.suppressNavPush = false;
  }
}

window.handleNativeBack = function handleNativeBack() {
  return goBackRoute();
};

function backFromQuiz() {
  const returnMainTab = state.activeSession?.returnMainTab || '';
  const subject = state.activeSession?.subject || state.activeSubject || '';
  const path = normalizePath(state.activeSession?.path || state.activePath || (subject ? [subject] : []));
  const returnPath = getPracticeReturnPath(state.activeSession, path);
  saveReviewPosition();
  const autoSaved = Boolean(isSavablePracticeSession() && state.uiConfig.autoSaveOnExit);
  if (autoSaved) saveCurrentSession({ silent: true });
  state.activeSubject = subject;
  state.activePath = returnPath;
  state.activeSession = null;
  releaseHydratedLargeBanks();
  state.navStack = state.navStack.filter(route => route.view !== 'quiz');
  const last = state.navStack[state.navStack.length - 1];
  if (last && last.view === 'subjects' && last.activeSubject === subject) {
    state.navStack.pop();
  }
  state.answers = {};
  state.drafts = {};
  state.currentIndex = 0;
  state.reviewMode = false;
  if (returnMainTab) {
    state.mainTab = returnMainTab;
    state.activePath = [];
    renderHome();
    if (autoSaved) showToast('已自动保存进度');
    return true;
  }
  if (returnPath.length && getDescendantBanks(returnPath).length) {
    renderSubject();
  } else if (subject && getBanksBySubject(subject).length) {
    state.activePath = [subject];
    renderSubject();
  } else {
    renderHome();
  }
  if (autoSaved) showToast('已自动保存进度');
  return true;
}

function getPracticeReturnPath(session, fallbackPath = []) {
  const path = normalizePath(fallbackPath);
  if (session && Object.prototype.hasOwnProperty.call(session, 'returnPath')) {
    return normalizePath(session.returnPath);
  }
  if (session?.bankIds?.length === 1 && path.length > 1) return parentPath(path);
  return path;
}

function restoreRoute(route) {
  state.activeSubject = route.activeSubject || '';
  state.activePath = normalizePath(route.activePath || (state.activeSubject ? [state.activeSubject] : []));
  state.answerLookupContext = route.answerLookupContext || null;
  state.activeAiThreadId = route.activeAiThreadId || state.activeAiThreadId || '';
  state.currentIndex = route.currentIndex || 0;
  state.mode = route.mode || state.mode;
  state.mainTab = route.mainTab || state.mainTab || 'home';
  if (route.view === 'subjects') return renderSubject();
  if (route.view === 'settings') return renderSettings();
  if (route.view === 'studyStats') return renderStudyStatsPage();
  if (route.view === 'notebookLibrary') return openFreeNotebookLibrary({ restoreRoute: true });
  if (route.view === 'answerLookup') return renderAnswerLookup();
  if (route.view === 'aiChat') return renderAiChat();
  if (route.view === 'aiSettings') return renderAiSettings();
  if (route.view === 'reviewQueue') return openReviewQueue({ restoreRoute: true });
  if (route.view === 'examSetup' || route.view === 'exam' || route.view === 'examHistory') return restoreExamRoute(route);
  if (route.view === 'handwriting') return openHandwritingPractice(route.inkPath || route.activePath || [], {
    restoreRoute: true,
    index: route.currentIndex || 0,
    freeMode: Boolean(route.inkFreeMode),
    documentId: route.notebookDocumentId || '',
  });
  if (route.view === 'quiz' && state.activeSession) {
    renderQuiz();
    restoreQuizRouteViewport(route.quizViewport);
    return;
  }
  return renderHome();
}

function openSettings() {
  pushRoute();
  renderSettings();

function openExternal(url) {

function downloadApk(url) {
  if (!url) return showNotice('没有找到 APK 下载链接');
  if (window.QuizAppNative && typeof window.QuizAppNative.downloadAndInstallApk === 'function') {
    updateDownloadProgress(0, '正在连接系统下载器');
    window.QuizAppNative.downloadAndInstallApk(url);
