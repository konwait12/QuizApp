<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>QuizApp — 刷题</title>
<link rel="icon" href="data:,">
<style>
:root {
  --bg: #f8f9fb;
  --card: #fff;
  --text: #1a1d28;
  --muted: #8e94a3;
  --line: #edf0f4;
  --primary: #4f6ef7;
  --primary-soft: #eef1fe;
  --secondary: #5b6472;
  --secondary-soft: #f1f3f6;
  --success: #22b07d;
  --success-soft: #e8f8f1;
  --danger: #f24e5e;
  --danger-soft: #fef0f2;
  --warn: #f5a623;
  --warn-soft: #fef7eb;
  --shadow: 0 10px 28px rgba(23,31,56,.07);
  --shadow-soft: 0 1px 2px rgba(23,31,56,.04),0 10px 30px rgba(23,31,56,.055);
  --radius: 14px;
  --radius-sm: 10px;
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
body[data-theme="dark"]{
  --bg:#12151c;
  --card:#1b202b;
  --text:#f4f6fb;
  --muted:#9aa3b5;
  --line:#2b3240;
  --primary-soft:#263153;
  --secondary-soft:#252b36;
  --success-soft:#17382d;
  --danger-soft:#3a1f27;
  --warn-soft:#3b301b;
  --shadow:0 2px 18px rgba(0,0,0,.24);
  --shadow-soft:0 1px 2px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.24);
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font);
  background:
    radial-gradient(circle at 12% -10%,rgba(79,110,247,.08),transparent 34%),
    var(--bg);
  color:var(--text);
  height:100%;
  overflow:hidden;
  display:flex;flex-direction:column;
  -webkit-user-select:none;user-select:none;
}
.app{flex:1;display:flex;flex-direction:column;overflow:hidden;max-width:760px;margin:0 auto;width:100%}

/* Top bar */
.topbar{
  min-height:58px;padding:10px 16px;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.92);border-bottom:1px solid var(--line);z-index:10;
  backdrop-filter:blur(10px)
}
.topbar h1{
  font-size:18px;font-weight:850;flex:1;min-width:0;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;letter-spacing:0
}
.brand-title{display:flex;align-items:center;gap:9px}
.brand-mark{
  width:30px;height:30px;border-radius:10px;display:grid;place-items:center;
  background:var(--primary);color:#fff;font-size:15px;font-weight:950;
  box-shadow:0 8px 18px rgba(79,110,247,.22)
}
.topbar .btn-back,.topbar .btn-icon{
  width:36px;height:36px;border:1px solid var(--line);
  background:rgba(248,249,251,.72);color:var(--text);cursor:pointer;
  border-radius:50%;display:grid;place-items:center;transition:all .15s;
  flex-shrink:0
}
.topbar .btn-back{font-size:20px}
.topbar .btn-icon{font-size:13px;font-weight:900}
.topbar .btn-back:hover,.topbar .btn-icon:hover{background:var(--primary-soft);color:var(--primary);border-color:rgba(79,110,247,.25)}
.topbar .btn-back:active,.topbar .btn-icon:active{transform:scale(.96)}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar .btn-text{
  height:34px;border:1px solid transparent;border-radius:99px;padding:0 12px;
  background:var(--primary-soft);color:var(--primary);
  font-size:12px;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s,background .15s
}
.topbar .btn-text:active{transform:scale(.97)}
.topbar .btn-save{background:var(--primary);color:#fff}
.topbar-meta{
  height:32px;display:inline-flex;align-items:center;justify-content:center;
  padding:0 10px;border-radius:99px;background:rgba(248,249,251,.72);color:var(--muted);
  border:1px solid var(--line);font-size:12px;font-weight:850;white-space:nowrap
}
body[data-theme="dark"] .topbar .btn-back,
body[data-theme="dark"] .topbar .btn-icon,
body[data-theme="dark"] .topbar-meta{background:rgba(18,21,28,.56)}
body[data-theme="dark"] .topbar,
body[data-theme="dark"] .bottombar{background:rgba(27,32,43,.92)}
.quiz-topbar{align-items:flex-start}
.quiz-topbar .topbar-actions{gap:6px}
.counter-pill{
  height:34px;display:inline-flex;align-items:center;justify-content:center;
  padding:0 10px;border-radius:99px;background:var(--bg);
  color:var(--muted);border:1px solid var(--line);font-size:12px;font-weight:900;white-space:nowrap
}

/* Progress bar */
.progress-wrap{padding:10px 16px 9px;background:var(--card)}
.progress-bar{
  height:4px;background:var(--line);border-radius:2px;overflow:hidden;
  display:flex;gap:2px;
}
.progress-bar span{height:100%;border-radius:2px;transition:width .3s}
.progress-bar .correct{background:var(--success)}
.progress-bar .wrong{background:var(--danger)}
.progress-bar .unanswered{background:var(--line)}
.progress-bar .review{background:var(--primary)}
.progress-info{
  display:grid;grid-template-columns:minmax(0,1fr) auto auto auto;gap:6px;align-items:center;margin-top:7px;
  font-size:11px;color:var(--muted)
}
.progress-info span{white-space:nowrap}
.progress-info span:first-child{overflow:hidden;text-overflow:ellipsis}
.progress-info span:not(:first-child){
  background:var(--bg);border-radius:99px;padding:3px 7px;font-weight:800
}

/* Viewport */
.viewport{flex:1;overflow:hidden;position:relative;touch-action:pan-y}
.viewport.view-scroll{
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}

/* Vertical scroll mode */
.scroll-container{height:100%;overflow-y:auto;scroll-behavior:smooth;padding:12px}
.scroll-container .card{margin-bottom:14px}

/* Horizontal page mode */
.page-frame{height:100%;overflow:hidden}
.page-track{
  height:100%;display:flex;transition:transform .24s cubic-bezier(.22,.8,.25,1);
  will-change:transform
}
.page-slide{
  min-width:100%;height:100%;overflow-y:auto;padding:16px 14px 18px;
  display:flex;align-items:flex-start;justify-content:center
}

/* Card */
.card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--line);
  box-shadow:var(--shadow-soft);padding:18px 16px 20px;width:100%;max-width:100%;
  transition:box-shadow .2s, transform .2s
}
.card.answered.correct{box-shadow:0 8px 28px rgba(34,176,125,.14)}
.card.answered.wrong{box-shadow:0 8px 28px rgba(242,78,94,.14)}
.card-header{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)
}
.card-num{
  min-width:30px;height:26px;border-radius:99px;display:inline-flex;
  align-items:center;justify-content:center;background:var(--primary-soft);
  color:var(--primary);font-size:13px;font-weight:900
}
.card-type{
  font-size:11px;padding:5px 9px;border-radius:99px;font-weight:900
}
.type-single{background:var(--primary-soft);color:var(--primary)}
.type-multi{background:var(--warn-soft);color:var(--warn)}
.type-bool{background:var(--success-soft);color:var(--success)}
.source-chip,.multi-hint{
  font-size:11px;border-radius:99px;padding:4px 8px;background:var(--bg);
  color:var(--muted);font-weight:800
}
.multi-hint{background:var(--warn-soft);color:var(--warn)}
.card-body{
  font-size:16px;line-height:1.72;margin-bottom:16px;
  background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 14px 15px
}
.card-body p{white-space:pre-wrap;word-break:break-word}

/* Options */
.options{display:flex;flex-direction:column;gap:10px}
.option{
  display:grid;grid-template-columns:auto minmax(0,1fr);align-items:flex-start;
  gap:11px;padding:13px 14px;min-height:54px;
  border:1px solid var(--line);border-radius:var(--radius-sm);
  background:linear-gradient(180deg,var(--card),rgba(248,249,251,.62));cursor:pointer;transition:all .15s;
  font-size:15px;line-height:1.45
}
.option:active{transform:scale(.98)}
.option.selected{border-color:var(--primary);background:var(--primary-soft);box-shadow:0 0 0 1px var(--primary-soft)}
.option.correct{border-color:var(--success);background:var(--success-soft);color:#10241b;box-shadow:0 0 0 1px rgba(34,176,125,.12)}
.option.wrong{border-color:var(--danger);background:var(--danger-soft);color:#351116;box-shadow:0 0 0 1px rgba(242,78,94,.12)}
.option.correct.animate-answer{animation:answerPop .22s ease-out}
.option.wrong.animate-answer{animation:answerShake .28s ease-out}
body[data-theme="dark"] .option{background:linear-gradient(180deg,var(--card),rgba(18,21,28,.72))}
body[data-theme="dark"] .option.correct{color:#d9f8eb}
body[data-theme="dark"] .option.wrong{color:#ffd9df}
.option[disabled],button[disabled]{opacity:.45;cursor:not-allowed}
.option-letter{
  width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  font-weight:800;font-size:13px;flex-shrink:0;
  background:var(--bg);color:var(--muted);transition:all .15s
}
.option-text{min-width:0;word-break:break-word}
.option.selected .option-letter{background:var(--primary);color:#fff}
.option.correct .option-letter{background:var(--success);color:#fff}
.option.wrong .option-letter{background:var(--danger);color:#fff}

/* Bool buttons */
.bool-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bool-btn{
  padding:40px 20px;border:2px solid var(--line);border-radius:var(--radius);
  font-size:28px;font-weight:800;cursor:pointer;transition:all .15s;
  display:grid;place-items:center;background:var(--card)
}
.bool-btn:active{transform:scale(.96)}
.bool-btn.selected{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
.bool-btn.correct{border-color:var(--success);background:var(--success-soft);color:var(--success)}
.bool-btn.wrong{border-color:var(--danger);background:var(--danger-soft);color:var(--danger)}
.bool-btn.correct.animate-answer{animation:answerPop .22s ease-out}
.bool-btn.wrong.animate-answer{animation:answerShake .28s ease-out}

.multi-actions{display:flex;justify-content:flex-end;margin-top:14px}
.btn-submit{
  min-width:112px;padding:10px 18px;border:0;border-radius:99px;
  background:var(--primary);color:#fff;font-weight:800;cursor:pointer
}
.btn-submit[disabled]{background:var(--line);color:var(--muted)}

/* Explanation */
.answer-reveal{display:flex;justify-content:flex-end;margin-top:14px}
.answer-reveal button{
  width:100%;min-height:44px;border:1px solid rgba(79,110,247,.22);border-radius:99px;padding:11px 14px;
  background:linear-gradient(180deg,var(--primary-soft),rgba(238,241,254,.58));
  color:var(--primary);font-size:13px;font-weight:900;
  cursor:pointer;transition:all .15s
}
.answer-reveal button:active{transform:scale(.96)}
.answer-reveal button.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
body[data-theme="dark"] .answer-reveal button{
  background:linear-gradient(180deg,var(--primary-soft),rgba(38,49,83,.58))
}
.explanation{
  margin-top:16px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--card);font-size:13px;line-height:1.62;display:none;color:var(--text);
  overflow:hidden
}
.explanation.show{display:block;animation:feedbackIn .2s ease-out}
.exp-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;background:var(--success-soft)
}
.explanation.wrong .exp-head{background:var(--danger-soft)}
.explanation.reveal .exp-head{background:var(--primary-soft)}
.explanation .exp-label{
  font-weight:900;color:var(--success);letter-spacing:.02em
}
.explanation.wrong .exp-label{color:var(--danger)}
.explanation.reveal .exp-label{color:var(--primary)}
.exp-body{padding:12px 14px 14px}
.answer-line{font-weight:900;color:var(--text)}
.answer-line.subtle{color:var(--muted)}
.exp-detail{margin-top:8px;color:var(--muted);white-space:pre-wrap;word-break:break-word}
.feedback-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.feedback-actions button{
  border:0;border-radius:99px;padding:8px 12px;font-size:12px;
  font-weight:800;cursor:pointer;background:var(--primary);color:#fff
}
.feedback-actions button.secondary{background:var(--card);color:var(--muted);border:1px solid var(--line)}
.feedback-actions button.danger{background:var(--danger);color:#fff}

/* Bottom bar */
.bottombar{
  padding:10px 16px calc(14px + env(safe-area-inset-bottom));display:flex;justify-content:space-between;
  gap:10px;align-items:center;background:rgba(255,255,255,.92);border-top:1px solid var(--line);
  backdrop-filter:blur(10px);
  box-shadow:0 -8px 24px rgba(0,0,0,.04)
}
.bottombar button{
  flex:1;min-width:0;padding:11px 12px;border:0;border-radius:99px;font-weight:800;
  font-size:14px;cursor:pointer;transition:all .15s
}
.bottombar button:active{transform:scale(.96)}
.btn-prev{background:var(--bg);color:var(--muted)}
.btn-next{background:var(--primary);color:#fff}
.btn-mode{background:var(--primary-soft);color:var(--primary);font-size:12px!important;padding:8px 12px!important}
.btn-overview{background:var(--primary-soft);color:var(--primary);flex:1.15!important}

.question-overview{
  position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:50;
  display:grid;align-items:end
}
.overview-panel{
  max-height:72vh;overflow-y:auto;background:var(--card);color:var(--text);
  border-radius:18px 18px 0 0;padding:16px;box-shadow:0 -8px 32px rgba(0,0,0,.28)
}
.overview-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.overview-head strong{font-size:16px}
.overview-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.overview-num{
  height:42px;border:1px solid var(--line);border-radius:10px;
  background:var(--bg);color:var(--muted);font-weight:900;cursor:pointer
}
.overview-num.current{box-shadow:0 0 0 2px var(--primary);color:var(--primary)}
.overview-num.correct{background:var(--success);border-color:var(--success);color:#fff}
.overview-num.wrong{background:var(--danger);border-color:var(--danger);color:#fff}
.overview-num.review{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.toast{
  position:fixed;left:50%;bottom:86px;transform:translateX(-50%);
  z-index:80;background:rgba(20,24,34,.94);color:#fff;border-radius:99px;
  padding:10px 16px;font-size:13px;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,.22)
}

/* Home page */
.home{padding:24px 16px;display:flex;flex-direction:column;gap:16px}
.stats-row{display:flex;gap:10px}
.subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.subject-card{
  background:var(--card);border-radius:var(--radius);padding:20px 16px;
  box-shadow:var(--shadow);cursor:pointer;transition:all .15s;
  display:flex;flex-direction:column;gap:6px
}
.subject-card:active{transform:scale(.97)}
.subject-card h3{font-size:15px;line-height:1.3}
.subject-card small{color:var(--muted);font-size:12px}

.bank-list{display:flex;flex-direction:column;gap:8px}
.bank-item{
  background:var(--card);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:12px
}
.bank-item:active{transform:scale(.98)}
.bank-item .icon{font-size:24px}
.bank-item .info{flex:1}
.bank-item .info h4{font-size:15px;margin-bottom:2px}
.bank-item .info small{color:var(--muted);font-size:12px}
.bank-item .count{font-size:13px;font-weight:700;color:var(--primary)}
.chapter-actions,.practice-actions{display:flex;gap:8px;flex-wrap:wrap}
.chapter-actions button,.practice-actions button{
  border:0;border-radius:99px;padding:9px 13px;font-size:13px;font-weight:800;
  cursor:pointer;background:var(--primary-soft);color:var(--primary)
}
.practice-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.practice-actions button{padding:13px 12px;background:var(--primary);color:#fff}
.practice-actions button.secondary{background:var(--secondary-soft);color:var(--secondary)}
.practice-actions button.answer-mode{background:var(--success-soft);color:var(--success)}
.practice-actions button.lookup-mode,.chapter-actions button.lookup-mode{background:var(--warn-soft);color:var(--warn)}
.practice-actions button.muted-mode,.chapter-actions button.muted-mode{background:var(--bg);color:var(--muted)}
.action-panel{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;display:flex;flex-direction:column;gap:10px
}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-grid button{
  border:0;border-radius:var(--radius-sm);padding:13px 10px;font-size:13px;font-weight:800;
  cursor:pointer;background:var(--primary);color:#fff
}
.action-grid button.secondary{background:var(--secondary-soft);color:var(--secondary)}
.action-grid button.answer-mode{background:var(--success-soft);color:var(--success)}
.action-grid button.lookup-mode{background:var(--warn-soft);color:var(--warn)}
.action-grid button.muted-mode{background:var(--bg);color:var(--muted)}
.action-grid button:last-child:nth-child(odd){grid-column:1 / -1}
.chapter-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));min-width:210px}
.chapter-actions button{padding:9px 8px}
.section-title{font-size:13px;font-weight:800;color:var(--muted);padding:2px}
.subject-summary{font-size:12px;color:var(--muted);padding:0 2px}
.wrong-badge{font-size:12px;font-weight:800;color:var(--danger)}
.analysis-panel{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;display:flex;flex-direction:column;gap:12px
}
.settings-row{display:flex;flex-direction:column;gap:6px}
.settings-row label{font-size:12px;font-weight:800;color:var(--muted)}
.settings-row input,.settings-row select{
  width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:10px;font-size:13px;background:var(--card);color:var(--text)
}
.setting-toggle{
  display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;
  padding:10px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--bg)
}
.setting-toggle input{width:18px;height:18px;margin-top:2px;accent-color:var(--primary)}
.setting-toggle strong{font-size:13px}
.setting-toggle small{display:block;margin-top:3px;color:var(--muted);font-size:12px;line-height:1.45}
.swatches{display:flex;gap:10px;flex-wrap:wrap}
.swatch{
  width:34px;height:34px;border-radius:50%;border:3px solid var(--card);
  box-shadow:0 0 0 1px var(--line);cursor:pointer
}
.swatch.active{box-shadow:0 0 0 3px var(--primary-soft),0 0 0 1px var(--primary)}
.settings-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.settings-actions.top{
  position:sticky;top:10px;z-index:5;padding:8px;
  background:rgba(255,255,255,.9);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow-soft);backdrop-filter:blur(10px)
}
.settings-actions button{
  border:0;border-radius:99px;padding:12px;font-size:13px;font-weight:800;
  background:var(--primary);color:#fff;cursor:pointer
}
.settings-actions button.secondary{background:var(--bg);color:var(--muted)}
body[data-theme="dark"] .settings-actions.top{background:rgba(27,32,43,.88)}
.settings-notice{
  border:1px solid var(--primary);
  background:var(--primary-soft);
  color:var(--primary);
  border-radius:var(--radius);
  padding:12px 14px;
  font-size:13px;
  font-weight:800;
  line-height:1.45
}
.lookup-toolbar{display:grid;grid-template-columns:1fr;gap:10px}
.lookup-toolbar input,.lookup-toolbar select{
  width:100%;border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:10px;font-size:13px;background:var(--card);color:var(--text)
}
.answer-list{display:flex;flex-direction:column;gap:10px}
.answer-row{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;display:flex;flex-direction:column;gap:8px
}
.answer-row .meta{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted);flex-wrap:wrap}
.answer-row .question{font-size:14px;line-height:1.55}
.answer-row .answer{font-size:15px;font-weight:900;color:var(--primary)}
.answer-row .options-mini{font-size:12px;line-height:1.55;color:var(--muted)}

@media(max-width:420px){
  .topbar{padding:10px 12px;gap:8px}
  .topbar h1{font-size:16px}
  .topbar-actions{gap:6px}
  .topbar .btn-text{height:32px;padding:0 9px}
  .brand-mark{width:28px;height:28px;border-radius:9px;font-size:14px}
  .topbar-meta{height:30px;padding:0 9px;font-size:11px}
  #questionCounter{display:none}
  .quiz-topbar{
    display:grid;grid-template-columns:auto minmax(0,1fr) auto auto;align-items:center;
    column-gap:8px;row-gap:7px;padding-top:8px;padding-bottom:9px
  }
  .quiz-topbar .btn-back{width:32px;height:32px}
  .quiz-topbar .topbar-actions{
    display:contents
  }

<div class="app" id="app"></div>

<script>
// ========== State ==========
const STORAGE_KEY = 'quizapp_banks';
const WRONG_KEY = 'quizapp_wrong_book';
const UI_CONFIG_KEY = 'quizapp_ui_config';
const SAVED_SESSION_KEY = 'quizapp_saved_session';
const SAVED_PROGRESS_KEY = 'quizapp_saved_progress';
const VIEW_PROGRESS_KEY = 'quizapp_view_progress';
const DEFAULT_BANK_FILES = [
  '毛概-导论.json',
  '毛概-第一章.json',
  '毛概-第二章 新民主主义革命理论.json',
  '毛概-第三章.json',

  '毛概-第五章.json',

  '毛概-第八章.json',
  '习思-导论.json',
  '习思-第一章.json',
  '习思-第二章.json',
  '习思-第三章.json',
  '习思-第四章.json',
  '习思-第五章.json',
  '习思-第六章.json',
  '习思-第七章.json',
  '习思-第八章.json',
  '习思-第九章.json',
  '习思-第十章.json',
  '习思-第十一章.json',
  '习思-第十二章.json',
  '习思-第十三章.json',
  '习思-第十四章.json',
  '习思-第十五章.json',
  '习思-第十六章.json',
  '习思-第十七章.json',
];
const DEFAULT_BANK_FILES_RUNTIME = [
  '毛概-导论.json',
  '毛概-第一章.json',
  '毛概-第二章 新民主主义革命理论.json',
  '毛概-第三章.json',
  '毛概-第四章.json',
  '毛概-第五章.json',
  '毛概-第六章.json',
  '毛概-第七章.json',
  '毛概-第八章.json',
  '习思-导论.json',
  '习思-第一章.json',
  '习思-第二章.json',
  '习思-第三章.json',
  '习思-第四章.json',
  '习思-第五章.json',
  '习思-第六章.json',
  '习思-第七章.json',
  '习思-第八章.json',
  '习思-第九章.json',
  '习思-第十章.json',
  '习思-第十一章.json',
  '习思-第十二章.json',
  '习思-第十三章.json',
  '习思-第十四章.json',
  '习思-第十五章.json',
  '习思-第十六章.json',
  '习思-第十七章.json',
];
window.__QUIZAPP_EMBEDDED_BANKS__ = null;

let state = {
  banks: [],
  activeSession: null,
  activeSubject: '',
  navStack: [],
  suppressNavPush: false,
  currentIndex: 0,
  answers: {},
  drafts: {},
  revealedAnswers: {},
  mode: 'page',
  reviewMode: false,
  view: 'home',
  loadingDefaults: false,
  defaultLoadError: '',
  touchStartX: 0,
  touchStartY: 0,
  pageAnimating: false,
  pageAnimationTimer: null,
  pageTargetIndex: null,
  answerFeedbackIndex: null,
  answerAnimationTimer: null,
  scrollTimer: null,
  wrongBook: {},
  answerLookupContext: null,
  uiConfig: {
    theme: 'system',
    primary: '#4f6ef7',
    autoSaveOnExit: false,
    randomReshuffleOnReset: true,
    rememberReviewPosition: true,
    rememberAnswerLookupPosition: true,
  },
};

// ========== Navigation ==========
function getRouteSnapshot() {
  return {
    view: state.view,
    activeSubject: state.activeSubject,
    answerLookupContext: state.answerLookupContext ? { ...state.answerLookupContext } : null,
    currentIndex: state.currentIndex,
    mode: state.mode,
  };
}

function pushRoute() {
  if (state.suppressNavPush) return;
  const current = getRouteSnapshot();
  if (!current.view || current.view === 'home') return;
  const last = state.navStack[state.navStack.length - 1];
  if (last && last.view === current.view && last.activeSubject === current.activeSubject) return;
  state.navStack.push(current);
  if (state.navStack.length > 40) state.navStack.shift();
}

function goHome() {
  saveCurrentViewPosition();
  state.navStack = [];
  state.answerLookupContext = null;
  renderHome();
}

function goBackRoute() {
  const overview = document.getElementById('questionOverview');
  if (overview) {
    overview.remove();
    return true;
  }
  if (state.view === 'home') return false;
  saveCurrentViewPosition();
  state.suppressNavPush = true;
  try {
    if (state.view === 'quiz') {
      return backFromQuiz();
    }
    const route = state.navStack.pop();
    if (route) {
      restoreRoute(route);
      return true;
    }
    if (state.view === 'settings' || state.view === 'subjects') {
      renderHome();
      return true;
    }
    if (state.view === 'quiz' || state.view === 'answerLookup') {
      renderSubject();
      return true;
    }
    renderHome();
    return true;
  } finally {
    state.suppressNavPush = false;
  }
}

window.handleNativeBack = function handleNativeBack() {
  return goBackRoute();
};

function backFromQuiz() {
  const subject = state.activeSession?.subject || state.activeSubject || '';
  saveReviewPosition();
  const autoSaved = Boolean(isSavablePracticeSession() && state.uiConfig.autoSaveOnExit);
  if (autoSaved) saveCurrentSession({ silent: true });
  state.activeSubject = subject;
  state.activeSession = null;
  state.navStack = state.navStack.filter(route => route.view !== 'quiz');
  const last = state.navStack[state.navStack.length - 1];
  if (last && last.view === 'subjects' && last.activeSubject === subject) {
    state.navStack.pop();
  }
  state.answers = {};
  state.drafts = {};
  state.currentIndex = 0;
  state.reviewMode = false;
  if (subject && getBanksBySubject(subject).length) {
    renderSubject();
  } else {
    renderHome();
  }
  if (autoSaved) showToast('已自动保存进度');
  return true;
}

function restoreRoute(route) {
  state.activeSubject = route.activeSubject || '';
  state.answerLookupContext = route.answerLookupContext || null;
  state.currentIndex = route.currentIndex || 0;
  state.mode = route.mode || state.mode;
  if (route.view === 'subjects') return renderSubject();
  if (route.view === 'settings') return renderSettings();
  if (route.view === 'answerLookup') return renderAnswerLookup();
  if (route.view === 'quiz' && state.activeSession) return renderQuiz();
  return renderHome();
}

function openSettings() {
  pushRoute();
  renderSettings();
}

function openExternal(url) {
  window.location.href = url;
}

// ========== Persistence ==========
function saveBanks() {
  const imported = state.banks.filter(b => !b.bundled);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(imported));
}

function loadBanks() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(saved)) {
      state.banks = saved.map((b, i) => normalizeBank(b, `import-${i}`, false));
    }
  } catch(e) {
    state.banks = [];
  }
}

function saveWrongBook() {
  localStorage.setItem(WRONG_KEY, JSON.stringify(state.wrongBook));
}

function loadWrongBook() {
  try {
    const saved = JSON.parse(localStorage.getItem(WRONG_KEY));
    state.wrongBook = saved && typeof saved === 'object' ? saved : {};
  } catch(e) {
    state.wrongBook = {};
  }
}

function isSavablePracticeSession(session = state.activeSession) {
  return Boolean(session && !state.reviewMode && !session.wrongPractice);
}

function saveCurrentSession(options = {}) {
  const session = state.activeSession;
  if (!session) return;
  if (!isSavablePracticeSession(session)) {
    if (!options.silent) showToast('当前模式不需要保存进度');
    return;
  }
  const scopeKey = session.scopeKey || makeQuestionScopeKey(session.subject, session.questions, state.reviewMode, session.title);
  const currentQuestion = session.questions[state.currentIndex];
  const payload = {
    ...session,
    scopeKey,
    currentIndex: state.currentIndex,
    currentQuestionKey: currentQuestion ? questionKey(currentQuestion) : '',
    answers: state.answers,
    drafts: state.drafts,
    answersByKey: mapIndexedValuesByQuestionKey(session.questions, state.answers),
    draftsByKey: mapIndexedValuesByQuestionKey(session.questions, state.drafts),
    questionOrderKeys: session.questions.map(questionKey),
    mode: state.mode,
    reviewMode: state.reviewMode,
    savedAt: Date.now(),
  };
  localStorage.setItem(SAVED_SESSION_KEY, JSON.stringify(payload));
  saveScopedProgress(scopeKey, payload);
  if (!options.silent) showToast('已保存当前进度');
}

function getSavedSession(scopeKey = '') {
  try {
    if (scopeKey) {
      const scoped = getSavedProgress()[scopeKey];
      if (scoped && isValidSavedSession(scoped)) return scoped;
    }
    const saved = JSON.parse(localStorage.getItem(SAVED_SESSION_KEY));
    if (saved && isValidSavedSession(saved) && (!scopeKey || saved.scopeKey === scopeKey)) return saved;
  } catch(e) {}
  if (!scopeKey) {
    const list = Object.values(getSavedProgress()).filter(isValidSavedSession);
    if (list.length) return list.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0))[0];
  }
  return null;
}

function isValidSavedSession(saved) {
  return saved && (
    (Array.isArray(saved.questions) && saved.questions.length) ||
    (Array.isArray(saved.questionOrderKeys) && saved.questionOrderKeys.length)
  );
}

function getSavedProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem(SAVED_PROGRESS_KEY));
    return saved && typeof saved === 'object' ? saved : {};
  } catch(e) {
    return {};
  }
}

function saveProgressStore(store) {
  localStorage.setItem(SAVED_PROGRESS_KEY, JSON.stringify(store));
}

function getViewProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem(VIEW_PROGRESS_KEY));
    return saved && typeof saved === 'object' ? saved : {};
  } catch(e) {
    return {};
  }
}

function saveViewProgress(store) {
  localStorage.setItem(VIEW_PROGRESS_KEY, JSON.stringify(store));
}

function setViewProgress(key, payload) {
  if (!key) return;
  const store = getViewProgress();
  store[key] = { ...payload, updatedAt: Date.now() };
  saveViewProgress(store);
}

function getViewProgressItem(key) {
  return getViewProgress()[key] || null;
}

function saveScopedProgress(scopeKey, payload) {
  if (!scopeKey) return;
  const store = getSavedProgress();
  store[scopeKey] = payload;
  saveProgressStore(store);
}

function removeScopedProgress(scopeKey) {
  if (!scopeKey) return;
  const store = getSavedProgress();
  delete store[scopeKey];
  saveProgressStore(store);
  try {
    const saved = JSON.parse(localStorage.getItem(SAVED_SESSION_KEY));
    if (saved && saved.scopeKey === scopeKey) localStorage.removeItem(SAVED_SESSION_KEY);
  } catch(e) {}
}

function mapIndexedValuesByQuestionKey(questions, values) {
  const result = {};
  for (const [index, value] of Object.entries(values || {})) {
    if (!value) continue;
    const question = questions[Number(index)];
    if (question) result[questionKey(question)] = value;
  }
  return result;
}

function getSavedValueMap(saved, keyedField, indexedField) {
  const direct = saved && saved[keyedField];
  if (direct && typeof direct === 'object') return { ...direct };
  return mapIndexedValuesByQuestionKey(saved?.questions || [], saved?.[indexedField] || {});
}

function mapQuestionKeysToIndices(questions, keyedValues) {
  const result = {};
  questions.forEach((question, index) => {
    const value = keyedValues?.[questionKey(question)];
    if (value) result[index] = value;
  });
  return result;
}

function makeQuestionScopeKey(subject, questions, reviewMode, title = '') {
  const keys = (questions || []).map(questionKey).sort().join('|');
  return `${reviewMode ? 'review' : 'practice'}:${subject || title || 'all'}:${hashString(keys)}`;
}

function makeBankScopeKey(subject, banks, reviewMode) {
  const ids = (banks || []).map(b => b.id || b.name).sort().join('|');
  return `${reviewMode ? 'review' : 'practice'}:${subject || 'all'}:${hashString(ids)}`;
}

function hashString(value) {
  let hash = 0;
  const text = String(value || '');
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  }
  return Math.abs(hash).toString(36);
}

function getQuestionsFromSavedSession(saved) {
  let questions = [];
  if (Array.isArray(saved.bankIds) && saved.bankIds.length) {
    const banks = saved.bankIds.map(id => state.banks.find(b => b.id === id)).filter(Boolean);
    if (banks.length) questions = buildQuestionSet(banks);
  }
  if (!questions.length && Array.isArray(saved.questions)) questions = saved.questions;
  if (saved.questionOrderKeys && saved.questionOrderKeys.length) {
    questions = orderQuestionsByKeys(questions, saved.questionOrderKeys);
  }
  return questions;
}

function orderQuestionsByKeys(questions, orderedKeys) {
  const map = new Map((questions || []).map(q => [questionKey(q), q]));
  const used = new Set();
  const ordered = [];
  for (const key of orderedKeys || []) {
    const question = map.get(key);
    if (question) {
      ordered.push(question);
      used.add(key);
    }
  }
  for (const question of questions || []) {
    const key = questionKey(question);
    if (!used.has(key)) ordered.push(question);
  }
  return ordered;
}

function restoreSavedSession(saved, options = {}) {
  if (!saved) return alert('没有可恢复的进度');
  const questions = options.questions || getQuestionsFromSavedSession(saved);
  if (!questions.length) return alert('保存的题库已不存在');
  const currentQuestionKey = saved.currentQuestionKey || questionKey(saved.questions?.[saved.currentIndex || 0] || {});
  const answersByKey = getSavedValueMap(saved, 'answersByKey', 'answers');
  const draftsByKey = getSavedValueMap(saved, 'draftsByKey', 'drafts');
  const savedIndex = Math.max(0, questions.findIndex(q => questionKey(q) === currentQuestionKey));
  const currentIndex = options.startAtFirst ? 0 : savedIndex;
  state.activeSubject = options.subject || saved.subject || '';
  state.activeSession = {
    title: options.title || saved.title || '保存的练习',
    subtitle: options.subtitle || saved.subtitle || '保存进度',
    subject: options.subject || saved.subject || '',
    shuffled: options.shuffled ?? Boolean(saved.shuffled),
    questions,
    scopeKey: options.scopeKey || saved.scopeKey || makeQuestionScopeKey(saved.subject, questions, Boolean(saved.reviewMode), saved.title),
    bankIds: options.bankIds || saved.bankIds || [],
  };
  state.currentIndex = currentIndex;
  state.answers = mapQuestionKeysToIndices(questions, answersByKey);
  state.drafts = mapQuestionKeysToIndices(questions, draftsByKey);
  state.revealedAnswers = {};
  state.mode = saved.mode === 'scroll' ? 'scroll' : 'page';
  state.reviewMode = options.reviewMode ?? Boolean(saved.reviewMode);
  state.navStack = [];
  state.view = 'quiz';
  renderQuiz();
}

function resumeSavedSession(scopeKey = '') {
  restoreSavedSession(getSavedSession(scopeKey));
}

function clearSavedSession(scopeKey = '') {
  if (scopeKey) {
    removeScopedProgress(scopeKey);
  } else {
    const saved = getSavedSession();
    if (saved?.scopeKey) removeScopedProgress(saved.scopeKey);
    localStorage.removeItem(SAVED_SESSION_KEY);
  }
  if (state.view === 'subjects') renderSubject();
  else renderHome();
}

function resetCurrentPractice() {
  if (!state.activeSession) return;
  const scopeKey = state.activeSession.scopeKey || '';
  if (scopeKey) removeScopedProgress(scopeKey);
  const reshuffled = Boolean(state.activeSession.shuffled && state.uiConfig.randomReshuffleOnReset);
  if (reshuffled) {
    state.activeSession.questions = shuffleQuestions(state.activeSession.questions);
  }
  state.answers = {};
  state.drafts = {};
  state.revealedAnswers = {};
  state.currentIndex = 0;
  showToast(reshuffled ? '已重置并重新打乱' : '已重置当前练习');
  renderQuiz();
}

function showToast(text) {
  const old = document.getElementById('toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.id = 'toast';
  el.className = 'toast';
  el.textContent = text;
  document.body.appendChild(el);
  window.setTimeout(() => el.remove(), 1600);
}

function clearToast() {
  const old = document.getElementById('toast');
  if (old) old.remove();
}

function saveUiConfig() {
  localStorage.setItem(UI_CONFIG_KEY, JSON.stringify(state.uiConfig));
}

function loadUiConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem(UI_CONFIG_KEY));
    if (saved && typeof saved === 'object') {
      state.uiConfig = { ...state.uiConfig, ...saved };
    }
  } catch(e) {}
  applyUiConfig();
}

function applyUiConfig() {
  const theme = state.uiConfig.theme === 'system' ? getSystemTheme() : state.uiConfig.theme;
  document.body.dataset.theme = theme;
  document.documentElement.style.setProperty('--primary', state.uiConfig.primary);
  document.documentElement.style.setProperty('--primary-soft', hexToSoft(state.uiConfig.primary));
}

function getSystemTheme() {
  if (typeof window.__nativeDarkMode === 'boolean') return window.__nativeDarkMode ? 'dark' : 'light';
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

window.applyNativeTheme = function applyNativeTheme(isDark) {
  window.__nativeDarkMode = Boolean(isDark);
  if (state.uiConfig.theme === 'system') {
    document.body.dataset.theme = isDark ? 'dark' : 'light';
  }
};

function hexToSoft(hex) {
  const clean = String(hex || '#4f6ef7').replace('#', '');
  const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
  const r = parseInt(full.slice(0, 2), 16);
  const g = parseInt(full.slice(2, 4), 16);
  const b = parseInt(full.slice(4, 6), 16);
  if ([r, g, b].some(Number.isNaN)) return '#eef1fe';
  return `rgba(${r},${g},${b},.12)`;
}

async function loadBundledBanks() {
  state.loadingDefaults = true;
  state.defaultLoadError = '';
  renderHome();

  const imported = state.banks.filter(b => !b.bundled);
  const loaded = [];
  const embeddedBanks = Array.isArray(window.__QUIZAPP_EMBEDDED_BANKS__) ? window.__QUIZAPP_EMBEDDED_BANKS__ : null;

  if (embeddedBanks && embeddedBanks.length) {
    state.banks = [
      ...embeddedBanks.map((data, i) => normalizeBank(data, `embedded:${i}`, true)),
      ...imported,
    ];
    state.loadingDefaults = false;
    renderHome();
    return;
  }

  for (const file of DEFAULT_BANK_FILES_RUNTIME) {
    try {
      const data = await loadBankJson(file);
      loaded.push(normalizeBank(data, `bundled:${file}`, true));
    } catch(e) {
      state.defaultLoadError = '内置题库加载失败，请检查 APK 是否为最新版。';
      console.warn('[QuizApp] bundled bank load failed:', file, e);
    }
  }

  state.banks = [...loaded, ...imported];
  state.loadingDefaults = false;
  renderHome();
}

function getBankUrl(file) {
  return `data/${String(file).split('/').map(part => encodeURIComponent(part)).join('/')}`;
}

async function loadBankJson(file) {
  const url = getBankUrl(file);
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    return await res.json();
  } catch(fetchError) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.overrideMimeType('application/json;charset=utf-8');
      xhr.onload = () => {
        if (xhr.status === 0 || (xhr.status >= 200 && xhr.status < 300)) {
          try {
            resolve(JSON.parse(xhr.responseText));
          } catch(parseError) {
            reject(parseError);
          }
          return;
        }
        reject(new Error(`${xhr.status} ${xhr.statusText || 'XHR failed'}`));
      };
      xhr.onerror = () => reject(fetchError);
      xhr.send();
    });
  }
}

// ========== Question helpers ==========
function getType(q) {
  const raw = String(q.type || '').trim().toLowerCase();
  if (raw === 'single' || raw === '单选') return 'single';
  if (raw === 'multi' || raw === '多选' || raw === 'multiple') return 'multi';
  if (raw === 'bool' || raw === '判断' || raw === 'tf' || raw === 'truefalse') return 'bool';
  return 'single';
}

function getTypeLabel(t) {
  return { single: '单选', multi: '多选', bool: '判断' }[t] || '单选';
}

function getOptions(q) {
  const t = getType(q);
  if (t === 'bool') return ['对', '错'];
  if (Array.isArray(q.options) && q.options.length) return normalizeOptions(q.options);
  if (q.options && typeof q.options === 'object') return normalizeOptions(Object.values(q.options));
  return ['A', 'B', 'C', 'D'];
}

function normalizeOptions(options) {
  const raw = Array.isArray(options) ? options.map(o => String(o || '').trim()).filter(Boolean) : [];
  if (!raw.length) return [];

  if (raw.length === 1) {
    const split = splitOptionBlock(raw[0]);
    if (split.length > 1) return split;
  }

  return raw.flatMap(item => {
    const split = splitOptionBlock(item);
    return split.length > 1 ? split : [stripOptionLabel(item)];
  }).map(o => o.trim()).filter(Boolean);
}

function splitOptionBlock(text) {
  const clean = String(text || '')
    .replace(/\u200b|\u200c|\u200d|\ufeff/g, '')
    .replace(/\r/g, '\n')
    .trim();
  const matches = [];
  const re = /(?:^|\n)\s*([A-H])(?:[.．、]|[\s])+\s*([\s\S]*?)(?=\n\s*[A-H](?:[.．、]|[\s])+\s*|$)/g;
  let match;
  while ((match = re.exec(clean))) {
    const value = stripOptionLabel(match[2]).trim();
    if (value) matches.push(value);
  }
  return matches;
}

function stripOptionLabel(text) {
  return String(text || '').replace(/^\s*[A-H](?:[.．、]|\s+)\s*/i, '').trim();
}

function cleanQuestionText(text) {
  return String(text || '')
    .replace(/\u200b|\u200c|\u200d|\ufeff/g, '')
    .replace(/[─━]{5,}/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function inferQuestionType(raw, rawAnswer, options) {
  const declared = getType(raw);
  const joinedOptions = (options || []).join('|');
  const rawText = String(raw.type || raw['题型'] || '');
  const answerLetters = String(rawAnswer ?? '').toUpperCase().split('').filter(c => c >= 'A' && c <= 'Z');

  if (rawText.includes('判断') || /^([AB]|对|错|正确|错误|√|✓|×|✗)$/i.test(String(rawAnswer ?? '').trim())) {
    if ((options || []).length <= 2 || /^(对|错)\|?(错)?$/.test(joinedOptions.replace(/\s/g, ''))) return 'bool';
  }
  if (rawText.includes('多选') || answerLetters.length > 1) return 'multi';
  if (rawText.includes('单选')) return 'single';
  return declared;
}

function normalizeQuestion(q, i) {
  const raw = q || {};
  const question = raw.q || raw.question || raw['题目'] || raw.title || '';
  const answerValue = raw.ans ?? raw.answer ?? raw['答案'] ?? raw.correct;
  const options = normalizeOptions(Array.isArray(raw.options) ? raw.options : (raw.options && typeof raw.options === 'object' ? Object.values(raw.options) : []));
  const type = inferQuestionType(raw, answerValue, options);
  return {
    id: raw.id || `q${i + 1}`,
    type,
    q: cleanQuestionText(question),
    options: (type === 'bool' ? ['对', '错'] : (options.length ? options : getOptions({ ...raw, type }))).map(o => String(o)),
    ans: normalizeAnswer({ ...raw, type }, answerValue),
    rawAns: String(answerValue ?? ''),
    exp: raw.exp || raw.explanation || raw['解析'] || raw.note || '',
  };
}

function extractQuestions(data) {
  if (Array.isArray(data)) return data;
  if (Array.isArray(data.questions)) return data.questions;
  if (Array.isArray(data.data)) return data.data;
  for (const key of Object.keys(data || {})) {
    if (Array.isArray(data[key]) && data[key].length > 0) return data[key];
  }
  return [];
}

function normalizeBank(data, fallbackId, bundled) {
  const rawQuestions = extractQuestions(data);
  const questions = rawQuestions
    .map((q, i) => normalizeQuestion(q, i))
    .filter(q => q.q && q.ans);
  const name = data.name || data.title || data['科目'] || fallbackId.replace(/^bundled:/, '').replace(/\.json$/i, '');
  const parsed = parseBankName(String(name));
  const subject = data.subject || data['科目'] || parsed.subject;
  const chapter = getDisplayChapter(subject, data.chapter || data['章节'] || parsed.chapter);
  return {
    id: data.id || fallbackId || `${Date.now()}`,
    name: String(name),
    subject,
    chapter,
    questions,
    bundled: Boolean(bundled),
  };
}

function getDisplayChapter(subject, chapter) {
  const clean = String(chapter || '').trim() || '综合练习';
  if (subject !== '习思') return clean;
  const map = {
    '导论': '导论',
    '中国特色社会主义': '第一章 中国特色社会主义',
    '党的领导': '第二章 坚持党的全面领导',
    '经济建设': '第三章 经济建设',
    '政治建设': '第四章 政治建设',
    '文化建设': '第五章 文化建设',
    '社会建设': '第六章 社会建设',
    '生态文明': '第七章 生态文明建设',
    '国家安全': '第八章 国家安全',
    '外交': '第九章 中国特色大国外交',
    '综合': '综合题库',
  };
  return map[clean] || clean;
}

function parseBankName(name) {
  const clean = String(name || '').replace(/\s*\(\d+题\)\s*/g, '').trim();
  const parts = clean.split(/\s*[-－—]\s*/).filter(Boolean);
  if (parts.length >= 2) {
    return { subject: parts[0], chapter: parts.slice(1).join('-') };
  }
  return { subject: clean || '未分类', chapter: '综合练习' };
}

function getSubjectGroups() {
  const groups = new Map();
  for (const bank of state.banks) {
    const subject = bank.subject || parseBankName(bank.name).subject;
    if (!groups.has(subject)) groups.set(subject, []);
    groups.get(subject).push(bank);
  }
  return Array.from(groups, ([subject, banks]) => ({
    subject,
    banks,
    questionCount: banks.reduce((sum, bank) => sum + bank.questions.length, 0),
  }));
}

function getBanksBySubject(subject) {
  return state.banks
    .filter(b => (b.subject || parseBankName(b.name).subject) === subject)
    .sort((a, b) => chapterSortValue(a.chapter) - chapterSortValue(b.chapter));
}

function chapterSortValue(chapter) {
  const text = String(chapter || '');
  if (text.startsWith('导论')) return 0;
  if (text.startsWith('综合')) return 999;
  const map = { 一:1, 二:2, 三:3, 四:4, 五:5, 六:6, 七:7, 八:8, 九:9, 十:10 };
  const match = text.match(/^第([一二三四五六七八九十]+)章/);
  if (!match) return 500;
  const zh = match[1];
  if (zh === '十') return 10;
  if (zh.startsWith('十')) return 10 + (map[zh.slice(1)] || 0);
  return map[zh] || 500;
}

function buildQuestionSet(banks) {
  return banks.flatMap(bank => bank.questions.map((q, i) => ({
    ...q,
    sourceBankId: bank.id,
    sourceSubject: bank.subject || parseBankName(bank.name).subject,
    sourceChapter: bank.chapter || parseBankName(bank.name).chapter,
    sourceIndex: i,
  })));
}

function questionKey(q) {
  return `${q.sourceBankId || 'bank'}:${q.sourceIndex ?? q.id ?? q.q}`;
}

function makeReviewScopeKey(subject, bankIds, title = '') {
  const ids = (bankIds || []).slice().sort().join('|');
  return `review-position:${subject || title || 'all'}:${hashString(ids)}`;
}

function makeAnswerLookupScope(subject = '', baseChapter = '') {
  return `answer-lookup:${subject || 'all'}:${baseChapter || 'all'}`;
}

function saveReviewPosition() {
  const session = state.activeSession;
  if (!session || !state.reviewMode || !state.uiConfig.rememberReviewPosition) return;
  const question = session.questions[state.currentIndex];
  setViewProgress(makeReviewScopeKey(session.subject, session.bankIds, session.title), {
    type: 'review',
    subject: session.subject || '',
    title: session.title || '',
    bankIds: session.bankIds || [],
    currentIndex: state.currentIndex,
    currentQuestionKey: question ? questionKey(question) : '',
    mode: state.mode,
  });
}

function applyReviewPosition(session) {
  if (!session || !state.reviewMode || !state.uiConfig.rememberReviewPosition) return;
  const saved = getViewProgressItem(makeReviewScopeKey(session.subject, session.bankIds, session.title));
  if (!saved) return;
  const index = session.questions.findIndex(q => questionKey(q) === saved.currentQuestionKey);
  state.currentIndex = index >= 0 ? index : Math.max(0, Math.min(saved.currentIndex || 0, session.questions.length - 1));
  if (saved.mode === 'scroll' || saved.mode === 'page') state.mode = saved.mode;
}

function saveAnswerLookupPosition() {
  const context = state.answerLookupContext;
  if (!context || !state.uiConfig.rememberAnswerLookupPosition) return;
  const viewport = document.getElementById('answerLookupViewport');
  setViewProgress(makeAnswerLookupScope(context.subject || '', context.baseChapter || ''), {
    type: 'answerLookup',
    subject: context.subject || '',
    baseChapter: context.baseChapter || '',
    chapter: context.chapter || '',
    query: context.query || '',
    scrollTop: viewport ? viewport.scrollTop : (context.scrollTop || 0),
  });
}

function restoreAnswerLookupContext(subject = '', baseChapter = '') {
  const fallback = { subject: subject || '', baseChapter: baseChapter || '', chapter: baseChapter || '', query: '', scrollTop: 0 };
  if (!state.uiConfig.rememberAnswerLookupPosition) return fallback;
  const saved = getViewProgressItem(makeAnswerLookupScope(subject || '', baseChapter || ''));
  if (!saved) return fallback;
  return {
    subject: subject || saved.subject || '',
    baseChapter: baseChapter || saved.baseChapter || '',
    chapter: saved.chapter || baseChapter || '',
    query: saved.query || '',
    scrollTop: Number(saved.scrollTop || 0),
  };
}

function saveCurrentViewPosition() {
  if (state.view === 'answerLookup') saveAnswerLookupPosition();
  if (state.view === 'quiz') saveReviewPosition();
}

function getWrongRecords(filter = {}) {
  return Object.values(state.wrongBook).filter(record => {
    if (filter.subject && record.question.sourceSubject !== filter.subject) return false;
    if (filter.chapter && record.question.sourceChapter !== filter.chapter) return false;
    return true;
  }).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
}

function isInWrongBook(question) {
  return Boolean(state.wrongBook[questionKey(question)]);
}

function addWrongToBook(idx) {
  const session = state.activeSession;
  if (!session) return;
  const q = session.questions[idx];
  const userAns = state.answers[idx];
  if (!q || !userAns) return;
  if (checkAnswer(q, userAns)) return;
  const key = questionKey(q);
  const prev = state.wrongBook[key] || {};
  state.wrongBook[key] = {
    key,
    question: q,
    lastAnswer: userAns,
    correctAnswer: getCorrectAnswer(q),
    wrongCount: (prev.wrongCount || 0) + 1,
    updatedAt: Date.now(),
  };
  saveWrongBook();
  showToast('已加入错题集');
  renderQuiz();
}

function removeWrongFromBookByKey(key, rerender = true) {
  if (!key || !state.wrongBook[key]) return;
  delete state.wrongBook[key];
  saveWrongBook();
  showToast('已从错题集删除');
  if (state.activeSession?.wrongPractice) {
    state.activeSession.questions = state.activeSession.questions.filter(q => questionKey(q) !== key);
    if (!state.activeSession.questions.length) {
      state.activeSession = null;
      renderSubject();
      return;
    }
    state.currentIndex = Math.min(state.currentIndex, state.activeSession.questions.length - 1);
  }
  if (rerender) renderQuiz();
}

function removeWrongFromBook(idx) {
  const q = state.activeSession?.questions?.[idx];
  if (!q) return;
  removeWrongFromBookByKey(questionKey(q));
}

function shuffleQuestions(questions) {
  const arr = questions.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startPractice({ subject, banks, title, subtitle, shuffled, reviewMode = false, forceNew = false }) {
  const source = Array.isArray(banks) ? banks : [];
  const questions = buildQuestionSet(source);
  const scopeKey = makeBankScopeKey(subject, source, reviewMode);
  const bankIds = source.map(bank => bank.id);
  if (!forceNew) {
    const saved = getSavedSession(scopeKey);
    if (saved) {
      const ordered = shuffled ? shuffleQuestions(questions) : questions;
      restoreSavedSession(saved, { subject, title, subtitle, questions: ordered, shuffled, reviewMode, scopeKey, bankIds, startAtFirst: Boolean(shuffled) });
      return;
    }
  }
  startQuestionPractice({ subject, title, subtitle, questions, shuffled, reviewMode, scopeKey, bankIds, forceNew });
}

function startQuestionPractice({ subject, title, subtitle, questions, shuffled, reviewMode = false, scopeKey = '', bankIds = [], wrongPractice = false, forceNew = false }) {
  if (!questions.length) return;
  clearToast();
  const finalQuestions = shuffled ? shuffleQuestions(questions) : questions;
  const finalScopeKey = scopeKey || makeQuestionScopeKey(subject, questions, reviewMode, title);
  if (forceNew) removeScopedProgress(finalScopeKey);
  pushRoute();
  state.activeSubject = subject;
  state.activeSession = {
    title,
    subtitle,
    subject,
    shuffled,
    questions: finalQuestions,
    scopeKey: finalScopeKey,
    bankIds,
    wrongPractice,
  };
  state.currentIndex = 0;
  state.answers = {};
  state.drafts = {};
  state.revealedAnswers = {};
  state.reviewMode = Boolean(reviewMode);
  applyReviewPosition(state.activeSession);
  state.view = 'quiz';
  renderQuiz();
}

function normalizeAnswer(q, value) {
  const t = getType(q);
  const raw = String(value ?? '').trim();
  const upper = raw.toUpperCase();

  if (t === 'bool') {
    if (['A', 'TRUE', 'T', 'YES', 'Y', '1', '对', '正确', '是', '√', '✓'].includes(upper) || ['对', '正确', '是', '√', '✓'].includes(raw)) return 'A';
    if (['B', 'FALSE', 'F', 'NO', 'N', '0', '错', '错误', '否', '×', '✗'].includes(upper) || ['错', '错误', '否', '×', '✗'].includes(raw)) return 'B';
  }

  return upper.split('').filter(c => c >= 'A' && c <= 'Z').sort().join('');
}

function getCorrectAnswer(q) {
  return normalizeAnswer(q, q.ans || q.rawAns || q.answer);
}

function getAnswerLabel(q) {
  const ans = getCorrectAnswer(q);
  if (getType(q) === 'bool') return ans === 'A' ? '对' : '错';
  return ans;
}

function checkAnswer(q, userAns) {
  return normalizeAnswer(q, userAns) === getCorrectAnswer(q);
}

// ========== Import ==========
function importJSON(jsonStr) {
  try {
    const data = JSON.parse(jsonStr);
    const bank = normalizeBank(data, `import:${Date.now()}`, false);
    if (!bank.questions.length) return alert('未找到有效题目');
    state.banks.push(bank);
    saveBanks();
    renderHome();
    return true;
  } catch(e) {
    alert('JSON 解析失败：' + e.message);
    return false;
  }
}

// ========== Render ==========
function renderHome() {
  state.view = 'home';
  state.activeSubject = '';
  state.answerLookupContext = null;
  const app = document.getElementById('app');
  const importedCount = state.banks.filter(b => !b.bundled).length;
  const totalQuestions = state.banks.reduce((sum, b) => sum + b.questions.length, 0);
  const totalWrongCount = getWrongRecords().length;
  const subjectGroups = getSubjectGroups();
  const saved = getSavedSession();
  const subjectList = subjectGroups.map(group => `
    <div class="bank-item" onclick="openSubject('${escapeAttr(group.subject)}')">
      <div class="icon">📚</div>
      <div class="info">
        <h4>${escapeHtml(group.subject)}</h4>
        <small>${group.banks.length} 章 · ${group.questionCount} 题</small>
      </div>
      <div class="count">进入</div>
    </div>
  `).join('');

    subject,

function openWrongPractice(subject, chapter, shuffled) {
  const records = getWrongRecords({ subject, chapter });
  if (!records.length) return alert('当前范围还没有错题集题目');
  const questions = records.map(record => record.question);
  const title = chapter || subject || '全部错题集';
  const subtitle = `${chapter ? '章节' : subject ? '全科' : '全部'}错题集${shuffled ? '随机' : '顺序'}练习`;
  startQuestionPractice({
    subject,
    title,
    subtitle,
    questions,
    shuffled,
    wrongPractice: true,
    forceNew: true,
  });
}

function openAnswerLookup(subject = '', chapter = '') {
  pushRoute();
  state.activeSubject = subject || '';
  state.answerLookupContext = restoreAnswerLookupContext(subject || '', chapter || '');
  state.view = 'answerLookup';
  renderAnswerLookup();
}

function getLookupQuestions(subject = '', chapter = '') {
  const banks = subject ? getBanksBySubject(subject) : state.banks;
  return buildQuestionSet(banks).filter(q => !chapter || q.sourceChapter === chapter);
}

function renderAnswerLookup() {
  state.view = 'answerLookup';
  const context = state.answerLookupContext || { subject: state.activeSubject || '', chapter: '', query: '' };
  state.answerLookupContext = context;
  const subject = context.subject || '';
  const subjects = getSubjectGroups().map(group => group.subject);
  const banks = subject ? getBanksBySubject(subject) : state.banks;
  const chapters = Array.from(new Set(buildQuestionSet(banks).map(q => q.sourceChapter || '未分类'))).filter(Boolean);
  const questions = getLookupQuestions(subject, context.chapter || '');
  const title = subject ? `${subject}答案表` : '全部答案表';
  const letters = 'ABCDEFGH';

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <button class="btn-back" onclick="goBackRoute()" aria-label="返回">←</button>
      <h1>${escapeHtml(title)}</h1>
      <span id="answerLookupCount" class="topbar-meta">${questions.length} 题</span>
    </div>
    <div class="viewport view-scroll" id="answerLookupViewport"><div class="home lookup-page">
      <div class="analysis-panel">
        <div class="section-title">答案查询</div>
        <div class="lookup-toolbar">
          <input id="answerLookupSearch" value="${escapeAttr(context.query || '')}" placeholder="搜索题干 / 选项 / 答案" oninput="state.answerLookupContext.query=this.value;filterAnswerRows()">
          <select onchange="state.answerLookupContext.subject=this.value;state.answerLookupContext.chapter='';state.answerLookupContext.scrollTop=0;saveAnswerLookupPosition();renderAnswerLookup()">
            <option value="">全部科目</option>
            ${subjects.map(item => `<option value="${escapeAttr(item)}" ${subject === item ? 'selected' : ''}>${escapeHtml(item)}</option>`).join('')}
          </select>
          <select onchange="state.answerLookupContext.chapter=this.value;state.answerLookupContext.scrollTop=0;saveAnswerLookupPosition();renderAnswerLookup()">
            <option value="">全部章节</option>
            ${chapters.map(chapter => `<option value="${escapeAttr(chapter)}" ${context.chapter === chapter ? 'selected' : ''}>${escapeHtml(chapter)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="answer-list" id="answerList">
        ${questions.map((q, i) => {
          const opts = getOptions(q);
          const answerText = getAnswerLabel(q);
          const optionText = opts.length ? opts.map((o, n) => `${letters[n]}. ${String(o)}`).join(' ｜ ') : '判断题：A. 对 ｜ B. 错';
          const searchText = `${q.q} ${optionText} ${answerText} ${q.sourceSubject || ''} ${q.sourceChapter || ''} ${q.exp || ''}`.toLowerCase();
          return `
            <div class="answer-row" data-search="${escapeAttr(searchText)}">
              <div class="meta">
                <span>#${i + 1}</span>
                <span>${escapeHtml(q.sourceSubject || '')}</span>
                <span>${escapeHtml(q.sourceChapter || '')}</span>
                <span>${escapeHtml(getTypeLabel(getType(q)))}</span>
              </div>
              <div class="question">${escapeHtml(q.q)}</div>
              <div class="options-mini">${escapeHtml(optionText)}</div>
              <div class="answer">正确答案：${escapeHtml(answerText)}</div>
              ${q.exp ? `<div class="options-mini">解析：${escapeHtml(q.exp)}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div></div>
  `;
  filterAnswerRows(false);
  setupAnswerLookupTracking();
}

function filterAnswerRows(shouldSave = true) {
  const list = document.getElementById('answerList');
  if (!list) return;
  const query = String(state.answerLookupContext?.query || '').trim().toLowerCase();
  const rows = Array.from(list.querySelectorAll('.answer-row'));
  let visible = 0;
  rows.forEach(row => {
    const show = !query || row.dataset.search.includes(query);
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const counter = document.getElementById('answerLookupCount');
  if (counter) counter.textContent = `${visible}/${rows.length} 题`;
  if (shouldSave) saveAnswerLookupPosition();
}

function setupAnswerLookupTracking() {
  const viewport = document.getElementById('answerLookupViewport');
  if (!viewport) return;
  const targetTop = Number(state.answerLookupContext?.scrollTop || 0);
  requestAnimationFrame(() => {
    viewport.scrollTop = targetTop;
  });
  viewport.addEventListener('scroll', () => {
    window.clearTimeout(state.scrollTimer);
    state.scrollTimer = window.setTimeout(saveAnswerLookupPosition, 120);
  }, { passive: true });
}

function clearImportedBanks() {
  if (!confirm('清除手动导入的题库？内置题库会保留。')) return;
  state.banks = state.banks.filter(b => b.bundled);
  saveBanks();
  renderHome();
}

function renderQuiz() {
  state.view = 'quiz';
  const session = state.activeSession;
  if (!session) return renderHome();
  const total = session.questions.length;
  if (!total) return renderHome();
  window.clearTimeout(state.pageAnimationTimer);
  state.pageAnimationTimer = null;
  state.pageAnimating = false;
  state.pageTargetIndex = null;

  state.currentIndex = Math.max(0, Math.min(state.currentIndex, total - 1));
  const idx = state.currentIndex;
  const savablePractice = isSavablePracticeSession(session);

  let correctCount = 0;
  let wrongCount = 0;
  if (!state.reviewMode) {
    for (let i = 0; i < total; i++) {
      if (state.answers[i]) {
        checkAnswer(session.questions[i], state.answers[i]) ? correctCount++ : wrongCount++;
      }
    }
  }
  const unansweredCount = state.reviewMode ? 0 : total - correctCount - wrongCount;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar quiz-topbar">
      <button class="btn-back" onclick="backFromQuiz()" aria-label="返回">←</button>
      <h1>${escapeHtml(session.title.slice(0, 24))}</h1>
      <div class="topbar-actions">
        <span id="questionCounter" class="counter-pill">${idx + 1}/${total}</span>
        <button class="btn-text" onclick="cycleMode()">${state.mode === 'page' ? '竖向' : '横向'}</button>
        ${savablePractice ? `
          <button class="btn-text" onclick="resetCurrentPractice()">重做</button>
          <button class="btn-text btn-save" onclick="saveCurrentSession()">保存</button>
        ` : ''}
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        ${Array.from({ length: total }, (_, i) => {
          const a = state.answers[i];
          const cls = state.reviewMode ? 'review' : (a ? (checkAnswer(session.questions[i], a) ? 'correct' : 'wrong') : 'unanswered');
          return `<span class="${cls}" style="width:${100 / total}%;min-width:2px"></span>`;
        }).join('')}
      </div>
      <div class="progress-info">
        <span>${escapeHtml(session.subtitle)}</span><span>${state.reviewMode ? '背题' : `正确 ${correctCount}`}</span><span>${state.reviewMode ? '答案可见' : `错误 ${wrongCount}`}</span><span>${state.reviewMode ? `${total} 题` : `未答 ${unansweredCount}`}</span>
      </div>
    </div>
    <div class="viewport ${state.mode === 'scroll' ? 'view-scroll' : 'view-page'}" id="viewport">
      ${state.mode === 'scroll' ? renderScrollMode(session) : renderPageMode(session)}
    </div>
    <div class="bottombar">
      <button id="prevBtn" class="btn-prev" onclick="prevQ()" ${idx === 0 ? 'disabled' : ''}>上一题</button>
      <button class="btn-overview" onclick="showQuestionOverview()">题号总览</button>
      <button id="nextBtn" class="btn-next" onclick="nextQ()" ${idx === total - 1 ? 'disabled' : ''}>下一题</button>
    </div>
  `;

  if (state.mode === 'scroll') {
    const card = document.getElementById(`card-${idx}`);
    if (card) card.scrollIntoView({ behavior: 'instant', block: 'start' });
    setupScrollTracking();
  } else {
    setupPageTouch();
    updateNavState();
  }
  scheduleAnswerAnimationCleanup();
  state.answerFeedbackIndex = null;
}

function renderPageMode(session) {
  const total = session.questions.length;
  const radius = 8;
  const start = Math.max(0, state.currentIndex - radius);
  const end = Math.min(total - 1, state.currentIndex + radius);
  const indices = Array.from({ length: end - start + 1 }, (_, i) => start + i);
  const currentPos = Math.max(0, indices.indexOf(state.currentIndex));
  return `
    <div class="page-frame">
      <div class="page-track" id="pageTrack" data-start-index="${start}" data-end-index="${end}" data-current-pos="${currentPos}" style="transform:translateX(${-currentPos * 100}%)">
        ${indices.map(i => `
          <div class="page-slide">
            ${renderCard(session.questions[i], i)}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function clearAnswerAnimations() {
  document.querySelectorAll('.animate-answer').forEach(el => el.classList.remove('animate-answer'));
}

function scheduleAnswerAnimationCleanup() {
  window.clearTimeout(state.answerAnimationTimer);
  state.answerAnimationTimer = window.setTimeout(clearAnswerAnimations, 300);
}

function renderScrollMode(session) {
  return `
    <div class="scroll-container" id="scrollContainer">
      ${session.questions.map((q, i) => renderCard(q, i)).join('')}
    </div>
  `;
}

function getQuestionStatus(idx) {
  if (!state.activeSession) return '';
  if (state.reviewMode) return 'review';
  const answer = state.answers[idx];
  if (!answer) return '';
  return checkAnswer(state.activeSession.questions[idx], answer) ? 'correct' : 'wrong';
}

function showQuestionOverview() {
  const session = state.activeSession;
  if (!session) return;
  const old = document.getElementById('questionOverview');
  if (old) old.remove();

  const wrap = document.createElement('div');
  wrap.id = 'questionOverview';
  wrap.className = 'question-overview';
  wrap.innerHTML = `
    <div class="overview-panel">
      <div class="overview-head">
        <strong>题号总览</strong>
        <button class="btn-submit" onclick="closeQuestionOverview()">关闭</button>
      </div>
      <div class="overview-grid">
        ${session.questions.map((_, i) => `
          <button class="overview-num ${getQuestionStatus(i)} ${i === state.currentIndex ? 'current' : ''}" onclick="jumpToQuestion(${i})">${i + 1}</button>
        `).join('')}
      </div>
    </div>
  `;
  wrap.addEventListener('click', e => {
    if (e.target === wrap) closeQuestionOverview();
  });
  document.body.appendChild(wrap);
}

function closeQuestionOverview() {
  const el = document.getElementById('questionOverview');
  if (el) el.remove();
}

function jumpToQuestion(idx) {
  if (!state.activeSession) return;
  state.currentIndex = Math.max(0, Math.min(idx, state.activeSession.questions.length - 1));
  saveReviewPosition();
  closeQuestionOverview();
  renderQuiz();
}

function renderCard(q, idx) {
  const t = getType(q);
  const hasDraft = Object.prototype.hasOwnProperty.call(state.drafts, idx);
  const userAns = hasDraft ? state.drafts[idx] : (state.answers[idx] || '');
  const answered = state.reviewMode || Boolean(state.answers[idx]);
  const correct = state.reviewMode ? true : (answered ? checkAnswer(q, state.answers[idx]) : null);
  const opts = getOptions(q);
  const letters = 'ABCDEFGH';
  const isMulti = t === 'multi';
  const correctAns = getCorrectAnswer(q);
  const session = state.activeSession;
  const showSource = session && session.subject === q.sourceSubject && session.title === session.subject;
  const inWrongBook = isInWrongBook(q);
  const revealed = !state.reviewMode && !answered && Boolean(state.revealedAnswers[idx]);

  let optHTML = '';
  const animateFeedback = state.answerFeedbackIndex === idx;
  if (t === 'bool') {
    const clsFor = letter => {
      if (state.reviewMode) return correctAns === letter ? 'correct' : '';
      if (!answered) return userAns === letter ? 'selected' : '';
      if (correctAns === letter) return `correct ${animateFeedback ? 'animate-answer' : ''}`;
      if (state.answers[idx] === letter) return `wrong ${animateFeedback ? 'animate-answer' : ''}`;
      return '';
    };
    optHTML = `
      <div class="bool-row">
        <div class="bool-btn ${clsFor('A')}" onclick="${state.reviewMode ? '' : `answerBool(${idx},'A')`}">✓</div>
        <div class="bool-btn ${clsFor('B')}" onclick="${state.reviewMode ? '' : `answerBool(${idx},'B')`}">✗</div>
      </div>
    `;
  } else {
    optHTML = `
      <div class="options">
        ${opts.map((o, i) => {
          const letter = letters[i];
          const selected = userAns.includes(letter);
          let cls = selected ? 'selected' : '';
          if (state.reviewMode) {
            cls = correctAns.includes(letter) ? 'correct' : '';
          } else if (answered) {
            if (correctAns.includes(letter)) cls = `correct ${animateFeedback ? 'animate-answer' : ''}`;
            else if (selected) cls = `wrong ${animateFeedback ? 'animate-answer' : ''}`;
            else cls = '';
          }
          return `
            <div class="option ${cls}" onclick="${state.reviewMode ? '' : (isMulti ? `toggleMulti(${idx},'${letter}')` : `answerSingle(${idx},'${letter}')`)}">
              <span class="option-letter">${letter}</span>
              <span class="option-text">${escapeHtml(String(o))}</span>
            </div>`;
        }).join('')}
      </div>
      ${isMulti ? `
        <div class="multi-actions">
          <button class="btn-submit" onclick="submitMulti(${idx})" ${state.drafts[idx] ? '' : 'disabled'}>确认答案</button>
        </div>
      ` : ''}
    `;
  }

  return `
    <div class="card ${answered ? `answered ${correct ? 'correct' : 'wrong'}` : ''}" id="card-${idx}">
      <div class="card-header">
        <span class="card-num">${idx + 1}</span>
        <span class="card-type type-${t === 'multi' ? 'multi' : t === 'bool' ? 'bool' : 'single'}">${getTypeLabel(t)}</span>
        ${showSource ? `<span class="source-chip">${escapeHtml(q.sourceChapter)}</span>` : ''}
        ${isMulti && !answered ? '<span class="multi-hint">选完后确认</span>' : ''}
      </div>
      <div class="card-body"><p>${escapeHtml(q.q)}</p></div>
      ${optHTML}
      ${!state.reviewMode && !answered ? `
        <div class="answer-reveal">
          <button class="${revealed ? 'active' : ''}" onclick="toggleAnswerReveal(${idx})">${revealed ? '收起答案' : '看答案'}</button>
        </div>
      ` : ''}
      ${revealed ? `
        <div class="explanation show reveal">
          <div class="exp-head">
            <div class="exp-label">答案</div>
          </div>
          <div class="exp-body">
            <div class="answer-line">正确答案：${escapeHtml(getAnswerLabel(q))}</div>
            ${q.exp ? `<div class="exp-detail">${escapeHtml(q.exp)}</div>` : ''}
          </div>
        </div>
      ` : ''}
      ${state.activeSession?.wrongPractice ? `
        <div class="feedback-actions">
          <button class="danger" onclick="removeWrongFromBook(${idx})">从错题集删除</button>
        </div>
      ` : ''}
      ${answered ? `
        <div class="explanation show ${state.reviewMode || correct ? '' : 'wrong'}">
          <div class="exp-head">
            <div class="exp-label">${state.reviewMode ? '答案' : (correct ? '正确' : '错误')}</div>
          </div>
          <div class="exp-body">
            ${!state.reviewMode && correct ? '<div class="answer-line subtle">你的选择正确</div>' : ''}
            ${state.reviewMode || !correct ? `<div class="answer-line">正确答案：${escapeHtml(getAnswerLabel(q))}</div>` : ''}
            ${q.exp ? `<div class="exp-detail">${escapeHtml(q.exp)}</div>` : ''}
            ${!state.reviewMode && !correct && !state.activeSession?.wrongPractice ? `
              <div class="feedback-actions">
                ${inWrongBook
                  ? `<button class="secondary" onclick="removeWrongFromBook(${idx})">从错题集删除</button>`
                  : `<button onclick="addWrongToBook(${idx})">加入错题集</button>`}
              </div>
            ` : ''}
            </div>
        </div>
      ` : ''}
    </div>
  `;
}

function toggleAnswerReveal(idx) {
  state.currentIndex = idx;
  if (state.revealedAnswers[idx]) delete state.revealedAnswers[idx];
  else state.revealedAnswers[idx] = true;
  renderQuiz();
}

function answerSingle(idx, letter) {
  state.currentIndex = idx;
  if (state.answers[idx] === letter) {
    delete state.answers[idx];
    state.answerFeedbackIndex = null;
  } else {
    state.answers[idx] = letter;
    state.answerFeedbackIndex = idx;
  }
  delete state.drafts[idx];
  delete state.revealedAnswers[idx];
  renderQuiz();
}

function answerBool(idx, letter) {
  state.currentIndex = idx;
  if (state.answers[idx] === letter) {
    delete state.answers[idx];
    state.answerFeedbackIndex = null;
  } else {
    state.answers[idx] = letter;
    state.answerFeedbackIndex = idx;
  }
  delete state.drafts[idx];
  delete state.revealedAnswers[idx];
  renderQuiz();
}

function toggleMulti(idx, letter) {
  state.currentIndex = idx;
  const cur = Object.prototype.hasOwnProperty.call(state.drafts, idx) ? state.drafts[idx] : (state.answers[idx] || '');
  const parts = cur.split('').filter(c => c >= 'A' && c <= 'Z');
  const i = parts.indexOf(letter);
  if (i >= 0) parts.splice(i, 1);
  else parts.push(letter);
  const next = parts.sort().join('');
  if (next) state.drafts[idx] = next;
  else delete state.drafts[idx];
  delete state.answers[idx];
  delete state.revealedAnswers[idx];
  renderQuiz();
}

function submitMulti(idx) {
  const draft = state.drafts[idx] || '';
  if (!draft) return;
  state.currentIndex = idx;
  state.answers[idx] = draft;
  state.answerFeedbackIndex = idx;
  delete state.drafts[idx];
  renderQuiz();
}

function nextQ() {
  if (state.activeSession && state.currentIndex < state.activeSession.questions.length - 1) {
    if (state.mode === 'page') return animatePage(1);
    state.currentIndex++;
    saveReviewPosition();
    renderQuiz();
  }
}

function prevQ() {
  if (state.currentIndex > 0) {
    if (state.mode === 'page') return animatePage(-1);
    state.currentIndex--;
    saveReviewPosition();
    renderQuiz();
  }
}

function cycleMode() {
  state.mode = state.mode === 'page' ? 'scroll' : 'page';
  saveReviewPosition();
  renderQuiz();
}

function animatePage(delta) {
  if (!state.activeSession) return;
  const baseIndex = state.pageAnimating && Number.isInteger(state.pageTargetIndex)
    ? state.pageTargetIndex
    : state.currentIndex;
  const target = baseIndex + delta;
  goToPageIndex(target, true);
}

function goToPageIndex(target, animate) {
  if (!state.activeSession) return;
  clearAnswerAnimations();
  target = Math.max(0, Math.min(target, state.activeSession.questions.length - 1));
  if (target === state.currentIndex && !state.pageAnimating) return;
  if (target < 0 || target >= state.activeSession.questions.length) return;
  const track = document.getElementById('pageTrack');
  if (!track) {
    state.currentIndex = target;
    state.pageAnimating = false;
    state.pageTargetIndex = null;
    saveReviewPosition();
    renderQuiz();
    return;
  }
  const start = Number(track.dataset.startIndex || 0);
  const end = Number(track.dataset.endIndex || start);
  if (target < start || target > end) {
    state.currentIndex = target;
    state.pageAnimating = false;
    state.pageTargetIndex = null;
    saveReviewPosition();
    renderQuiz();
    return;
  }
  const pos = target - start;
  state.currentIndex = target;
  state.pageTargetIndex = target;
  state.pageAnimating = Boolean(animate);
  track.dataset.currentPos = String(pos);
  saveReviewPosition();
  updateNavState();
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(${-pos * 100}%)`;
  if (!animate) {
    track.offsetHeight;
    track.style.transition = '';
    state.pageAnimating = false;
    state.pageTargetIndex = null;
    return;
  }
  window.clearTimeout(state.pageAnimationTimer);
  state.pageAnimationTimer = window.setTimeout(finalizePageAnimation, 260);
}

function finalizePageAnimation() {
  if (!state.activeSession) return;
  state.pageAnimating = false;
  state.pageTargetIndex = null;
  const track = document.getElementById('pageTrack');
  if (!track) return;
  const start = Number(track.dataset.startIndex || 0);
  const end = Number(track.dataset.endIndex || start);
  const total = state.activeSession.questions.length;
  const shouldRecenter = (state.currentIndex - start <= 1 && start > 0)
    || (end - state.currentIndex <= 1 && end < total - 1);
  if (shouldRecenter) renderQuiz();
}

function updatePagePosition(animate) {
  const track = document.getElementById('pageTrack');
  if (!track || !state.activeSession) return;
  const start = Number(track.dataset.startIndex || 0);
  const pos = state.currentIndex - start;
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(${-pos * 100}%)`;
  track.dataset.currentPos = String(pos);
  if (!animate) {
    track.offsetHeight;
    track.style.transition = '';
  }
  updateNavState();
}

function updateNavState() {
  if (!state.activeSession) return;
  const total = state.activeSession.questions.length;
  const counter = document.getElementById('questionCounter');
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (counter) counter.textContent = `${state.currentIndex + 1}/${total}`;
  if (prev) prev.disabled = state.currentIndex === 0;
  if (next) next.disabled = state.currentIndex === total - 1;
}

function setupPageTouch() {
  const viewport = document.getElementById('viewport');
  if (!viewport) return;
  viewport.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    state.touchStartX = t.clientX;
    state.touchStartY = t.clientY;
  }, { passive: true });
  viewport.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    const dx = t.clientX - state.touchStartX;
    const dy = t.clientY - state.touchStartY;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
      dx < 0 ? nextQ() : prevQ();
    }
  }, { passive: true });
}

function setupScrollTracking() {
  const container = document.getElementById('scrollContainer');
  if (!container || !state.activeSession) return;
  container.addEventListener('scroll', () => {
    window.clearTimeout(state.scrollTimer);
    state.scrollTimer = window.setTimeout(() => {
      const cards = Array.from(container.querySelectorAll('.card'));
      let bestIndex = state.currentIndex;
      let bestDistance = Infinity;
      const top = container.getBoundingClientRect().top;
      cards.forEach((card, i) => {
        const distance = Math.abs(card.getBoundingClientRect().top - top - 12);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = i;
        }
      });
      state.currentIndex = bestIndex;
      saveReviewPosition();
      updateNavState();
    }, 80);
  }, { passive: true });
}

document.addEventListener('keydown', e => {
  if (state.view !== 'quiz') return;
  if (e.key === 'ArrowRight') nextQ();
  if (e.key === 'ArrowLeft') prevQ();
});

// ========== Import ==========
function setupImport() {
  const zone = document.getElementById('importZone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });
}

function handleFile(input) {
  const file = input.files[0];
  if (file) readFile(file);
  input.value = '';
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    if (importJSON(reader.result)) renderHome();
  };
  reader.readAsText(file, 'utf-8');
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/'/g, '&#39;');
}

// ========== Init ==========
loadUiConfig();
loadBanks();
loadWrongBook();
loadBundledBanks();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (state.uiConfig.theme === 'system') applyUiConfig();
});
</script>
