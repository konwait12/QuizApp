function updateDownloadProgress(percent, text = '') {
  const panel = document.getElementById('updateProgress');
  const fill = document.getElementById('updateProgressFill');
  const label = document.getElementById('updateProgressText');
  if (!panel || !fill || !label) return;
  const nextPercent = Math.max(0, Math.min(100, Number(percent || 0)));
  panel.hidden = false;
  fill.style.width = `${nextPercent}%`;
  label.textContent = text || `下载进度 ${Math.round(nextPercent)}%`;
}

window.updateDownloadProgress = updateDownloadProgress;

// ========== Persistence ==========
function getBankQuestionCount(bank) {
  if (!bank) return 0;
  if (bank.storage === 'indexeddb' && bank.hydrated === false) {
    return Math.max(0, Number(bank.questionCount || 0));
  }
  return Array.isArray(bank.questions) ? bank.questions.length : Math.max(0, Number(bank.questionCount || 0));
}

function getBankQuestionKeys(bank) {
  const count = getBankQuestionCount(bank);
  return Array.from({ length: count }, (_, index) => `${bank.id}:${index}`);
}

function getQuestionKeysForBanks(banks) {
  return (banks || []).flatMap(getBankQuestionKeys);
}

function createIndexedBankReference(bank) {
  return {
    id: bank.id,
    name: bank.name,
    subject: bank.subject,
    chapter: bank.chapter,
    path: getBankPath(bank),
    storage: 'indexeddb',
    hydrated: false,
    questionCount: getBankQuestionCount(bank),
    releaseManaged: Boolean(bank.releaseManaged),
    releaseVersion: bank.releaseVersion || '',
    releaseSource: bank.releaseSource || '',
  };
}

function normalizeIndexedBankReference(data, fallbackId) {
  const name = data.name || data.title || fallbackId;
  const parsed = parseBankName(String(name));
  const subject = data.subject || parsed.subject;
  const chapter = getDisplayChapter(subject, data.chapter || parsed.chapter);
  return {
    id: data.id || fallbackId,
    name: String(name),
    subject,
    chapter,
    path: normalizePath(data.path || [subject, chapter]),
    questions: [],
    bundled: false,
    storage: 'indexeddb',
    hydrated: false,
    questionCount: Math.max(0, Number(data.questionCount || 0)),
    releaseManaged: Boolean(data.releaseManaged),
    releaseVersion: data.releaseVersion || '',
    releaseSource: data.releaseSource || '',
  };
}

function saveBanks() {
  const imported = state.banks.filter(b => !b.bundled);
  const localBanks = [];
  const largeBanks = [];
  const indexedIds = [];
  for (const bank of imported) {
    if (bank.storage === 'indexeddb' && bank.hydrated === false) {
      localBanks.push(createIndexedBankReference(bank));
      indexedIds.push(bank.id);
      continue;
    }
    const serialized = JSON.stringify(bank);
    if (bank.storage === 'indexeddb' || serialized.length >= LARGE_BANK_THRESHOLD) {
      bank.storage = 'indexeddb';
      bank.hydrated = true;
      bank.questionCount = getBankQuestionCount(bank);
      largeBanks.push(bank);
      localBanks.push(createIndexedBankReference(bank));
      indexedIds.push(bank.id);
    } else {
      localBanks.push(bank);
    }
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(localBanks));
  state.bankPersistencePending += 1;
  return persistLargeBanks(largeBanks, indexedIds)
    .catch(error => {
      console.error('[QuizApp] large bank persistence failed:', error);
      showNotice('大型题库保存失败，请确认设备剩余存储空间');
      throw error;
    })
    .finally(() => {
      state.bankPersistencePending = Math.max(0, state.bankPersistencePending - 1);
      if (!state.bankPersistencePending && ['home', 'subjects', 'settings'].includes(state.view)) {
        releaseHydratedLargeBanks();
      }
    });
}

async function loadBanks() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

      const indexedBanks = saved.filter(bank => bank?.storage === 'indexeddb');
      state.banks = [
        ...inlineBanks.map((b, i) => normalizeBank(b, `import-${i}`, false)),
        ...indexedBanks.map((b, i) => normalizeIndexedBankReference(b, `indexed-${i}`)),
      ];
      applyBankMeta();
    }
  } catch(e) {
    state.banks = [];
  }
}

async function persistLargeBanks(banks, keepIds = []) {
  const database = await openInkDatabase();
  return new Promise((resolve, reject) => {
    const transaction = database.transaction(BANK_STORE_NAME, 'readwrite');
    const store = transaction.objectStore(BANK_STORE_NAME);
    const keep = new Set([...keepIds, ...banks.map(bank => bank.id)]);
    const keysRequest = store.getAllKeys();
    keysRequest.onsuccess = () => {
      for (const key of keysRequest.result || []) {
        if (!keep.has(key)) store.delete(key);
      }
      for (const bank of banks) store.put({ ...bank, id: bank.id });
    };
    transaction.oncomplete = () => {
      database.close();
      resolve();
    };
    transaction.onerror = () => {
      database.close();
      reject(transaction.error || new Error('大型题库存储失败'));
    };
  });
}

async function readLargeBanks(ids) {
  if (!ids.length) return [];
  try {
    const database = await openInkDatabase();
    return await new Promise((resolve, reject) => {
      const transaction = database.transaction(BANK_STORE_NAME, 'readonly');
      const store = transaction.objectStore(BANK_STORE_NAME);
      const result = [];
      for (const id of ids) {
        const request = store.get(id);
        request.onsuccess = () => { if (request.result) result.push(request.result); };
      }
      transaction.oncomplete = () => {
        database.close();
        const byId = new Map(result.map(bank => [bank.id, bank]));
        resolve(ids.map(id => byId.get(id)).filter(Boolean));
      };
      transaction.onerror = () => reject(transaction.error || new Error('大型题库读取失败'));
    });
  } catch(e) {
    console.error('[QuizApp] large bank load failed:', e);
    return [];
  }
}

function isBankHidden(bank) {
  return Boolean(bank && state.bankMeta?.[bank.id]?.hidden);

function getVisibleBanks() {
  const visible = state.banks.filter(bank => !isBankHidden(bank));
  const releasePaths = new Set(
    visible
      .filter(bank => bank.releaseManaged)
      .map(bank => pathKey(getBankPath(bank)))
      .filter(Boolean)
  );
  if (!releasePaths.size) return visible;
  return visible.filter(bank => !(bank.bundled && releasePaths.has(pathKey(getBankPath(bank)))));
}

function isSavablePracticeSession(session = state.activeSession) {
  const review = session && Object.prototype.hasOwnProperty.call(session, 'reviewMode') ? session.reviewMode : state.reviewMode;
  return Boolean(session && !review && !session.wrongPractice);
}

function saveCurrentSession(options = {}) {
  const session = state.activeSession;
  if (!session) return;
  if (!isSavablePracticeSession(session)) {
    if (!options.silent) showToast('当前模式不需要保存进度');
    return;
  }
  syncCurrentAnswersToGlobal({ force: true });
  flushAnswerStateSave();
  const scopeKey = session.scopeKey || makeQuestionScopeKey(session.subject, session.questions, state.reviewMode, session.title, session.shuffled);
  const currentQuestion = session.questions[state.currentIndex];
  const payload = {
    title: session.title || '',
    subtitle: session.subtitle || '',
    subject: session.subject || '',
    path: normalizePath(session.path || []),
    returnPath: normalizePath(session.returnPath || []),
    shuffled: Boolean(session.shuffled),
    reviewMode: Boolean(state.reviewMode),
    wrongPractice: Boolean(session.wrongPractice),
    scopeKey,
    bankIds: session.bankIds || [],
    total: session.questions.length,
    currentIndex: state.currentIndex,
    currentQuestionKey: currentQuestion ? questionKey(currentQuestion) : '',
    answersByKey: mapIndexedValuesByQuestionKey(session.questions, state.answers),
    draftsByKey: mapIndexedValuesByQuestionKey(session.questions, state.drafts),
    questionOrderKeys: session.questions.map(questionKey),
    mode: state.mode,
    savedAt: Date.now(),
  };
  localStorage.setItem(SAVED_SESSION_KEY, JSON.stringify(payload));
  saveScopedProgress(scopeKey, payload);
  if (!options.silent) showToast('已保存当前进度');
}

function getSavedSession(scopeKey = '') {
  try {
    if (scopeKey) {
      const scoped = getSavedProgress()[scopeKey];
      if (scoped && isValidSavedSession(scoped)) return scoped;
    }
    const saved = JSON.parse(localStorage.getItem(SAVED_SESSION_KEY));
    if (saved && isValidSavedSession(saved) && (!scopeKey || saved.scopeKey === scopeKey)) return saved;
  } catch(e) {}
  if (!scopeKey) {
    const list = Object.values(getSavedProgress()).filter(isValidSavedSession);
    if (list.length) return list.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0))[0];
  }
  return null;
}

function isValidSavedSession(saved) {
  return saved && (
    (Array.isArray(saved.questions) && saved.questions.length) ||
    (Array.isArray(saved.questionOrderKeys) && saved.questionOrderKeys.length)
  );
}

function hydrateAnswerStateFromSavedProgress() {
  const candidates = Object.values(getSavedProgress()).filter(isValidSavedSession);
  try {
    const saved = JSON.parse(localStorage.getItem(SAVED_SESSION_KEY));
    if (isValidSavedSession(saved)) candidates.push(saved);
  } catch(e) {}
  let changed = false;
  candidates.forEach(saved => {
    if (!saved || saved.reviewMode) return;
    const modeKey = saved.shuffled ? 'random' : 'sequence';
    if (!state.answerState[modeKey]) state.answerState[modeKey] = {};
    const answersByKey = getSavedValueMap(saved, 'answersByKey', 'answers');
    Object.entries(answersByKey || {}).forEach(([key, value]) => {
      if (!key || !value || state.answerState[modeKey][key]) return;
      state.answerState[modeKey][key] = value;
      changed = true;
    });
  });
  if (changed) saveAnswerState();
}

function getAnswerModeKeyFromSession(session = state.activeSession, reviewMode = state.reviewMode) {
  if (!session || reviewMode || session.wrongPractice) return '';
  return session.shuffled ? 'random' : 'sequence';
}

function getAnswerModeKey(shuffled, reviewMode = false, wrongPractice = false) {
  if (reviewMode || wrongPractice) return '';
  return shuffled ? 'random' : 'sequence';
}

function getGlobalAnswersForQuestions(questions, modeKey) {
  const store = state.answerState?.[modeKey] || {};
  const result = {};
  for (const question of questions || []) {
    const key = questionKey(question);
    if (store[key]) result[key] = store[key];
  }
  return result;
}

function mergeAnswerMapsForMode(questions, modeKey, base = {}) {
  return {
    ...(base || {}),
    ...getGlobalAnswersForQuestions(questions, modeKey),
  };
}

function updateSavedAnswerPayload(saved, key, value) {
  if (!saved || !key) return false;
  const keys = saved.questionOrderKeys || (saved.questions || []).map(questionKey);
  if (!keys.includes(key)) return false;
  const answersByKey = getSavedValueMap(saved, 'answersByKey', 'answers');
  if (value) answersByKey[key] = value;
  else delete answersByKey[key];
  saved.answersByKey = answersByKey;
  delete saved.answers;
  saved.savedAt = Date.now();
  return true;
}

function syncSavedScopesForQuestion(modeKey, key, value) {
  if (!modeKey || !key) return;
  const session = state.activeSession;
  const scopeKey = session?.scopeKey || '';
  if (scopeKey && ((modeKey === 'random') === Boolean(session?.shuffled))) {
    const store = getSavedProgress();
    const saved = store[scopeKey];
    if (updateSavedAnswerPayload(saved, key, value)) {
      store[scopeKey] = saved;
      saveProgressStore(store);
    }
  }
  try {
    const saved = JSON.parse(localStorage.getItem(SAVED_SESSION_KEY));
    if (saved && !saved.reviewMode && ((modeKey === 'random') === Boolean(saved.shuffled)) && updateSavedAnswerPayload(saved, key, value)) {
      localStorage.setItem(SAVED_SESSION_KEY, JSON.stringify(saved));
    }
  } catch(e) {}
}

function setGlobalAnswerForQuestion(question, value, modeKey = getAnswerModeKeyFromSession(), options = {}) {
  if (!modeKey || !question) return;
  if (!options.force && !shouldAutoPersistAnswers()) return;
  if (!state.answerState[modeKey]) state.answerState[modeKey] = {};
  const key = questionKey(question);
  if (value) state.answerState[modeKey][key] = value;
  else delete state.answerState[modeKey][key];
  if (options.force) {
    saveAnswerState();
    syncSavedScopesForQuestion(modeKey, key, value);
  } else {
    saveAnswerStateDebounced();
  }
}

function syncCurrentAnswerToGlobal(idx, value, options = {}) {
  const question = state.activeSession?.questions?.[idx];
  setGlobalAnswerForQuestion(question, value, getAnswerModeKeyFromSession(), options);
}

function syncCurrentAnswersToGlobal(options = {}) {
  const session = state.activeSession;
  const modeKey = getAnswerModeKeyFromSession(session);
  if (!session || !modeKey) return;
  if (!options.force && !shouldAutoPersistAnswers(session)) return;
  if (!state.answerState[modeKey]) state.answerState[modeKey] = {};
  let changed = false;
  Object.entries(state.answers || {}).forEach(([idx, value]) => {
    const question = session.questions[Number(idx)];
    if (!question || !value) return;
    const key = questionKey(question);
    if (state.answerState[modeKey][key] !== value) {
      state.answerState[modeKey][key] = value;
      changed = true;
    }
  });
  if (changed) saveAnswerState();
}

function clearGlobalAnswersForQuestions(questions, modeKey) {
  if (!modeKey || !state.answerState[modeKey]) return;
  for (const question of questions || []) {
    const key = questionKey(question);
    delete state.answerState[modeKey][key];
  }
  saveAnswerState();
}

function getTodayKey(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function isDateKey(key) {
  return /^\d{4}-\d{2}-\d{2}$/.test(String(key || ''));
}

function dateFromKey(key) {
  const parts = String(key || '').split('-').map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function addDays(date, amount) {
  const next = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  next.setDate(next.getDate() + amount);
  return next;
}

function normalizeStudyStatsStore(saved) {
  const source = saved && typeof saved === 'object' ? saved : {};
  const normalized = {};
  Object.entries(source).forEach(([key, value]) => {
    if (key === STUDY_STATS_META_KEY) return;
    if (!isDateKey(key)) return;
    const seconds = Math.max(0, Math.floor(Number(value?.seconds || value || 0)));
    const normalizeBreakdown = breakdown => Object.fromEntries(Object.entries(breakdown && typeof breakdown === 'object' ? breakdown : {})
      .map(([name, amount]) => [String(name || '').trim(), Math.max(0, Math.floor(Number(amount?.seconds ?? amount ?? 0)))])
      .filter(([name, amount]) => name && amount > 0));
    normalized[key] = {
      seconds,
      subjects: normalizeBreakdown(value?.subjects),
      modes: normalizeBreakdown(value?.modes),
      updatedAt: Number(value?.updatedAt || 0) || Date.now(),
    };
  });
  normalized[STUDY_STATS_META_KEY] = {
    startedAt: Number(source[STUDY_STATS_META_KEY]?.startedAt || 0) || Date.now(),
  };
  return pruneStudyStats(normalized);
}

function pruneStudyStats(store = state.studyStats) {
  const target = store && typeof store === 'object' ? store : {};
  const today = dateFromKey(getTodayKey());
  const cutoff = addDays(today, -(STUDY_STATS_RETENTION_DAYS - 1));
  Object.keys(target).forEach(key => {
    if (!isDateKey(key)) return;
    const date = dateFromKey(key);
    if (!date || date < cutoff || date > today) delete target[key];
  });
  if (!target[STUDY_STATS_META_KEY]) target[STUDY_STATS_META_KEY] = { startedAt: Date.now() };
  return target;
}

function loadStudyStats() {
  if (state.uiConfig.persistStudyStats === false) {
    state.studyStats = normalizeStudyStatsStore({});
    return;
  }
  try {
    const saved = JSON.parse(localStorage.getItem(STUDY_STATS_KEY));
    state.studyStats = normalizeStudyStatsStore(saved);
    saveStudyStats();
  } catch(e) {
    state.studyStats = normalizeStudyStatsStore({});
  }
}

function saveStudyStats() {
  pruneStudyStats();
  if (state.uiConfig.persistStudyStats === false) return;
  localStorage.setItem(STUDY_STATS_KEY, JSON.stringify(state.studyStats));
}

function getTodayStudySeconds() {
  const item = state.studyStats[getTodayKey()];
  return Number(item?.seconds || 0);
}

function formatStudyDuration(seconds) {
  const total = Math.max(0, Number(seconds || 0));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  if (h > 0) return `${h}小时${String(m).padStart(2, '0')}分`;
  if (m > 0) return `${m}分${String(s).padStart(2, '0')}秒`;
  return `${s}秒`;
}

function normalizeStudyChartRange(range) {
  return ['week', 'month', 'thisMonth', 'lastMonth'].includes(range) ? range : 'week';
}

function getStudyChartRange(range = state.uiConfig.studyChartRange) {
  const today = dateFromKey(getTodayKey());
  const key = normalizeStudyChartRange(range);
  if (key === 'month') return { key, title: '近 30 天', start: addDays(today, -29), end: today };
  if (key === 'thisMonth') return { key, title: '本月', start: new Date(today.getFullYear(), today.getMonth(), 1), end: today };
  if (key === 'lastMonth') {
    const start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const end = new Date(today.getFullYear(), today.getMonth(), 0);
    return { key, title: '上月', start, end };
  }
  return { key: 'week', title: '近 7 天', start: addDays(today, -6), end: today };
}

function getStudyChartData(range = state.uiConfig.studyChartRange) {
  const meta = getStudyChartRange(range);
  const rows = [];
  for (let date = new Date(meta.start); date <= meta.end; date = addDays(date, 1)) {
    const key = getTodayKey(date);
    rows.push({
      key,
      day: date.getDate(),
      month: date.getMonth() + 1,
      label: `${date.getMonth() + 1}/${date.getDate()}`,
      seconds: Number(state.studyStats[key]?.seconds || 0),
    });
  }
  return { ...meta, rows };
}

function getStudyChartRangeLabel(chart) {
  const startLabel = `${chart.start.getMonth() + 1}月${chart.start.getDate()}号`;
  const endLabel = `${chart.end.getMonth() + 1}月${chart.end.getDate()}号`;
  return `${startLabel} - ${endLabel}`;
}

function buildSmoothPath(points) {
  if (!points.length) return '';
  if (points.length === 1) return `M ${points[0].x} ${points[0].y}`;
  const minY = Math.min(...points.map(point => point.y));
  const maxY = Math.max(...points.map(point => point.y));
  const clampY = value => Math.max(minY, Math.min(maxY, value));
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i - 1] || points[i];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[i + 2] || p2;
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = clampY(p1.y + (p2.y - p0.y) / 6);
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = clampY(p2.y - (p3.y - p1.y) / 6);
    d += ` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)}, ${cp2x.toFixed(1)} ${cp2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
  }
  return d;
}

function isStudySurfaceActive() {
  return !document.hidden && ['quiz', 'answerLookup', 'handwriting', 'reviewQueue', 'exam'].includes(state.view);
}

async function hydrateBanks(banks) {
  const targets = (banks || []).filter(bank => bank?.storage === 'indexeddb' && bank.hydrated === false);
  if (!targets.length) return banks || [];
  const records = await readLargeBanks(targets.map(bank => bank.id));
  const recordsById = new Map(records.map(bank => [bank.id, bank]));
  for (const target of targets) {
    const record = recordsById.get(target.id);
    if (!record) continue;
    const normalized = normalizeBank(record, target.id, false);
    Object.assign(target, normalized, {
      storage: 'indexeddb',
      hydrated: true,
      questionCount: normalized.questions.length,
    });
  }
  return banks || [];
}

async function ensureBanksHydrated(banks, options = {}) {
  const source = Array.isArray(banks) ? banks : [];
  await hydrateBanks(source);
  const missing = source.filter(bank => bank?.storage === 'indexeddb' && bank.hydrated === false);
  if (missing.length && !options.silent) {
    showNotice(`有 ${missing.length} 个大型题库无法从本机存储读取，请重新下载或恢复备份`);
  }
  return source.filter(bank => !(bank?.storage === 'indexeddb' && bank.hydrated === false));
}

function releaseHydratedLargeBanks() {
  if (state.bankPersistencePending) return false;
  for (const bank of state.banks) {
    if (bank?.storage !== 'indexeddb' || bank.hydrated === false) continue;
    bank.questionCount = getBankQuestionCount(bank);
    bank.questions = [];
    bank.hydrated = false;
  }
  return true;
}

function getStudyTrackingContext() {
  if (state.view === 'quiz') {
    const session = state.activeSession;
    return {
      subject: session?.subject || state.activeSubject || '',
      mode: state.reviewMode ? '背题' : session?.wrongPractice ? '错题集' : session?.shuffled ? '随机' : '顺序',
    };
  }
  if (state.view === 'answerLookup') return { subject: state.answerLookupContext?.subject || '', mode: '答案表' };
  if (state.view === 'handwriting') return { subject: state.activeSubject || '', mode: state.inkSession?.freeMode ? '自由笔记' : '题目笔记' };
  if (state.view === 'exam') return { subject: state.examSession?.subject || '', mode: '模拟考试' };
  if (state.view === 'reviewQueue') {
    const record = state.reviewQueueSession?.records?.[state.reviewQueueSession.index];
    const question = record?.question || {};
    return { subject: question.sourceSubject || question.sourcePath?.[0] || '', mode: 'FSRS复习' };
  }
  return { subject: '', mode: '' };
}

function startStudyTimer() {
  if (state.studyTimer) return;
  state.studyTimer = window.setInterval(() => {
    if (!isStudySurfaceActive()) {
      updateHomeStudyStatsDisplay();
      return;
    }
    const key = getTodayKey();
    const item = state.studyStats[key] || { seconds: 0, subjects: {}, modes: {} };
    const context = getStudyTrackingContext();
    item.seconds = Number(item.seconds || 0) + 1;
    item.subjects = item.subjects && typeof item.subjects === 'object' ? item.subjects : {};
    item.modes = item.modes && typeof item.modes === 'object' ? item.modes : {};
    if (context.subject) item.subjects[context.subject] = Number(item.subjects[context.subject] || 0) + 1;
    if (context.mode) item.modes[context.mode] = Number(item.modes[context.mode] || 0) + 1;
    item.updatedAt = Date.now();
    state.studyStats[key] = item;
    saveStudyStats();
    updateHomeStudyStatsDisplay();
  }, 1000);
}

function getPracticeProgressSummary() {
  const keys = new Set(getQuestionKeysForBanks(getVisibleBanks()));
  const sequenceKeys = Object.keys(state.answerState.sequence || {}).filter(key => keys.has(key));
  const randomKeys = Object.keys(state.answerState.random || {}).filter(key => keys.has(key));
  const completed = new Set([...sequenceKeys, ...randomKeys]);
  const total = keys.size;
  const percent = total ? Math.round((completed.size / total) * 100) : 0;
  return {
    total,
    completed: completed.size,
    percent,
    sequence: sequenceKeys.length,
    random: randomKeys.length,
  };
}

function getPracticeProgressBySubject() {
  const sequence = state.answerState.sequence || {};
  const random = state.answerState.random || {};
  return getSubjectGroups().map(group => {
    const keys = new Set(getQuestionKeysForBanks(group.banks));
    const sequenceKeys = Object.keys(sequence).filter(key => keys.has(key));
    const randomKeys = Object.keys(random).filter(key => keys.has(key));
    const completed = new Set([...sequenceKeys, ...randomKeys]).size;
    return {
      subject: group.subject,
      total: keys.size,
      completed,
      sequence: sequenceKeys.length,
      random: randomKeys.length,
      percent: keys.size ? Math.round(completed / keys.size * 100) : 0,
    };

}

function getSubjectStudyStats(range = state.uiConfig.studyChartRange) {

  return getSubjectGroups().map(group => {
    const progress = progressBySubject.get(group.subject) || { total: 0, completed: 0, sequence: 0, random: 0, percent: 0 };
    const seconds = chart.rows.reduce((sum, row) => sum + Number(state.studyStats[row.key]?.subjects?.[group.subject] || 0), 0);
    const todaySeconds = Number(state.studyStats[todayKey]?.subjects?.[group.subject] || 0);
    return {
      ...progress,
      subject: group.subject,
      seconds,
      todaySeconds,
      wrong: getWrongRecords({ subject: group.subject }).length,
      banks: group.banks.length,
    };
  }).sort((left, right) => right.seconds - left.seconds || right.completed - left.completed || left.subject.localeCompare(right.subject, 'zh-Hans-CN'));
}

function getModeStudyStats(range = state.uiConfig.studyChartRange) {
  const chart = getStudyChartData(range);
  const totals = new Map();
  chart.rows.forEach(row => {

    });

  return [...totals.entries()].map(([mode, seconds]) => ({ mode, seconds })).sort((left, right) => right.seconds - left.seconds);
}

function setViewProgress(key, payload) {

}

function getViewProgressItem(key) {

function saveScopedProgress(scopeKey, payload) {

function removeScopedProgress(scopeKey) {

function mapIndexedValuesByQuestionKey(questions, values) {
  const result = {};
  for (const [index, value] of Object.entries(values || {})) {
    if (!value) continue;
    const question = questions[Number(index)];
    if (question) result[questionKey(question)] = value;
  }
  return result;
}

function getSavedValueMap(saved, keyedField, indexedField) {
  const direct = saved && saved[keyedField];
  if (direct && typeof direct === 'object') return { ...direct };
  return mapIndexedValuesByQuestionKey(saved?.questions || [], saved?.[indexedField] || {});
}

function mapQuestionKeysToIndices(questions, keyedValues) {
  const result = {};
  questions.forEach((question, index) => {
    const value = keyedValues?.[questionKey(question)];
    if (value) result[index] = value;
  });
  return result;
}

function getProgressModeSegment(shuffled, reviewMode) {
  if (reviewMode || state.uiConfig.progressScopePolicy === 'merged') return '';
  return shuffled ? 'random' : 'sequence';
}

function makeQuestionScopeKey(subject, questions, reviewMode, title = '', shuffled = false) {
  const keys = (questions || []).map(questionKey).sort().join('|');
  const mode = getProgressModeSegment(shuffled, reviewMode);
  return `${reviewMode ? 'review' : 'practice'}:${mode ? `${mode}:` : ''}${subject || title || 'all'}:${hashString(keys)}`;
}

function makeBankScopeKey(subject, banks, reviewMode, shuffled = false) {
  const ids = (banks || []).map(b => b.id || b.name).sort().join('|');
  const mode = getProgressModeSegment(shuffled, reviewMode);
  return `${reviewMode ? 'review' : 'practice'}:${mode ? `${mode}:` : ''}${subject || 'all'}:${hashString(ids)}`;
}

function migrateSavedProgressStore(store) {
  if (!store || typeof store !== 'object') return {};
  let changed = false;
  const next = { ...store };
  Object.entries(store).forEach(([key, saved]) => {
    if (!saved || saved.reviewMode || key.startsWith('review:')) return;
    const parts = key.split(':');
    if (parts[0] !== 'practice' || ['sequence', 'random'].includes(parts[1])) return;
    const mode = saved.shuffled ? 'random' : 'sequence';
    const migratedKey = `practice:${mode}:${parts.slice(1).join(':')}`;
    if (!next[migratedKey]) {
      next[migratedKey] = { ...saved, scopeKey: migratedKey };
      changed = true;
    }
  });
  if (changed) saveProgressStore(next);
  return next;
}

function hashString(value) {
  let hash = 0;
  const text = String(value || '');
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  }
  return Math.abs(hash).toString(36);
}

async function getQuestionsFromSavedSession(saved) {
  let questions = [];
  if (Array.isArray(saved.bankIds) && saved.bankIds.length) {
    const banks = saved.bankIds.map(id => state.banks.find(b => b.id === id)).filter(Boolean);
    if (banks.length) {
      questions = buildQuestionSet(await ensureBanksHydrated(banks));
      releaseHydratedLargeBanks();
    }
  }
  if (!questions.length && Array.isArray(saved.questions)) questions = saved.questions;
  if (saved.questionOrderKeys && saved.questionOrderKeys.length) {
    questions = orderQuestionsByKeys(questions, saved.questionOrderKeys);
  }
  return questions;
}

function orderQuestionsByKeys(questions, orderedKeys) {
  const map = new Map((questions || []).map(q => [questionKey(q), q]));
  const used = new Set();
  const ordered = [];
  for (const key of orderedKeys || []) {
    const question = map.get(key);
    if (question) {
      ordered.push(question);
      used.add(key);
    }
  }
  for (const question of questions || []) {
    const key = questionKey(question);
    if (!used.has(key)) ordered.push(question);
  }
  return ordered;
}

function restoreSavedSession(saved, options = {}) {
  if (!saved) return showNotice('没有可恢复的进度');
  if (options.questions) return restoreSavedSessionWithQuestions(saved, options, options.questions);
  return getQuestionsFromSavedSession(saved).then(questions => restoreSavedSessionWithQuestions(saved, options, questions));
}

function restoreSavedSessionWithQuestions(saved, options, questions) {
  if (!questions.length) return showNotice('保存的题库已不存在');
  const currentQuestionKey = saved.currentQuestionKey || questionKey(saved.questions?.[saved.currentIndex || 0] || {});
  const answersByKey = getSavedValueMap(saved, 'answersByKey', 'answers');
  const draftsByKey = getSavedValueMap(saved, 'draftsByKey', 'drafts');
  const answerModeKey = getAnswerModeKey(options.shuffled ?? Boolean(saved.shuffled), options.reviewMode ?? Boolean(saved.reviewMode), Boolean(saved.wrongPractice));
  const mergedAnswersByKey = mergeAnswerMapsForMode(questions, answerModeKey, answersByKey);
  const savedIndex = Math.max(0, questions.findIndex(q => questionKey(q) === currentQuestionKey));
  const currentIndex = options.startAtFirst ? 0 : savedIndex;
  state.activeSubject = options.subject || saved.subject || '';
  state.activeSession = {
    title: options.title || saved.title || '保存的练习',
    subtitle: options.subtitle || saved.subtitle || '保存进度',
    subject: options.subject || saved.subject || '',
    path: normalizePath(options.path || saved.path || (options.subject || saved.subject ? [options.subject || saved.subject] : [])),
    returnPath: options.returnPath === null ? getPracticeReturnPath(saved, options.path || saved.path || []) : normalizePath(options.returnPath || saved.returnPath || getPracticeReturnPath(saved, options.path || saved.path || [])),
    shuffled: options.shuffled ?? Boolean(saved.shuffled),
    reviewMode: options.reviewMode ?? Boolean(saved.reviewMode),
    wrongPractice: Boolean(saved.wrongPractice),
    questions,
    scopeKey: options.scopeKey || saved.scopeKey || makeQuestionScopeKey(saved.subject, questions, Boolean(saved.reviewMode), saved.title, Boolean(saved.shuffled)),
    bankIds: options.bankIds || saved.bankIds || [],
  };
  state.currentIndex = currentIndex;
  state.answers = mapQuestionKeysToIndices(questions, mergedAnswersByKey);
  state.drafts = mapQuestionKeysToIndices(questions, draftsByKey);
  state.revealedAnswers = {};
  state.mode = saved.mode === 'scroll' ? 'scroll' : 'page';
  state.reviewMode = options.reviewMode ?? Boolean(saved.reviewMode);
  state.navStack = [];
  state.view = 'quiz';
  syncCurrentAnswersToGlobal();
  renderQuiz();
}

async function resumeSavedSession(scopeKey = '') {
  await restoreSavedSession(getSavedSession(scopeKey));
}

function clearSavedSession(scopeKey = '') {
  if (scopeKey) {
    removeScopedProgress(scopeKey);
  } else {
    const saved = getSavedSession();
    if (saved?.scopeKey) removeScopedProgress(saved.scopeKey);
    localStorage.removeItem(SAVED_SESSION_KEY);
  }
  if (state.view === 'subjects') renderSubject();
  else renderHome();
}

function resetCurrentPractice() {
  if (!state.activeSession) return;
  const scopeKey = state.activeSession.scopeKey || '';
  if (scopeKey) removeScopedProgress(scopeKey);
  const reshuffled = Boolean(state.activeSession.shuffled && state.uiConfig.randomReshuffleOnReset);
  clearGlobalAnswersForQuestions(state.activeSession.questions, getAnswerModeKeyFromSession());
  if (reshuffled) {
    state.activeSession.questions = shuffleQuestions(state.activeSession.questions);
  }
  state.answers = {};
  state.drafts = {};
  state.revealedAnswers = {};
  state.currentIndex = 0;
  showToast(reshuffled ? '已重置并重新打乱' : '已重置当前练习');
  renderQuiz();
}

function showToast(text) {
  const old = document.getElementById('toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.id = 'toast';
  el.className = 'toast';
  el.textContent = text;
  document.body.appendChild(el);
  window.setTimeout(() => el.remove(), 1600);
}

function clearToast() {
  const old = document.getElementById('toast');
  if (old) old.remove();
}

function closeAppDialog() {
  state.notebookGraph?.destroy?.();
  state.notebookGraph = null;
  state.notebookGraphSelection = null;
  document.querySelector('.app-dialog-mask')?.remove();
}

function showAppDialog({ title, message = '', defaultValue = '', input = false, confirmText = '确定', cancelText = '取消', onConfirm }) {
  closeAppDialog();
  const mask = document.createElement('div');
  mask.className = 'app-dialog-mask';
  const dialog = document.createElement('div');
  dialog.className = 'app-dialog';
  dialog.innerHTML = `
    <h3>${escapeHtml(title)}</h3>
    ${message ? `<p>${escapeHtml(message)}</p>` : ''}
    ${input ? `<input type="text" value="${escapeAttr(defaultValue)}">` : ''}
    <div class="app-dialog-actions">
      <button class="secondary" type="button">${escapeHtml(cancelText)}</button>
      <button type="button">${escapeHtml(confirmText)}</button>
    </div>
  `;
  mask.appendChild(dialog);
  document.body.appendChild(mask);
  const inputEl = dialog.querySelector('input');
  const [cancelBtn, okBtn] = dialog.querySelectorAll('button');
  const finish = () => {
    const value = inputEl ? inputEl.value.trim() : true;
    closeAppDialog();
    if (onConfirm) onConfirm(value);
  };
  cancelBtn.onclick = closeAppDialog;
  okBtn.onclick = finish;
  mask.onclick = e => { if (e.target === mask) closeAppDialog(); };
  if (inputEl) {
    inputEl.focus();
    inputEl.select();
    inputEl.onkeydown = e => {
      if (e.key === 'Enter') finish();
      if (e.key === 'Escape') closeAppDialog();
    };
  } else {
    okBtn.focus();
  }
}

function askText(title, defaultValue, onConfirm) {
  showAppDialog({ title, defaultValue, input: true, onConfirm: value => {
    if (value) onConfirm(value);
  } });
}

function askConfirm(message, onConfirm) {
  showAppDialog({ title: '确认操作', message, confirmText: '确认', onConfirm });
}

function showNotice(message) {
  showAppDialog({ title: message, confirmText: '知道了', cancelText: '关闭' });
}

function saveUiConfig() {
  localStorage.setItem(UI_CONFIG_KEY, JSON.stringify(state.uiConfig));
}

function loadUiConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem(UI_CONFIG_KEY));
    if (saved && typeof saved === 'object') {
      const migrated = { ...saved };
      const version = Number(migrated.configVersion || 0);
      if (version < 2 && migrated.toolPanelsDefaultExpanded === true) {
        migrated.toolPanelsDefaultExpanded = false;
      }
      if (migrated.palette === 'endfield') {
        migrated.systemTheme = 'endfield';
        migrated.palette = 'forest';
        migrated.primary = PALETTE_PRESETS.forest.primary;
      }
      state.uiConfig = { ...state.uiConfig, ...migrated, configVersion: UI_CONFIG_VERSION };
    }
  } catch(e) {}
  if (!PALETTE_PRESETS[state.uiConfig.palette]) state.uiConfig.palette = 'classic';
  normalizeUiConfig();
  applyUiConfig();
}

function normalizeUiConfig() {
  state.uiConfig.systemTheme = state.uiConfig.systemTheme === 'endfield' ? 'endfield' : 'standard';
  state.uiConfig.componentRadius = Math.max(0, Math.min(18, Number(state.uiConfig.componentRadius ?? 14)));
  state.uiConfig.reduceMotion = Boolean(state.uiConfig.reduceMotion);
  if (state.uiConfig.progressScopePolicy !== 'merged') state.uiConfig.progressScopePolicy = 'separate';
  const iconKeys = getIconOptions().map(item => item.key);
  if (!iconKeys.includes(state.uiConfig.iconStyle)) state.uiConfig.iconStyle = 'folder';
  if (!iconKeys.includes(state.uiConfig.subjectIconStyle)) state.uiConfig.subjectIconStyle = 'library';
  if (!iconKeys.includes(state.uiConfig.chapterIconStyle)) state.uiConfig.chapterIconStyle = 'book';
  const legacyWidth = Number(state.uiConfig.savedProgressWidgetWidth || 0);
  const phoneSeed = Number(state.uiConfig.savedProgressWidgetWidthPhone || legacyWidth || 360);
  const tabletSeed = Number(state.uiConfig.savedProgressWidgetWidthTablet || Math.max(legacyWidth, 520) || 520);
  state.uiConfig.savedProgressWidgetWidthPhone = Math.max(300, Math.min(430, phoneSeed));
  state.uiConfig.savedProgressWidgetWidthTablet = Math.max(440, Math.min(720, tabletSeed));
  state.uiConfig.savedProgressWidgetWidth = state.uiConfig.savedProgressWidgetWidthPhone;
  state.uiConfig.persistStudyStats = state.uiConfig.persistStudyStats !== false;
  state.uiConfig.studyChartRange = normalizeStudyChartRange(state.uiConfig.studyChartRange);
  const validTools = ['practice', 'review', 'wrong', 'handwriting'];
  state.uiConfig.toolCardOrder = Array.isArray(state.uiConfig.toolCardOrder) ? state.uiConfig.toolCardOrder.filter(key => validTools.includes(key)) : validTools;
  state.uiConfig.hiddenToolCards = Array.isArray(state.uiConfig.hiddenToolCards) ? state.uiConfig.hiddenToolCards.filter(key => validTools.includes(key)) : [];
  const validMetrics = ['subjects', 'questions', 'progress', 'time'];
  state.uiConfig.homeMetricOrder = Array.isArray(state.uiConfig.homeMetricOrder) ? state.uiConfig.homeMetricOrder.filter(key => validMetrics.includes(key)) : validMetrics;
  state.uiConfig.hiddenHomeMetrics = Array.isArray(state.uiConfig.hiddenHomeMetrics) ? state.uiConfig.hiddenHomeMetrics.filter(key => validMetrics.includes(key)) : [];
  state.uiConfig.subjectOrder = Array.isArray(state.uiConfig.subjectOrder) ? state.uiConfig.subjectOrder : [];
  state.uiConfig.libraryOrder = state.uiConfig.libraryOrder && typeof state.uiConfig.libraryOrder === 'object' ? state.uiConfig.libraryOrder : {};
  state.uiConfig.notebookLibraryViewDesktop = state.uiConfig.notebookLibraryViewDesktop === 'list' ? 'list' : 'covers';
  state.uiConfig.notebookLibraryViewMobile = state.uiConfig.notebookLibraryViewMobile === 'covers' ? 'covers' : 'list';
  state.uiConfig.notebookPageFlow = state.uiConfig.notebookPageFlow === 'horizontal' ? 'horizontal' : 'vertical';
  state.uiConfig.notebookToolbarCollapsed = Boolean(state.uiConfig.notebookToolbarCollapsed);
  const notebookToolKeys = NOTEBOOK_TOOL_DEFINITIONS.map(item => item.key);
  const savedNotebookTools = Array.isArray(state.uiConfig.notebookToolbarTools)
    ? state.uiConfig.notebookToolbarTools.filter((key, index, items) => notebookToolKeys.includes(key) && items.indexOf(key) === index)
    : notebookToolKeys;
  state.uiConfig.notebookToolbarTools = savedNotebookTools.includes('pen') ? savedNotebookTools : ['pen', ...savedNotebookTools];
}

function applyUiConfig() {
  const endfield = state.uiConfig.systemTheme === 'endfield';
  const theme = endfield ? 'dark' : (state.uiConfig.theme === 'system' ? getSystemTheme() : state.uiConfig.theme);
  document.body.dataset.theme = theme;
  document.body.dataset.systemTheme = endfield ? 'endfield' : 'standard';
  document.body.dataset.palette = endfield ? '' : (state.uiConfig.palette || 'classic');
  document.body.dataset.reduceMotion = state.uiConfig.reduceMotion ? 'true' : 'false';
  const palette = endfield ? ENDFIELD_SYSTEM_THEME : (PALETTE_PRESETS[state.uiConfig.palette] || PALETTE_PRESETS.classic);
  const surface = endfield ? palette.surface : (palette[theme] || palette.light);
  const root = document.documentElement;
  root.style.setProperty('--bg', surface.bg);
  root.style.setProperty('--card', surface.card);
  root.style.setProperty('--text', surface.text);
  root.style.setProperty('--muted', surface.muted);
  root.style.setProperty('--line', surface.line);
  const primary = endfield ? palette.primary : (state.uiConfig.primary || palette.primary);
  root.style.setProperty('--primary', primary);
  root.style.setProperty('--on-primary', endfield ? '#101113' : '#ffffff');
  root.style.setProperty('--primary-soft', hexToSoft(primary));
  root.style.setProperty('--secondary', palette.secondary);
  root.style.setProperty('--secondary-soft', hexToSoft(palette.secondary));
  root.style.setProperty('--success', palette.success);
  root.style.setProperty('--success-soft', hexToSoft(palette.success));
  root.style.setProperty('--danger', palette.danger);
  root.style.setProperty('--danger-soft', hexToSoft(palette.danger));
  root.style.setProperty('--warn', palette.warn);
  root.style.setProperty('--warn-soft', hexToSoft(palette.warn));
  root.style.setProperty('--bar-bg', rgbaFromHex(surface.card, theme === 'dark' ? .90 : .92));
  root.style.setProperty('--option-tint', rgbaFromHex(theme === 'dark' ? surface.bg : surface.line, theme === 'dark' ? .72 : .42));
  root.style.setProperty('--shadow', theme === 'dark' ? '0 2px 18px rgba(0,0,0,.24)' : '0 10px 28px rgba(23,31,56,.07)');
  root.style.setProperty('--shadow-soft', theme === 'dark' ? '0 1px 2px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.24)' : '0 1px 2px rgba(23,31,56,.04),0 10px 30px rgba(23,31,56,.055)');
  root.style.setProperty('--saved-progress-width-phone', `${state.uiConfig.savedProgressWidgetWidthPhone || 360}px`);
  root.style.setProperty('--saved-progress-width-tablet', `${state.uiConfig.savedProgressWidgetWidthTablet || 520}px`);
  const radius = state.uiConfig.componentRadius;
  root.style.setProperty('--radius', `${radius}px`);
  root.style.setProperty('--radius-sm', `${Math.max(0, Math.round(radius * .72))}px`);
  root.style.setProperty('--radius-control', `${Math.max(0, Math.round(radius * .86))}px`);
}

function getSystemTheme() {
  if (typeof window.__nativeDarkMode === 'boolean') return window.__nativeDarkMode ? 'dark' : 'light';
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

window.applyNativeTheme = function applyNativeTheme(isDark) {
  window.__nativeDarkMode = Boolean(isDark);
  if (state.uiConfig.theme === 'system') {
    applyUiConfig();
  }
};

// ========== AI configuration and persistence ==========
function normalizeAiConfig() {
  const preset = AI_PROVIDER_PRESETS[state.aiConfig.provider] || AI_PROVIDER_PRESETS.custom;
  state.aiConfig.provider = AI_PROVIDER_PRESETS[state.aiConfig.provider] ? state.aiConfig.provider : 'custom';
  state.aiConfig.baseUrl = String(state.aiConfig.baseUrl || preset.baseUrl || '').trim().replace(/\/+$/, '');
  state.aiConfig.apiKey = String(state.aiConfig.apiKey || '').trim();
  state.aiConfig.model = String(state.aiConfig.model || preset.model || '').trim();
  state.aiConfig.modelOptions = Array.isArray(state.aiConfig.modelOptions)
    ? Array.from(new Set(state.aiConfig.modelOptions.map(item => String(item || '').trim()).filter(Boolean))).slice(0, 200)
    : [];
  state.aiConfig.maxTokens = clampNumber(Number(state.aiConfig.maxTokens || 1800), 128, 16384);
  state.aiConfig.historyMessages = clampNumber(Number(state.aiConfig.historyMessages || 12), 0, 60);
  state.aiConfig.temperature = clampNumber(Number(state.aiConfig.temperature ?? .3), 0, 2);
  state.aiConfig.visionEnabled = Boolean(state.aiConfig.visionEnabled);
  state.aiConfig.persistThreads = state.aiConfig.persistThreads !== false;
  state.aiConfig.customSystemPrompt = String(state.aiConfig.customSystemPrompt || '').trim().slice(0, 6000);
}

function loadAiState() {
  try {
    const saved = JSON.parse(localStorage.getItem(AI_CONFIG_KEY));
    if (saved && typeof saved === 'object') state.aiConfig = { ...state.aiConfig, ...saved };
  } catch(e) {}
  normalizeAiConfig();
  try {
    const savedThreads = JSON.parse(localStorage.getItem(AI_THREADS_KEY));
    state.aiThreads = Array.isArray(savedThreads)
      ? savedThreads.map(normalizeAiThread).filter(Boolean).slice(0, 50)
      : [];
  } catch(e) {
    state.aiThreads = [];
  }
  try {
    const savedAnalyses = JSON.parse(localStorage.getItem(AI_ANALYSES_KEY));
    state.aiAnalyses = savedAnalyses && typeof savedAnalyses === 'object' ? savedAnalyses : {};
  } catch(e) {
    state.aiAnalyses = {};
  }
}

function normalizeAiThread(thread) {
  if (!thread || typeof thread !== 'object') return null;
  return {
    id: String(thread.id || `ai:${Date.now()}:${Math.random().toString(36).slice(2)}`),
    title: String(thread.title || '新对话').slice(0, 80),
    createdAt: Number(thread.createdAt || Date.now()),
    updatedAt: Number(thread.updatedAt || thread.createdAt || Date.now()),
    context: thread.context && typeof thread.context === 'object' ? thread.context : null,
    messages: Array.isArray(thread.messages) ? thread.messages.map(message => ({
      id: String(message.id || `message:${Date.now()}:${Math.random().toString(36).slice(2)}`),
      role: message.role === 'assistant' ? 'assistant' : 'user',
      content: String(message.content || ''),
      attachments: Array.isArray(message.attachments) ? message.attachments.map(normalizeAiAttachment).filter(Boolean) : [],
      createdAt: Number(message.createdAt || Date.now()),
      model: String(message.model || ''),
      usage: message.usage && typeof message.usage === 'object' ? message.usage : null,
      error: Boolean(message.error),
    })) : [],
  };
}

function normalizeAiAttachment(item) {
  if (!item || typeof item !== 'object') return null;
  return {
    id: String(item.id || `attachment:${Date.now()}:${Math.random().toString(36).slice(2)}`),
    name: String(item.name || '附件').slice(0, 180),
    type: String(item.type || 'application/octet-stream').slice(0, 120),
    size: Number(item.size || 0),
    kind: item.kind === 'image' ? 'image' : item.kind === 'text' ? 'text' : 'file',
    text: String(item.text || '').slice(0, 30000),
    dataUrl: typeof item.dataUrl === 'string' ? item.dataUrl : '',
  };
}

function saveAiConfig() {
  normalizeAiConfig();
  localStorage.setItem(AI_CONFIG_KEY, JSON.stringify(state.aiConfig));
}

function saveAiThreads() {
  if (!state.aiConfig.persistThreads) {
    localStorage.removeItem(AI_THREADS_KEY);
    return;
  }
  const slim = state.aiThreads.slice(0, 50).map(thread => ({
    ...thread,
    messages: (thread.messages || []).slice(-120).map(message => ({
      ...message,
      attachments: (message.attachments || []).map(attachment => ({
        ...attachment,
        dataUrl: '',
        text: String(attachment.text || '').slice(0, 16000),
      })),
    })),
  }));
  try {
    localStorage.setItem(AI_THREADS_KEY, JSON.stringify(slim));
  } catch(e) {
    const reduced = slim.slice(0, 20).map(thread => ({ ...thread, messages: thread.messages.slice(-40) }));
    localStorage.setItem(AI_THREADS_KEY, JSON.stringify(reduced));
  }
}

function saveAiAnalyses() {
  const entries = Object.entries(state.aiAnalyses || {})
    .filter(([, item]) => item && item.content)
    .sort((a, b) => Number(b[1].updatedAt || 0) - Number(a[1].updatedAt || 0))
    .slice(0, 500);
  state.aiAnalyses = Object.fromEntries(entries);
  try {
    localStorage.setItem(AI_ANALYSES_KEY, JSON.stringify(state.aiAnalyses));
  } catch(e) {
    state.aiAnalyses = Object.fromEntries(entries.slice(0, 180));
    localStorage.setItem(AI_ANALYSES_KEY, JSON.stringify(state.aiAnalyses));
  }
}

function createAiThread(options = {}) {
  const thread = normalizeAiThread({
    id: `ai:${Date.now()}:${Math.random().toString(36).slice(2)}`,
    title: options.title || '新对话',
    createdAt: Date.now(),
    updatedAt: Date.now(),
    context: options.context || null,
    messages: Array.isArray(options.messages) ? options.messages : [],
  });
  state.aiThreads.unshift(thread);
  state.activeAiThreadId = thread.id;
  saveAiThreads();
  return thread;
}

function getActiveAiThread(createIfMissing = true) {
  let thread = state.aiThreads.find(item => item.id === state.activeAiThreadId);
  if (!thread && createIfMissing) thread = createAiThread();
  return thread || null;
}

function getAiThreadTitle(thread) {
  if (!thread) return 'AI 助手';
  if (thread.context?.question) return String(thread.context.question).slice(0, 28);
  const firstUser = (thread.messages || []).find(message => message.role === 'user' && message.content.trim());
  return firstUser ? firstUser.content.trim().replace(/\s+/g, ' ').slice(0, 28) : (thread.title || '新对话');
}

function renameAiThreadFromContent(thread) {
  if (!thread || (thread.title && thread.title !== '新对话')) return;
  thread.title = getAiThreadTitle(thread);
}

function getAiChatEndpoint() {
  const base = String(state.aiConfig.baseUrl || '').trim().replace(/\/+$/, '');
  if (/\/chat\/completions$/i.test(base)) return base;
  return `${base}/chat/completions`;
}

function getAiModelsEndpoint() {
  const base = String(state.aiConfig.baseUrl || '').trim().replace(/\/+$/, '');
  if (/\/chat\/completions$/i.test(base)) return base.replace(/\/chat\/completions$/i, '/models');
  return `${base}/models`;
}

function validateAiConnectionConfig() {
  normalizeAiConfig();
  if (!state.aiConfig.baseUrl) throw new Error('请先填写 API 地址');
  if (!/^https:\/\//i.test(state.aiConfig.baseUrl) && !/^http:\/\/127\.0\.0\.1(?::\d+)?/i.test(state.aiConfig.baseUrl) && !/^http:\/\/localhost(?::\d+)?/i.test(state.aiConfig.baseUrl)) {
    throw new Error('API 地址必须使用 HTTPS；本机调试地址可以使用 localhost');
  }
  if (!state.aiConfig.apiKey) throw new Error('请先填写 API Key');
  if (!state.aiConfig.model) throw new Error('请先选择或填写模型');
}

function isAiConfigurationError(error) {
  const message = String(error?.message || error || '').trim();
  return message === '请先填写 API 地址' ||
    message === '请先填写 API Key' ||
    message === '请先选择或填写模型';
}

function estimateAiTokens(text) {
  const value = String(text || '');
  const ascii = (value.match(/[\x00-\x7F]/g) || []).length;
  return Math.max(1, Math.ceil((value.length - ascii) / 1.7 + ascii / 4));
}

function formatAiUsage(message) {
  const usage = message?.usage || {};
  const output = Number(usage.completion_tokens || usage.output_tokens || 0);
  const input = Number(usage.prompt_tokens || usage.input_tokens || 0);
  if (input || output) return `${input ? `输入 ${input}` : ''}${input && output ? ' · ' : ''}${output ? `输出 ${output}` : ''} tokens`;
  return message?.content ? `约 ${estimateAiTokens(message.content)} tokens` : '';
}

function buildAiAttachmentText(attachments, allowVision) {
  const lines = [];
  for (const attachment of attachments || []) {
    if (attachment.kind === 'text' && attachment.text) {
      lines.push(`\n[文件：${attachment.name}]\n${attachment.text}`);
    } else if (attachment.kind === 'image' && (!allowVision || !attachment.dataUrl)) {
      lines.push(`\n[图片附件：${attachment.name}。当前请求没有可读取的图片数据或模型未开启视觉能力，请明确告知用户无法分析这张图片。]`);
    } else if (attachment.kind === 'file') {
      lines.push(`\n[文件附件：${attachment.name}，类型 ${attachment.type}。当前客户端无法提取正文，请明确说明不能读取该文件内容。]`);
    }
  }
  return lines.join('');
}

function buildAiUserContent(message) {
  const attachments = message.attachments || [];
  const allowVision = Boolean(state.aiConfig.visionEnabled);
  const textContent = `${message.content || ''}${buildAiAttachmentText(attachments, allowVision)}`.trim();
  const images = attachments.filter(item => item.kind === 'image' && item.dataUrl && allowVision);
  if (!images.length) return textContent;
  return [
    { type: 'text', text: textContent || '请分析附件。' },
    ...images.map(item => ({ type: 'image_url', image_url: { url: item.dataUrl } })),
  ];
}

function getAiRequestMessages(thread) {
  const system = [AI_CHAT_SYSTEM_PROMPT, state.aiConfig.customSystemPrompt].filter(Boolean).join('\n\n');
  const messages = [{ role: 'system', content: system }];
  if (thread?.context) {
    messages.push({
      role: 'system',
      content: `这是当前追问题目的固定上下文。后续回答必须结合它：\n${JSON.stringify(thread.context, null, 2)}`,
    });
  }
  const historyLimit = Number(state.aiConfig.historyMessages || 0);
  const history = (thread?.messages || []).filter(item => !item.error).slice(-(historyLimit + 1));
  for (const message of history) {
    messages.push({
      role: message.role,
      content: message.role === 'user' ? buildAiUserContent(message) : String(message.content || ''),
    });
  }
  return messages;
}

async function requestAiCompletion(messages, options = {}) {
  validateAiConnectionConfig();
  const controller = options.controller || new AbortController();
  const body = {
    model: state.aiConfig.model,
    messages,
    max_tokens: state.aiConfig.maxTokens,
    temperature: state.aiConfig.temperature,
    stream: options.stream !== false,
  };
  const response = await fetch(getAiChatEndpoint(), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${state.aiConfig.apiKey}`,
    },
    body: JSON.stringify(body),
    signal: controller.signal,
  });
  if (!response.ok) {
    let detail = '';
    try {
      const errorData = await response.json();
      detail = errorData?.error?.message || errorData?.message || '';
    } catch(e) {
      try { detail = await response.text(); } catch(ignore) {}
    }
    throw new Error(detail || `API 返回 ${response.status}`);
  }
  const responseType = String(response.headers.get('content-type') || '').toLowerCase();
  if (body.stream && response.body && responseType.includes('text/event-stream')) {
    const reader = response.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';
    let content = '';
    let usage = null;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split(/\r?\n/);
      buffer = lines.pop() || '';
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;
        const raw = trimmed.slice(5).trim();
        if (!raw || raw === '[DONE]') continue;
        try {
          const chunk = JSON.parse(raw);
          const delta = chunk?.choices?.[0]?.delta?.content || '';
          if (delta) {
            content += delta;
            if (options.onDelta) options.onDelta(content);
          }
          if (chunk?.usage) usage = chunk.usage;
        } catch(e) {}
      }
    }
    return { content: content.trim(), usage };
  }
  const data = await response.json();
  const resultContent = data?.choices?.[0]?.message?.content;
  return {
    content: Array.isArray(resultContent) ? resultContent.map(item => item?.text || '').join('') : String(resultContent || '').trim(),
    usage: data?.usage || null,
  };
}

function renderAiMarkdown(value) {
  const lines = String(value || '').replace(/\r/g, '').split('\n');
  const result = [];
  let listType = '';
  let inCode = false;
  let codeLines = [];
  const closeList = () => {
    if (listType) result.push(`</${listType}>`);
    listType = '';
  };
  const inline = text => escapeHtml(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  for (const line of lines) {
    if (line.trim().startsWith('```')) {
      closeList();
      if (inCode) {
        result.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
        codeLines = [];
      }
      inCode = !inCode;
      continue;
    }
    if (inCode) {
      codeLines.push(line);
      continue;
    }
    const heading = line.match(/^\s*(#{2,4})\s+(.+)$/);
    if (heading) {
      closeList();
      result.push(`<h3>${inline(heading[2])}</h3>`);
      continue;
    }
    const unordered = line.match(/^\s*[-*]\s+(.+)$/);
    const ordered = line.match(/^\s*\d+[.)]\s+(.+)$/);
    if (unordered || ordered) {
      const nextType = ordered ? 'ol' : 'ul';
      if (listType !== nextType) {
        closeList();
        listType = nextType;
        result.push(`<${listType}>`);
      }
      result.push(`<li>${inline((unordered || ordered)[1])}</li>`);
      continue;
    }
    closeList();
    if (line.trim()) result.push(`<p>${inline(line.trim())}</p>`);
  }
  closeList();
  if (inCode) result.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
  return result.join('');
}

function hexToSoft(hex) {
  const rgb = hexToRgb(hex);
  if (!rgb) return 'rgba(31,143,98,.12)';
  return `rgba(${rgb.r},${rgb.g},${rgb.b},.12)`;
}

function rgbaFromHex(hex, alpha) {
  const rgb = hexToRgb(hex);
  if (!rgb) return `rgba(31,143,98,${alpha})`;
  return `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
}

function hexToRgb(hex) {
  const clean = String(hex || '#1f8f62').replace('#', '');
  const full = clean.length === 3 ? clean.split('').map(c => c + c).join('') : clean;
  const r = parseInt(full.slice(0, 2), 16);
  const g = parseInt(full.slice(2, 4), 16);
  const b = parseInt(full.slice(4, 6), 16);
  if ([r, g, b].some(Number.isNaN)) return null;
  return { r, g, b };
}

async function loadBundledBanks() {
  state.loadingDefaults = true;
  state.defaultLoadError = '';
  refreshLibrarySurfaceAfterBankLoad();

  const imported = state.banks.filter(b => !b.bundled);
  const loaded = [];
  const loadedIds = new Set();
  const embeddedBanks = Array.isArray(window.__QUIZAPP_EMBEDDED_BANKS__) ? window.__QUIZAPP_EMBEDDED_BANKS__ : null;

  if (embeddedBanks && embeddedBanks.length) {
    embeddedBanks.forEach((data, i) => {
      const bank = normalizeBank(data, `embedded:${i}`, true);
      if (loadedIds.has(bank.id)) return;
      loaded.push(bank);
      loadedIds.add(bank.id);
    });
  }

  const optionalFiles = await discoverLocalPostgraduateBankFiles();
  const files = Array.from(new Set([...DEFAULT_BANK_FILES_RUNTIME, ...optionalFiles]));
  for (let offset = 0; offset < files.length; offset += 6) {
    const batch = files.slice(offset, offset + 6);
    const results = await Promise.allSettled(batch.map(async file => ({
      file,
      bank: normalizeBank(await loadBankJson(file), `bundled:${file}`, true),
    })));
    results.forEach((result, index) => {
      const file = batch[index];
      if (result.status === 'fulfilled') {
        const bank = result.value.bank;
        if (!loadedIds.has(bank.id)) {
          loaded.push(bank);
          loadedIds.add(bank.id);
        }
        return;
      }
      if (DEFAULT_BANK_FILES_RUNTIME.includes(file) && !embeddedBanks?.length) {
        state.defaultLoadError = '内置题库加载失败，请检查 APK 是否为最新版。';
      }
      console.warn('[QuizApp] bundled bank load failed:', file, result.reason);
    });
    if (offset === 0 || offset + batch.length >= files.length) {
      state.banks = [...loaded, ...imported];
      applyBankMeta();
      refreshLibrarySurfaceAfterBankLoad();
    }
  }

  state.banks = [...loaded, ...imported];
  applyBankMeta();
  state.loadingDefaults = false;
  refreshLibrarySurfaceAfterBankLoad();
}
