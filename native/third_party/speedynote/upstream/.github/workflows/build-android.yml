name: Build SpeedyNote Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write   # needed to push Docker image to GHCR

env:
  REGISTRY: ghcr.io
  # Image is public (build environment only — no secrets inside)
  IMAGE_NAME: ${{ github.repository_owner }}/speedynote-android-builder
  MUPDF_VERSION: 1.24.10

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # Docker image — rebuild only when android/Dockerfile changes.
      # The image is stored in GHCR using BuildKit registry-based layer caching.
      # Tagging by Dockerfile hash means identical environments share the same
      # layer cache across branches and contributors.
      # -------------------------------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker image tag from Dockerfile hash
        id: docker-tag
        run: |
          HASH=$(sha256sum android/Dockerfile | cut -c1-12)
          echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${HASH}" >> $GITHUB_OUTPUT
          echo "Docker image tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${HASH}"

      - name: Build and push Docker image (BuildKit layer cache in GHCR)
        uses: docker/build-push-action@v6
        with:
          context: android/
          push: true
          tags: ${{ steps.docker-tag.outputs.tag }}
          # Registry-based cache survives across runners and is not bound by the
          # 10 GB GHA cache limit (important for a Qt + NDK + SDK image).
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # -------------------------------------------------------------------------
      # MuPDF static libraries — cache the compiled output directory.
      # Cache key covers the MuPDF version, NDK version (baked into Dockerfile),
      # and the build script itself.  Any change to any of those invalidates
      # the cache and triggers a fresh MuPDF build.
      # -------------------------------------------------------------------------
      - name: Restore MuPDF library cache
        id: cache-mupdf
        uses: actions/cache@v4
        with:
          path: android/mupdf-build
          key: mupdf-${{ env.MUPDF_VERSION }}-${{ hashFiles('android/Dockerfile', 'android/build-mupdf.sh') }}

      - name: Build MuPDF (skipped on cache hit)
        if: steps.cache-mupdf.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ steps.docker-tag.outputs.tag }} \
            bash -c "./android/build-mupdf.sh"

      # -------------------------------------------------------------------------
      # Release signing — whenever the secret is available.
      # The keystore is never stored in the repo; it lives in GitHub Secrets as a
      # base64-encoded blob.  Required secrets (Settings → Secrets → Actions):
      #
      #   ANDROID_SIGNING_KEY     base64-encoded .keystore file
      #                           Generate with:
      #                             base64 -w0 release.keystore > keystore.b64
      #                           Then paste the contents as the secret value.
      #
      #   ANDROID_KEY_ALIAS       Key alias inside the keystore
      #   ANDROID_STORE_PASSWORD  Keystore password
      #   ANDROID_KEY_PASSWORD    Key password (may equal ANDROID_STORE_PASSWORD)
      #
      # If these secrets are not set the workflow falls back to a debug-signed APK.
      # -------------------------------------------------------------------------
      - name: Decode release keystore
        id: signing
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 --decode > /tmp/release.keystore
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract version from CMakeLists.txt
        id: version
        run: |
          VERSION=$(grep -oP 'project\(SpeedyNote VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "App version: ${VERSION}"

      - name: Build SpeedyNote APKs (arm64 + arm32)
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Decide signing mode
          if [[ "${{ steps.signing.outputs.available }}" == "true" ]]; then
            SIGN_FLAG="--release"
            KEYSTORE_MOUNT="-v /tmp/release.keystore:/tmp/release.keystore"
            KEYSTORE_ENV="-e RELEASE_KEYSTORE=/tmp/release.keystore"
          else
            SIGN_FLAG=""
            KEYSTORE_MOUNT=""
            KEYSTORE_ENV=""
          fi

          for ARCH in arm64 arm32; do
            docker run --rm \
              -v ${{ github.workspace }}:/workspace \
              ${KEYSTORE_MOUNT} \
              -w /workspace \
              ${KEYSTORE_ENV} \
              -e RELEASE_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
              -e RELEASE_STORE_PASS="${{ secrets.ANDROID_STORE_PASSWORD }}" \
              -e RELEASE_KEY_PASS="${{ secrets.ANDROID_KEY_PASSWORD }}" \
              ${{ steps.docker-tag.outputs.tag }} \
              bash -c "rm -rf android/build-app/android-build && ./android/build-speedynote.sh --apk --${ARCH} ${SIGN_FLAG}"

            mv android/SpeedyNote.apk "android/SpeedyNote-${VERSION}-${ARCH}.apk"
          done

      - name: Remove release keystore
        if: always()
        run: rm -f /tmp/release.keystore

      # -------------------------------------------------------------------------
      # Artifacts
      # -------------------------------------------------------------------------
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpeedyNote-${{ steps.version.outputs.version }}-APKs
          path: |
            android/SpeedyNote-${{ steps.version.outputs.version }}-arm64.apk
            android/SpeedyNote-${{ steps.version.outputs.version }}-arm32.apk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/SpeedyNote-${{ steps.version.outputs.version }}-arm64.apk
            android/SpeedyNote-${{ steps.version.outputs.version }}-arm32.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
